front:
  text: 淮海集卷之十六
  hash: sha256:7f589ccb7262560edd79abc56c8a2456043fab919e24fa07838c174b547f694a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_016-1a}
body:
  text: 秦觀少遊進䇿將帥臣聞將帥之難其人久矣勢有強弱任有久近敵有堅脆地有逺邇時有治亂而勝敗之機不繫焉惟其將而已矣昔智氏以韓魏三國之兵伐趙馬服君之子以四十萬之衆抗秦可謂強矣而潰於晉陽坑於長平廉頗率老弱之卒守邯鄲田單鳩創病之餘保即墨可謂弱矣而栗腹以摧騎劫以走是不在乎勢之強弱也穰苴之用於齊拔于閭伍之中也一日斬莊賈晉師罷去燕師渡水而解韓信之擊趙非素拊循士大夫也背水一戰而擒趙王歇斬成安君是不在乎任之久近也以周瑜之望曹公不啻虎狼而吳兵捷於赤壁以元德之視陸遜甚於雛􅙿而蜀師衄於白帝是不在乎敵之堅脆也東西異壤也而鄧艾以縋兵取成都南北異習也而王鎮惡以舟師平關中是不在乎地之逺邇也夫以東晉之衰而謝元得志於淝水開元之盛而哥舒翰失利於潼關是不在乎時之治亂也故善將者勢無強弱任無久近敵無堅脆地無逺邇時無治亂不用則已用之無不勝焉故曰惟其將而已矣雖然有一軍之將有一國之將有天下之將走及奔馬射中飛鳥攻堅城破強敵所向無前此有勇之士一軍之將也出竒制勝無窮如天地不竭如江河攻輒破擊輒服此有智之士一國之將也福於已而禍於人則功有所不立利於今而害於後則事有所不為功成事畢自視缺然無矜大之色此有道之士天下之將也古者閫外之事將軍制之軍中不聞天子之詔其委任責成如此非有道之士其可以輕付之哉國家將帥可謂盛矣閲禮樂而敦詩書者肩摩而轂擊縱橫剽悍稱智囊而號肉飛者至不可勝計然驛騎有赤白囊至則廟堂之上為之紛然進止賞罰皆從中決者何也豈以為將帥者皆智勇之人非有道之士不可獨任故邪夫廟堂議邊事則王體不嚴將帥之權輕則武功不立嗚呼可謂兩失之也臣以為西北二邉宜各置統帥一人用大臣材兼文武可任天下之將者為之凡有軍事惟以大義上聞進退賞罰盡付其手得以便宜從事如此則雖有邊警可以不煩廟堂之論而豪傑之材得以成其功矣竒兵臣聞萬物莫不有竒馬有驥犬有盧畜之竒也鷹隼將擊必匿其形虎擬而後動動而有獲禽獸之竒也天雄烏喙堇葛之毒竒於藥繁弱忘歸竒於弓矢鸊鵜莫邪竒於刀劒雲為山竒濤為海竒隂陽之氣怒為風交為電亂為霧薄而為雷激而為霆融散而為雨露凝結而為霜雪天地之竒也惟兵亦然嚴溝壘盛輜重傳檄而出計里而行剋期而戰此兵之正也提百一之士力扛鼎而射命中者縋山航海依叢薄而晝伏乘風雨而夜起恍焉如鬼之無迹忽焉如水之無制此兵之竒也兵之道莫難於用竒莫巧於用竒莫妙於用竒何以言之凡用竒之法必以正兵為主而出者謂之無正兵為主孤軍孤軍勝敗未可知也霍去病所將常選有大軍繼其後是以深入而未嘗困絶李陵提步卒五千轉鬪單于于漠北而無他將援之其擒宜矣故曰莫難於用竒夫材有勇怯技有精冗勇者克敵則怯者奮冗為敵破則精者却自然之勢也善將者擇其精勇以為竒悉其冗怯以為正竒兵雖少而以鋭為正之勢正兵雖雜而以衆為竒之勢長短相補強弱相資則寡者亦為衆冗怯者亦為精勇也故曰莫巧于用竒昔岑彭泝都江而上以拔武陽繞出延岑軍後而公孫述驚鄧艾取隂平道下油江破綿竹徑薄成都而劉禪降孫處自江左浮大海直掩畨禺而盧循破李訴越交成戍殱張柴柵夜襲蔡州而吳元濟擒此數子者皆智謀足以料敵勇敢足以決勝故能乘變投隙而就其功名使敵雖有強將徑卒不得盡試其能而固巳敗也故曰莫妙于用竒孫臏曰解雜亂紏紛者不控捲救鬪者不摶檄批亢搗虛形禁勢格則自為解耳則非夫通隂陽之幾達萬物之變以得用竒之奧者何足以及此今夫屠者之解牛也經肯綮則以刀遇大軱則以斧至庖丁則不然批隙導窽遊其刃于空虛而磔然已解矣奕者之鬪碁也諦分審布失其守者逐而攻之至奕秋則不然倒行而逆施用意于所爭之外而沛然巳勝矣夫屠奕鄙事也有竒技則無與抗者况于兵乎兵法曰兵以正合以竒勝然而天下之狃於常而駭於變知所以合者多而悟所以勝者少也辨士臣聞兵之大槩我為主彼為客是守之而已彼為主我為客是攻之而已客主不分彼我相埒塗覯而卒遇是戰之而已此兵之常法也且事固有常法所不能辦者守則形不便攻則勢不利戰則氣不克當是時也雖有智勇無所用之獨可馳一介之使憑軾撙御喻以禍福而得志此軍中所以不可無辨士也然則所謂辨士者必以其具三德眀五機而利口者不與焉蓋上知道德性命之原下達禮義形器之變旁通幽明時物之所宜者識也窘之而益出費之而益新掩之以卒而不亂壓之以重而不懾者才也經傳子史天星地志醫方卜筮百家之書無所不涉而能謹守其宗者學也夫是之謂三德俯而賀仰而吊聞者遑懅心折骨驚手足俱廢其名曰恐機道以令名贊以美利聞者悅懌陽氣浸淫上滿大宅其名曰喜機訐過差而不貸觸忌諱而無疑聞者忿然髮上衝冠目眥盡裂其名曰怒機旁刺其所悼念逆釣其所感傷聞者泫然涕下霑臆不𣸪自勝其名曰悲機發端而指隙其説泛而不根其意圓而無主聞者茫然如獲異物不知其名欲捨之而行則恐其寶也欲取之而去則恐其怪也徙倚周章狐疑而不知其名曰思機此五者天之所以命於人有觸之則彍然而發莫能禦巳夫是之謂五機蓋三德不具不足以立已五機不眀不足以移人故曰所謂辨士者必具三德明五機而利口者不與焉昔蘇秦張儀犀首陳軫代厲之屬嘗以辨名於世矣然三德不足而五機有餘故事求遂而不問禮之得失功求成而不恤義之存亡偷合茍容取濟一時而巳此其所以為利口之雄而君子不道也然後世之人見其如此遂以辨為縱橫之術諱問而耻言之則所謂因咽而廢食也孔子曰賜能辨而不能訥孟子曰豫豈好辨哉豫不得巳也由此觀之孔孟之間未嘗廢辨特貴夫時然後發不得巳而後用爾古者列國之大夫聘于塗者肩摩而轂擊兵之交則使在其間若非辨士為之則安能專對而不辱於君命耶或曰戰國之時無定勢無常形橫則秦帝縱則楚王故辨士足以乘間而執其機自漢以來形勢異矣尚安所事辨乎曰是不然人之生也有手足則知搏擊有心智則知思慮有口舌則知語言天下之亂常生於此三者然反而用之亦可已亂蓋搏擊為力思慮為謀語言為辨天下未嘗一日不用力與謀也何獨於辨而疑之昔酈食其使齊田橫以七十城下漢陸賈使南越尉它去黃屋而稱臣賈林致李抱真命而王武俊倒戈韓愈入鎮州而牛元翼出矣此後世用辨士之明效也天下不用兵則已矣如用兵辨士不可無也謀主臣聞兵家之所以取勝者非特將良而士卒徑也必有精深敏悟之士料敵合變出竒無窮者為之謀主焉古之人將有天下之事未嘗不先於謀故考訂卿士之議參酌庶人之言所以謀之於明也拂龜端䇿灼之而辨兆揲之而分卦所以謀之於幽也易曰天地設位聖人成能人謀鬼謀百姓與能夫謀者聖人所不能免也况於兵乎兵之道猶一人之身將者心也謀主者思慮也圖籍者臟腑也法制者脈絡也號令者聲音也旌旗鼓鐸者耳目也車騎步兵者四肢也心之統臟腑惣脈絡出聲音用耳目役四肢也精以思慮則外不攘於人事內不冦於隂陽思焉而不精慮焉而不熟則飢飽勞佚之遇漫然而不知寒暑溫清之變冥然而不察冒犯水火嬰觸金石無所不至矣故心雖明臟腑雖安脈絡雖通聲音雖和耳目雖聰明四肢雖便利不可以無思慮將雖良圗籍雖具法制雖謹號令雖嚴旌旗鼓鐸雖修車騎步兵雖練不可以無謀主蓋將軍之於謀主也有之者勝無之者敗已棄之而資敵者敗敵取之而助已者勝嘗用矣而或棄者亦敗棄矣而或用者亦勝何以知其然耶昔楚漢之強弱者不待較而知也而項氏乘百戰之威身死東城劉氏以顛沛奔北之餘五載而成帝業何哉漢有良平之屬為之謀楚有一范增而不能用也故楊雄曰漢屈羣䇿羣䇿屈群力楚憞群䇿而自屈其力屈人者勝自屈者負此所謂有之者勝無之者敗也昔陳餘捨李左車之計死泜水上韓信釋縛而師事之遂收燕齊袁本初棄許攸之䇿攸奔曹公公跣而迎之遂破冀州夫攸左車者豈欲負彼而忠此哉用舍之勢然也此所謂巳棄之而資敵者敗敵取之而助巳者勝也昔張繡以精卒追魏師賈詡以為不可已而果敗既又請收散卒而攻之已而果勝夫詡之為繡謀一也從違不同則勝敗異變可不察哉此所謂嘗用矣而棄之者亦敗嘗棄矣而用之者亦勝也是以良將之待謀主也致之以禮而不敢慢交之以誠而不敢欺結之以恩而不敢厭遺其過差而略其缺失所與圗畫者雖父子兄弟有不得而知焉古之人所以談笑而折衝偃息而銷釁者繇此道也後世則不然將受命之日士大夫莫敢仰視而所謂幕府從事者往往皆闒茸取具之人一旦敵傳於陴隍之下變發乎肘腋之間召而問之五色已無主矣是豈有輔於萬分之一哉臣病夫世之論兵者止知重將帥之選急士卒之練講器械陳營之所宜究山川形勢之便而推風角鳥占之説至於謀主則未始一言及焉不知夫謀主者一軍勝敗之樞機也淮海集卷之十六
