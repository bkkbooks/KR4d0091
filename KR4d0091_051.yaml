front:
  text: 淮海長短句巻中
  hash: sha256:9428d024beaaf706852ae77ab0720e340b539b1d72de1a6b8928274ca0d4535b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_051-1a}
body:
  text: 秦觀少游鵲橋仙纎雲弄巧飛星傳恨銀漢迢迢暗度金風玉露一相逢便勝却人間無數柔情似水佳期如夢忍顧鵲橋歸路兩情若是久長時又豈在朝朝暮暮菩薩蠻蟲聲泣露驚秋枕羅幃淚濕鴛鴦錦獨卧玉肌凉殘更與恨長陰風翻翠幔雨澀燈花暗畢竟不成眠鴉啼金井寒减字木蘭花天涯舊恨獨自凄凉人不問欲見回腸斷盡金爐小篆香黛蛾長歛任是東風吹不轉困倚危樓過盡飛鴻字字愁木蘭花秋容老盡芙蓉院草上霜花勻似剪西樓促坐酒盃深風壓繡簾香不捲玉纎慵整銀筝鴈紅袖時籠金鴨煖嵗華一任委西風獨有春紅留醉臉畵堂春落紅鋪徑水平池弄晴小雨霏霏杏園憔悴杜鵑啼無柰春歸柳外畵樓獨上凭䦨手撚花枝放花無語對斜暉此恨誰知千秋嵗水邉沙外城郭春寒退花影亂鶯聲碎飄零踈酒盞離别寛衣帶人不見碧雲暮合空相對憶昔西池㑹鵷鷺同飛葢携手處今誰在日邊清夢斷鏡裏朱顔改春去也飛紅萬㸃愁如海踏莎行霧失樓臺月迷津渡桃源望斷無尋處可堪孤舘閉春寒杜鵑聲裏斜陽暮驛寄梅花魚傳尺素砌成此恨無重數郴江幸自遶郴山為誰流下瀟湘去人何贖釋天隠註三體唐詩謂此二句實自沅湘日坡翁絶愛此詞尾兩句自書於扇云少游已矣雖萬亦流於淇已有此意秦公葢出諸此又王直方詩話夜東流去不為愁人住少時變化然弼之毖彼泉水郴誌遂作斜陽度愚謂此亦何害而病其重也李太載黄山谷惜此詞斜陽暮意重欲易之未得其字今陽斜杜工部山木蒼蒼落日曛皆此意別如韓文公白詩睠彼落日暮即斜陽暮也劉禹錫烏衣巷口夕之類尤多豈可亦謂之重耶山谷當無此言即誠岀紀夢詩中有一人壯非少石鼔歌安置妥帖平不頗未足為定論也山谷亦一時之言蝶戀花曉日窺軒雙燕語似與佳人共惜春將暮屈指艷陽都幾許可無時霎閑風雨流水落花無問處只有飛雲冉冉來還去持酒勸雲雲且住憑君礙斷春歸路一落索楊花終日空飛舞柰久長難駐海潮雖是暫時來却有箇堪憑處紫府碧雲為路好相將歸去肯如薄倖五更風不解與花為主醜奴兒夜來酒醒清無夢愁倚闌干露滴輕寒雨打芙蓉淚不乾佳人别後音塵悄瘦盡難拚明月無端已過紅樓十二間南鄉子妙手寫徽真水剪雙眸㸃絳唇疑是昔年窺宋玉東鄰只露墻頭一半身往事已酸辛誰記當年翠黛顰盡道有些堪恨處無情任是無情也動人醉桃源即阮郎歸碧天如水月如眉城頭銀漏遲緑波風動畵船移嬌羞初見時銀燭暗翠簾垂芳心兩自知楚臺魂斷曉雲飛幽歡難再期河傳二首亂花飛絮又望空闘合離人愁苦那更夜來一霎薄情風雨暗掩將春色去籬枯壁盡因誰做若説相思佛也眉兒聚莫恠為伊抵死縈腸惹肚為沒教人恨處又恨眉醉眼甚輕輕覷著神魂迷亂常記那回小曲闌干西畔鬢雲鬆羅襪剗丁香咲吐嬌無限語軟聲低道我何曾慣雲雨未諧早被東風吹散悶損人天不管浣溪沙五首漠漠輕寒上小樓曉陰無賴似竆秋澹烟流水畵屏幽自在飛花輕似夢無邊絲雨細如愁寶簾閑挂小銀鈎又香靨凝羞一笑開柳腰如醉暖相挨日長春困下樓臺照水有情聊整鬢倚闌無緒更兠鞋眼邊牽恨懶歸來又霜縞同心翠黛連紅綃四角綴金錢惱人香爇是龍涎枕上忽收疑是夢燈前重㸔不成眠又還一段惡因緣又脚上鞋兒四寸羅唇邊朱粉一櫻多見人無語但回波料得有心憐宋玉只應無柰楚襄何今生有分共伊麽又錦帳重重卷暮霞屏風曲曲闘紅牙恨人何事苦離家枕上夢魂飛不去覺來紅日又西斜滿庭芳草襯殘花婉約有味尾句尤含蓄深思前叚用元㣲之天台詩意後叚如夢令五首門外鴉啼楊柳春色着人如酒睡起熨沉香玉腕不勝金斗消瘦消瘦還是褪花時候又遥夜沉沉如水風緊驛亭深閑夢破䑕窺燈霜送曉寒侵被無寐無寐門外馬嘶人起又幽夢怱怱破後妝粉亂㾗霑袖遥想酒醒來無柰玉銷花瘦回首回首遶岸夕陽疎柳又樓外殘陽紅滿春入柳條將半桃李不禁風回首落英無限腸斷腸斷人共楚天俱逺又池上春歸何處滿目落花飛絮孤舘悄無人夢斷月堤歸路無緒無緒簾外五更風雨阮郎歸四首褪花新緑漸團枝撲人風絮飛秋千未拆水平堤落紅成地衣遊蝶困乳鶯啼怨春春怎知日長早被酒禁持那堪更别離又宫腰裊裊翠鬟鬆夜堂深處逢無端銀燭殞秋風靈犀得暗通更有限恨無窮星河沉曉空隴頭流水各西東佳期如夢中又瀟湘門外水平鋪月寒征棹孤紅妝飲罷少踟蹰有人偷向隅揮玉筯洒真珠梨花春雨餘人人盡道斷腸初那堪腸也無又湘天風雨破寒初深沉庭院虛麗譙吹罷小單于迢迢清夜徂鄉夢斷旅魂孤崢嶸嵗又除衡陽猶有鴈傳書郴陽和鴈無滿庭芳三首咏茶北苑研膏方圭圓璧萬里名動京闗碎身粉骨功合上凌煙尊俎風流戰勝降春睡開拓愁邊纎纎捧香泉濺乳金縷鷓鴣斑相如方病酒一觴一詠賔有羣賢便扶起燈前醉玉頽山搜攬胸中萬巻還傾動三峽詞源歸來晚文君未寢相對小妝殘又此詞正少游所作人傳王觀撰非也曉色雲開春隨人意驟雨方過還晴髙臺芳榭飛燕蹴紅英舞困榆錢自落秋千外綠水橋平東風裏朱門映栁低按小秦筝多情行樂處珠鈿翠葢玉轡紅纓漸酒空金榼花困蓬瀛豆蔻梢頭舊恨十年夢屈指堪驚凭闌乆疎煙淡日寂寞下蕪城又茶詞雅燕飛觴清談揮麈使君髙㑹羣賢宻雲雙鳯初破縷金團牎外爐烟似動開尊試一品香泉輕淘起香生玉乳雪濺紫甌圓嬌鬟宜美盼雙擎翠袖穏步紅蓮坐中客翻愁酒醒歌闌㸃上紗籠畫燭花􅍡弄月影當軒頻相顧餘歡未盡欲去且留連桃源憶故人玉樓深鏁薄情種清夜悠悠誰共羞見枕衾鴛鳯悶即和衣擁無端畵角嚴城動驚破一番新夢窓外月華霜重聽徹梅花弄淮海長短句巻中
