front:
  text: 淮海後集巻之五
  hash: sha256:acc4a2b5723a0f4544833b2dabc7db7c26cfcd505b2c708f88e924293ae31d3e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_046-1a}
body:
  text: 秦觀少游代蘄州守謝上表愚罪著明當以萬死聖恩寛大尚假一麾顧帷昧冐之深第積戰競之至伏念臣不學無術寡偶少徒荷先帝之誤知繇常員而擢用始欲悉力而舉職莫知長慮以佐時自取悔尤至煩揮黜責其妄作便可屏之逺方憫其知非猶當投於散地敢圖生死而肉骨尚容宣化以承流况臣粤自去冬嘗陳愚懇願歸使節求綰郡章雖此左遷正符宿願恩既深而逾望感亦極而難言此蓋伏遇皇帝陛下大徳海涵至仁天覆謂災青之可赦以過失為當憐寛其未棄之誅開以自新之路辨之不早嗟已迫於桑榆來者可追幸未填於溝壑誓捐軀幹上報恩私代程給事乞祝聖表本州管内舊有應天寺者造於宋元徽中其地據寳林山巔南直秦望北負卧龍蕺山挾其左鑑水趨其前圜視井邑如閲圖畫越之形勝十得六七比於熈寧十年八月遇火金石土木之觀一夕殆盡樓觀宫室化為丘墟父老過之徜徉悼歎若失所依憑者因相率詣州自陳願以私錢修復故寺本州尋具其事上聞仍乞易為十方䝉朝廷報可賜號寶林禪院於是郡之衣冠緇素無不悦豫皷舞以謀報上因大出力財爭先請奮浮圖棟宇次第告成曾未踰年已復舊觀葢所據之地勝故興也易所遭之時盛故成也速不然何以至是哉謹按寶林禪院其地本名龜山前世文士見於篇章上有鰻井嵗旱禱雨輒應臣等竊以為龜神物也有先事之智而夀踰千嵗鰻龍類也有施澤之仁而功被萬物位正南方與時相見勢出人境足以有臨稽之於名効之於物參之於方位考之於形勢而酌之於民情理從事順實宜永為頌祝陛下聖夀之地臣等自今後每遇同天節只於本院啓建道塲及禱祠雨澤吉祥齋供其餘宫中道埸並不令於本院啓建夫下達士民之願上報君父之恩臣子之職也臣等荷國厚恩無以荅生成之萬一庶幾因緣塔廟少伸犬馬之誠仰瞻闕庭不勝大願伏望聖慈特賜俞允坤成節功徳文疏寶曆開祥爰屬補天之運金行御氣適當夢帝之期躬詣精廬妙修勝㑹致上方香積之飯閲西土貝多之文庶憑調御之緣少効華封之祝太皇太后伏願睿圖鞏固宸筭増隆日月無私永照臨於下土風雲不間長感㑹於中天代荅范相公啟堯天器兼文武道備天人始列周行綽有棟梁之器及參大政鬱為社稷之臣果振家聲遂當國相昔韋平嗣興於西漢袁楊繼起於東京張公錫延賞之名陸氏取象先之意雖云華族未必熈朝然猶前史以為美談當世謂之榮事固未有百年遇太平之運四世膺爰立之求以今言之一何盛也某夙登門仭嘗頌威容念班謁以無由第承風而竊抃賀孫中丞啟光奉明恩進陞中憲伏惟慶慰恭惟中丞侍郎受天間氣爲世真儒力足以扶顛持危器足以致逺任重巍然如衣服之有冠冕卓爾若鳥魚之有鳯鯤三朝充諌諍之官奮身不顧七郡任蕃宣之寄爲民所思動静不失其時遜逆必求諸道比支物望簡在上心粤自貳卿遂登執法嚴霜被野既知松栢之後凋猛獸居山將見藜藿之不采某叨持符節久逺門闌賀吏部傅侍郎啓光膺帝命進貳天官云云某官道術淵微器猷宏慱更險夷而不測其操踐中外而不易其心漢節初歸常折董宏之妄楚郊卧治尤推汲黯之忠方傳報政之成已聽除書之下亟辭右輔復踐中臺邦人遮轍以願留朝士舉酒而相賀吏曹三綜既知水鑑之無私王體一謀當見鈞衡之益重某屬驅軺傳阻造門闌代何提舉賀范樞密啓光膺睿命進貳中樞碩輔登崇溥天均慶竊以天運無積蓋由八柱之仰成歲功不虧亦自四時而分洽矧媧皇補天之際當商老和羮之初儻非心徳之素同難冀事功之必立伏惟某官器兼文武學僃天人雖小善而必為臨大節而不奪入參臺省佇聞折檻之風外摠戎機寢罷爭桑之釁負謗傷而精神益勵處閑散而聞望愈隆逮神聖之纂臨屬風雲之感㑹念昔仁祖虚懷於慶曆之間惟時先公奏對於天章之下謂道可行於反掌而世亦至於容刀盛世難逢事空傳於故老嗣賢復出天實慰於斯民既被召以旋歸遂干霄而直上千尋廣厦欣然慰多士之心萬里長城足以制四夷之命某夙登門仞久曠書幐方從沙汰之餘未卜棲翔之所側聞進拜倍切驩愉巖石雖瞻尚鬱搢紳之論衮衣遂有方醻區夏之情賀門下吕僕射啓㣲仲伏審光奉明恩進陞左輔伏惟慶慰恭以某官當世大儒斯民先覺毁譽莫為之損益窮通靡得而變渝北平如髙山深林人何可測巨源若渾金璞玉器孰能名卓乎在搢紳之中屹然有公輔之望果踐西臺之峻遂躋端揆之崇邸音喧騰士類交慶納忠有素詎須徳裕之六箴應變無方不止姚崇之十事謝潁州吕吏部啟叨奉宸恩謬當藩郡境預四鄰之未潤霑九里之餘憑几占書未進河南之牘朶雲號體俄䝉郇國之函仰荷謙沖退増悚愧恭以某官器周事變學造淵微出四世五公之門遇千載一時之運文辭則操觚立就政事則投刃皆虚荀氏八龍盡繼髙陽之美河東三鳯尤推鸑鷟之奇㑹公旦之相周俾伯禽而侯魯布宣詔令已成帥帥之功近省君親行陟股肱之任某承風兹久覿徳未遑企頌之懐敷宣㒺既荅丁彦良書某啟辱書及詩備悉雅㫖且承邇來為况甚休以感以慰竊味詩之大意率多辛酸耿愴之㫖君生長素富貴而喜作寒士語何耶因知詩非能窮人詩窮然後工得非政欲以此合古人語乎兼審薄挂吏議小累不足以玷逺猷毋甚怏怏也知罷官里閭慕義嗜學是所以增其志尚爾白玉微瑕千丈松磥砢不害他日爲大器跅弛之士自有御之者幸順時自愛區區不宣某再拜與許州范相公某再拜安撫相公閤下某淮海一介之士行能無取比因緣科第獲列仕版又屬朝廷復置賢科而一二邇臣猥以充賦名實乖戾果致多言相公當國憐其孤單不即聞罷使得自便引疾而歸僥倖深矣比遇相公均逸藩輔而某承乏之地實在節制之下疵賤無介紹不敢以書自通眷眷私懷何以云喻豈圖相公過有採聽首賜論薦使僃著述之科檄書初至發函伏讀且喜且懼葢相公於某昔既有保全之賜今又有論薦之恩顧惟狂愚何以辱此屬拘官守不獲進謝門闌又不敢具啓事以叙悃愊區區俗禮非國士所以報知已者也惟相公裁察祭監税主簿文維年月日具銜姓名謹以清酌庶羞之奠致祭于歿故監税主簿之靈嗚呼賢才懿徳宜顯周行以君徳厚宜享夀康仕既未達人其云亡顧天理之莫究兹僚友之永傷嗚呼西風蕭颯長夜凄涼靈車戒道丹旐飛揚有殽在俎有酒盈觴臨岐伸奠歸安故鄉尚饗淮海後集巻之五
