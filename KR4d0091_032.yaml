front:
  text: 淮海集巻之三十二
  hash: sha256:0e79d3d6deba4f10e1d7ecfd09cd41a7d9c4073852993bba9ae8f265626a66b3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_032-1a}
body:
  text: 秦觀少游謝雨文謹以清酌庻羞之奠敢昭告于某神惟大荒落陽氣浸驕沮傷天和怒風鳴條川池既耗土山行焦念土之毛民慘不聊祗奉明命爰率我僚禱雨于神恵此東臯日走祠下莫敢告勞神享其誠精祲且交油然作雲遂不崇朝其散如絲其沃如膏焦巻一變蔚爲美苗罷遣兒曹無復呌號巫覡反室蔵緘鼓簫秋成可期玉燭遂調樽有㫖酒豆有嘉殽拜貺于神神鑒其昭尚饗代獲賊祭諸廟文謹以清酌庻羞之奠告于某神之靈乃者群盗竊發剽刼閭里逰魂疆埸境内騷然頼神威靈咸伏其辜鯨鯢既殱民以休靖敢用牲酒以荅神休尚饗代蔡州赦後省賽文維今月日徳音云云謹以清酌庻羞之奠告于某神祗奉綸言徧修羣祀導迎善氣加恵元元敢不蒸進酒牲備嚴薦獻以承休命神其鑒之尚饗代祭歐陽夫人文吁嗟夫人出于華宗來嬪髙門實配文忠惟我文忠一世之師道徳餘事發爲文辭如天有斗如嵗有春四方以正萬物爲新吁嗟夫人其徳惟稱内宗外姻俱承厥慶文忠前薨朝野涕瀾今夫人逰士亦永歎矧在敝族晚通姻好承凶矍然舉室驚悼新鄭之原文忠之塋歸合有期千車送行守土汝南征駕莫遑敬致薄辭以奠一觴代祭韓康公文嗚呼我宋受命網羅群英諸夏用康百餘年間異人間出左右辟王公以盛徳出入四朝文武自将入為上宰厥有丕績盟府是蔵出為長城臨制萬里姦變銷亡伯氏仲氏迭秉國鈞榮莫與亢功成事畢奉身而退與道翺翔嵗在執徐爰請于朝言還許昌百官奉㫖祖道供張于國之陽禮未及行遽即窀穸漠然聲光二聖震驚法駕臨奠哀動周行哲人其萎實舍于許里門相望遲公之歸執爵承飲稱夀公堂承訃泫然涕泗横集精逰出疆許道如砥喬木交覆比通大梁不見安輿乃見䘮車人且䀌傷悲來填膺辭不成文聊侑一觴祭酺神文比者善氣始應霖潦屢䧏溝壑流通事既有望矣而越自雨闕以來飛蝗蔽天敢爲妖孽土之毛髪所過爲盡嗚呼其不仁也哉大旱之後而得霖雨是天有意於恤民也惟爾有神亦當上承天意驅率醜類入于江海自求多福無或違天以速愆咎登第後青詞竊以天運至神固不期於報効羣生多故實有賴於祈欀敢伸悃愊之私仰凟髙明之鑒伏念臣生而固陋長更屯竒奔走道塗常數千里淹留埸屋幾二十年既利欲之未忘在過愆而奚免深懼風霆之譴竊萌豺獺之心乃與母親戚氏爰自往年願修醮事今則猥塵科第叨預仕途豈㣲軀之克堪皆造物之冥賜輒取甲寅之嵗祗就海陵之宫依按靈科酬還素志伏願上真昭荅列聖顧懐増夀考於慈親除禍殃於眇質私門安燕無疾病之潜生官路享通絶謗傷之横至臣無任代蔡州進興龍節功徳䟽貝葉㣲言善㑹權而歸實蘂珠妙㫖能却老以延年方兹誕聖之晨可託効愚之意恭趨精宇嚴備淨筵梵唄徹於紫霄龍蘭鬰乎藻井皇帝陛下伏願皇圖鞏固睿筭増新下感羣生與松椿而共茂上通列宿將箕翼以並明代蔡州正賜庫功徳䟽嵗功告備方圖歸報之因誕節届期當具祝延之禮爰修勝㑹用逹愚衷初入寳樓不假善財之彈指遍行香飯何煩金粟之遺人助以風林水鳥之音雜以玉珮金鐺之韻皇帝陛下伏願聖躬如月宸筭後天日聞萬嵗之呼嵗受千金之鑒興龍節䟽二道號登元祐鬰佳氣以横流節遇興龍藹頌聲而並作非具祝延之禮莫輸歸報之誠爰詣梵坊仍趨真境儼朱紫以具在布紛緇而畢臻合覺背塵探寳王之妙敎長生久視發藏室之靈篇萬物循而其聲不窮四海竭而此飯無盡庻因勝㑹稽致愚誠皇帝陛下伏願睿命増新皇圖鞏固警蹕所至日聞嵩嶽之呼文軌攸同嵗効封人之祝電昔繞樞協氣已蟠於穹壤葵今向日頌聲復溢於華戎恭詣寳坊廣延緇侣致上方香積之饌開西土貝葉之文妙㑹惟修愚衷斯罄伏願睿圖鞏固神筭増隆日月無私永照臨於下土風雲不間常感㑹於中天代蔡州進生辰功徳䟽格王休旦夷夏同曕文母誕辰天人合慶非具祝延之禮莫輸歸報之誠肆就寳坊具伊蒲之盛饌遂延緇侣閲貝葉之真文梵音清越以干雲香穗縈回而成蓋庻憑妙㑹稍逹愚衷皇太后伏願景命逾新清躬益固導迎戩榖豈惟如月之就盈增續年齡將見後天而難老神宗皇帝晏駕功徳疏宫車晏駕率土崩心爰輸殞裂之誠用結精嚴之㑹伏願皇靈妙湛天仗超摇大圓鑒中既證無生之忍妙髙峰上更旋不退之輪慶逮邦家澤流寰海髙郵長老開堂䟽棒頭取證尤爲瓦解氷消喝下承當未免龍頭蛇尾况乃不快漆桶無孔鐵鎚徒認影以迷頭但抱贓而呌屈豈知填溝塞壑無非碧眼胡僧積嶽堆山盡是黄面老子伏惟和尚脚根㸃地鼻孔遼天真匠子之銓鎚實作家之鑪韛諸方舉唱要湏十字縱横大衆證明但看一埸敗闕寳林寺開堂疏彌勒開門惟善財而能入毗耶丈室非摩詰以難居寳林禪院南宋遺區東呉勝槩本惠休繙經之地實澄觀隷業之坊法水灣環妙峰孤秀下奩玉鑑㴠日月於昏明傍穴金蚪化風雷於呼吸既川源之綉錯仍丹艧之鼎新飛閣浮堦就山爲勢方疏圓井因木成姿即之而智慧生望之而塵勞破九重鴈塔現多寳之莊嚴萬石鯨鍾示觀音之方便久非開士難稱覺埸大師雅稱聖箭素號禪闗投虎峰而出家遇龍浮而得法祖師衣鉢昔因書壁而傳首座山林今以躍瓶而獲了無異議實有聖縁徃開大摠持門以繼鑠迦羅眼乾明開堂疏竊以離塵求覺已乖調御之心即幻見真方契飲光之望聖因時逺人與法差執空而取者依一精明任相而求者認四顛倒守癡禪爲定力運乾慧爲慈光習以自欺久則難變既安邪觧沉迷有漏之因宜得正宗開示無生之忍昭慶上人洞該真際圓證法空於旋流轉徙之途得妙湛摠持之力反聞聞性體已徧於塵沙自覺覺他功未周於毫刹輒勤三請願繼一音説現在心作將來眼醴泉開堂䟽毛端寳刹曽何新故之常天下大禪安有去來之累惟古佛廟實今醴泉自百年香火之餘治一國風煙之際塔閟連環之玉骨殿藏及錦之貝文然而飛鳥㘅花空存勝境真珠撒帳未遇明師逮軍旅之荐興獲法筵之初啓芳公長老少通敎相晩悟宗乘宻行則鄉黨之所依歸妙法則天龍之所回向逰方既久竚海滋深願辭臃腫之居亟返歸來之駕爲談不三以度爲邉淮海先生文集巻之三十二
