front:
  text: 淮海集卷之三十七書
  hash: sha256:2ef11747d16a8c213b9901b602abb0d393ecc72033dc31ba2549a7087645b06e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_037-1a}
body:
  text: 秦觀少遊上王岐公論薦士書門下相公閣下某淮海一介之士行能無取比汲汲焉惟犬馬之養是營釡鍾之祿是干行年三十有七矣而脂韋汩沒德不加充學不加進可謂無以别於常人者豈復有意求知於搢紳先生之門哉此者先人之友喬君執事奉使吳越道過淮南具言常辱相公齒及名氏屬喬君喻意使進謁於門下夫布衣之賤獲見知於宰相此古人所以書亟上日掃門而求者也顧某之不肖何以辱此幸甚幸甚然嘗聞之禍莫大於蔽賢福莫長於薦士漢武之大臣其功莫如衛霍其酷莫如張湯青去病之後侯失國除其傳不過一再而湯之子孫茅土相襲逮乎東京何哉一身之功過不足以易天下之利害故青去病受蔽賢之禍而湯獲薦士之福雖微二三子古之人其孰不然哉一沐三握髮一飯三吐哺起以待士猶恐失天下之賢人蓋其封於少昊之墟曲阜廟食者三十有四世其别封者又為凡蔣邢茅胙祭之國夫周公之求賢豈有意於求福哉天之報施自當然耳伏惟相公輔先帝已來隂陽調和廢政具舉吏民效職夷狄賔貢其度數聲名文物之盛粲然與唐虞同風逮承顧命立今天子宗社至計定於從容已事缺然若無所與其功德可謂冠百辟而通神明矣當此之時雖持尊飬嚴却客踈士固於盛致未可云損然猶區區訪諏發於至誠如某之不肖尚挂左右之餘論又况盛德尊行魁奇俊偉之才乎誠推所以辱賜不肖之意思天下所謂盛德尊行魁奇俊偉之才抱能而不試已用而未顯者兼收並進之使朝野內外才能各當其分無一人失其所者則相公雖不求於天天之所以報王氏之子孫者當不下於周公矣惟相公察焉干冒鈞嚴俯伏惟命不宣上吕晦叔書五月日進士秦某謹再拜獻書知府大資閣下某聞天下之功成於器識來世之名立于學術古之大臣以道事君不可則止未始有意於功名然其器識學術慱大而精微則功名巋然與時自至雖欲深閉固拒揮而去之不可得也昔漢昭宣之時霍光以宿衛之臣任漢室之寄大器將傾徐起而正之神色不變此其器識實有以過人者然操持國柄不知消息盈虛之運身死肉未及寒而宗族滅矣則學術不明之弊也其後順桓之間李固以一時名儒位居三事扼姦臣之吭而奪其氣此其學術真有古之遺風然易舉輕發不能定大計於無形至爭以口舌申之書幐事固不就身亦隨之喪焉則器識不宏之弊也非特二子為如此大抵西漢之士器識優於學術故多成功而名不足東漢之士學術優於器識故多令名而功不成夫君子以器為車以識為馬學術者所以御之耳西漢之士如環舍之車駕以駃騠驅通道上峻阪無所不可然而日暮途逺倒行逆施者有焉東漢之士如豆泰氏持䇿攬轡圓旋中規方折中矩然而車弊馬羸轉薄於險阻之間則固已敗矣某狂妄嘗以此説推論歷世豪傑之士又以默觀當今之時而搢紳先生有告某者以謂器足以任天下之重識足以致無窮之逺學足以探天人之賾術足以偶事物之變如古之所謂大臣非閣下不足以與於此又曰閣下之道如元氣行乎渾茫之中其發為風霆雨露者特糟粕耳某時方食聞之投匕箸而起遂欲身從服役之後求備掃灑之列而困於無介紹莫獲自通竊伏淮海抱區區之願缺然未厭者有年矣比者天幸閣下來守是邦而某丘墓之邑實隸麾下是以輒忘賤陋取其不腆之文録在異卷贄諸下執事又述其願見之説為書先焉夫大冶無棄金大陶無棄土江海不却水王侯不遺士某雖不能廉小謹曲以自託於鄉閭然古人所以處廢興而擇去就者竊嘗講其一二矣儻閣下不賜拒絶而辱收之請繼此以進干冒台嚴俯伏待命不宣謝王學士書史院學士閣下某愚不自揆竊嘗以謂衣冠而稱士者冝有以異於流俗而以古人自期故凡方册所載簡牘所存不見則巳茍有見焉未嘗不熟誦其文精核其義縱觀其形勢而私掇其英華敝精神勞筋力不能自休已者十年於兹矣然志大而才不掩事左而身益困每觀今時偶變投隙之士操數寸之管書方尺之𥿄無不拾取青紫為宗族榮耀而已獨碌碌抱不售之器以自濵於飢寒鄉人憫其愚而笑之干祿少年至指以為戒雖某亦自疑焉因計曰劒工之惑劒劒之似莫耶者惟歐冶能名其種玉工之眩玉玉之似碧蘆者惟猗頓不失其情夫宗工碩儒亦後進之歐冶猗頓也何重惜一見以質其胸中之疑乎於是試取其所為文投執事而諸公見之乃大稱借以為非世俗之所知復激勸之使卒其業故前輩諸公在東南者多得與之遊焉然某之私意尚有所不滿者獨以未見閣下也前日復衣食所迫求試有司遂得進謁左右屬賔客盛集不獲薦其區區方謀繼見而閣下固已得其鄙文於從遊之間伏蒙猥賜薦寵以為可教亦如諸公所云某於是自決不疑亦知前志之不謬俗議之不足恤而古人為可信也古之人有立行著書而舉世莫或知者猶業之如故以俟後之君子况不至於是者耶天不為人惡寒而輟其冬地不為人惡險而易其廣君子不以小人之胸胸而易其行某雖不肖竊誦此久矣自擯棄以來尤自刻勵深居簡出幾不與世人相通獨念昨出都時會閣下在告私懷惓惓有所未畢適有西行之便故復略而陳之并以近所為詩文合七篇獻諸執事伏惟閣下道德文章為一時君子之所望鄙陋之迹固已獲進于前日矣宜更賜指教水導而木植之使駑驂蹇服知所趨向不繆於先進之迹亦君子樂育人材之義也惟深賜憐察幸甚幸甚謝曾子開書史院學士閣下某不肖竊伏下風之日久矣顧受性鄙陋又學習迂闊凡所辛苦而僅有之者率不與世合以故分甘委棄不敢輒欵於搢紳之門比者不意閣下於遊從之間得其鄙文而數稱之士大夫聞者莫不竊疑私怪以為故嘗服役於左右而某未嘗一望閣下之履舄也竊觀今之士子峩冠大帶求試於有司殆五六千人學宫儒館以教育自任者無慮百數其因緣親故以為介紹談説道真以為贄獻善詞令以干謁者俯理色以叩閽人冒汙忍恥僥幸人之已知者迹相仍殃相屬也然而得善遇者十無五六與之進而教誨者十無二三至於許之以國士之風借之以齒牙餘論者蓋百無一二焉其售愈急其價愈輕亦其勢之然也某與閣下非有父兄之契姻黨鄉縣之舊介紹不先贄納不前謁者未嘗知名閽人莫識其靣而閣下獨見其骫骳之文以為可教因曲推而過與之傳曰鳴聲相應仇偶相從人由意合物以類同嗚呼閣下之知某某之受知於閣下可謂無愧乎今之人矣前日嘗一進謁於執事屬迫東下不獲繼見以盡所欲言旋觸聞罷遂無入都之期燕居間處獨念無以謝盛意之萬一輒因西行之便略陳固陋并近所為詩賦文記合七篇獻諸下執事伏惟閣下既推借之於其始宜成就之於其終數灌溉以茂其本根削垢翳以發其光明不間踈賤而教之以書使晚節未路獲列於士君子之林則某與閣下非特無愧於今之人又將無愧於古之人矣古語有云烹牛而不鹹敗所為也此言雖小可以喻大惟閣下裁之與喬希聖論黃連書某比聞公以眼疾餌黃連至數十兩猶不已不知果然否審如所聞殆不可也某頃年血氣未定頗好方術之説讀醫經數年嘗記釋者云服黃連苦參久而反熱甚以為不然後乃信之蓋五味入胃各歸其所喜故酸先歸肝苦先歸心甘先歸脾辛先歸肺鹹先歸腎入肝則為溫入心則為熱入肺則為清入腎則為寒入脾則為至隂而血氣兼之皆謂增其氣不已則臟氣有所偏勝有所偏勝則必有所偏絶黃連苦參性雖大寒然其味至苦入胃則先歸於心久而不已則心火之氣勝火勝則熱乃其理也眼疾之生本於肝之熱肝與心為子母夫心為子肝為母心火也肝亦火也腎孤臟也人嘗患一水不勝二火今病本于肝而久餌苦藥使心有所偏勝是所謂以火救火命之曰益多其不可亦明矣夫藥所以療疾其過也適所以為疾聞比初作時十已損其七八正宜節藥慎護飲食以俟其自平非如決疣潰癰可以忽然一朝去也輒具以進惟留意而聽之無忽與鮮于學士書昨蒙左右不以觀之不肖猥賜論薦以備著述之科假借過當伏增悚懼觀重惟結髮以來明公以先人之故比諸子弟而教誨之受性狂妄動取悔尤常恐一旦蒙擯絶則內傷先人之聞上負門下之義死不瞑目敢圖始終假借以及於此賜非望始榮幸實深論報無緣愧懼滋甚韓退之與陳給事書云始之以日隔之踈加之以不專之望以不與者之心而聽忌者之説閣下之門由是無愈之迹矣觀之去門下于今七年明公自留臺奉使京東入為九列進拜諫議大夫供奉仗內士因緣介紹有候門墻希望明公一顧者肩相摩迹相接也觀以聲聞過情深為同進所忌閉關却掃罪惡日聞然則明公之門宜其無觀之迹矣而詔書比下明公首以觀充賦乃知君子之所為自有常度豈以顯晦數疏而易其意哉汝南雖當孔道人事絶少風氣和平魚稻𬞞果不減於淮海士子亦樂於相從養親讀書之計極為安便但創置之官居處什物之類百色皆無自供職已來千乞營繕殆無須臾之間久不獲進左右之問緣此故也伏望垂悉幸甚自承拜命即欲致左右之問屬守將驟易日迫賤事乃爾後時皇恐無地議者謂今中書舍人皆以伯仲繼直西垣前世以來未有其事誠國家之美非特衣冠之盛也除書始下中外欣然舉酒相屬况如觀者自先舍人已來獲備服役之列其為慶慰何可勝言引領門仞但有傾倒而已婚書蚤年擁彗嘗趨大丞相之門末路紬書實佐先翰林之事重以世毋出于伯薑既事契之久敦宜婚姻之申結敬承佳命增慰夙心淮海集卷之三十七
