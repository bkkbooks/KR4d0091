front:
  text: 淮海集卷之三十三誌銘
  hash: sha256:0060a36ead968f8cf4e6cf70e9d0e55e3ad39914afd39bcc6ebf3ea64ee896b9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_033-1a}
body:
  text: 秦觀少游李狀元墓誌銘元祐三年春三月上始臨軒䇿有司所貢士被選者凡數百人而廪延李君為第一君諱常寜字安邦自嘉祐中舉進士數為春官所却至是始獲奉大對於庭上刺六經之文旁獵百氏之言下通當世之務其詞奥衍有漢唐之遺風進御一讀遂為舉首天下莫不異之是時朝庭耇老謀王體斷國論者皆累朝舊臣君於斯時年踰知命褎然得雋於翰墨之塲世以為萬户侯如以契劵取也而君釋褐授宣義郎簽書鎮海軍節度判官是歳六月以疾卒享年五十有二有司以聞詔賜錢三十萬䘏其家天下莫不悲之君困於科舉盖三十年其得名宦纔數月尔嗚呼何起之難而僨之易邪然君子疾沒世而名不稱焉君以諸生崛興名動海内其視碌碌無聞而殁者亦可以無憾君結髪學問晚而彌勵事親孝扵二弟友愛爲人恭儉潔亷其取予一毫不妄也曽祖諱益祖諱知進世居開封廪延不仕考諱永昌始仕爲從事郎鼎州司户参軍夫人秦氏先大父承議之女也後君四年卒雖除君䘮猶布衣􅂼食以終其身平生端烈􅁼如此子二人長曰弼有學行次未名女二人尚㓜以卒之年􅁙扵開封府雍丘縣大善鄉裴村西谷山林之原先府君之兆初君襄事期迫不暇納幽堂之銘逮夫人袝􅁙始鑱銘而納之銘曰帝初臨軒䇿士于庭有器晚成冠我群英大道孔夷其御又良閶闔玉堂行矣翺翔慶者在門弔者在閭胡亟只且世為嗟呼如霆忽厲風雨奄至俛仰而闕孰知其自大椿乆榮朝􅌲暫敷竟復何殊同扵空虚隋渠之壖􅂎國之疆佳城蒼蒼刻文是蔵慶禪師塔銘師諱昭慶字顯之俗姓林氏泉州晉江人也少跅弛以氣自任嘗與鄉里數人相結為賈自閩粤航海道直抵山東往來海中者十數年資用甚饒皇祐中祀眀堂恩度天下僧師爲兒時父母嘗許爲僧名􅀠漳州開元寺籍至是輒謝諸賈以財物屬同産使養其親徒手入寺毁鬚髪受具戒鄉人異之居無何謂其曹曰出家兒當尋師訪道求脱生死若匏繫一方乃土偶人耳遂去開元遍參知識至禾山楚才禪師㑹中因看風幡話忽然有悟以為道妙盡扵此矣及見黄龍惠南禪師示以佛手驢脚因縁輒漫不省因服役左右數年不去始盡得黄龍之道故師後出世法嗣黄龍云熈寧中逰淮南往來廣陵天長髙郵之間三邑之人見師如舊相識莫不靡然心服願為弟子而髙郵之人遂以乾眀請師出世凡三住道埸初髙郵之乾眀次烏江之惠濟㝡後廣陵之建隆惟惠濟僻在深山中地有湯泉人跡罕至心樂居之乾眀建隆皆為檀越士大夫所彊遯去不獲非其好也師所得法廣大㣲妙又學術無不通逹其為人法或以經論或以老莊或以卜筮或以方藥下至種種一切俗諦之事隨其根器示大方便不獨守古人言句而已自唐以來禪家盛行於世者惟雲門臨濟兩宗是時雲門苖裔分據大刹相望於淮淛之上臨濟之後自江以北惟師一人故雲門之徒或不以師為然師聞而笑曰此吾所以為臨濟兒孫也晚嵗多病謝住持事寓止髙郵醴泉法嗣處安㑹中一日召安師及諸禪者以偈兩首示之眀日飯後奄然歸寂實元祐四年八月十六日也俗夀六十三僧臘四十一其徒智勤等二十有二人與廣陵檀越奉師靈骨歸建陵起塔而葬焉眀年智潭自廣陵走京師乞銘扵某嗚呼始師出世某之外舅故潭州寜鄉縣主簿徐君賡實為檀越首及師在惠濟某甞從故龍圖閣直學士孫公覺莘老錢塘僧道潜參寥訪師於湯泉山中時烏江令則今承議郎閻君木求仁也髙郵士大夫孫閻諸公皆參問於師而為役之久縁契最深者殆莫如某然則銘師之塔某何敢辭乃為銘曰嗚呼我師法妙難思與物並作而不磷緇經論老莊卜筮方藥是皆黄龍佛手騾脚我從中證决定無疑非遷陀客當大笑之山河既露水鳥又談能事畢矣汝復何參少賈之雄老禪之伯求其異相亦不可得有岡崑崙南直海門盡未來際我師長存葛宣徳墓銘君諱書學字規叔姓葛氏其先廣陵人唐天祐中逺祖濤始徙常州之江隂曽祖諱祥不仕祖諱惟甫贈吏部尚書考諱宻承議郎致仕承議與其兄兵部侍郎宫相繼䇿名及其仲季皆以徳善夀考為搢紳所推諸子若孫行學聞扵時者相屬闔門百口有古雍睦之風今東南大族稱孝友者曰江隂葛氏君弱不好弄五嵗遭夫人憂哀毁如成人與葷血輒揮去不食及長篤行力學敏扵文詞熈寧三年中進士第調杭州餘杭縣主簿詔舉學官侍臣有欲以君􅂶賦者檄取所為文君嫌扵求售竟謝不與是時朝廷興修二浙水利議者謂苕霅二水出于天目之山而溢于太湖書曰三江既入震澤底定今二江並廢獨一松江入海故太湖之水壅而呉興被患遂欲廢北闗長安二埭上塘之渠以與下塘相通又扵餘杭之南股引苕溪之水逹于漕渠穿錢塘之市而入于江以紓呉興之患時多以為然部使者檄君行視君以為呉興之水原於太湖太湖廣袤四萬八千餘頃旁占數郡其所灌輸非獨苕霅也書稱三江震澤說者不同就如議者之言則尋常溝瀆之流豈可以比二江之任祗益紛擾耳且錢塘二埭其來乆矣大役之興古人所重固執不可議者不能奪其事遂寢故龍圖閣直學士李公常時守呉興聞君之說貽書嘉歎而部使者亦知君而交薦之移衛州共城縣令丁承議憂服除授淮南節度推官知蔡州真陽縣事改左宣徳郎知開封府長垣縣事三邑皆有惠愛民到于今思之長垣有地訟更數令不決其人執康定元年二月書契為證君至謂訟者曰爾所執偽契也康定改元在寳元之冬豈復有二月耶訟者詘服吏大驚君之為政眀多此􅁼也元祐六年六月十六日卒於長垣之官舍享年五十有四君為人篤於孝悌而毅然有守不為利害所移觀其風節議論朝廷器也而間闗數邑以卒悲夫娶夏侯氏故司門員外郎淇之女子男三人張仲牧仲子仲皆舉進士女四人在室以八年九月丙申葬扵常州江隂縣屠村之原前期諸孤以狀來請銘余舉進士時常與君同學在汝南復與君同官君之登科與儂仲父同年而張仲又余之婿也然則非余其誰宜銘者銘曰葛以國氏其支覃亂離瘼矣遷江南崛起貳卿諸弟參長垣詞徳如不慚有地百里如子男侯挽不來迄今談其積如京發二三有如不信銘斯鑱徐氏夫人墓誌銘夫人姓徐氏真州楊子人供備庫副使諱昌言之孫太子左清道率府致仕諱守約之女年二十一歸清河張氏為内殿承制諱文英之夫人治平三年閏月二十八日以疾卒于京師享年五十三生男五人清臣良臣堯臣舜臣禹臣堯臣舉進士以學行聞舜臣應天府軍巡判官監楚州五祐鹽埸女二人長適進士王搆次適進士王諤早卒以元豐四年十月癸酉祔葬于揚州江都縣東興鄉馬坊里承制君之墓承制君元配劉氏無子早卒既升朝故事得封妻為縣君夫人請先劉氏承制君義而從之故夫人未及封而卒後二年以恩始追贈夀昌縣君銘曰懿懿夀昌女子之師渾然平夷不妄咲嬉初在厥家孝謹是處逮嬪徳門益踵前武維親及黨不汝瑕疵豈伊黽俛天實我資承祭奉賓事嚴且飭以身先之疇敢不力既羙于躬又相其夫子多俊髦亦澤之餘崑崙之西岡阜蟠踞鑱詞幽墟以照不腐虞氏夫人墓誌銘夫人姓虞氏諱麗華越州山隂人助教昱之季女年十九歸同郡陸氏為承議郎知髙郵縣事佖之夫人踰八年而卒卒後十年葬于山隂縣野人原其舅朝議公所生母􅀽夫人之兆實熙寧三年五月某日也元豐六年天子有事扵南郊夫人以承議君陞朝恩封仙源縣君云承議君甞謂予曰虞雖越之著姓世以財雄亡妻婉嫕恭儉如出寒素之家仰事舅姑旁接内外之宗姻下撫僮使之衆殆無一人失其意者不幸短折以死生一女嫁進士史安術比已死矣余深悲之幸䝉明恩追錫封邑而葬時迫其幽堂之銘實尚未刻子與予故人也願為論次其事將穿其墓前而納之以致予意焉是時予將赴汝陽治装薄􅃍雖許其作而未暇而君毎見余輒以仙源之銘為囑至于八九而不倦鳴呼夫婦俗薄乆矣仙源之殁幾三十年而君尋繹悼念眷眷不忘如初非風義之厚出扵天性何以至此耶乃為之銘曰惟夫人胃東陽嬪徳門家有光命雖絶慶未央刻斯文誌幽荒李氏夫人墓誌銘至和中先君逰太學事安定先生胡公嵗時歸覲具言太學人物之盛數稱海陵王君觀及其從弟覿有髙才力學而文流軰無與比者余時爲兒侍左右聞而心慕之願即見盖不可得後數年二君相繼舉進士中第其試於有司皆為開封第一名實既發所與皆一時之豪余遂以故人子獲從之逰元豐六年七月二十六日寺丞君觀之母李夫人卒宣徳君覿以書抵余曰世母葬有日矣伯氏荒迷不能請願有銘嘻先君友執之命也其可以辭謹按夫人李氏諱仁用世為泰州如臯人年二十六歸王氏為府君諱惟清之夫人享年八十有三以卒之年九月四日祔葬于如臯之赤崖鄉府君之墓子男一人寺丞君也女四人其婿趙世昌為内殿崇班蔡實丁傳夏侯煦皆舉進士孫男一人曰譚孫女二人一早卒次尚㓜夫人性通逹治事有法度凡内外之宗姻下逮婢使靡不得其歡心子既出仕供養甚厚及坐法免生理蕭然恬不以介意雖髙年視聽不衰手足便利迄終無一言亂者銘曰扵維夫人閒且穆來嬪王宗祗厥職内嚴外順宗姻懌既夀又康時酒食變故相詭獨䖏廓氣形逮反超不失藏從其夫古原宅詞詔後來有幽刻掩闗銘元豐初觀舉進士不中退居髙郵杜門却掃以詩書自娱乃作掩闗之銘其詞曰門有衡衢􅀆蹄踵聮世不我謀􅀆地自偏渾沌是師􅀆機械焚何以玩心􅀆有討論插架萬軸􅀆星宿懸口唫目披􅀆逰聖賢偶與意㑹􅀆欣忘飡植芳樹羙􅀆亦既蕃執耰摶虎􅀆更衆難自覈不迷兮邈考槃蹇民多艱􅀆戒求全髙明家室􅀆鬼笑喧速成亟壊􅀆理則然蔓蔓荆棘􅀆上造天窳窳窳一作磨牙􅀆交術阡勿應其求􅀆􅋦深寃掩闗自娯􅀆觧憂患啜菽飲水􅀆顔恱歡優哉㳺㦲􅀆聊永年劉氏研銘溪之精石之靈紫雲氣亟明星為頴窟作刃硎永寳用瑑斯銘銘頴師研頴師十二嵗以書為東坡大滌二公所稱他時豈易量㦲予以紫石硯贈之銘其下曰三生懐素法頴上人時扵此處轉大法輪瀘州使君任公墓表元豐中朝廷治西南乞弟之罪至扵斬將帥絀監司兩蜀騷然四年而後定余甞怪乞弟裔夷耳兵不過二千人非有冒頓强悍之威結賛狡險之謀蛇豕㣲種乃為邉患如此及觀瀘州使君任公事迹然後知累年之役實部使者為之裔夷何足責也任公諱伋字師中眉州眉山人少學讀書通其大義不治章句性任俠喜事與其兄孜相繼舉進士中第知名於時眉人敬之號二任而蘇先生洵尤與厚善熙寧某年其察訪使熊本薦知瀘州州上接僰道下連南平控引蠻夷千有餘里如甫望箇恕羅氏鬼主沙取諸郡皆嵗來互市而守􅀅任輕無節制之權非有竒略逺謀則不幸徃徃有事公既至威信大著夷夏便之嵗滿當更詔留再任比滿又特轉一官留之元豐二年納溪砦互市有歐羅胡茍里夷人死者故事漢人殺夷人既論死仍償其資謂之骨價時砦將欲勿與夷人大恚爭譟而出公馳至境上具以禍福曉之相與投兵請降辭者八毋其六既聽命矣而轉運判官意與公異乃移瀘州不與措置事專為攻討之計公爭弗能得乃歎曰邉患自此始矣即具奏言羅胡茍里本瀘州熟户夷也比因殺傷求索骨價爲侵境上故是常事與異時生夷反叛不同臣招納垂畢而使者貪功生事因欲討之臣恐窮迫無所􅇡伏轉投生界則甫望箇恕諸部更相結連益鴟張而難制矣㑹女孫卒不果上七月詔涇原路副緫管韓存寳以陜右兵五千人經制其事存寳在瀘攻羅胡茍里㓕之諸夷驚潰果奔甫望箇恕其年冬箇恕之酋乞弟遂稱兵反皆如公所料云初乞弟自納溪砦互市還過江安縣縣令犒之既去數十里遣親信楊節一毛以一馬謝令令辭不受一毛去至夷牢口為土夷所邀一毛死焉楊節者本嘉州卒吏避罪亡入夷中夷人愛之用事號為羅判至是節自度不免乃以矢房中乞弟所入馬二千緡劵來降公以中國不失信于小夷宜斬節歸劵責以納亡之罪則乞弟憚威而愧徳矣而轉運使固執不從三年乞弟果以一毛為辭入冦路分都監王宣以兵二千人禦之戰于羅箇牟國為賊所敗宣與其子某及禆將十有四人死之於是詔韓存寳復以陜右兵五千人經制其事存寳至瀘逗留不進隂使人誘乞弟以書䧏遽分屯奏功天子得書怒甚更遣環慶路副總管林廣代之命御史何正臣中人梁從政至蜀雜治獄具斬存寳干瀘州流監軍韓承式於海島除轉運使董􅃏名四年廣進兵抵乞弟之巢賊空壁遁去廣不得已竟納其降而還天子亦不復責矣自是瀘州守將始加㳂邉安撫之名專治軍政部使不得輙與未幾使者復以開邉田賦生稅為請天子一切不許而西南夷復安堵矣由是言之前日之役豈非部使者實為之初公既奏羅胡茍里之事雖不果上而使者聞知内銜切骨日夜謀中公以法公知其謀乃録使者不法事闗瀘州十有五條上之使者薄遽不知所為即誣奏公乞弟過江安時不時掩擊及延儒生講書疑有私謁朝廷疑之乃先免而下章扵它部各窮竟所考未具而公既卒矣時當途者以公既殁為使者地公之子大防三詣闕上書陳寃狀獄不敢變使者竟免公為吏通敏吏民畏而愛之其通守齊安也嘗逰於定惠院既去郡人名其亭曰任公時蘇先生之長子翰林公軾以譴遷齊安人知其與公善也復扵其側為師中庵曰師中必來訪予將館於是眀年公卒郡人聞之相與哭於定惠者百餘人飯僧於亭而祭公於庵而蘇先生之少子中書公轍復為之記余甞從翰林中書公逰聞二任之風乆矣後為汝南學官始識大防於是得公之行事公以元豐四年三月二十四日卒于遂州西禪佛舍享年六十有四六年五月二十二日葬于光山縣准信鄉午歩原其世次官邑御史頓君既為幽堂之誌此不復著著其瀘州之事與誌之闕不書者掲于墓原以備史官之擇云淮海集卷之三十三
