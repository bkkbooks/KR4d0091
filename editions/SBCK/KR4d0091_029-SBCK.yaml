front:
  text: 淮海集卷之二十九
  hash: sha256:943b1951c58b54bd3180bea73c570e1630bf5870581c9e0d3d9f22ae44ac99b3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_029-1a}
body:
  text: 秦觀少游代賀王右丞啓伏審光奉明恩進升左轄伏惟慶慰恭以左丞太中夙鍾間氣早擅英聲學窮游夏之淵源文列班楊之伯仲周旋不撓出處可觀共推天下之中庸自得賢人之簡易其退也如陂萬頃撓不濁而澄不清其進之若火一然用彌明而宿彌壯大任斯降貴名益昭曉逹吏方戴胄旋更於二轄潤飾儒術平津即至於三公某辱在陶鈞云云代賀胡右丞啓伏審光奉明恩進升右轄伏惟慶慰恭以右丞太中抱英傑之器屬休明之期智無不照而御之以寛學無不窺而守之以約待時藏器未嘗枉尺而直尋肆筆成書帷欲琢雕而復朴風采凛乎其可畏議論坦然而易行俄鑿枘之相投遽嚢錐之頴出擢丞御史人無間言進轄文昌朝有故事面折廷爭巳聞國士之風内平外成行見大儒之効某叨分符節云云代賀京西運判啟伏審光奉睿恩榮分漕計恭惟慶慰恭以運判道師古始識造淵微身兼數器而用之以時學備諸家而守之以約討論不乏嘗編簡以成圖俯仰無心任摘山之變法屢奉三年之最亟更一道之權舉屬史以傾心竚前旌之入境矧是右輔實惟奥區南則控引於荆􅀭西則轉輸於秦雍奉嚴陵寢備繕河防於措置以為難在選掄而尤重登車攬轡初承使者之風結綬懐金行被從官之召賀京西運使啟伏審光奉宸恩榮分漕計伏惟慶慰恭惟運使知周事變識照幽微梃忠鯁之一心兼縱横之數器英摽特出早膺神聖之知劇任屢更果見事功之立比繇太府來領外臺回卿月之餘光動使星之異色邸音初播屬部增欣蹔駕輕軺坐使邦財之阜佇歸法從進謀王體之嚴代賀簽書趙樞宻啟伏審光膺睿命進貳鴻樞伏惟慶慰恭以樞宻太中器猷宏博學術精微敏識照於未然竒節見於已試犯顔逆㫖屢輸汲黯之忠别嫌明疑力折董宏之妄進退周旋而可度艱難險阻而不渝俄被召以旋歸遽干霄而直上粤自卿曹之貳進陪樞筦之崇邸音播騰士論欣快亟聞趙武越四等以將上軍行見千秋以一言而取宰相某叨分符節云云代賀蔡相公啟光膺制書榮還内殿伏惟慶慰恭以判府觀文相公道貫精微智周事變以文章擅一時之譽以器業結萬乘之知姚元崇入賛鴻鈞初聞逺略霍子孟逮承顧命益見忠謀勲業顯隆夷夏歡頌惟三郡均勞之乆當二聖圖舊之勤既奉綸言復青氈之舊物竚瞻繡衮反黃閤之故居某猥辱異知欣承嘉命屬繆分於符竹阻祗慶於門闈系頌實深敷宣罔既代賀司馬相公啟顯奉明恩進陞上宰老成登用區夏均驩竊以大河之渾持寸膠不能以止積嵗之旱待霖雨然後乃蘇故當大有為之時必得非常人之輔伏惟相公望隆一代節著四朝力足以扶持顛危風足以興起貪懦青天白日奴􅀠亦知其明璞玉渾金鑒識莫名其器果符物論克享天心伊尹得君耻一物之失所姚崇作相陳十事而後為姦邪失匕箸而自驚忠義引壺觴而相慶夙某叨記省方預陶甄欣衆正之路開信太平之責塞願稽故事就封富民之侯請與諸生更上得賢之頌代賀胡右丞知陳州啓均逸中臺承流右輔地接日畿之重職兼禁殿之華凡在庇庥所同欣抃恭以某人智周事變道本神明學窮游夏之淵源文列傳班之伯仲霜雪既至知松栢之後彫鳥雀或鳴見鷹鸇之必擊既丞御史遂轄文昌語黙惟時獨任天下之事卷舒以道有古大臣之風邸音播騰士類聳歎矧是淮陽之郡實惟太昊之墟風氣和平獄訟稀少屈英游而卧治徯惠政之立成騰實飛聲巳應半千之用賛元經體竚歸尺五之天某夙以單微甞䝉題品念使旌之在望嗟吏役之攸拘賀錢學士啓被渥帝宸升華儒館伏惟慶慰恭以學士天資英發地習髙嚴翻然鵠止於碧梧卓爾珠遺於滄海申之以聞見之洽重之以探討之精咸五登三出屬休明之運駢四儷六尤多絶妙之詞敏疾擅枚臯之風雅徤得子長之體倚馬可待下筆不休所以特受眷於先朝屢見稱於元老矧冊府校讎之號洎刑曹勾稽之司惟實與名既清且要熊掌兼魚飱之美自古為難羔裘加豹飾之華於今葢寡緬彼文學之貴見乎諸吏之中雖出異恩實繇公議芸臺畵省諒難嵗月之淹鼇禁掖垣行復風雲之㑹代賀提刑啓光奉宸恩就持憲節伏惟慶慰恭以提刑器識深宏材猷敏邵進退必度於義夷險不易其誠程輦轂之工徒亟聞善状督江湖之冶鑄益著能聲既累效於事功肆就分於使指矧兹右輔實號要區士林承命以欣愉屬部望風而悚跂傳車夙駕暫煩僕御之勞法從進聯諒非嵗月之乆代回胡右丞年節啓天端肇正人統全生實萬類引逹之期乃四序調和之始恭以某官受時間氣為國寳臣天資英發而持之以謙地胄髙華而守之以約履兹獻嵗茂擁休祥治譽藹聞已備賜環之寵恩靈下逮行膺錫馬之蕃頌願之私敷宣罔既代回吕吏部啓宻室飛灰見陽生於本律清臺課􅀱知日起於初躔恭惟某官望重本朝材髙當世一時千載韋平之遇巳稀四世五公袁楊之興未艾既承召節仍屬嘉辰宜戩榖之駢臻顧頌言而何既代謝中書舍人啓一時承乏方慙越爼以代庖數月為真更愧操刀而製錦才微任過恩重報艱切以三省之興實先朝之盛典四禁之任尤當代之要津上則潤色於典謨訓誥誓命之文下則稽參於吏户禮兵刑工之事自非詞章妙絶吏術精通何以特被選揚預從班於仗内遂叨任使專外制於筆端如某者少也鈍頑長而屯賤請鄰祭竈􅂓為寄食之資賣劒買牛行作歸耕之計豈意千齡之㑹誤䝉二聖之知猥從宂貟屬居言責雖奮身不顧頗摧當路之豪彊而燭理未明莫正本朝之缺失日求罷退􅂓避謗譏忽叨左史之除俄冐西垣之選曽非踴躍冶金偶就於莫耶惟是青黄溝木遂成扵犧象此蓋伏遇某官道師古始識造㡬微成就人才為今天下之計主張善類有古名臣之風肆令衰病之餘獲預禁嚴之列某敢不温尋舊學激勵晩途作漢文章何敢望相如之輩正唐鹽法庶㡬為處厚之徒過此以還未知所措代賀運使啓伏審光奉制函榮分漕計伏惟慶慰恭以運使郎中器猷宏敏道術精微資之以問學之優侈之以聞見之愽持綱憲府風聲豈畏於悍彊賛治天官冰鑑無私於微􅆌惟兹右輔寔號奥區禄廪兵食之資異時或屈陵寝河防之費他路所無肆輟名郎出為膚使符檄未加於一道威名已肅扵列城外斡邦財頗欝縉紳之論進謀王體諒非嵗月之淹代賀提刑落權發遣字啓榮膺睿㫖寵進華資伏惟慶慰恭以提刑風猷妙敏襟韻踈明智無不燭而待之以寛謀無不周而斷之以必傑出名臣之後藹居膚使之前持節陜關倉廪扵焉充實按刑淮海囹圄為之虗空屬右輔之浩繁屈髙材而刺舉既被賜環之寵仍䝉増秩之榮詔音播騰士論欣快嵩山汝水既乆滯於星軺金馬玉堂佇歸聨扵法從謝胡晉侯啓伏審光奉明恩寵登上第伏惟慶慰恭以新恩先輩器猷閎愽問學淵深挺生旌表之門優入英雄之彀臂折惟九終號良醫璞獻者三竟為美瑞雖邅廻之可歎建遭際以尤榮而觀者昔陪綘帳之生近被棘闈之屬兒寛早嵗嘗為禇大之徒夢得晩年飜作竒章之客矧惟季弟又獲同年交情既重於他人喜氣亦殊扵他日追惟二紀有同夢寐之遊復㑹一時如閲簡編之事未修鄙牘􅃍辱華緘感佩之私敷陳罔既代參寥與鍾公實啓伏承較藝數竒獻書遇合起家戎幕受職儒宫榮動一時寵踰三舍伏惟歡慶竊以文髙徐樂才贍馬周性理内融事機旁照扣角負鼎無羡昔人轉海回天復聞今日某夙親談讌猥與從㳺覩此盛隆竊深欣忭淮海集巻之二十九
