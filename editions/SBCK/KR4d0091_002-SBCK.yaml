front:
  text: 淮海集卷之二古詩
  hash: sha256:030e78c2c0e5f3ca193cfe9ff9a30ce01eff0bec3bf88862c0a96eef7eb745ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_002-1a}
body:
  text: 秦觀少游泊吳興西觀音院金刹􅀒城闉閴然美栖止卞山直穹窿苕水相依倚霜檜鬱􅄀㝠海棕鮮薿薿廣除庇夏隂飛棟明朝晷溪光鳬鶩邉天色孤蒲裏緒風傳晝焚璧月窺夜禮􅂥雲彗層空規荷鑑幽沚艅艎烟際下鍾磬林端起聱牙戲淸深􅋂崟撲空􅂵所遇信悠然此生如寄耳志士耻溝瀆征夫念桑梓攬衣軒楹間嘯歌何竆巳三老堂保趙通議趙少師張少堂堂三元老業履冠儔匹謇諤横秋霜髙明麗朝日竝道謁温宣連科収甲乙東南奠藩服西北馳使驛解鞅環堵安岸幘氊裘屈群姦懾謦欬衆廢起咄叱至今領麾地謳吟遍蓬蓽出入雖異途歸潔固如一晚厭方内遊把袂訪閑逸雲壑慶安車風川駛飛鷁獻酬埃􅅽外珠玉在揮筆風標傲松鶴顔髪移丹漆遂令吳越人藻繪恣稱述邈然超世姿髣髴得十七辟廱禮寂滅麟閣事蕭瑟兹焉出民願名實更炳蔚琬琰􅅣髙詞龍蘭燎􅀷室福履旣所綏光華無終畢送周裕之赴新息令丈人淮海英抗節浮雲外揮毫錯星錦抵掌參竽􅄜靑春抱脩能脫略無范蔡晚營三徑資百里􅂓束帶扁舟􅀊欲徂古刹夜仍艾去去整羽儀行與髙風㑹􅀉曾逢原孟夏氣􅀱好林塘媚晴輝囘渠轉淸流藻荇相因依叢薄起踈􅄜衆鳥鳴且飛髙城帶落日光景酣夕霏即事逺興託撫巳幽思㣲超揺弄柔翰徙倚絃金徽美人邈雲􅆌志願固有違丹靑儻不逾與子同裳衣送僧歸遂州寳師本巴蜀浪跡遊淮海定水湛虚明戒珠烱圓彩飄零鄕縣異晼晚星霜攺明發又西征􅀌帆破烟靄司馬遷壑字分韻得子長少不覊發軔遍丘壑晚遭李陵禍憤悱思逺託髙辭振幽光直筆誅隱惡馳騁數千載貫穿百家作至今青簡上文彩炳金雘髙才忽小疵難用常情度譬彼海運鵬豈復顧繒􅌳區區班叔皮未易議踈略觀易元吉獐猿圖歌叅天老木相樛枝嵌空怪石銜靑漪兩猿上下一旁掛兩猿熟視蒼蛙疑蕭蕭叢竹山風吹海棠杜宇相因依下有兩獐從兩兒花飱草囓含春嬉易老筆精湖海推􅀞意􅁯形形更奇解衣一掃神扶持他日自見猶嗟咨金錢百萬酒千鴟荆南將軍欣得之老禪豪取橐為垂白晝掩門􅀄許窺房櫳炯炯明冬曦榛藂羽革分豪釐殘編未終且歸讀􅀊暮有間重借披夜坐懐莘老司諌次韻參寥六合寥寥信茫昩中有日月無根柢古往今來漫不休靑髪素顔從此逝嗟予自少多邅迴氣血未衰心已艾北渡長淮霜入屨南窺禹穴塵生䄃日鑿一竅渾沌死雖有餘風終破碎囬車復路可無縁三問道人三不對荅朱廣㣲廣㣲才華殆天賦十􅀊􅀌山有佳句又夢東林飮虎溪歎息清風人不悟自爾所見無全牛桐栢崑崙日傾注葱蘢暁景破新花蹭蹬老拳擒脫兎身勤事左竟何成巧迫化工天所怒兩鬢星星滄海頭強學禪那慰遲暮昨夜燈花吐金粟曉烹鯉魚得尺素􅀏我徜徉吳楚間經卷酒巵随所遇人生迕意十八九月得解顔能㡬度著書準易空自疲服藥求仙良亦悞北風老矣無能為行看黄鸝語飛絮安得從君醉百塲落筆珠璣不論數送僧歸保寧西湖環繞皆招提樓閣晦明如卧披保寧復在最佳處水光四合無端倪車塵不來馬足斷時有海月相因依上人弱齡巳隷此心目所證惟瑰琦白玉芙蓉出清沼天然不受緇塵擾坐客一語不入意目如明星視飛鳥冠切雲􅀆佩玉難上人顧之真等閑應縁聊入人間世興盡􅁍歸湖上山伊余久欲窺禹穴矧今仲父官東越行挽秋風入剡溪為君先醉西湖月和王通叟琵琶夢鶗􆇻鳴時衆芳歇華堂夢斷音容絕風驚玉露不成圓一夜芙蕖泣秋月金紋捍面􅂵檀槽曾抱花前送酒舠􅁃郎江令費珠璧小砑紅牋揮兎毫風流雲散令人瘦􅃘看麴塵昏錦綬楚水悠悠更不西上天破鑑空依􅃇醫者塊然一氣􅀄渾淪散作六物相吐吞主承客禦勝復存是為萬物疾病原寥寥空陂逰寛魂誨此法術成軒轅金書玉册要不煩煥如星宿不可捫時遷聖徂遂幽昬弊俗竊以資利源余嘗感槩期明論世無妙質孰與言因君乞詩置屋軒聊復援筆賦本根漫郎桃字分韻得元公機鑒天所髙中興諸彦非其曹自呼漫郎示真率日與聱叟為嬉遨是時胡星殞未久關輔擾擾猶弓刀百里不聞易五羖三士空傳殺二桃心知不得載行事俛首刻意追風騷字皆華星章對月漏洩元氣煩揮毫徛玗春深茂花竹九疑日暮吟哀猱紅顔白骨付清醥一官扵我真鴻毛乃知逹人妙如水濁清顯晦惟所遭無時有禄亦可隱何以龕巖逺遁逃記夢荅劉全羙􅀊逢困敦斗申指辰次庚辰漏傳子夢出城闉豋古原草木榮天帶流水千夫荷鍤開久殯前有一人狀瓌偉素冠長跪烝酒殽云是劉郎字全美馬鳴車響斷還續人境晦明秋色裏旣窹􅃼然失所遭河轉星飜汗如洗世傳夢凶常得吉神物戲人良有㫖全美聲名海縣聞閉久當開乃其理娟娟二十四橋月月下吹簫聊爾耳洗眼看君先一鳴九萬扶揺從此始田居四首雞號四鄰起結束赴中原戒婦預為黍呼兒随掩門犂鋤帶晨景道路更􅀏喧宿潦濯芒屨野芳簮髻根霽色披窅靄春空正鮮繁辛夷茂横阜錦雉嬌空園少壯已雲趨伶俜尚鴟蹲蟹黄經􅀨潤野馬從風犇村落次第集隔塍致寒暄眷言月占好弩力競晨昏入夏桑柘稠隂隂翳虚落新麥巳豋塲餘蠶猶占箔隆䂀破曾隂霽靄収逺壑雌蜺卧淪漪鮮飈泛藂薄林深鳥更鳴水漫魚知樂羸老厭煩敲觧衣屢槃礴䕃樹濯凉颸起行遺帶索冢婦餉􅀄還丁男耘有託倒茼備青錢鹽茗恐垂槖明日輸絹租鄰兒入城郭昔我蒔青秧廉纎屬梅􅀨及兹欲成穗已復頽星暑遲暮易昏晨揺落多砧杵村逈少過從客來旋炊黍興發即杖䉫未嘗先處所褰裳渉淺瀬矯首沒􅀌羽藂祠土鼓悲野埭鵾雞舞雉子随販夫老翁拜巫女辛勤艱難一作稼穡事惻愴田疇語得􅂖不敢儲催科吏旁午嚴冬百草枯鄰曲富休暇土井時一汲柴車久停駕寥寥塲圃空跕跕烏鳶下􅀌榜旁横塘喧舂起旁舎田家重農􅂩翁嫗相􅌽迓班坐釃酒醪一行三四謝陶盤奉㫖蓄竹筯羞雞䏑飮酣争獻酬語闋或悲咤悠悠燈火暗剌剌風飈射客散靜柴門星蟾耿寒夜作當富疑􅀉題傅欽之草堂河陽有洑流經營太行根盛徳不終晦發為清濟源斯堂濟源上太行正當門仰視浮雲作俯窺流水犇脩竹帶藩籬百禽鳴朝􅚐相望有盤谷李愿故居存主人國之老實惟商巖孫班行昔供奉亟進逆耳言天子色為動群公聲亦吞蕭條冰霜際不攺白玉温出處士所重其㣲難具論公勿思草堂朝廷待公尊次韻酬徐仲車見寄渭淸非勝涇蘭芳本無慕我生季葉中乃與古人遇軄當供洒掃匏繫愧遲暮来章感存没三讀淚如注次韻邢敦夫秋懷十首􅀨滴梧桐為韻以㣲雲淡河漢踈驅車陟髙丘􅁍望大梁圻馳道入􅀟闕勾陳連太㣲夷門壯下屬清洛相因依美哉吾黨士皐卨良可希暮有二客至俱以能禪聞一枝惠林出一派智海分言各不相可往來劇絲棼謝客姑舎是妨余醉看雲昔者曾中書門戸實難瞰筆􅀔如長淮􅀄源可觴濫經營終入海欲語焉能暫斯人今則亡悲歌風慘憺渤海有巨鼇其顛冠嵳峩宿昔嘗小抃八絃相盪靡忽遭龍伯人一舉空潮波取皮煎作膠清此崑崘河蝮蛇􅀄螫手壯士㫁其腕豈不悲毀傷所䘏在存作軀幹西羗沙鹵地置戍或煩漢雞肋不足云阿䐽妙思筭湯湯辟廱流中有學子居但說若稽古言猶三萬餘来者轉相祖詞林日凋踈稍喜績溪令入校天祿書匠氏構明堂百材入斤斧儻非豫章棟宂長亦焉取英英范與蘇慶師豋守􅄊識兼文武胡為先一州不用作霖􅀨憬彼髙句麗来脩裔夷軄天都富如海勞汝送涓滴軸艫尾相銜逺近困供億止沸當絕薪􅀭湯百無益祖宗舉賢良充賦多名儒執事惡言者此科為之無雖有仲舒錯或横江潭魚果欲鳴鳳至還當種椅梧邢侯秋卧㢌揮毫見深衷賡者二三子翕然笙磬同不
