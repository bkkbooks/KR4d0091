front:
  text: 淮海集巻之十二
  hash: sha256:d433e4aabab6029133cee803e44b06d7cbf687a77d170d2869b68ec6b9144d23
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_012-1a}
body:
  text: 秦觀少㳺序篇臣聞春則倉庚鳴夏則螻蟈鳴秋則寒蟬鳴冬則雉鳴此數物者㣲眇矣然其􅀱未至則寂寞而無聞既至則日夜鳴而不已何則隂陽之所鼓動四時之所感􅀤氣變於外則情迫於中雖欲不鳴不可得也淮海小臣不聞廟堂之議帷幄之謀獨耳剽目采頗知當世利病之所以然者嘗欲輸肝膽效情素上書於北闕之下則又念身非諫官職非御史出位犯分重煩有司之誅隠忍逡巡而不敢􅀤幸陛下發德音下明詔使大臣任舉賢良方正能直言極諫之士將修祖宗故事而親策於庭嗚呼此亦愚臣效鳴之秋也輒忘踈賤條其意之所欲言者爲三十篇以獻惟陛下財擇焉其目曰以意寓言以言寓文示變化之所終始使天下曉然知之作國論瑟不鳴二十五絃各以其聲應轂不運三十幅各以其力旋黙則治語靜則制動作主術急不極則緩不生緩不極則急不成一僨一起如環無端作治勢二篇以地爲險山川是資以兵爲險不厭通逹作安都自信者不避嫌自許者不求合倚而容之績乃可底作任臣二篇衆賢聚於本朝姦人之所不利巧爲詆誣以幻羣聼作朋黨二篇鳥有鳳魚有鯤超絶之材宜見闊畧作人材楊墨塞路孟氏所攘申商崛興莫或汝遏作法律二篇得與失爲鄰利與害同門非至精莫之能分作論議二篇爵禄者所以勵世磨鈍科條品目其可不悉作官制二篇善治水者以四海爲壑善治財者以天地爲資國之大計於是乎在作財用二篇料敵之虛實若别牛馬應變之倉卒如數一二非有道之士不能作將帥以寡覆衆來如風􅀨去如絶􅃶作竒兵美言可以市三寸之舌勝百萬之師作辨士機㑹之來間不容髪匪龜匪鏡其能勿失作謀主心不治則神擾氣不養則精喪治心養氣四術自得作兵法愚民弄兵依阻山谷銷亡不時或為大釁作盗賊三篇党項㣲種盗我靈武逾八十年天誅不迄作邊防三篇東西為緯南北為經織者就綜而文成其詳在彼其略在此作序篇國論臣聞古之人君以其祖考之志而升黜人材弛張法度者多矣太上忘言其次有言其下不及言何則昔舜舉十六相去四㓙肇十有二州皆堯志也而精誠所動神化所移不待告之以言而天下曉然固已心知其本末此所謂太上忘言者也􅐻庚之遷毫武王之代商所以從先王之業承文考之志也而浮言横議二三不一至以其遷伐之意託於詞令丁寧而告于庭委曲而誓諸野然後民始恱然而服從此所謂其次有言也秦孝公用商君之説變法令易風俗所以修繆公之業成獻公之志也然未嘗以其變法之意告民疑而不服則痛法以繩之此所謂其下不及言者也夫秦之不及言固無足道而舜之忘言又不可以遽及然則後世人君有以祖考之命而升黜人材弛張法度者安得不法􅐻庚武王之有言哉陛下即位以來圖任元老眷禮名儒屏棄姦臣投竄刻吏所以照臨海内甚盛罷青苗之使廢市易之司削保甲之條刋免役之令至於摘山煑海冶鑄之事他日吏縁以為姦者臨遣信臣更定其法所以加惠元元甚厚臣竊聞之凡此大功數十淹速輕重雖出於聖母之裁成其大槩則皆先帝之末命也然大道之行小人所不利或作為詆欺之言悖亂羣聽以為先帝之道陛下當終身奉以周旋而數年之間遽聽一二大臣更張㡬盡異乎所謂父作之子述之者矣自非明智不惑之士往往聞其説而疑之嗚呼此殆陛下不法􅐻庚武王有言之過也夫子之事父其生也養志為大養口體次之其殁也繼志為大述事次之知述事而不知繼志猶養口體而不養志也非所以為逹孝秦皇漢武皆以蓋世之氣闢闔宇宙之材并吞諸侯攘却胡粤若以功業言之則始皇之英偉傑特又非武帝之可比也然而萬世之下號始皇為暴主稱武帝為賢君秦祚遽傾漢基益大者何哉二世不變始皇之事孝昭能改武帝之法故也向使先帝晚年於人材法度初無升黜之心弛張之意陛下猶當繼其志不述其事又况親承於末命乎臣願陛下具以意作爲明詔丁寧反覆如古訓誥誓命之文布告天下咸使聞之則小人雖有詆欺之言不能以疑衆矣然後被之於詩章傳示無窮以明德意使後世皆知成先帝之功者陛下也豈不休哉主術臣聞人主之術無他其要在乎能任政事之臣與議論之臣而已政事之臣者宰相執政和隂陽萬物宰制百辟鎮撫四夷與天子經綸於帷幄之中者也議論之臣者諫官御史學術知古始器識通世務奮不顧身與天子辦曲直爭是非者也今天下之事有執政之臣以行之有議論之臣以言之則人主可以弁冕端委而無所事不然則雖弊精神竭筋力以夜繼日猶無益也臣請以用人一事明之士大夫以名列於仕版者蓋以萬計有智者有愚者有賢者有不肖者若智與賢則功利之所從興也愚與不肖則罪害之所從起也夫人主以一身之思慮一耳目之聰明而當天下功罪利害之機非有政事之臣則百官之進退柰何而不亂也然人之難知久矣實愚而似智實智而似愚者有之實賢而似不肖實不肖而似賢者有之申以親疎之異重以好惡之偏夫以天下之智愚賢不肖而付之於二三大臣之手非有議論之臣則進退當否柰何而知之也雖然政事之臣者人主之股肱議論之臣者人主之耳目任政事之臣而忽諫官略御史猶股肱便利而耳目盲瞶也任議論之臣而輕宰相薄執政猶耳目聰明而股肱折也要之二者不可偏勝使之適平而已漢成帝用王鳯為大將軍政事大小皆自鳳出天子曾不一舉手京兆尹王章言之為鳳所陷罪至大逆故陽朔之後天下以言為諱唐明皇用李林甫為相十有九年顓政用事補闕杜進上書斥為下邽令由是諫諍路絶此則任政事之臣太勝也漢武帝擢嚴助朱買臣吾丘夀王司馬相如東方朔之徒於左右朝廷有政事輒令助等與大臣辨論大臣數絀唐德宗晚年宰相唯奉行詔書所與圖事者李齊運裴延齡韋渠牟而已此則任議論之臣太勝也臣聞仁祖時天下之事一切委之執政羣臣無得預者除授或不當雖貴戚近屬㫖從中出輒為固執不行一旦諫官列其罪御史數其失雖元老名儒上所眷禮者亦稱病而賜罷政事之臣得以舉其職議論之臣得以行其言两者之勢適平是以治功之隆過越漢唐與成康相先後蓋繇此也陛下即位以來圖任老成屬以事屢下明詔使中外大臣舉諫官薦御史保任骨鯁以備獻納之科可謂得人主之要術矣願鑒漢唐之弊專取法於仁祖常使两者之勢適平足以相制而不足以相勝則陛下可以弁冕端委而無事矣治勢上臣聞御天下之術必審天下之勢不審其勢而巳信臆決行其所謂道守其所謂法則雖有剛嚴果斷之材或失而為刻深慈恵惻隱之意或壞而為姑息何則設之不當也夫聖主之於天下豈嘗有意用術哉天下有彊勢吾則有寛術天下有弱勢吾則有猛術非彊非弱天下無勢非寛非猛吾亦無術蓋無勢者天下之常勢而無術者天下之至術也雖然御彊勢者必以寛而彊之弊實生於寛御弱勢者必以猛而弱之弊實生於猛何則昔漢之文景承髙祖開創之後接呂氏蹀血之餘除誹謗去肉刑减笞法定箠令可謂寛矣而諸侯逆命夷狄侵邊孝武不勝其憤力攘匃奴誅兩粤大臣相繼而入獄二千石連頸而伏誅巫蠱之禍至於夫婦父子之間而不相保由是言之豈非强之弊實生於寛耶昔唐肅宗噐本刻深以刑名自喜安史之亂來歸者戮於獨柳之下待罪者斃於縲紲之中可謂猛矣而慶緖荐興思明復起代宗深鑒其事舎脇從之罪緩汚染之誅至於封豕長蛇無所懲艾忠臣義士切齒不平王室陵夷之漸蓋基於此由是言之豈非弱之弊實生於猛耶是故救强之弊必於崇寛之時救弱之弊必於尚猛之日夫强弱之相乘寛猛之相代猶東之有西晝之有夜理之所必至事之所固然也顧昧者不知耳昔陵陽嚴詡將去頴川謂掾史曰我以柔弱召必選剛猛代到將有僵仆者矣及何並至郡首治鍾威趙季李􅅃之獄果如詡言以詡並觀之則天下之勢可以前百年而預定古者刑罰世輕世重不為定論文王之時闗市譏而不征周公成王之時則闗市有征矣至凶年然後㢮之推此類而言則先王之法度大抵皆審天下之勢而為之者也傳曰政寛則民慢慢則紏之以猛猛則民殘殘則㢮之以寛寛以濟猛猛以濟寛政是以和夫傳所謂和者則臣之所謂聖人之至術者歟治勢下臣聞祖宗之時天下新脫割據戰伐之禍天厭久亂俱欲無為而又掃除煩苛之患足以深結海㝢之心削平僣偽之威足以逆折姦俠之氣當是時天下之勢如元氣在乎混淪之中固莫得而名已逮嘉祐之後習安玩治為日既久大臣以厚重相髙小臣以苟簡自便肉食者鄙未能逺謀誰能無偷朝不及夕故先皇即位之始大講法度作而新之覈名實以興百辟攘夷狄以布威靈有司奉行於中使者刺舉於外此真得所謂以猛政救緩勢之術也元豐之後執事者矯枉過直矜鉤距以為法術任惠文以取媮快上下迫脇民不堪命故陛下即位之始黜鍜鍊之吏逐聚歛之臣登老臣於散地擢忠鯁於謫籍平寃獄振乏餒與天下休息此真得所謂以寬政解急勢之術也而比日已來執事者又將矯枉而過直矣何告訐詆欺之言率然敢陳而王體未嚴也嚮背異同之見各自為守而國論未决也蠻夷猾夏寇賊姦宄隱忍羈縻冀其自罷而天誅未迄也推此言之天下之緩急雖曰未見而固已胚渾於􅄀􅄀之中矣夫致先帝之用猛術者嘉祐之緩勢也致陛下之用寛術者元豐之急勢也今又矯枉過直則勢必復緩緩甚則術又將出於猛矣猛術一用天下固已震動若再用緩則安危之計未可知也何則天下之勢猶一人之身緩而救之以猛猶闗鬲不通而涌泄之也其急而觧之以寛猶虚中暴下而􅀘養之也􅀘養至平則可以已矣平而不已則又將至於闗鬲不通再加涌泄正氣必傷重被猛術國本必伐故曰安危之計未可知也臣願陛下遏逋慢之原杜懈㢮之漸明詔内外一乎中和使天下之緩勢不得而成緩勢不成則後世雖有猛術不可得而用之淮海集卷之十二
