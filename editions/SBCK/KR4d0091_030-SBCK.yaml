front:
  text: 淮海集巻之三十簡
  hash: sha256:c73dcc1ac6a21ec3c3ff0c12b4964aebfc33ac34f5a21354d362699692814ae9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_030-1a}
body:
  text: 秦觀少游荅傅彬老簡彬老足下昨奉手教所以慰誨甚勤并䝉錄示寄蘇登州書并題眉山集後尊賢善道發扵誠心詞㫖清婉近世所希見也發函展讀殆不能釋手欽想髙風益增企系屢廹賤事修報後時悚愧何已然僕昧陋不能具曉盛意中間有未然處輒為左右具言之惟閤下恕其僣易幸甚幸甚閤下謂蜀之錦綺妙絶天下蘇氏蜀人其扵組麗也獨得之扵天故其文章如錦綺焉其説信美矣然非所以稱蘇氏也蘇氏之道最深扵性命自得之際其次則器足以任重識足以致逺至扵議論文章乃其與世周旋至粗者也閤下論蘇氏而其説止扵文章意欲尊蘇氏適卑之耳閤下又謂三蘇之中所願學者登州為最優于此尤非也老蘇先生僕不及識其人今中書補闕二公則僕嘗身事之矣中書之道如日月星辰經緯天地有生之類皆知仰其髙明補闕則不然其道如元氣行於混淪之中萬物由之而不知也故中書嘗自謂吾不及子由僕竊以為知言閤下試贏數日之糧謁二公扵京師不然取其所著之書熟讀而精思之以想見其人然後知吾言之不謬也文翁哀詞杼思乆矣重䝉示諭尤増感愴時氣尚熱未及晤見千萬順時自愛因風無惜以書見及幸甚與蘇公先生簡某頓首再拜知府學士先生比參寥至奉十二月十二日所賜教慰誨勤至殆如服役把玩彌日如晤玉音釋然不知窮困憔悴之去也即日伏惟尊􅀱動止萬福某鄙陋不能脂韋婉孌乖世俗之所好比迫扵衣食彊勉萬一之遇而寸長尺短各有所施鑿圓枘方卒以不合親戚游舊無不憫其愚而笑之此亦理之必然無足嘆者但以再世偏親皆垂白而田園之入殆不足奉裘褐供饘粥犬馬之情不能無悒悒爾然亦命也又將奚尤惟先生不棄而時賜之以書使有以自慰幸甚幸甚窮冬未由侍坐伏乞為國自重下慰輿情不宣某頓首再拜同前頃䝉不間鄙陋令賦黄樓自度不足以發揚壮觀之萬一且廹扵科舉以故承命經營彌乆不獻比縁杜門多暇念嘉命不可以虚辱輒冐不韙撰成繕寫呈上詞意蕪廹無足觀覽比之途歌野語解顔一笑可也又多不詳被水時事恐有謬誤并太鄙惡處皆望就垂改􅇡庶㡬觀者不至詆訶以重門下之辱素紙一軸敢兾醉後揮掃近文并芙蓉城詩時得把玩以慰馳情幸甚幸甚同前某頓首昨所遣人還奉所賜詩書伏䝉奨與過當固非不肖之跡所能當也愧畏比辰伏惟尊􅀱萬福某比侍親如故敝廬數間足以庇風雨薄田百畝雖不能盡充饘粥絲麻若無横事亦可給十七家貧素無書而親戚時肯見借亦足諷誦深居簡出㡬不與世人相通老母家人見其如此又得先生所賜詩書稱借過當副之藥物亦可以湔所敗辱為不朽矣參寥時一見過他客既以奔軍見棄又不與之徃還因此遂絶頗得專意讀書學作文字性雖甚愚戅亦時有所發明差勝前時汩汩中也懋誠集引尋巳付邵君刻石畢寄上次黄樓賦比以重違尊命率然為之不意過有愛憐將刻之石又得南都著作所賦但深媿畏也文與可學士尚未至如過此當同參寥往見矣春初未侍坐間伏乞保衛尊重下慰惓惓不宣某再拜同前某頓首再拜去冬伏奉所賜教旋又李獻甫過此甚得興居之詳欣慰何可勝言尋欲上狀而區區之情欲布於左右者一日復一日人事無間斷而自春巳來尤復擾擾家叔自㑹稽得替便道取疾入京改官令某侍大父還髙郵又安厝亡嬸靈柩在揚州且買地趂今冬舉葬入夏又為諸弟輩學時文應舉而家叔至今雖巳改官尚滯京師未還老㓜夏間多疾病更遇嵗饑聚族四十口食不足終日忽忽無聊頼本欲作書詳道至今不果甚可笑也想公當悉此意矣即日初寒伏惟尊候萬福前得所賜書承用道家方士之言自冬至後屏去人事室居四十九日乃出又李漕傳到城都大慈寳藏記文誦書讀記想見公超然逸舉於形骸埃􅅽之外雖欲從之不可得也辱誨諭且令勉彊科舉如某者實無所有豈敢求異於時但長年頗慙為兒女子所嗤笑耳得公書重以親老之命頗自摧折不復如向來簡慢盡取今人所謂時文者讀之意謂亦不甚難及試就其體作數首輙有見推可者因以應書遂亦䝉見録今復加工如求應舉時矣但恐南省所取又不同儻只如此恐十有一二可得也前寄呈亂道繼亦作得十數篇未敢附上子駿以公言顧遇甚厚嘗令作揚州集序并辯才法師見囑作龍井記言師囑作雪齋記二記皆黄魯直為書巳刻成尚未寄到今且録草去因便却乞并此書轉致髙安先生處幸甚幸甚子駿以保任不當罷去莘老復固辭不來此亦是無聊一事也莘老云有兩書託公擇寄去不知曽有書去否渠云非求荅但欲知逹否爾昨過此不多日然相聚甚欵未嘗無一日不數十次及公昆仲也雖不求揚州為公作黄樓主人亦是吾黨中一段佳事某來嵗東歸時庶㡬到徐見之也黄魯直去年過此出所為文尤非昔時所見其為人亦稱是真所謂豪傑間出之士也但恨去速不得與之從容參寥在阿育王山璉老處極得所比亦有書來昨云巳斷吟詩聞說後來巳復破戒矣某數日間便西行未縁侍坐伏乞與時自重下慰瞻依不宣某再拜與邵彦瞻簡某頓首啓日月不相貸借奉違未㡬已復清明緬惟還自諸邑尊履勝常欽企欽企春色遂爾藹然草木魚鳥各有佳意廣陵多登臨之美臨風把盞所得故應不貲古語有之良辰美景賞心樂事四者難并今又以風流從事從文章太守游淮海佳郡豈不為七難并得乎甚盛甚盛邑中少所還徃杜門忽忽無以自娱但支枕獨卧追惟舊游而巳欲南去屬私故未能伺舟但増引悒不宣某頓首頃䝉以集瑞圖序文見屬此固盛時之事前世詞臣墨客所頌歎者不特為南方之美君家之祥也不腆之文何以稱此然重逆盛意又竊喜託名圖上以為榮故不敢固辭輒撰次并揚州集序寄呈中間尤惡處不惜指示就與改竄尤幸或要手寫可先具素令畵史圖一本異時渌水堂中為設清酒一樽芍藥數枝可乘醉一揮也揚州集序雖鄙陋然頗能道廢興遷徙之詳如無他文似不若寘之於前使觀者開巻便知作集之意也望與使君議之仍得其集一觀幸甚幸甚與孫莘老學士簡某頓首司諫學士丈丈屢奉所賜教誨慰殷勤雖父兄之於子弟無以過此仰荷盛意不復勝言幸甚幸甚比日伏惟鎮撫餘暇尊􅀱萬福某自入夏得中暑疾去之不時至秋遂大作伏枕餘月今雖少間而疲頓非常氣息僅屬人事殆廢起居之問曠然不進於下塵職此之故前書聞姨婆縣君服藥甚乆徐氏弟兄及妻子皆憂撓不知所為近聞得僧法賔者調治巳平可勝忻慰南方險逺風氣固非人所安然丈丈行已二年北歸之期甚近更善調䕶數月即逹中州矣越州祖父得書甚安頃䝉教以先至㑹稽迎侍祖父還家家叔徑入都甚荷留意巳封所賜教取禀於越州矣蘇黄州雖不得書然昨蘇子田著作過此及南來士大夫具云在黄甚能自處了不以遷謫介意日但杜門蔬食誦經讀書而巳昔之論者常患其才髙太銳今日之事尤足以成其盛德也前日辱齒及亂道誨喻尤詳某雖不肖請終身誦之矣自越歸後頗無事幸不廢所學但乆去門下聞見日益昏塞雖復區區卒無所得耳詩文數篇謾録呈左右因風更乞指喻教育之賜幸甚幸甚與黄魯直簡某頓首奉違甚遽殊不盡所欲言者每覽焦尾弊帚兩編輙悵然終日殆忘食事昔人千里命駕良有以也嵗莫苦寒不審行李巳逹何地奉惟榮養吉慶昨揚州所寄書中得次韻莘老斗野亭詩殊妙絶來者雖有作不能過也及辱手寫龍井雪齋兩記字畫尤清美殆非鄙文所當巳寄錢塘僧摹勒入石矣幸甚幸甚比又得真州所寄書及手寫樂府十月十三日泊江口篇諷味乆之竊已得公江上之趣矣李端叔後公十數日遂過此南如晉陵為留兩日斗野詩八音二十八舍歌并公所寄詩皆和了今録其副寄上所要子由金山詩并某所屬和者今奉寄八音歌次韻斗野亭黄子理憶梅花詩凡四首亦隨以呈聊發一笑耳皖口見公擇李六不知相從㡬多時恨不同此集也餘嵗就畢杜門忽忽殊無佳意何時展晤以盡所懐未間願與時自愛千萬千萬不宣某再拜與蘇子由著作簡某頓首再拜著作先生頃過南都幸一拜清重扁舟東下廹於同行不獲欵聽緒言以厭所願但増於悒耳比日苦寒伏惟尊􅀱動止萬福某受性庸昧與世異馳昨廹於衣食彊出應書僥倖萬一之遇既而擯棄乃理之當然無足道者顧親巳老田園之入殆不足以給朝夕之養犬馬之情不能無堙鬰耳此外亦復何恨惟先生不棄時教之以書使無聊之中有以自慰幸甚幸甚未縁侍坐伏乞為國自頥以副輿願不宣某再拜不肖之迹雖復為世所棄而杜門謝客頗得專意讀書衡茅之下有以自適古語有之蘭生幽宫不為莫服而不芳某雖不敏竊事斯語但鄉閭士子類皆從事新書每有所疑無從考訂而先生長者皆在千里之外以此良悒悒耳比因冬後輙為古詩一首寄獻下執事繕寫以呈雖詞意鄙廹不足以道盛德之萬一然區區之慕望庶㡬於此少見之伏惟少賜覽閱幸甚幸甚與李德叟簡某頓首昨得遞中所寄書甚慰馳仰尋欲作報㑹得傷寒疾甚重不食七八日伏枕又踰月乃平遂因循至此黄魯直去必能道所以然也嵗莫苦寒伏惟奉養吉慶某去年除日還自㑹稽鄉里交朋皆出仕宦所與游者無一二人杜門獨居日益寡陋秋間本欲一至黄州因過舒奉見不意遭此疾病遂不能逺去親側頗負平時區區之意夫復何言别後所論者想甚多殊不寄一二何也然觀所枉書詞翰妙絶足以知他皆凖此矣仰服仰服魯直過此為留兩日雖忽遽不盡所懐然有益於人多矣其弊帚焦尾兩編文章髙古邈然有二漢之風今時交游中以文墨自業者未見其比所謂珠玉在傍覺人形穢信此言也未縁展奉願與時自重慰此馳情十一月十五日不宣與蘇黄州簡某再拜自聞被㫖入都逺近驚傳莫知所謂遂扁舟渡江北至呉興見陳書記錢主簿具知本末之詳以先生之道仰不愧天俯不怍人内不愧心某雖至愚亦知無足憂者但慮道途頓撼起居飲食之失常是以西鄉憫憫有兒女子之懐殆不能自克也比聞行李巳逹齊安燕居僧坊水飲蔬食有以自適然後私所念慮一切俱亡且知平時有望於先生者為不謬矣彼區區所謂外物者又何足為左右道哉本欲便至齊安屬乆離侍下未可逺適問道或在秋杪也惟親近藥餌方書以節宣和氣臨紙於悒不盡所懐與李樂天簡某頓首昨在㑹稽游雖不數然誦盛文講髙誼熟矣及還淮南又得所寄書詞古而義髙超然有從我於寥廓之意豈所謂有心相知者邪幸甚幸甚僕散漫可笑人也去年如越省親㑹主人見留辭不獲去又貪此方山水勝絶故淹留至嵗莫耳非僕本意也自還家來比㑹稽時人事差少杜門却掃日以文史自娱時復扁舟循䢴溝而南以適廣陵泛九曲池訪隋氏陳迹入大明寺飲蜀井上平山堂折歐陽文忠所種栁而誦其所賦詩為之喟然以歎遂登摘星寺寺迷樓故址也其地最髙金陵海門諸山歷歷皆在履下其覽眺所得佳處不减㑹稽望海亭但制度差小耳僕每登此竊心悲而樂之人生豈有常所遇而自適乃長得志也以閤下趣尚髙逺非復今時舉子之比得以發其狂言他人聞之當絶倒矣未展晤間與時自重不宣與參寥大師簡某頓首懶慢滋甚不奉問㡬一年中間屢䝉惠書賜責亦不加切參寥師真知我者也幸甚幸甚僕自去年還家人事擾擾所徃還者惟黄子理子思家兄弟子思又巳分居困於俗事彦瞻每行縣輙得數日從游此外但杜門塊處而巳甚無佳興至秋得傷寒病甚重食不下咽者七日汗後月餘食粥畏風如見俗人事事俱廢皆縁此也比䝉録示黄州書并䟦尾幸甚觀其詞意憂患固未足以干其中愈令人畏服爾僕所題名此却無本煩囑聦師寫一通相寄為望仍并蘇公䟦尾前所寄者巳為端叔彊取去矣昨聞蘇就移滁州然未知實耗果然甚易謀見也蓋此去滁纔三程公便可輟四明之游來此偕往瑯瑘山水亦不減雪竇天童之勝子由春間過此相從兩日僕送至南埭而還後亦未嘗得書渠在揚州淹留甚乆時僕值寒食上冢故不得徃從之耳莘老壽安君竟不起子實遂丁憂逺方罹此禍故殊可傷也傳師巳聞作司農簿聲聞籍甚恐旦夕得一美除公擇近亦得書說秋初甞至湯泉到寄老庵見顯之恨不與吾儕同此樂顯之恐十數日間來此為十數日之㑹今已到天長矣黄魯直近從此赴太和令來相訪為留兩日得渠新詩一編髙古妙絶吾屬未有其比僕頃不自揆妄欲與之後先而驅今乃知不及逺甚其為人亦放此葢江南第一等人物也黄詩未有力盡飜去且錄數篇嘗一臠足知一鼎味也又為僕手寫兩記今封去如辯才無擇要入石便可用此摸勒僕自病起每把筆如讎不知何謂得此公為我書殊増氣也其字差瘦更為潤色開時令盡墨為妙中間更未安及不是處但請就改之若開得成囑二師各寄數本李端叔在楚音問不絶比如毗陵過此相見極歡揚州太守鮮于大夫蜀人甚賢有文僕頗為其延禮有唱和詩數篇今録一通去當一笑也頃聞公不作詩有一小詩奉戯又已復破戒矣可謂熟處難忘也聰師有書來要字序僕近日無好意思明年又應舉方欲就舉子學時文恐未有好言語今但為渠取字曰聞復葢取楞嚴所謂聞復翳根除者也錢塘多文士可求人為作不必須僕也蔡彦規巳卒闗中今歸葬山陽可傷朋友彫落如此獨有僕數人朴鈍落魄者無恙又多病少佳意人世良可悲耳何時合并以盡此懐不宣郡後學張綖校正淮海集巻之三十
