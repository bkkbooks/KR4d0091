front:
  text: 淮海後集卷之一
  hash: sha256:3fd53e52605420a22950612f76d7fe2b8cb8d4e6cdad1eb82e0aafbfcfee7d00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_042-1a}
body:
  text: 秦觀少游進南郊慶成詩并表右臣伏覩皇帝陛下肇修典禮冬日之至親有事於南郊仍復祖宗故事以皇天地祗合祭前期之日隂雲蔽空將祀之夕月纒畢宿詩云月離于畢俾滂沱矣於法當雨而是夜開霽特甚晏温星月昭明禮畢之明日雨雪乃作朝市郊野相告欣然頌嘆之聲形于中外非二聖有作上當天心神祗顧享何以逮此臣雖疎賤通籍祕省預見熈事不勝犬馬區區之情輙將輿人之頌撰成郊禮慶成五言二十韻詩一首随狀上進干冐宸嚴臣無任瞻天望聖激切屏營之至於赫龍飛後中區八月秋合嚴天地祀逺繼祖宗休熈事將興舉彞章預講諏紛然曲臺議斷自太任謀宗伯方承命元􅀛遂告猷三錢封内帑五瑞輯諸侯路寢前齋玉清宫復射牛長迎南至日圓即自然丘扈蹕三千劒干霄十二樓鈎陳嚴御座太一奉宸遊好雨虚聞畢生陽不待鄒浮雲依斗散華月亘天流宵被黄䄄却霜空曲蓋收堪輿同顧饗河嶽盡懷柔麾日初鳴仗旂風不滿旒回鑾龍入馭傳詔鶴為郵崇慶天難老華胥聖不憂衣冠千玉簡宇宙一金甌可但豐年屢當知世徳求慙無班馬手作頌配商周幽眠幽眠起常晩冬晷復不長中間數十刻倐如驚燕翔晨飡粗云畢申鼓鳴相望忽忽竟何就念之動中腸天地一逆旅死生猶轉商暫來旋云去遲速乃所常較計亦何補徒然非慨慷不如聽两行一㮣付酒觴北風吹老槐白日轉紙窻布衾一覺睡身世成􅄅茫宿莽冬不衰蘭􅊉幽更芳無庸傷局促速此鬢髮霜越王越王念吳役寢興常不安有臣曰種蠡實與同難艱終酬㑹稽耻列國不敢干智者見未兆愚夫暗前觀范公拂衣去扁舟五湖間清輝照四海秋月耿雲端種也竟不悟處之若無難屬鏤一朝至身與名俱殘兎走獵狗悲鳥盡良弓閑自古身不退多為世所歎隕星石蕭然古丘上有石傳隕星胡為霄漢間墜地成此精雖有堅白姿塊然誰汝靈犬眠牛礪角終日䝉羶腥疇昔同列者到今司賞刑森然事芒角次第羅空青俛仰一氣中萬化無常經安知風雲㑹不復歸青㝠山陽阻淺一日行一尺十日行一丈豈不歎淹留所幸無波浪悲風動深夜原野􅆌森爽青天行蟾蜍枯水轉魍魉此時蓬茅下去心劇於癢棄置勿復論通塞如反掌次韻參寥莘老迅風薄髙林萬象號虎豹紛披枳與棘尔復皷狂閙我垣既已頽我棟又以撓豈無一木枝横力難與較黎明忽自罷晴日射魚罩死水失狂瀾衰木回故貌勞生眞其一作夢事徃趨如睡覺炊黍焚黄鶉吾其理歸棹送洪景之循州參軍寒梅不自重輙花桃李先矯枉有佳菊最後衆芳妍各因一時美難以相嗤憐物理固若是士林亦宜然夫子南國俊聲猷推妙年數奇晚方偶參軍古龍川龍川雖云逺風物號清鮮羅浮不相下頡頏巉荒天雲鬢二三子聊足奉周旋行矣試老拳歸歟逺翔騫茶茶實嘉木英其香乃天育芳不愧杜蘅清堪揜椒菊上客集堂葵圓月探奩盝玉鼎注漫流金碾響丈竹侵尋發美鬯猗狔生乳粟經時不銷歇衣袂帶紛郁幸䝉巾笥藏苦厭龍蘭續願君斥異類使我全芬馥茶臼幽人躭茗飲刳木事擣撞巧制合臼形雅音侔柷椌虚室困亭午松然明􅂦窓呼奴碎圓月掻首聞錚鏦茶仙頼君得睡魔資尔降所宜玊兎擣不必力士扛願偕黄金碾自比白玊缸彼美制作妙俗物難與雙石魚佛宫琢琳瑯懸魚警羣聦緩扣集方袍急拊趨百工雖無筍虡器自恊徵與宫犂然當人心邈有炎氏風山泉自疏數珮玉相玲瓏朝昏間鍾皷清響傳無窮惟有寶陁山於音獲圓通一聞如得解石鞏亦投弓劉公幹鄴中多賢豪公幹氣飄逸弱嵗頗徊徨飄零低金室君王事遨宴下馬列琴瑟豪吹挾哀彈娯歡非一日當年侍賡酬珠玉在揮筆五字一何工妙絶冠儔匹所得雖經寄未得偏人失贈醫者鄒放百工皆聖作惟醫有書傳緒餘起人死妙處實通天鄒子本淮海弱齡加討研岐扁逢巻中遂知百病先徃嵗遊京室公侯紛薦延國工不敢妬遣兒求執鞭晚棄本州役青衫鬢蕭然臨衢開大肆旁午送金錢嗣子頗不凡文塲早周旋行期拾青紫善積神所憐贈張潜道張生何為者落魄不自拘獨携三尺琴笑别妻與孥一來泊吾里忽已月再虛朝遊故人館暮止佛子廬雖無食羮餘所樂常晏如我欲有所進生聞勿煩紆君子閑有道不專塊然居無道秪深適鳴戱亦已愚願生脱塵鞅從我滄海隅荷花方塘收雨脚落日半遥岑芙蕖浄娟娟麗服撫翠衾無言意自逺欲渡秋水深􅃡懷平生人對此詎可尋弄芳惜晼晩酒至誰與斟天涯有歸雲􅂓寄相思心心開獲清賞芙蕖一何綺美人艷新粧歛袂照秋水端如蕩子妻顧自良家子黄金選燕趙摇落對江沚薄暮風雨來獨立淚如洗望君君詎知傾宫定誰似酬曾逢原參寥上人見寄山陽作倦客當老秋忽忽少佳意孰云塵滓地劉阮肯俱至一披清骨毛再見失身世有如執盛熱傃月濯涼吹又如觀巨梓却覘蕭葦細十辰同遨遊不覺日車逝嗟予逃空虛終日靣林翳聞人足音喜况乃道所契方念衣袖分明月忽我畀眷言何以酬白髮同所詣吳興道中黽勉蓽門下十年守一方胡為御舟者挽我置此傍青山不肯盡流水故意長雖云道理逺瓦樽有酒漿無題二首其一君子有常度所遭能自如不與死生變豈為憂患渝西伯囚演易馬遷罪成書性剛趣和樂淺淺非丈夫其二世事如浮雲飄忽不相待歘然化蒼狗俄頃成章蓋達觀聽两行昧者乃多態舎旃勿重陳百年等銷壞喜雨得城字陰陽有常職代御不可并一氣或錯繆愆伏相冦兵惟時四月交南國厭久晴風師挾帝令呼號肆徂征雲師畏推逐蓄意不敢争雨師曠厥官所茍朝夕生黄塵暗如霧掩彼日月明帝眷一夕回旱議沮莫行畨然需膏澤夜半來雨聲黎明縱遐眺溝澮各已盈青秧散廣畆白水涵孤城耕夫欣有託水鳥飛且鳴乃知化工妙悠然信難名行矣耘我穡嵗終竚坻京東城被盗得世字野人無機心觸事少防衛所至輙酣寢屢墮穿窬計孤亭夜深墨風死雨初霽有盗穴壁來攘取逮衾袂微思不敵怒弱力皷虚鋭起搏且復呼可否誰量勢誰云同室闘函丈莫相繼两奴眠牖旁矯首但睥睨棄之倚柱休盗亦從此逝慚無牛缺賢幸脱燕人斃亡弓豈須求失馬不必涕黎明成感歎事往若異世良賈號深藏無閡稱善閉君子勿我誇得喪求無際夢伯􅀵文公昨夜夢故人心顔少歡趣自嗟棄有司却言歸山路君王下明詔羣英翕爭赴焦鵬共揮翮跛鼈亦騁歩擾擾天地間飛鳥不知數何意獨蕭條命與時相忤空復蔽馬牛不為匠人顧昔為土中花行待東風煦今為簷下草逺矣霑秋露老母鬢成絲寒妻被無絮嵗莫多嚴風絺綌將焉度覺來不復見撫枕淚如注安得萬頃陂活此舟中鮒送佛印抱包初捨蔚頭藍江月松風處處參他日惠林為上首幾年彌勒作同龕真珠撒帳開新座飛鳥㗸花繞舊庵雲散虎溪蓮社友獨依香火思何堪次韻公闢㑹流觴亭偷引湖光一派飛詠觴還却似當時吳歌送酒隨流急越艷浮花轉曲遲山廟早因前守徹冰􅐻元是故工遺年年褉飲今非昔不到蘭亭到北池次韻公闢㑹蓬萊閣林聲摵摵動秋風共躡丹梯上卧龍路隔西陵三兩水門臨南鎮一千峯湖吞碧落詩爭發塔湧青㝠畵幾重非是登髙能賦客可憐猿鶴自相容送羅正之兩浙提刑豈為鱸魚憶故丘東南昏墊賴良謀一封暮别雲間閣三組秋歸海上州子政暫為都水使千秋終作富民侯贈君一語君應笑競注江河本不流淮海後集巻之一
