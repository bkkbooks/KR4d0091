front:
  text: 淮海集巻之三十一
  hash: sha256:5f36205c84d5135f032297ef9a5a362b89c0d79cc3341b0a99be0523a519ea8e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_031-1a}
body:
  text: 秦觀少游文謁先師文惟公聖神所鑄號古哲人凛然髙風聞者爲起諸生不敏承學累年依慿餘光以得名官時方尚徳進爵既崇祭重報先敢忘大賜祠以薄饌公其鑒之祈晴文凡物平爲福有餘爲禍雖隂陽之大猶不免焉乃季春以來􅀨霪不止漫溝甽漲川澮麥苗垂敗將弗克有秋是用禱于爾神惟神廟食此土當赫厥靈以福于民民亦將有以事神而不敢懈尚饗􅀕馬通議文惟公盛徳之後克承厥先不激爲髙不詭爲偏不見瑕玭器實渾然踐更中外垂五十年長者之風四方是傳始使六路國用充委旋帥二邉羌虜唯唯亳許江都下車風靡法度具存頌聲未已我來此邦公適厭事杖履阡陌優㳺卒嵗方期暇日從公逰詣孰云奄然棄我而逝日月飄忽端如筈絃承㐫未幾遽卜新阡惟時淮海春御戒旋悲鳥號木愁雲蔽川念公此行無復來還奠觴薦詞用訣終天尚饗弔鏄鍾文嘉魚縣傍湖中比嵗大旱水皆就涸而夜常有光恠赫然屬天鄉人相與誌其處而掘之得古鏄鍾焉其形有兩欒如合兩瓦面左右九乳總三十六牙鼓鉦舞銿衡旋斡之類考之不與禮合者無幾縣令施君識其寳謀獻之太常未果乃輸武昌庫中㑹其守觧秩佐攝事見而惡之曰那得背時物畜之不祥也亟命投於兵器之冶嗚呼物之不幸有如是邪昔九江吏盗顔忠肅之碑材寘其所述歐陽詹聞而弔之以詞予悲夫鎛鍾古樂之器先王所以被功徳而和人神審音之士至有振車鐸於空地而求之者非若九江碑材因人而貴也而辱於泥塗無所自效遇其非鑒以觸廢毁好古之士焉得黙黙而已乎乃作文以弔之詞曰嗚呼衆方之生謬形殊器更首迭尾雌雄相廢朝爲姜姬夕爲憔萃或竒偶之相續或九舛而一躓清餓和黜刑王眇貴生犢失明得駿折髀洞所遇之參差莾循環於一氣傳曰黄鍾毁棄瓦缶雷鳴余始以爲不然今乃信之矣嗚呼鏄鍾何世所爲質不呈剛形不露竒恊律中度渾如天資掩抑雖久不見瑕疵爰有兩欒三十六乳厥音琅然小大隨叩曷所挺之壞偉而偶沉於幽陋辱泥塗之汚漫厭鱗鬛之腥臭嗟筍虡之一辭遽月絃絃之幾彀幸陽愆而水涸天日怳其復覯謂庭貢之是充獲效鳴於金奏何夜光之暗投卒按劒而莫售嗚呼赤刀大訓天球河圖秦璽漢劒趙璧隨珠犍爲之磬汾隂之鼎曲阜之履天澤之弧歷世相傳以華國都下至威斗錯刀羯鼓之捲破鏡缺符遺簮墮珥信無益於經綸猶見收於好事是鍾也郊廟所薦樂之紀綱統和元氣舞獸儀凰令大河而更清使左角其不芒變化風俗返乎羲皇而乃廢於深淵出而遇毁殆藻盤之不如矧牛鐸之敢企此義夫志士所爲疾心而切齒也然余聞之隂精之純燥氣之裔雖從火革其質不變一晦一明昔者既然僨而復起可無畢年嗚呼鍾乎今焉在乎豈復爲樂激宫流羽以嗣其故乎將慿化而遷改象易制以周於用乎豈爲錢爲鏄爲銍爲釜以供耕稼之職將爲鼎爲鼐以效烹飪之功乎豈爲浮圖老子之像巍然瞻仰於緇素乎豈爲麟趾􅙂蹄之形翕然玩於邦國乎豈爲干越之劒氣如虹霓掃除妖氛於指顧之間乎將爲百鍊之鑑湛如止水别妍醜於髙堂之上乎新故相代未始云畢紛然殊途必有一出决不泯泯草亾木卒嗚呼鏄鍾又將奚䘏遣瘧鬼文䢴溝處士秋得痎瘧之疾發以景中起於毛端伸欠乃作其始也凄風轉雨洒然薄人其少進也如沍壑隂崖單衣犯雪􅀛穹蠖屈奄奄欲絶寒威既替熱復大來畢方媒毒回禄嗣災躁外渴中卧已復興欲挾斗杓東適浡澥酌以注嗌未足爲快徂酉盡戌淟然霑汗然後乃已於是處士乃澡心慮斥聰明枕石藉茅偃於洞房疲極而寐夢五鬼物異服醜形朱丹其髪運斤鼔槖縻綆注缶揮以大箑跳踉而進曰嘻良苦惟子昔年學道名山把握風雷與斗爭威吏兵雲屯使者火馳呼吸元氣懸鬼以嬉我屬蓄忿怒􅀱間隙之日久矣孰爲爾來荒唐是師跅􅕟是友果於自爲横心肆口隨世上下金鎔木楺嘗於禁戒隳滅應手交親指議傳笑十九而子岸然恬不爲醜我屬縁是得而甘心焉於是處士驚遽若失所以對者衆鬼大笑處士叱之曰來汝鬼物向吾示汝神明之機天收其武地藏其文七緯十精亡失光耀而汝朋儔漫不復省瞽矇之前藻繪徒施叩宫流徴而瞶者勿知嘗以爲未然乃今信之蹇吾妙齡志于幽􅀇明師我違以溺竒偏疑信相寇于兹有年披收氛霧乃覩青天樊然故藝一昔棄捐飫食酣寢以還本源若夫嬪御如雲珍貨山積後房彈吹秀色可食馬有副車有二人所同好吾亦勿避久官無成家徒壁立彈劒而哦援琴自慰風埃藍縷兒女所羞人所共惡吾亦勿求好惡我無與天下俱故造物之父與吾並駕而逰固非汝曹知也嗟汝鬼物亦道之孫經緯星辰啓隂閉陽何獨迷繆自䘮耿光依憑草木爲此不祥於是衆鬼相視失色涕泗交頥呿而不合悔其所爲稽首再拜稱弟子而去處士寤亦失厥疾矣祭洞庭文紹聖三年十月已亥朔十一日丁卯前宣義郎秦觀敬以錢馬香酒茶果之奠望洞庭青草湖境上敬祭于岳州境内洞庭昭靈王青草安流王淵徳侯順濟侯忠潔侯孝烈靈妃孝感侯之神觀罪戾不肖頃縁幸㑹嘗厠朝列備員儒舘承乏史臣福過災生數遭重劾䝉恩寛貸投竄湖南老母戚氏年踰七十久抱末疾盡室幼累幾二十口不獲俱行既寓浙西方令男湛謀侍南來敬惟諸神皆以威烈忠孝著在方冊廟食此方分風擘流有禱如響觀之得罪本末諸神具知願加哀憐老母異時經彼重湖賜以便風安然獲濟仍願神貺早被天恩生還鄉邑觀以疾走便道不遑躬詣祠下盡此血誠故修薄奠以伸悃愊心切詞迫瀆浼至靈俯企惶懼唯諸神明鑒之謁宣聖文郡守被命于朝既至治所則必告于境内之明神禮也矧惟宣聖實我儒師薦見之禮敢後群祠是率僚属爰及士子躬趨於庭以報祀事尚饗告狄梁公廟文惟公昔以盛徳爲唐名臣嘗刺此州風流具存越王之禍玉石俱焚二千餘人賴公獲免宜千萬年血食兹土豫之子孫報仰何窮舊祠迫隘不稱明靈爰築新室以安貌像敢涓時日薦告于庭告李太尉廟文唐之中葉盗據此方嵗行四宫天誅不訖公時銜命實帥西師披此姦巢市不易肆虵豕遺種化爲平民公於蔡人厥功懋矣廟貌雖久棟宇穿頺易而新之得是亢爽千秋萬嵗公其安焉祭勾芒神文日窮于次嵗時肇興爰卜土牛以送寒氣惟神佐成震治于民有功敢稽禮經用修常祀尚饗代蔡州太守謁先聖文惟王道備天人功崇列聖大成既集六藝斯明内聖外王所同憲法山川鳥獸咸亦裕如萬世尊親天下通祀惟時士子生逢休明讀玩棄餘作爲藝業有司論定天澤遂覃推本所從實王芘貺敢涓時日薦見廟庭代蔡州太守謁嶽廟文維神望秩岱宗實長群嶽有嚴祀事在于此邦守土之臣既見民吏敢羞牲酒進見于庭代蔡州太守謁城隍文淮南古城形若垂瓠帶以汝水生齒實繁惟神廟食此土芘貺一方敢致酒牲用嚴薦見躬趨于庭疇敢後時代蔡州祈晴文謹以清酌庻羞之奠敢昭告于某神粤自去冬隂氣爲沴雪積袤丈逮兹獻嵗寒不時歸雪又復作道途梗塞物價翔踴四郊農事茫然無期是用奔走乞晴于爾明神廟食此土宜赫厥靈揮却慘欝屏除翳昏還我大明毋使斯民久罹重苦代蔡州謝晴文謹以清酌庻羞之奠敢昭告于某神間者久隂不觧大雪荐作寒氣摠至民不聊生於是率僚属吏士奔走分告乞晴於神神享其誠荅以景貺閉隂啓陽變慘爲舒清風既發大明遂昇一方熈然僅有生意吏實不徳何以克堪敢憑酒殽以謝神貺淮海集巻之三十一
