front:
  text: 淮海集巻之二十八
  hash: sha256:76d81da4cbcd5f1e96d9911a98090339be4256117d1a7732d564904b82ce432e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_028-1a}
body:
  text: 秦觀少游啓謝及第啓光靈遽被愧幸特深竊以聖神臨御之初實惟祖宗熈洽之後戈兵收偃經藝著明風俗莫榮於為儒材能咸耻乎未仕圜冠方履求自試者㡬千萬焉血指汗顔獲見收者纔四百耳既甚嚴其程度宜盡得於豪英如某者淮海孤生衣冠末系志在流水嘗辱子期之知困於鹽車頗為伯樂之顧徒以為養而求仕故雖被黜以忘慙懲於羮者吹虀自知其妄不量鑿而正枘人指為狂豈意力田而逢年亦稱長袖而善舞大羮焉用以貴本而不遺昌歜甚微縁嗜偏而見取方賢書之上獻俄吏議之旁連竊鈇致疑事非在我解驂見贖世鮮其人尚頼平反卒䝉昭雪折劒既以重鑄死灰因而復燃究其倚伏之難常益信窮通之有定屬皇明之繼照推睿澤以横流特免試言徑躋仕版技能莫効初如不戰而屈人名䆠亟成更類無功而受禄退而省察殆有夤縁此盖伏遇某官誘進人材主張士類離竒蟠木素為左右之先璀璨餘光復自比鄰之借致兹寒陋亦預採收敢不慎操修之方明出處之致庶期末路獲報明恩過此以還未知所措賀吕相公啓伏審光膺宸命顯正台司凡在生成舉同抃蹈竊以媧皇補天之際髙宗夢帝之初未就泥金正資陶鑄不調琴瑟方頼更張是謂大有為之時必得非常人之佐恭惟中書僕射相公累朝元老當世大儒力足以扶持顛危風足以興起貪懦青天白日奴􅀠亦知其明璞玉渾金鑒識莫名其器既天資之篤實加地胄以髙華四世五公勲在王室一門萬石寵冠廷臣宗族謂之小許公夷狄以為真漢相果從人望爰享天心方思左轄之嚴遽踐鸞臺之峻獻可替否而思矯激之過解紛挫銳而有調和之能必欲成仁之始終非特潔身之去就繇是端人坌集異黨寖微寛大之澤四覃苛刻之風一變名既得功而並立位當與德而俱崇明詔始班吉士交慶太公入國固知天下之父歸伊尹得君益見聖人之任重某猥縁幸㑹叨被題評昔陪北海之樽有同夢寐今望平津之館如隔雲天但欣衆正之路開始信太平之責塞願稽故事就封富民之侯請與諸生復上得賢之頌賀蘇禮部啓伏審光膺睿命入拜儀曹凡有識知所同欣抃竊以大儒之出處實為當世之重輕三仁去而商寖微二老歸而周始大長孺仕漢諸侯寢謀中立相唐列藩聽命殆亦天時之有數豈伊人力之能為伏惟禮部郎中先生道貫神明智周事物决科射䇿亟聞董相之風逆指犯顔屢奪史魚之節周旋臺閤而風采可畏流落江湖而容貌不枯葢好仁無以尚之故特立有如此者斯文未喪果䝉日月之照臨吾道將興更屬風雲之盛㑹既補郡守俄遷侍郎雖未厭於人情漸當陪於國論昔神龍失水㡬為螻蟻之所侵今猛虎在山將見藜藿之不採某乆操茇篲獲侍門墻歎刻鵠之未成念攀鴻而何敢聞之不寐知告於人晛見曰消頗動雪雲之態厦成相賀獨申燕雀之私賀中書蘇舍人啓光膺中詔進直西垣伏惟慶慰恭以某官當世大儒斯民先覺論議為四海之輕重出處繫一時之安危蕭夫子之文章蠻夷亦慕張使君之威望草木猶知始從記注之嚴爰掌絲綸之重姦邪聞命投匕筯以自驚忠義承風引壷觴而相慶某猥縁幸㑹謬接光儀昔者先生甞䝉論次茲焉伯氏又獲追攀竊聞進拜之崇倍切欣愉之至謝程公闢啓某啓比縁省覲薄㳺勾踐之都獲執掃除叨預老􅆅之役辱品題之巳過慚報効之何從伏念某少也妄庸長而屯賤枘方乖鑿人指為狂鈎直失魚自知其拙碌碌抱簀中之恥棲棲銜跨下之羞不謂修撰給事誤賜采葑曲加推轂引置金臺之館俾叅珠履之游蕭洒蘭亭甞繼孫王而奉筆風流蓮社屢陪劉阮以焚香既令馮子而出輿仍為穆生而設醴至於升將軍之故第泛賓客之舊湖興與天横情隨水逺牙檣錦纜擁南國之佳人玉斚金罍醉西園之清夜徃來乎十洲三島之上俯仰乎千巖萬壑之間曽微瓊玉以報刀祗枉明珠而彈雀從游八月大為北客之美談酬唱百篇永作東呉之盛事退而省察何以堪勝血指汗顔徒為今日輸肝剖膽期在異時庶追王國之風少盡門人之禮謝館職啓法同愽士閱五載而遷官例比編書通三年而改秩寵靈既逮愧懼實深伏念某族系單微器能淺陋少時好賦僅成童子之雕蟲中嵗窮經未究古人之糟粕始䇿名於進士俄充賦於直言濫居方物之前叨被傳車之召文章末技固非道義之尊箕斗虚名秪取謗傷之速亟從引避幾至顛隮褒未就於衮華惡巳成於瘡痏三朞之内王尊乍佞而乍賢七年之中魯田一與而一奪但以偏親垂老生計屢空聊復靦顔以居未能投劾而去日期沙汰分絶進升豈期積日以累勞輒亦逢年而遇合束緼還婦雖䝉假借之私懲羮吹虀尚慮譴訶之及竊觀前史具見鄙宗西蜀中郎孔明呼為學士東海釣客建封任以校書雖為將相之品題實匪朝廷之選用夫何寡陋遽有遭逢此葢伏遇某官道欲濟時仁能錫類始憐貧女稍分秦壁之光終念播臣為激越江之水矧兹竒蹇亦與甄收敢不以古人行已之方為國士執君之義千金弊帚聊依翰墨以自娱一割鈆刀或兾事功之可立過此以往未知所裁賀崔學士啓伏審顯膺明命榮領近藩凡在庇庥所同欣抃恭以知府學士妙知德奥精契道真斥百氏之竒偏傳七師之要妙著于書者乃其糟粕見乎業者亦其緒餘即之如渾金璞玉而難名望之如髙山深林而莫測作歌而去陋􅄯董之不為應聘而興指臯䕫而自許既參璧水之直俄預道山之遊入則陪國論於五房出則督工徒於二監世推前軰地號要津然而了不器於盈虚澹無心於舒巻願奉二年之最固辭五兵之曹邸音播騰士論聳歎矧汝南之奥壤為右輔之名區僊聖所棲英豪斯聚競欲識先生之杖屨匪徒瞻太守之旂於昔誦髙辭極太行之表裏行觀美化遍汝水之隂陽尚疑未駕於征軺固巳召還於法從某謬聨服役叨預婚姻顧罪悔之方虞幸依歸之遽獲車逢峻阪空嗟兩耳之垂船在中流實有一壺之望代賀吕司空啓伏審光膺顯命正位公台伏惟慶慰恭以司空相公學師古始道造淵微以一代之人英為四朝之國老允廸厥德克世其家言乎時則韋平豈可分道而行論其事則袁楊安得同日而語年髙德邵而臣節益峻功成名遂而帝眷愈隆進拜冬官非止居四民而時地利平章國論實惟有一德以享天心聖王之文章具焉天下之能事畢矣某叨分符節辱在陶鎔陪班謁以無縁苐承風而竊抃代賀中書僕射范相公啓伏審光奉明恩進陞右弼伏惟慶慰恭以中書僕射相公器兼文武學備天人出處繫一時之安危議論為四海之輕重臨大節而不奪雖小善其必為荀氏羣龍慈明為最河東諸鳯伯褒尤竒投閑散而聞望愈隆渉憂患而精誠益壯果濟世美簡在上心昔執鴻樞既致干戈之戢今居端揆何難禮樂之興坦然衆正之路開行矣太平之責塞某叨分符節云云代賀門下孫侍郎啓伏審光奉明恩進陞東省伏惟慶慰恭以門下侍郎星躔異禀嶽鎮殊鍾先朝藩邸之舊臣今日廟堂之耇老正直如羔羊之徳信厚有麟趾之風解劇樞庭乃心不怠均勞輔郡報政斯成民心竚以旋歸國論倚之進斷粤從琳館入踐鸞臺薄夫撫已以自慙吉士舉酒而相慶矧同升之俊乂皆妙選於搢紳三王之法本人情固無過舉六官之長皆民譽兹謂昌期某辱在陶鈞叨分符節第承風而竊抃念稱慶以無縁代賀中書劉侍郎啓伏審光奉明恩進陞西省伏惟慶慰恭以中書侍郎智周事變道本誠明語黙不愆其時進退必度於禮雪霜既䧏知松栢之後凋鳥雀或鳴見鷹鸇之必擊君未比隆於二帝我則若撻於市朝民有失所之一夫我則如擠於溝壑大任既降英聲益飛豈止邦家之光實為天地之紀逮兹進拜尤慰具瞻亷陛難躋益致髙堂之峻股肱克壯重增元首之尊某辱在陶鈞云云淮海集巻之二十八
