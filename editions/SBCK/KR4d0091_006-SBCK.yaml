front:
  text: 淮海集卷之六
  hash: sha256:df5028a162bf050fe5a3a3b3750795c7c19c1a2a295ed9c3d7bade197b077993
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_006-1a}
body:
  text: 秦觀少㳺覿覯二弟作小室請書魯直名曰寄寂作此寄之用孫子實韻二首力田不逢年識者未宜閔他時􅀊在金百兩無虚稛士生當自量天道平如凖汝兄魯叔山正坐不前謹有琴亦無絃何心尚求軫客來欲頹玉大白􅂺滿引官長既屢罵諸生亦時囅一口吸西江玄哉居士藴􅀊寒知蒼松日暮識丹槿夢想八九椽森然羅玉筍薛宣欲吏雲孫子實詩玄非近凖才難不易得志大略細謹士生要洪毅天地季氏或招閔此分胷中秋萬物既収稛賣藥偶知名草然囅誰能借前籌還婦用束藴吾聞調􅅅鼎異味及枌如盖軫驥令鹽車驂井下知綆引難甘吁爾食􅂓寄粲而棄㑹稽笋槿豈其供王羞南都新亭行寄王子發洛水沄沄天上動道入隋渠下梁宋宋都堤上十二亭一一飛驚若鸞鳯光華逺繼周王雅宴喜還歸魯侯頌玉觴嚴令肅衣冠金縷哀音繞梁棟姢姢殘月照波翻習習暖風吹鳥哢何處高帆落文鷁誰家駿馬嘶征鞚柳枝芳草恨連天暮雨朝雲同昨夢借問亭名製者誰留守王公才望重胸中雲夢吞八九日解千牛節皆中祥符相公實曾祖庭列三槐多伯仲承明厭直出荆州轉守此都行大用此都去天纔尺五交廣荆陽歸引控兎園事迹化黄埃清冷文雅堪長慟舳艫銜尾車挂轊昨日出迎今日送送故迎新無已時古往今來相戲弄亭下􅋂崎淮海客末路逢公詩酒共一樽明日難重持豈恤官期後芒種今年氣候頗云早夭矯梅花春欲縱行見亭中祖帳開千乗送公歸法從反􅀄昔年淮海末邂逅安期生謂我有靈骨法當逰太清區中縁未㫁方外道難成一落世間網五十换嘉平夜參半不􅃦披衣涕縱横誓當反􅀄服仍先謝諸彭晞髪陽之阿餔餟太和精心將虗無合身與元氣并陟降三境中髙真相送迎琅函紀前績金蒲錫嘉名耿光洞寥廓不借日月明故棲黄埃裏絶想空復情寄蓴薑法魚糟蟹􅀉子瞻鮮鯽經年漬􅙩醁團臍􅂵蠏脂填腹後春蓴茁滑扵酥先社薑芽肥勝􅁏鳬卵纍纍何足道飣餖盤飱亦時欲淮南風俗事瓶罌方法相傳為㫖蓄魚鱐蜃醢薦􅇼豆山蔌溪毛例􅂪録輙送行庖當擊鮮澤居備禮無麋鹿精思精思洞元化白日昇高旻俯仰凌倒景龍行速如神半道過􅂵府弭節聊逡巡金牀設寳几璀璨明月珍僊者二三子眷然骨􅁏親飲我霞一杯放懷暖如春遂朝玉虚上冠劔班列真無端拜失儀放斥令自新雲霄難遽返下土多埃塵淮南守天庖嗟我實何人送楊康功守􅂫公扵萬事輕獨嗜山水重寓直西掖垣滄洲長入夢廣陵以都㑹厨酒萬斯甕毎歎闕登臨持此將焉用比持蘇􅄗節論欝縉紳共翻云美泉石汔可小嬉弄怱怱治行李草草别賓從乃知仁智心所樂異庸衆梅花發春端百卉日興動公等行復反􅄗閣俟鸞鳳偶戲偶戲失班龍坐謫崑崙隂崑崙一何髙去天無數㝷嘉禾穗盈車珠玉炯成林天飈時一拂清哀動人心一面四百門官譙雲氣侵闕然竹使符難矣蹔豋臨群仙来按行憐我久滯淫力請始云免反室􅀊巳深親朋喜我来感歎或霑􅁭塵寰君勿悲殊勝巢嶔崟次韻黄冕仲􅀉題順興歩雲閣故山無期大刀頭黄塵溽暑未罷休歩雲之篇忽我投便見氷玉懸清秋順興山川甲閩甌無風萬壑松颼颼歩雲之人人品優御風禦㓂真其儔仙人乘槎凌斗牛囬環十見天星周猿鶴忽驚空蕙帳周家正要磻溪望正仲左丞生日元氣鍾英偉東皇賦炳靈蓂敷十一莢椿茂八千齡汗血来西極摶風出北溟之無分襁褓詩禮學趨庭妙質珠遺海高材刄發硎􅀄更芸閣秘屢直􅃈闈靑史筆開凡例綸言正緯經文昌頻曵履京兆屢空囹遂緫􅄗綱紀常參國典刑兩宫隆眷遇諸夏聳瞻聽武略驅雷電文鋒粲斗星乞閑辭亢滿分逸下青㝠騎引􅀟朱服腰横萬寶釘明峰春矗矗汝水暮泠泠散䇿花間徑揮犀水上亭壺觴延墨客燈燭按歌伶周衮歸公旦商巖夢武丁久聞虚揆席佇見返皇扄别數汾陽考重鐫宋父銘巍然廟堂上永作世儀形病犬犬以守禦用老憊将何為跟蹌劣扵行纍然抱渴饑主人恩義易乃為升斗資追随不肯去猶若戀藩蘺屠膾意得逞烹庖在須斯糟糠固非意豚豕同一時念昔􅀄得寵青韁纒毯絲飼飬候飢飽動止常相随胡云不終始委逐在衰遲犬死不足道固為主人悲贈女冠暢師瞳人剪水腰如束一幅烏紗褁寒玉飄然自有姑射姿囬看粉黛皆塵俗霧閤雲牎人莫窺門前車馬任東西禮罷暁壇春日静落紅滿地乳鵶啼和子瞻􅀟石天鑱海濱石欝若􅀛毛綠信為小仇池氣􅁚宛然足連巖下空洞鼎張彭亨腹􅀟峰照清漣春眉鏡中蹙疑經女媧錬或入金華牧鑪熏充雲氣研滴當川瀆􅀹物足移人不必珠與玉道傍􅀄無異漢将疑虎伏支機亦何據但出君平卜奇礓入華林傾都自追逐我願作陳那令吼震山谷一拳既在夢二駒空所欲大士捨寶陁仙人遺句曲惟詩落人間如傳置郵速徐得之閑軒建安自古多俊髦徐子磊落􅀹其豪論兵􅀃劔走湖海身勤事左無所遭綠水五校已屠膾黒衣三衞嗟徒勞歸來故山便卜築脫棄萬事輕鴻毛横前澗水漱哀玉傍舎老􅇫藏飛猱山􅂼何用媿梁􅁏鶴氅未必輸青􅂁追寒弄月有真意慎勿輕語傳兒曹雷陽書事駱越風俗殊有疾皆勿藥束帶趨祀房瞽史巫紛若絃歌薦繭栗奴主洽觴酌呻吟殊未央更把雞骨灼一笛一腰鼓鳴聲甚悲凉借問此何為居人朝送殤出郭披莽蒼磨刀向猪羊何湏作佳事􅀑去百無殃舊傳日南郡野女出成群此去尚􅀿逺東門已如雲蚩氓託絲布相就通慇懃可憐秋胡子不遇卓文君海康書事十首白髪坐鉤黨南遷海瀕州灌園以餬口身自雜蒼頭籬落秋暑中碧花蔓牽牛誰知把鋤人􅃇日東陵侯荔子無㡬何黄柑遽如許遷臣不惜日恣意移寒暑層巢俯雲木信美非吾土草芳自有時鵯鵊何􅀜汝卜居近流水小巢依嶔岑終日數椽間但聞鳥遺音鑪香入幽夢海月明孤斟鷦鷯一枝足所恨非故林培塿無松栢駕言出焉逰讀書與意㑹􅁍掃可忘憂尺蠖以時詘其信亦非求得歸良不惡未歸且淹留粤女市無常所至輒成區一日三四遷處處售鰕魚青裙脚不襪臭味㣪與狚孰云風土惡白州生緑珠海康臘巳酉不論冬孟仲殺牛撾祭鼓城郭為沸動雖非堯暦頒自我先人用大􅀏荆楚人嘉平獵雲夢粲粲菴摩勒作湯美無有上客賦驪駒玉奩開素手那知蒼梧野棄置同芻狗荆山玉抵鵲此事繇來久裔土桑柘希􅁞月不紡績吳綃與魯縞取具舩客一朝南風發家室相怵迫半賈鬻我藏倍稱還君息一雨復一暘蒼茫􅄓風發怒號兼晝夜山海為顛蹶云何大塊噫乃爾不可遏黎明衆竅虚白日麗空闊合浦古珠池一熟胎如山試問池邉蜑云今累年閑豈無明月珍轉徙溟渤間何􅀜二千石時至自當還次韻曾存之嘯竹軒翩翩曾公子子猷定前身嗜好凖疇昔了然不緇磷寄食平凖官植竹當比鄰朝與竹相對暮與竹相親安可一日無此君真可人㳺仙二首服形百神朝刳心萬緣盡我無退轉境何以有精進戲為汗漫游八極一何近渺渺東海水纍纍北邙墳向來歌舞處忽復成荒村愚人如鹿耳其死了無魂孰知九霄間玄圃枕崑崙緇塵化人衣蒼蘿誰與捫雲車自天来駕言㳺混茫手持太一節身佩使者章龍虎傍夭矯馬􅀛伏以翔朝元􅂵􅅔上所覩浩難量寳網結萬珠參伍相焜煌花品不知數妙英拆玄房宫殿随人身處處輙清􅋽危髾擢貞玉髙謝人間粧二三古􅂡眉冠雲帶含光遺我飛霞佩副以明月璫再拜敬服之白毛發靈香次韻荅張文濳病中見寄與君渉世網所得如鈎温念昔相乖離俯仰變寒暄把􅃑安可期寄書嘱加飱三年汝水濱孤懷誰與言末路非所望聮鑣金馬門校文多豫暇玄談到羲軒孰云笭箵小史書垂後昆匪惟以􅃇聞牴牾良可刋比枉病中作筆端淮海奔亟駕問所苦兀坐一室閑晤對不知夕歸途斗星飜平時帶十圍頗復減臂環君其專精神㣲恙不足論愷悌神所勞此理真如絃送喬希聖鷃翔蓬蒿非所悲鵬擊風雲非所喜貴賤竆通盡偶然囬頭緫是東流水我思田文昔相齊朱􅂁照日如雲霓三千冠佩醉明月清歌一曲傾玻璃如今陳迹知何在但見荒􅃁烟蕪迷又思原憲昔居魯門戸東西閉環堵杖藜對客騁髙談自覺胸􅁭輩堯禹如今寂寞已成塵空有聲名掛千古送君去何時囬世間如此令人哀我徒駐足不可久􅀏指白雲歸去來與子瞻㑹松江得浪字松江浩無旁垂虹跨其上漫然銜洞庭領略非一状怳如陣平野萬馬攅穹帳離離雲抹山窅窅天粘浪烟中漁唱起鳥外征帆颺愈知宇宙寛斗覺東南壯太史主文盟諸豪盡詩将超揺外形檢語􅀏供頡頏㛹姢棄追逐撥剌亦從放獨留三百缸聊用沃軒曠吴越溪山子瞻得風字西北風絶境自忘千里逺勝逰難復五人同舟師不㑹興未竆又扶衰病過垂虹浮天自古東南水送客今朝處吐長虹平生睡足連江雨盡日舟行擘岸風人􅀏年留連意擬看斜陽萬頃紅二子縁詩老更窮人間無􅐻尾鬛紅參寥得岸字蜿蜒跨長虹吳㑹稱傑觀來三岀慣天教我軰一鐏同知君欲寫長相憶更送銀来誇震澤勝事無昏旦破浪湧長鬐排空度飛翰肺肝淪連㡬萬頃放目失垠岸倒境射遥山青螺􅀧空半從得淩九垓從公逰汗漫入清境劃􅀂春氷泮安淮海集卷第六
