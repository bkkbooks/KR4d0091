front:
  text: 淮海長短句巻上
  hash: sha256:c935de123e7f3be1e444ce8acdc9ed0eb2075fc1dbfdd29b0de4b93c1548f91c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_049-1a}
body:
  text: 秦觀少游望海潮四首廣陵懐古星分牛斗疆連淮海揚州萬井提封花發路香鶯啼人起朱􅄕十里春風豪俊氣如虹曵照春金紫飛盖相從巷入垂楊画橋南北翠煙中追思故國繁雄有迷樓挂斗月觀横空紋錦製㠶明珠濺雨寧論雀馬魚龍徃事逐孤鴻但亂雲流水縈帶離宫最好揮毫萬字一飲􅂸千鍾又越州懐古秦峰蒼翠耶溪瀟洒千巖萬壑爭流鴛瓦雉城譙門畵㦸蓬萊燕閣三休天際識歸舟泛五湖煙月西子同遊茂草荒臺苧蘿村冷起閑愁何人覧古凝眸悵朱顏易失翠被難留梅市舊書蘭亭古墨依稀風韻生秋狂客鑑湖頭有百年臺沼終日夷猶最好金􅀛換酒相與醉滄洲又洛陽懷古梅英踈淡氷澌溶洩東風暗換年華金谷俊游銅駞巷陌新晴細履平沙長記誤隨車正絮翻蝶舞芳思交加柳下桃蹊亂分春色到人家西園夜飲鳴笳有華燈礙月飛盖妨花蘭苑未空行人漸老重來是事堪嗟煙暝酒旗斜但倚樓極目時見棲鴉無奈歸心暗隨流水到天涯又别意奴如飛絮郎如流水相沾便肯相隨微月户庭殘燈簾幙怱怱共惜佳期纔話暫分携早抱人嬌咽􅀟淚紅垂畵舸難停翠幃輕别兩依依别來怎表相思有分香帕子合數松兒紅粉脆痕青牋嫰約丁寧莫遣人知成病也因誰更自言秋杪親去無疑但恐生時注著合有分于飛沁園春春思宿靄迷空膩雲籠日晝景漸長正蘭臯泥潤誰家燕喜蜜脾香少觸處蜂忙盡日無人簾幙挂更風遞遊絲時過墻微雨後有桃愁杏怨紅涙淋浪風流寸心易感但依依竚立回盡柔腸念小奩瑶鑑重勻綘蠟玉籠金斗時熨沉香柳下相將遊冶處便回首青樓成異鄉相憶事縱蠻牋萬疊難寫微茫水龍吟贈妓婁東玉小樓連苑横空下窺繡轂雕鞍驟疎􅄕半捲單衣初試清明時候破暖輕風弄晴微雨欲無還有賣花聲過盡斜陽院落紅成陣飛鴛甃玉珮丁東别後悵佳期參差難又名韁利鎻天還知道和天也瘦花下重門柳邊深巷不堪回首念多情但有當時皓月向人依舊八六子倚危亭恨如芳草萋萋剗盡還生念柳外青騘别後水邊紅袂分時愴然暗驚無端天與娉婷夜月一簾幽夢春風十里柔情怎奈向歡娯漸隨流水素絃聲斷翠綃香減那堪片片飛花弄晩濛濛殘雨籠晴正銷凝黄鸝又啼數聲風流子東風吹碧草年華換行客老滄洲見梅吐舊英柳摇新絲惱人春色還上枝頭寸心亂北隨雲黯黯東逐水悠悠斜日半山􅊕烟兩岸數聲横笛一葉扁舟青門同携手前歡記渾似夢裏揚州誰念斷腸南陌囬首西樓筭天長地久有時有盡柰何綿綿此恨難休擬待倩人説與生怕人愁夢揚州晚雲收正柳塘煙雨初休燕子未歸惻惻輕寒如秋小欄外東風軟透繡幃花宻香稠江南逺人何處鷓鴣啼破春愁長記曾陪燕遊酬妙舞清歌麗錦纒頭殢酒困花十載因誰淹留醉鞭拂靣歸來晩望翠樓簾捲金鈎佳㑹阻離情正亂頻夢揚州雨中花指㸃虛無征路醉乘斑蚪逺訪西極見天風吹落滿空寒皇女明星迎笑何苦自淹塵域正火輪飛上霧捲煙開洞觀金碧重重觀閣横枕鼇峰水面倒銜蒼石隨處有奇香幽火杳然難測好是蟠桃熟後阿環偷報消息在天碧海一枝難遇占取春色一叢花年時今夜見師師雙頰酒紅滋疎􅄕半捲微燈外露華上煙裊凉颸簮髻亂抛偎人不起彈涙唱新詞佳期誰料久參差愁緒暗縈絲想應妙舞清歌罷又還對秋色嗟咨惟有畵樓當時明月兩處照相思鼔笛慢亂花叢裏曽携手竆艷景迷歡賞到如今誰把雕鞍鎻定阻遊人來往好夢隨春逺從前事不堪思想念香閨正杳佳歡未偶難留戀空惆悵永夜嬋娟未滿嘆玉樓幾時重上那堪萬里却尋歸路指陽闗孤唱苦恨東流水桃源路欲囬雙漿仗何人細與丁寧問呵我如今怎向促拍滿路花露顆添花色月彩投􅈧隙春思如中酒恨無力洞房咫尺曽寄青鸞翼雲散無蹤跡羅帳薰殘夢回無處尋覔輕紅膩白歩歩熏蘭澤約腕金環重宜裝飾未知安否一向無消息不似尋常憶憶後教人片時存濟不得長相思鐵罋城髙蒜山渡闊千雲十二層樓開尊待月掩箔披風依然燈火揚州綺陌南頭記歌名宛轉鄉號温柔曲檻俯清流想花陰誰繫蘭舟念凄絶秦􅃶感深荆賦相望幾許凝愁勤勤裁尺素柰􅀟魚難渡􅀲洲曉鑑堪羞潘髩㸃吳霜漸稠幸干飛鴛鴦未老不滿庭芳三首山抹微雲天連衰草畵角聲斷譙門暫停征棹聊共引離尊多少蓬萊舊事空回首煙靄紛紛斜陽外寒鴉數㸃流水繞孤村銷魂當此際香囊暗解羅帶輕分謾贏得青樓薄倖名存此去何時見也襟袖上空惹啼痕傷情處髙城望斷燈火巳黄昏字人亦知為天生好言語晁云斜陽外三句雖不識又紅蓼花繁黄蘆葉亂夜深玉露初零霽天空闊雲淡楚江清獨棹孤篷小艇悠悠過􅃄渚沙汀金鈎細絲綸慢捲牽動一潭星時時横短笛清風皓月相與忘形任人笑生涯泛梗飄萍飲罷不妨醉卧塵勞事有耳誰聽江風静日髙未起枕上酒㣲醒又碧水驚秋黄雲凝暮敗葉零亂空堦洞房人静斜月照徘徊又是重陽近也幾處處砧杵聲催西窓下風摇翠竹疑是故人來傷懷增悵望新懽易失徃事難猜問籬邊黄菊知為誰開謾道愁須殢酒酒未醒愁巳先囬憑闌久金波漸轉白露㸃蒼苔江城子三首西城楊柳弄春柔動離憂淚難收猶記多情曾為繫歸舟碧野朱橋當日事人不見水空流韶華不為少年留恨悠悠幾時休飛絮落花時候一登樓便做春江都是淚流不盡許多愁都是淚流不盡許多愁可謂警句雖用李宻數隋檄詞人佳句多是翻案古人語如淮海此詞便做春江東流變化名家如此類者不可枚舉亦一法也語亦自李後主問君都有幾多愁却似一江春水向又南來飛燕北歸鴻偶相逢慘愁容綠鬢朱顔重見兩衰翁别後悠悠君莫問無限事不言中小槽春酒滴珠紅莫怱怱滿金鍾飲散落花流水各西東後㑹不知何處是煙浪逺暮雲重又棗花金釧約柔荑昔曾携事難期咫尺玉顔和淚鎻金閨恰似小園桃與李雖同處不同枝玉笙初度顫鸞箆落花飛為誰吹月冷風髙此恨只天知任是行人無定處重相見是何時滿園花一向沉吟久淚珠盈襟袖我當初不合苦撋就慣縱得軟頑見底心先有行待痴心守甚捻著脉子倒把人來僝僽近日來非常羅皂醜佛也須眉皺怎掩得衆人口待收了孛羅罷了從來斗從今後休道共我夢見也不能得勾迎春樂菖蒲葉葉知多少惟有箇蜂兒妙雨晴紅粉齊開了露一㸃嬌黄小早是被曉風力暴更春共斜陽俱老怎得花香深處作箇蜂兒抱恐是當時語花香原作香香淮海長短句巻上
