front:
  text: 淮海集卷之四十哀挽
  hash: sha256:e0877dcb7c7bc9da6ffbc1b00dfe83a6c47d1237c6f447b3365e89204f57965f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_040-1a}
body:
  text: 秦觀少游大行太皇太后挽詞二首東朝制詔九年稱烈武功高後世興坐舉不周天柱正親扶暘谷日車升班行尚想延和殿羽衛俄趨永厚陵洛水嵩峯霄漢外百官西望涕難勝保扶明主自春宫萬國昇平出至公顧命一時聊共政思齊千古遂同風外家恩數仍長信原廟蒸嘗即治隆欲叙聖功歌挽者乾坤難入畫圖中韓樞密夫人挽詞二首奕葉貂蟬後宗姻樂靜間從夫登兩地看子入三山舊像瞻揄闕遺音想佩環百年川閲水不復更西還天上開華屋丘山忽返真内人歸􅈖盛挽者轉哀新鸞詔初乾墨魚軒已暗塵藹然多徳善論次有蒼珉俞公逹待制挽詞二首詞􅂣英妙氣如虹出入青雲見事功流馬木牛通蜀漕葛巾羽扇破渠戎風生使者旌旄上春在將軍爼豆中詔墨未乾人奄忽傷心江漢日傾東一麾出守著威名凶訃西來上為驚玉悵笑談成昨夢錦囊書札見平生衣冠漸散紅蓮府鎧馬還歸細柳營可道風流回首盡芝蘭庭下粲朝榮陳承事挽詞眀時就養寄淮壖忽歎艅艎以柩旋八尺衣冠成繪事百年風誼列幽鐫銘旌暮暗黄梅雨鄉路秋横碧玉天遙想葬期豪傑㑹高車連軫駐新阡永夀縣君挽詞二首廷尉䝉恩後蘭臺就養初大椿宜更夀流水遽焉如鸞錦封花誥蛛絲網板輿百年誰考徳琬琰在幽墟明世辭隆養哀榮道路傳賻䘮從上宰歌挽出群仙素幔傷秋泛青缸慘夜船玉峰歸葬處木拱鴈連天曽子固哀詞皇受命而熈洽兮實千祀而一時恊氣鬱而四塞􅀆與盛徳其俱升麟鳳出而旁午􅀆猶氤氳而扶輿篤生我公􅀆以文章為世師公神禹之苖裔􅀆肇子爵而鄫封逮去邑而為氏􅀆季葉汩其南征祖騫翔而績著􅀆考踡跼而文鳴公既生而多艱􅀆踵祖武而好修既輕車又良御􅀆遂大放乎厥詞發天人之奥秘􅀆約六藝而成章元氣含而未泄􅀆洞芒芴而窅㝠挽天河而一瀉􅀆物應手而華昌揖楊馬使先路􅀆咸告公曰不敢彼崔蔡之紛紛􅀆孰云窺其藩翰辰來遲而去速􅀆固前修以跋㚄方􅐻礴而上征􅀆遽相羊而補外皇揆公之忠誠􅀆即商墟而賜環紬史諜乎東觀􅀆裁誥命乎西垣典章絶而復作􅀆世爭覩而快先正經緯乎終古􅀆配維斗而昭然變化詭而難常􅀆雖司命其或昧忽遭艱而去國􅀆遂衘哀而即世述作紛其具存􅀆悵爽靈之焉詣信百年不斯須􅀆猶電滅而焱逝天不憗遺一老􅀆固縉紳之所傷矧不肖以薄技􅀆早獲進扵門墻路貫江而修阻􅀆曾莫奠乎酒漿悲填膺而茀鬱􅀆􅂓自記扵斯文蔡氏哀詞惟夫人之髙誼􅀆真一時之女英既富有此好徳􅀆又申之以令儀帶幽蕙之縹緲􅀆佩明月之陸離人自操舎之不一􅀆雅獨取善以自持何報施之或􅑯􅀆罹禍艱於不虞顔色􅋑而未暮􅀆所天忽以殞殂痛平素之偕處􅀆忍此奄奄而嫠居瀝哀血以自誓􅀆甘餌毒而捐軀佩珠玉以死真􅀆固衆女之所􅅓曷卓越以不顧􅀆棄性命其如遺美不可强有􅀆信天資之所開要反心以内省􅀆豈或售乎人知嗟三晨之未浹􅀆遂俱逰而莫留死者有知􅀆􅆧魂魄以並逰日黄昏而不見􅀆庭室窈其無人惟哀風以歸來􅀆動素幔之襜襜何平生之􅅃密􅀆遽音聲之不可尋儼遺跡以在目􅀆紛百憂而攻心豈至理不吾喻􅀆如意厚而悲深撫雙櫬以增慟􅀆涕漬血而洒襟已矣哉人生有死􅀆自前古而既然精魄忽其不駐􅀆惟修名之可延忍錄錄以寓世􅀆信烈者之所羞儻佳志之獲申􅀆雖奄忽其焉悼時宣義挽詞奮發多難裏哀榮厚夜中妙年推正行末路見隂功風雨􅀟龍合山川弔鶴空懸知青史上又載一于公中書侍郎挽詞二首崛起啇巖後清忠士論歸法知商鞅弊議折董宏非遷謫生華髮騫騰上紫微又騎箕尾去朝野涕空揮守道無夷險如公實寡仇望從烏府重官到鳯池休二品追褒峻千金賻恤優搢紳終有恨王駿不封侯吕與叔挽章四首舉舉西州士來為邦國華藝文尤爾雅經術自名家正有髙山仰俄成逝水嗟賢人各有數不獨嵗龍蛇數日音容隔人琴遂已虗門生應有謚國史可無書舊室懸蛛網遺編走蠧魚定無封禪草平日笑相如追惟獻嵗發春間和我新詩憶故山今日始知詩是䜟魂􅀆應已度函闗風流雲散了無餘天祿空存舊直廬小吏獨來開鎻鑰案頭塵滿校殘書東平夫人挽章錢穆夫人相閥風流盛王家地勢雄室中蘭作佩庭下玉成叢啼鳥悲春檻荒原入夜宫遺芳得鴻筆論次詔無竆開府李公挽章報國封章數論交意氣真先朝貴公子當代老成人月動融尊酒花催鄭驛賓誰知古原上馬鬛一朝新戚里薨􅂄舊哀榮世未如襚加三事衮奠致两宫輿鹵簿前衢隘歌鍾後院虗英風知不墜芝王茂庭除孫莘老挽詞四首同功一體盡調元獨抱沉疴反故園壺遂暮年非不遇人生到此可忘言青春芸閤妙文詞進讀金華鬢若􅁝轉守七州多異政奉常處處有房祠月旦甞居第一評立朝風采照公卿門生故吏知多少盡向碑隂刻姓名華屋丘山可柰何百年光景一投梭故人唯有羊曇在慟哭西州不忍歌陳用之學士挽詞禮經三百鬢毛班追述先儒伯仲間誰請尚書重給札盡抄遺藁入名山岹嶢芸閤上參天直舎相依欲二年願寫此情歌挽者淚霑毫素不成篇雲臺觀者候昏明奎璧躔中失二星上界真人重離别隂風一夜攪青􅄀牢落公車待詔時白頭掌故更捿捿一生勤苦成何事只得銘旌數尺題滕逹道挽詞早嵗峩冠侍冕旒白頭淹䘏外諸侯篋中尚有東風草塞下曾無北顧憂心繫漢廷長入夢氣吞胡虜不防秋經綸未了埋黄土精爽還應屬斗牛江南江北奉周旋合散如雲二十年春郡勝遊花蔽馬夜山清話雨連天共驚萬里長城壊獨把千金寶劔懸平日書題多散亂呼兒尋聚一澘然自作挽詞嬰釁徙竆荒茹哀與世辭官來錄我槖吏來驗我屍藤束木皮棺藁葬路傍陂家鄉在萬里妻子天一涯孤魂不敢歸惴惴猶在兹昔忝柱下史通藉黄金閨奇禍一朝作飄零至扵斯弱孤未堪事返骨定何時脩途繚山海豈免從闍維荼毒復荼毒彼蒼那得知嵗晩瘴江急鳥獸鳴聲悲空濛寒雨零慘淡隂風吹殯宫生蒼蘚􅁓錢掛空枝無人設薄奠誰與飯黄緇亦無挽歌者空有挽歌辭後學張綖校正淮海集卷之四十
