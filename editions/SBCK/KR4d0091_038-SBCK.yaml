front:
  text: 淮海集卷之三十八記
  hash: sha256:cb9717cc832c40b904447f43fff3fe3e8bac08fa86e4018e125f8633627b37d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_038-1a}
body:
  text: 秦觀少游御書手詔記元豐元年八月詔以先臣某為天章閤待制環慶路安撫經略使三年四月環州肅逺寨慕家白子等剽屬􅆧構兵馬亂攻殺旁族先臣遣第二將張守約走馬承受陸中招降之誅其不聽命者於是􅆧族始定而亡入夏國者凡三百人復遣守約屯寨上檄夏人使歸其衆夏人承命震恐以其衆歸初慕􅆧之叛也附置以聞有詔得亡者無小大長少皆即其地斬之至是斬其酋豪百二十有二人而錄其脇從㓜弱婦女百四十有二人請干朝詔皆原之既又别賜手詔褒諭先臣跪捧伏讀感激涕下退謂臣等曰我本孤生䝉上識㧞寵遇如此自度無以報萬一惟與汝曹共誓捐軀而已明年先臣下世臣等銜奉遺訓夙夜殞越念無以􅆀區區者輙求金石具刻明詔以為不朽之傳蓋亦先臣之念也昔唐相權徳輿甞讀太宗所賜手詔至流涕曰君臣之際迺爾耶臣以為萬世之後當有讀明詔而感動復如徳輿者矣豈特今日為百執事之勸哉六年月日承務郎臣俞次臯記五百羅漢圖記五百羅漢圖一軸入定於龕中者一人䕃樹趺坐而説法者一人左右侍聽者八人説經者六人課經者六人課已而收經與誦而倚杖者各一人環坐指畫而議論者麈揮手杖支頥相嚮而談者各六人歸依寳塔者五人和南合座者六人稽首舍利光者八人飯餓鬼者四人食烏鳶者施魚鼈者各五人雲升者六人指現五色光者缽現白光者泉湧於頂者火燃於踵者􅃝而洗耳金環手隨求而立者各一人受齋請者七人受龍女珠獻者六人受兩猊花獻者四人受徃生花獻者七人受衣冠從三牛謁者五人受胡輸贐者七人受胡從兩橐駞而􅆀琛者四人受海神跪寳者五人騎龍者跨虎者乘馬者象駕者獅子馭者各三人爲犀説法者一人後座者三人植錫而座巨蟒上者一人背樹矚山􅍎者六人注猱升者仰鳯集者閲麋鹿者各四人俛伏羱者翫舞鶴者各五人擷菡蓞者一人從後者五人書蕉葉者五人持蕉葉而渉筆者二人焚香而茗飲者六人臨流而滌鉢者三人滌已而持歸者一人浣衣者就樹絞衣者浣已而歸者將浣而進者隔岸而覘者各一人洗屨者後洗而納屨者振衣而去者各一人削髮者為削髮者沐而待者解衣者既解收衣者各一人補毳者二人操刀尺者一人治綫者三人泉涌於石逺近而觀者十六人度石梁者三人欲度者四人行杖錫者二人導者二人賛者三人芒屩擔簦而歸者三人束裝而行者一人或坐或行或立跏趺􅅃欠杖柱笠負數珠白紼山曲水隈塗覯而卒遇者十八輩合一百二十有三人或坐或行或立背樓觀憑欄楯據危迫險俛瞰仰睇直視轉盻側睨旁顧近相目逺相望者二十八輩合一百三十九人凡羅漢五百人而佛處其中焉佛之旁又有寶冠珠絡持如意執蓮花座猊象者菩薩二右􅃝徒跣曲拳和南而後侍者弟子十瞻賛而前謁者十六甲胃椎䯻挺劒秉􅃏立左右者善神二别三十有一焉又童子有抱經室主茶奩荷䇿持缾典湯徹器凡十有六鬼有馭龍馭馬象受施食送齋書鱗身鳥咮衣短後隠樹而窺者凡十有四雜人物有白衣胡跪獻花香珍怪衣冠而謁驅牛以從載犀象挈筐篚而進被甲服弓矢愕而贍歎者凡十有九鳥獸有鳯鶴鵲烏龍虎犀象師子馬牛槖駞蟠蟒戯猊猿猱大小四十有三然以羅漢為主故號五百羅漢圗世傳呉僧法能之所作也筆畫雖不甚精絶而情韻風趣各有所得其綿密委曲可謂至矣昔戴逵常畫佛像而自隠於帳中人有所臧否輙竊聽而隨改之積數年而就余意法能亦當研思若此然後可成非率然而為之决也余家既世崇佛氏又甞覽韓文公畫記愛其善叙事該而不煩縟詳而有軓律讀其文恍然如即其畫心竊慕焉於是倣其遺意取羅漢佛之像而記之顧余文之陋豈能使人讀之如即其畵哉姑致叙之私意云爾元豐二年正月十五日弟子秦某記雪齋記雪齋者杭州法㑹院言師所居室之東軒也始言師開此軒汲水以為池累石以為小山又灑粉於峯巒草木之上以象飛雪之集州倅太史蘇公過而愛之以為事雖􅁼兒嬉而意趣甚妙有可以發人佳興者為名曰雪齋而去後四年公為彭城復命郡從事畢君景儒篆其名并自作詩以寄之於是雪齋之名浸有聞於時士大夫喜幽尋而樂勝選者過杭而不至則以為恨焉杭大州也外帶濤江漲海之險内抱湖山竹林之勝其俗工巧羞質朴而尚靡麗且事佛為最勤故佛之宫室棊布於境中者殆千有餘區其登覽宴遊之地不可勝計然獨不至雪齋則人以為恨何也蓋公之才豪於天下斥其棄餘以為詞章字畫者亦皆絶妙一時讀而翫之使人超然有孤舉逺擢之意是齋雖􅄶小無足取稱於人而公所書詩實在其壁士大夫過杭而不能一至其地以寓目焉是豈所謂喜幽尋而樂勝選者哉以為恨焉宜矣昔李約得蕭子雲飛白大書蕭字持歸東洛遂號所寘亭為蕭齋余謂後之君子將有聞雪齋之風不可得而見者矣豈特為今日之貴耶言師名法言字無擇泊然蕭洒人也蓋能作雪齋從蘇太史遊則不問可知其為人元豐三年四月十五日記龍井記龍井舊名龍􅇦距錢塘十里吳赤烏中方士葛洪嘗鍊丹於此事見圗記其地當西湖之西淛江之北風篁嶺之上實深山亂石之中泉也每嵗旱禱雨於他祠不獲則禱於此其禱輙應故相傳以為有龍居之然泉者山之精氣所發也西湖深靚空闊納光景而涵煙霏菱芡荷花之所附麗􅀛魚鳥蟲之所依憑漫衍而不廹紆餘以成文隂晴之中各有奇態而不可以言盡也故岸湖之山多為所誘而不克以為泉淛江介於吳越之間一晝一夜濤頭自海而上者再疾擊而逺馳兕虎駭而風雨怒遇者摧當者壊乘髙而望之使人毛髮盡立心掉而不禁故岸江之山多為所脇而不暇以為泉惟此地蟠幽而踞阻内無靡曼之誘以散越其精外無豪捍之脇以虧踈其氣故嶺之左右大率多泉龍井其尤者也夫畜之深者發之逺其養也不茍則其施也無窮龍井之徳蓋有至於是者則其為神物之託也亦奚疑哉元豐二年辨才法師元静自天竺謝講事退休於此山之夀聖院院去龍井一里凡山中之人有事於錢塘與游客之將至夀聖者皆取道井旁法師乃即其處為亭又率其徒以浮屠法環而呪之庶幾有慰夫所謂龍者俄有大魚自泉中躍出觀者異焉然後知井之有龍不謬而其名由此益大聞於時是嵗余自淮南如越省親過錢塘訪法師於山中法師䇿杖送余於風篁嶺之上指龍井曰此泉之徳至矣美如西湖不能滛之使遷壯如淛江不能威之使屈受天地之中資隂陽之和以養其源推其緒餘以澤於萬物雖古有道之士又何以加於此盍為我記之余曰唯唯龍井題名記元豐二年中秋後一日余自吳興過杭東還㑹稽龍井辨才法師以書邀予入山比出郭已日夕航湖至普寧遇道人參寥問龍井所遣籃輿則曰以不時至去矣是夕天宇開霽林間月明可數毛髮遂棄舟從參寥杖䇿並湖而行出雷峯度南屏濯足于惠因澗入靈石塢得支徑上風篁嶺憇龍井亭酌泉據石而飲之自普寧經佛寺十皆寂不聞人聲道旁廬舎或燈火隱顯草木深鬱流水激激悲鳴殆非人間有也行二鼓矣始至夀聖院謁辨才於潮音堂明日乃還閒軒記建安之北有山巋然與州治相直曰北山山之南有澗澗之南有横阜背山而靣阜據澗之北濵有屋數十楹則東海徐君大正燕居之地也其名曰閒軒去軒數十里有田可以給饘粥供􅁝麻賔婚燕祭之用取具君將歸而老焉而求記扵髙郵秦觀觀曰士累於進退乆矣弁冕端委於廟堂之上者倦而不知歸據莽蒼而佃横清冷而漁者閉距而不肯試二者皆有累焉君雖少舉進士而便馬善射慷慨有氣略天下奇男子也夫以精悍之姿遇休明之時齒髪未衰足以任事而欲就閒曠處幽隠分猿狖之居厠麋鹿之遊竊為君不取也乃為詞以招之曰山之雲兮油然作水循澗兮號不斁雲為雨兮水為瀆時不淹兮難驟得念夫君兮武且力矢奔星兮弧挽月夜參半兮投袂起探虎穴兮虜其子破千金兮購奇服撫劒馬兮氣横出山之中兮嵗將闌木樛枝兮水驚湍鷹隼擊兮蛟龍蟠熊咆虎嘯兮天為寒四無人兮誰與言膏君車兮秣君馬軒之中兮不可以乆閒芝室記河南張倪老既以其父宣義君命奉其母彭城君之喪殯于廣陵石塔佛舎遂與其弟曼老冲老廬於殯側數月有芝生于廬中余聞而謁觀焉蓋附土而出者數本其色正赤澤而堅悍若傅髹彤余撫而歎曰天下之物固有未易詰其所以然者夫濡雨露而生被霜雪而死下荄而上蔓者草之常性也今芝亦草耳而孝士大夫之家則生賢諸侯之國則生明天子之世則生徙之不可蒔之不能豈所謂未易詰其所以然者歟有浮屠聞而笑之曰是不然天下之物皆吾心也心之本體明白空洞實無一毫可得而有惟其覺真蔽扵塵幻由是清激而升者為想濁汚而墮者為情夫情想之扵心猶珠鑑之有影像江海之有浪漚形固具存非其本矣故無窮如虛空有物如天地爰逮日月斗星金石草木之属凡恱可於吾心意者皆善想之所變而憎惡於吾耳目者皆惡情之所生也吾聞彭城君承其先夫人之凶五日而以毁死諸子廬於殯側刺血書經哀動道路善想交感室為生芝異扵凡草理固然矣其又奚疑若夫善惡畢寂情想究空芝於此時瑞為何物已而歎曰奇哉吾不能以告子矣余未甞讀佛書固不知所論中否然竊恠其語宏愽􅅛奇有足觀者明年張氏兄弟服除而歸廣陵士大夫因號其廬曰芝室懼來者之不知也而嘱余為記余既論次其事遂追䟽浮屠之語而并載之倪老名康伯以召試中選今為南都教授曼老名節孫前參海陵軍沖老名康道云祖氏先塋芝記大夫祖公無頗自西蜀使者得請以崇福祠官燕居于蔡將還朝謂髙郵秦觀曰祖氏本幽州之范陽晉將軍逖實我逺祖其後稍徙深州至道間始來居蔡今汝陽縣陽安鄉十里岡之源則我先府君之墓也元豐初有芝數十本產于塋中其後嵗嵗有之迨今不絶夫豈一氣之運偶然感發莫詰其所以然耶抑天時人事之際或有以致之也子其為我記之觀曰草之有芝猶鳥之有鳯獸之有麟從古相傳以為瑞物今乃嵗生於先塋之中者殆汝南和氣之應祖氏方大之祥其非偶然决也何以明之汝南在漢為佳郡陳蕃黄憲二許諸􅀽之徒實皆郡人俗尚風節輕勢利士不守道則妻妾耻之故天下號汝南為名氏之區迨唐之世始建彰義節度使屯宿重兵而李希烈吳元濟秦宗權之屬盗有其地王澤不流民甿無知父以弄兵詔子兄以殺人誨弟故天下號淮西為盗賊之藪皇朝受命定都大梁蔡去京師七驛遂為輔郡百餘年間良二千石接武而至興學校脩貢舉以宣布教化故盛徳尊行魁奇俊偉之才相繼出焉盖唐之􅃇俗浸㣲而漢之遺風復起當此之時祖氏一門顯者數人府君之仲弟士衡掌誥掖垣從子無擇通籍内閣大夫踐更中外為省名郎作時膚使行且登用諸子森然多有植立其慶未艾也由是言之芝為汝南和氣之應祖氏方大之祥豈不信然昔新豐市李興廬于父之墓左有紫芝白芝二本生扵廬上柳宗元以為孝治神化隂中其心克致斯事矧今芝出於股肱之郡侍從之家也哉宜得一時文學之士比物屬辭歸美於上度為樂歌薦之郊廟追配元封齋房之篇觀也何足以與扵此姑承大夫之命論次其事以備作者採擇而已府君諱士龍字徳驤云元祐八年四月吉日記羅君生祠堂記羅君之為江都以誠心為主耻言鈎距惠文之事凢民有訟曲直徑决於前不以属吏詿誤若小過輙誨諭遣去視鰥寡孤獨之有失其所者如已致焉黎明視事入夜猶不已或譏其太勞君曰與其委成於吏民有不盡之情孰若勞予之耳目哉居數月政化大行民知其長者不忍欺紿之訟者益少君乃出行諸郊所過召其􅂄老問以疾苦及所願欲而不得者為罷行之始復大石湖改名元豐廣袤數百歩溉田千有餘頃是嵗大穰畆收皆倍於是逺近自陳願復陂塘溝渠之利者相屬君一切聽許親至其地與之經始築大堤以却潮之患䟽潦水而注諸江凡水利之興復者五十有五溉田六千頃而桑之以課種者亦八十五萬有竒徙其治於東南爽愷之地為屋數百楹以其贏材新驛堠亭館之在境者又頗出私錢營致藥劑以給疾病之民所瘉至不可勝計嵗或乾溢有禱群祠雨暘輙應如響世益謂神其享之歳滿代去其民思之不置乃聚而謀曰我民之徳羅君至矣顧無以自效聞古有召伯者善治民民追思之至不忍伐其所憇之棠又有謝公者亦其流也甞以斯城北築埭後人因名其埭曰召埭今埭實在江都之北境盍即其地堂畵羅君之像而祠之以慰吾民且曰使羅君之名與召謝共傳而不朽不亦可乎衆曰善於是即召埭之東法華佛寺置生祠焉羅君名適字正之台州寧海人學術有本末通於世務風節凛然國士也甞再被召見皆以不合罷歸其蒞官行已所可書者甚有書在江都者以為生祠記云勅書奬諭記代元祐二年夏五月詔以臣某知蔡州軍州事三年春盗發陳蔡頴之間甲而兵者四十餘人皆慓悍善鬭其渠魁頗能拊衆得其死力毎刦大姓之家獨取金幣斥其錢粟以予小民小民徳之樂為囊槖通行饋食捕盗言以故稀復遇間遇之又輙為所敗俄轉入淮南界光夀都廵御史素戰不勝其子死之奔仙居縣尉朱記吏卒死傷甚衆既而引還陳蔡頴之間復擾扵是有㫖合京西南北部使者督捕移將官於京東募弓箭手騎兵於渭州增立賞格得其渠魁者官三班供職錢六十萬餘黨一人錢四十萬是時諸捕盗官相望者十餘屯無晝夜夜不解甲而賊衆詭秘出沒如神終莫能得臣既隂布耳目察其所在又預募將兵以備掩擊㑹諜知其區處而諸屯皆逺不可遽召扵是令權節度推官翟元衡統所募兵夜從間道去果遇賊扵髙佐之北斬其渠魁并其妻等六級梟扵市元衡又與諸捕盗官圍殘黨於李曲殱其衆遁免者以次皆擒或自相屠殺棄屍扵水中獲仙居縣尉朱記前後斬首凡三十四級生得者六人獲鎧甲旗幟仗械二百二十有七是時渭州弓箭手騎兵猶未至奏却於途諸捕盗官各解去而陳蔡頴之間安堵矣四年六月䝉恩賜勑書奬諭臣竊惟二聖臨御以來神功聖化皷動海内隂陽調和菑害絶息臣於此時幸緣肺腑備位郡守偶因薄效遽賜褒嘉承命震驚榮懼交至敢憑金石具刻明詔傳示無窮又論次其事而并載之元祐四年六月二十八日臣向宗回記遊湯泉記漳南道人昭慶隠湯泉山之八月集賢孫公謂其㳺曰漳南去幾時已甚乆且聞其所寓富山水盍徃訪焉於是余與道人參寥請從之具鞍馬戒徒御翼日出髙郵西郭門馳六十里宿神居山之悟空寺神居髙不踰三四引而股趾盤薄甚大旁占數墟俗呼土山或曰昔老姥煉丹於此功成仙去今寺有石藥臼者乃其遺物也又馳四十里宿黄公店從者以雨告止焉又馳六十里次六合館夀聖寺之香積院院有庬眉老僧主之應客淡然若無意於世者與之言心如其貎蓋有道者也又馳七十里次真相院明日漳南来逆相勞苦如平生歡遂與俱行馳二十五里至湯泉館惠濟院院則漳南之所寓也景申遂浴扵湯泉之墟西惠濟二百歩周袤不踰一成有泉五一曰太子湯舊傳梁昭明所遊今廢於野一在居民朱氏家其三則􅀠于惠濟而惠濟三泉旁皆甃石為八方斛竅其兩崖一以受虛一以泄滿泉輸其中晨夜不絶其色深碧沸白香氣襲人爬搔委頓之病浴之輙愈贏粮自逺而至者無虚時劉夢得和州記云地有沸井即此泉也噫泉之為湯者衆矣彼汝水驪山嘗為乘輿後宫之所臨幸方其盛時綺䟽璇題魚龍飛動眩人目睛勢徂事變鹿豕得而辱焉其僻昧不聞扵世者又皆蔽扵叢薄堙扵土塗抱清懐潔歷千百年莫或稍試扵用二者皆有恨焉獨是泉出無亢滿之累其仁足以及物豈所謂無出而陽無入而藏柴立乎其中央者歟余三人者既嘉泉之近扵道又貪其有功扵塵垢疾病也日不一至再日必至焉率以為常越三日烏江令閻求仁来求仁余鄉友也遂與俱行東南馳八里至龍洞山下棄馬而徒歩山形斗起䝉籠曲道尤難登捫蘿進者五里然後至其山椒是日風曀望建業江山蟠龍踞虎之狀皆依約而得之自山椒轉而西南盤紆徑復又二里而至龍洞其上巄嵷崟岑不可窮竟門則大穴也漸下十數丈窅然深黑日光所不及揭炬然後可行腹中空豁可儲粟數萬斛屏以青壁而泉嚙其趾蓋以乳石而䑕家其竇仰而視之或突然傲岸而出若有恃者或侵尋而却若有畏者雲撓而鳥企鼻口呀而齗齶露其陬牙横遌卒愕之變疑生扵鬼神雖智者造謀而巧者述之未必能爾也惜乎閟於龕巖夐絶人迹罕至之地世莫得而窺焉夫豈負天下之奇勝者固不欲售其伎必待夫至誠篤好之士然後與之接耶或曰洞有小蛇青色而赤章旱嵗禱雨多應云景夕還惠濟惠濟有庵二一在太子泉南北歩崦中隠者陳生居之一未構基在院西六十歩大丘之原丘勢坡陁前有小澗㳙㳙而流藩以齊篠閎以􅀟松毎泠風自逺而至泛篠薄激松梢度流水其音嘈然如奏笙籟巽嚮而望自定山轉而西服光晷薄星辰亘二百里迅馳而矗立妬危而恬壯分秀而取奇各挾其伎以効履舄之下孫公愛其地勝欲寄以老焉因請名曰寄老庵相率作詩以約之明年庵成發二奇石於􅀟松之下形勢益振扵是環山數百里甞以遊觀名者遷延辭避推寄老焉西庵之成乆矣其地廹遽無流水非枯槁自謀之士莫能居之故蔑有聞者是庵始基也為賢士大夫所矚及成遂以眺望浮游之勝甲扵一方物之興固自有時也哉湯泉之事既窮余又獨從參寥西馳七十里入烏江邀求仁謁項羽祠飲繫馬松下憑大江以望三山憇于虚樂亭復還惠濟翌日乃歸盖自髙郵距烏江三百二十五里凡經佛寺四神祠一山水之勝者二得詩三十首賦一篇至扵山林雲物之變溪瀬潺湲之音故墟荒落晨汲瞑舂之狀悠然與耳目謀而適然與心遇者蓋不可勝計嗚戱兹游之所得可謂富矣明年漳南自湯泉來㑹于髙郵追叙去年登臨之美且歎日月之速盛遊之難再也因撰次之以備湯泉故事時與同好者覽之以自擇焉熈寧十年九月記淮海集卷之三十八
