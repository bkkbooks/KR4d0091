body:
  text: 贈蹇法師翊之天都九經緯人物如紡績豈無仙聖㳺但未見高識蹇師蜀方士鬼物充服役朅來長安城摩挲金銅狄大蛇死巳論葛陂囚且釋是事何足云聊爾恤艱厄方從馬明生西去鍊金液丹成得度世造化為莫逆予亦江海人名宦偶牽迫投劾去未能見師三歎息送劉貢父舎人二首虎去藜藿採珠在其川媚君子一詘信實繫天下事念昔元豐間公初謫南裔託詞弔湘水聞者為心醉踰年憸臣逐國老起相繼除公守㐮陽士始有生意茲焉歸法從乃是朝廷計在公何足云事業本餘棄掖垣羙花木入直春正麗同僚㸔家風立馬揮九制觀也本諸生早與世參商方枘不量鑿交親指為狂末路辱公知賜出非所望相期古人處豈止事文章汝南雖奥區校官實始張觧鞅百無有栖栖寄僧坊築室從有徒皆公偕餘光一壺千金直所濟在倉黄萬里猶比鄰别離無足傷何以報公徳修好以為常南京妙峰亭王勝之所作蘓子瞻題榜王公厭承明出守南宫鑰結搆得崇丘巋然瞰清洛是時謫仙人發軔自廬霍郊原春鳥鳴來此動豪酌報投一何富玉按金刀錯新牓掲中楹千載見逺託朅來訪陳迹物色屬摇落人烟隔鳬鴈田疇帶城郭紅蕖隕風漪砂礫巻飛籜青青陵上姿獨汝森自若人生如博奕得喪難前約金鎚初控頥巳復東方作大明昇中天龍鸞入階閣深懲漁奪弊法令一刋削斯民如觧懸喜氣欎磅礴公乎數豋覽行矣翔寥廓次韻奉酬丹元先生金華紫烟客來作牧羊兒至言初無文尋繹自成詩二景入妙解元氣含烟詞憐我鬛蒼浪黄埃眩蟲絲勸解冠上纓一濯含風漪攝身列缺外倒躡蜿蜒鬐維斗錯明珠望舒耿脩眉真㳺無疆界浩蕩天風吹送裴仲謨君子出於徳妙髙如匠石但見廣厦成不見斧斤迹厚為諸兄奉自奉頗云嗇三生陽亢宗薄俗有慙色汝南古佳郡月旦評一易爾來似揚州不辨龍蜥蝪短簿髯叅軍喜怒移頃刻正平竟獲免實我文舉力念公多乖隔憂思如紡績耻為兒女仁到此淚横臆熈朝大烹飪賢者不家食朝為郡縣吏暮作臺省客矧聞諸法從乆欲薦言責去去勿重陳九萬自此擊題雙松寄陳季常遥聞連理松託根黄麻城枝枝相鉤帶葉葉同死生雖云金石姿未免兒女情想應風月夕蒲庭合歡聲徐仲車食於學官吏或以為不可欲罷去之太守不聼禮遇如初感之而作許丞老病聾督郵白欲廢賢哉黄次公鑒裁實精詣殷勤謝督郵此丞乃廉吏重聼庸何傷善助無失意古人骨巳朽來者復誰繼仲車天下士固非許丞類至行通神明問學有根柢若充老更聘自革風俗弊太守前巳聞粟帛俄見賜奈何少年子輒効督郵事道喪賢哲窮聞之為流涕人心如其面難以一律揆所望在次公督郵何足議次韻夏侯太冲秀才儒官飽閑散室若僧坊静北忩腹便便支枕㸔斗柄或時得名酒停午猶中聖醒來復何事秉筆賦秋興焉知懶是真但覺貧非病茫茫流水意㑹有知音聼鐘鼎與山林人生各天性送張和叔兼簡黄魯直汝南如一器百千聚飛蚊終然鼔狂閙啾啾竟誰聞議郎盛徳後清修繼先芬未試霹靂手低囬從此君學官冷於水虀鹽度朝曛間䝉相煖熱破憂發孤欣君今又復去冀北遂空羣豈無一樽酒誰與通殷勤大梁多豪英故人滿青雲為謝黄叔度鬢毛今白紛題騕褭圖雙瞳夾鏡權恊月尾鬛蕭森澤於髪鞍銜不施韁復脫旁無馭者氣騰越地如砥平丘隴㓕天寒日暮抱饑渇驤首號鳴思一發超䡍絶塵入恍忽東門金鑄乆銷歇曹覇丹青亦云没頼有龍眠戲揮筆眼前時見千里骨玉臺閶闔相因依嗟爾龍媒空自竒鸞旗日行三十里焉用逐風追電為和東坡紅鞓帶君不見相如容貌窮不枯卓氏恥之分百奴一朝奉㫖使笻筰駟馬赤車從萬夫仲元君平更髙妙寄食耕卜霜眉鬚兩川人物古不乏數子風流今可無參軍少年飽經術期作侍中司御壺老披青衫更矍鑠上馬不用兒孫扶一朝忽解印綬去恥将詩禮攘裙襦懸知百年事巳定却笑列仙形甚臞東阡北陌西風入瑞草橋邉人呌呼相見紅圍照白髪頽然醉卧文君壚和王忠玉提刑嵩峰何其髙峰髙氣尤清念昔秋欲老從公峰下行古木上參天哀禽報新晴脩塗雲外轉槁葉風中零曛黒度伊水眇然古今情黎明出龍門山川莽難名信羙非吾土顧瞻懐楚萍美人天一方傷哉誰目成黄綬我􅊃爾白鷗公勿驚糟醨可餔啜古人忌偏醒題楊康功醉道士石黄冠初飲何人酒徑醉頹然不知乆風吹化石楚山阿藤蔓纒身蘚封口常隨白鶴亦飛去但有衣冠同不朽異物終為賢俊得野老田夫豈宜有華隂楊公香按吏一見遂作忘年友日暮西垣視草歸往往對之傾數斗大夢之間無定論啓母望夫天所誘榖城或與子房期西域更為陳郍吼我疑黄冠反見玩若此堅頑定醒否何當一笑凌蒼霞顧謝主人聊舉手送蔡子驤用蔡子駿韻越絶山川逺相屬萬壑千巖抱青緑卧龍一峰稱是竒遶趾清漪如帶束鏡水春生鶂尾銜稽山日暮猿聲續三休上與蓬萊接登眺使人遺寵辱我昔東游觀禹穴痛飲狂歌得所欲上天何曾有官府鸞鳳日日遭鞭扑僧坊畫壁閱幾偏神妙難忘獨金粟華胥夢斷巳十年又見春風煑餳粥苧羅若耶固依舊可憐雲月誰追逐故人淡泊出天性鷦鷯巢林一枝足不肯絃歌甘筦庫還同市門隱梅福惟應月下小叢歌尚有哀音傳舊俗飲酒詩四首我觀人間世無如醉中真虚空為消隕况乃百憂身惜哉知此晚坐令華髪新聖人難驟得得且致賢人左手持蟹螯舉觴屬雲漢天生此神物為我洗憂患山川同恍惚魚鳥共蕭散客至壺自傾欲去不容間客從南方來酌我一甌茗我酌初不啜彊啜且復醒既鑿渾沌氏遂出華胥境操戈逐儒生舉觴還酩酊氏一作竅雷觴淡如水經年不濡脣爰有擾龍系為造英靈春英靈韻何髙蒲萄難為鄰他年血食汝應配杜康神艇齋并序予以典校史領倅錢塘邂逅得友丁君彦良於陳留官舎丁君彦良年少氣雋誦詩文亹亹不休動有過人語深恨得之晩也臨分以艇齋詩速予賦為寄題一篇平生樂漁釣放浪江湖間兀兀寄幽艇不憂浪如山聞君城鄗居左右羣書環有齋亦名艇何時許追攀釣古不釣今所得孔與顔不然如爾祖跨鶴出塵寰和裴仲謨放兎行兎饑食山林兎渇飲川澤與人不瑕疵焉用苦求索天寒草枯死見窘何太廹上有蒼鷹禍下有黄犬厄一死無足悲所耻敗頭額敢期揮金遇倒槖無難色雖乖獵者意頗塞仁人責兎兮兎兮聽我言月中仙子最汝憐不如亟返月中宿休顧商巖并嶽麓和裴仲謨摘白鬚行仲将題凌雲比訖鬚盡白陸展媚側室星星染為黒人生如寄耳况復形與色澤壑藏山舟夜半輸有力龎眉三不遇巳矣何所惜二毛賦秋興自愛頗姑息聞諸古竺乾毛髪因地得數窮反其本螻螘得而食妙年光可鍳烱若鴉羽戢映梳漸蕭蕭變化了無隙所以梵志云昔人巳非昔皤然君勿笑子羽以貎失信美如客兒終翦施摩詰我作白鬚行而得養生術淮海集巻五欽定四庫全書淮海集巻六宋秦觀撰
