body:
  text: 法帖通解序法帖者太宗皇帝時遣使購摹前代法書集為十巻摹刻於板藏之禁中大臣初登二府詔以一本賜之其後不復賜世號官帖故丞相劉公沆守長沙日以賜帖摹刻二本一置郡帑一藏於家自此法帖盛行於世士大夫好事者又往往自為别本矣今可見者潭綘二郡劉丞相家潘尚書師旦家劉御史次莊家宗將世章家凡六本雖有精粗然大抵皆官帖之苖裔也頃為正字時見諸帖墨蹟有藏於秘府者字皆華潤有肉神氣動人非如刻本之枯槁也蓋雖官帖亦其糟粕耳又當時奉詔集帖之人茍於書成不復更加研考頗有偽蹟濫厠其間至於標題次序乖錯逾甚士大夫以字畫小技莫有論次之者投荒索居無以解日輒以其灼然可考者䟽記之疑者闕之名曰法帖通解云漢章帝書衛巨山云漢興而有草書不知作者姓名至章帝時齊相杜度號善作篇是章帝時已有草書矣然千字文者乃梁武帝得王羲之所書千字使周興嗣以韻次之時南平王偉令蕭子範亦製此文蔡逺浪釋辰宿一帖興嗣文也豈得為漢章帝之書耶歐陽文忠以謂前世學書者已有此語不獨始於羲之按漢武帝時司馬相如作無將篇無復字元帝時黄門令史㳺作急就篇成帝時將作大匠李長作元尚篇元始中揚雄作訓纂篇班固續之無復字皆小學家也千字文者蓋擬諸篇而作今急就篇之類尚有存者其詞高古讀之不問可知為漢人之文與興嗣所作殊不類也文忠此説殆亦可疑爾倉頡書易曰上古結繩而治後世聖人易之以書契百官以治萬民以察葢取諸夬而説者或以為書契始於伏羲或以為始於倉頡蓋伏羲畫八卦則書契已兆至倉頡觀鳥迹則書契遂詳始於伏羲而成於倉頡爾古者八嵗入小學故周官保氏掌國子教之六書謂象形象事象意象聲轉注假借也謂之小學家自至秦焚燒典籍始用篆𨽻而古文滅矣漢武時魯共王壞孔子舊宅於壁中得尚書春秋論語孝經時人以不復知有古文謂之科斗書又北平侯張蒼獻春秋左氏傳郡國亦往往於山川得鼎彞其銘則前代之古文皆自相似時王莽司空甄豐改定古文有謂古文竒字羲書佐書繆篆鳥書凡六體所謂古文者孔氏壁中書也魏初傳古文者有邯鄲淳衛覬甞冩淳尚書後以示淳而淳不别至正始中在三字不維轉失淳法因科斗之名遂効其形太康元年汲縣人盜發魏襄王冢得簡書十餘萬言案魏氏所出猶有髣髴古書亦數種其一巻論楚事者最為工妙齊文惠太子為雍州時盜發楚王冢亦得竹簡青絲綸簡廣數分長二尺皮節如新有得十餘簡者王僧䖍云是科斗書記周官所闕文以此論之凡稱古文者皆倉頡遺法也古文雖非科斗書而世常謂之科斗者以其類科斗爾此帖題曰倉頡書而了不與科斗相類乃近大小二篆蓋可疑也仲尼書魯司寇仲尼書者呉季子墓銘也銘在季子墓上其字皆徑尺餘唐張從紳記云舊本湮滅開元中元宗命殷仲容摹榻其書以傳至大厯中蕭定又刻于石此小字者蓋後人依効爲之者也歐陽文忠公謂孔子平生未嘗至呉以史記世家考之其厯聘諸侯南不逾楚推其嵗月蹤跡未嘗過呉不得親銘季子之墓又其字特大非古簡牘所容然則季子墓銘其真者猶疑非仲尼書又况依倣爲之者歟史籕李斯史籕者周宣王太史作大篆十五篇與古文時有同異先王之時天下之書同文及其衰也諸侯各自爲政而字畫之形亦異殊矣秦兼天下丞相李斯乃奏罷不合秦文者而斯作倉頡篇車府令趙髙作爰厯篇太史令胡母敬作博學篇皆取史籕大篆或頗省改是為小篆是時天下多事篆字難成長安下士人程邈得罪繫寜陽十年從獄中增減大篆去其繁複奏之始皇以爲善出邈為御史名其書曰𨽻書凡奏事令𨽻人書之故又謂之佐書自爾秦書有大篆小篆刻符包蚫𨽻書等凡八體焉倉頡爰厯博學三篇至漢時閭里之師并為倉頡篇而籕文至建武時已六篇矣今稱史籕之迹者惟岐陽石鼔文李斯之書惟泰山詔爲真蹟二世詔嶧山之碑近世傳者出於徐常侍夏英公家自唐封演巳疑非真杜甫直謂野火焚棗木傳刻爾不知此謂史籕李斯二帖者何從得之也今漢碑在者皆𨽻字而程邈此帖乃是小楷觀其氣象豈敢遂信以為秦人書鍾繇鍾繇賀捷表其後云建安二十四年閏月九日南蕃東武亭侯鍾繇上歐陽文忠公嘗問孫集賢思恭云建安二十四年閏在何月集賢精於厯學以漢家所用四分乾象厯推之是嵗已亥三厯皆閏十月文忠以陳夀三國志考與集賢之言合然文忠考魏呉二志乃權以是嵗閏十月方征闗羽至十二月獲之明年正月始傳首至洛陽鍾繇安得於閏十月先賀捷也由是疑此表爲非真焉懐素懐素唐僧字藏真此帖稱王右軍云吾真書可比鍾繇而草故不减張芝僕以爲真不如鍾草不如張又嘗見其一帖云漢時張芝言書為世所重非老僧莫入其體則懐素自謂抗張芝而過右軍矣昔栢元自謂右軍之流論者以比孔琳之齊髙帝謂張融曰卿書殊有骨力但恨無二王法荅曰非恨臣無二王法亦恨二王無臣法前世善書者盖嘗欲與右軍抗衡矣而毎不謂公論所許懐素此言其果然歟歐陽文忠公嘗謂法帖者乃魏晉時人施於家人朋友其逸筆餘興初非用意自然可喜後人乃棄百事而以學書爲事如一未至至於終老窮年疲弊精神而不以爲苦是真可歎也懐素之徒是巳文忠此論可謂名言然天下之事畢竟亦何所有孰為可學孰爲不可學者自古以藝自名家至於文章學術大功大名世所謂不朽者其人方從事於其間也曷嘗不棄百事而爲之至於終老窮年疲弊精神而不以爲苦也由後世觀之其異於懐素之學草書也幾何邪書晉賢圖後此畫舊名晉賢圖有古衣冠十人惟一人舉杯欲飲其餘隠几杖䇿傾聽假寐讀書屬文了無霑醉之態龍眠李叔時見之曰此醉客圖也盖以唐竇䝉畫評有毛惠逺醉客圖故以名之焉叔時善畫人所取信未幾轉相摹寫徧於都下皆曰此真醉客圖也非叔時疇能辨之獨譙郡張文潜與余以為不然此畫晉賢宴居之狀非醉客也叔時易其名出竒以眩俗耳余舊傳聞江南有一僧以貲得度未嘗誦經聞有書生欲苦之詣僧問曰上人亦嘗誦經否僧曰然生曰金剛經㡬巻僧實不知卒爲所困即誣生曰君今日已醉不復可語請俟他日書生笑而去至夜僧從鄰房問知巻數詰旦生來僧大聲曰君今日乃可語耳豈不知金剛經一巻也生曰然則巻有幾分僧茫然瞪目熟視曰君又醉耶聞者莫不絶倒今圖中諸公了無醉態而横被沈湎之名然後知昔所傳聞爲不謬矣雖然余懼叔時以余與文潜異論亦將以醉見名則余二人者将何以自觧也叔時好古愽雅君子其言宜不妄豈評此畫時方在酩酊邪圖中諸客洎予二人孰醉孰不醉當有能辨之者書蘭亭叙後蘭亭者晉右将軍㑹稽内使瑯琊王羲之逸少所書詩序也右軍以穆帝永和九年三月三日與太原孫統丞公孫綽興公廣漢王彬之道生陳郡謝安安石髙平郄曇重熈太原王藴發仁釋支遁道林及其子凝之徽之操之等四十有一人修袚褉於山隂之蘭亭酒酣賦詩製序用蠶繭紙䑕鬚筆書凡二十八行三百二十四字字有重者皆構别體而之字最多至二十許字他日更書數十本終無及者右軍亦自愛重留付子孫至七代孫智永爲比􅏀俗呼永禪師永卒傳其書於弟子辯才才俗姓袁氏梁司空昻之元孫唐正觀中太宗銳意學二王書帖摹搨殆盡惟未得蘭亭凡三召辯才詰之固稱荐經䘮亂亡失不知所在後遣監察御史蕭翼㣲服爲書生以詭辯才始得之命供奉搨書人趙模韓道政馮承素葛貞等四人各搨數本以賜皇太子諸王近臣貞觀二十三年髙宗奉遺詔以蘭亭入昭陵惟趙模等所搨者傳於世事見何延之蘭亭記淮海集巻三十五欽定四庫全書淮海集巻三十六宋秦觀撰狀
