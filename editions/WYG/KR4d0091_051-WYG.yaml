seq: 51
front:
  text: 淮海長短句巻中宋秦觀撰
  hash: sha256:39a6aeeca5e6b616b229717ffea9134527cf26bd260980ace95a1d5de137bfba
body:
  text: 鵲橋仙纎雲弄巧飛星傳恨銀漢迢迢暗度金風玉露一相逢便勝却人間無數柔情似水佳期如夢忍顧鵲橋歸路兩情若是久長時又豈在朝朝暮暮菩薩蠻蟲聲泣露驚秋枕羅幃淚濕鴛鴦錦獨卧玉肌凉殘更與恨長陰風翻翠幔雨澀燈花暗畢竟不成眠鴉啼金井寒减字木蘭花天涯舊恨獨自凄凉人不問欲見回腸斷盡金爐小篆香黛蛾長歛任是東風吹不轉困倚危樓過盡飛鴻字字愁木蘭花秋容老盡芙蓉院草上霜花勻似剪西樓促坐酒盃深風壓繡簾香不捲玉纎慵整銀筝鴈紅袖時籠金鴨煖嵗華一任委西風獨有春紅留醉臉畫堂春落紅鋪徑水平池弄晴小雨霏霏杏園憔悴杜鵑啼無柰春歸柳外畫樓獨上凭䦨手撚花枝放花無語對斜暉此恨誰知千秋嵗水邉沙外城郭春寒退花影亂鶯聲碎飄零疎酒盞離别寛衣帶人不見碧雲暮合空相對憶昔西池㑹鵷鷺同飛葢㩦手處今誰在日邊清夢斷鏡裏朱顔改春去也飛紅萬㸃愁如海踏莎行霧失樓臺月迷津渡桃源望斷無尋處可堪孤舘閉春寒杜鵑聲裏斜陽暮驛寄梅花魚傳尺素砌成此恨無重數郴江幸自遶郴山為誰流下瀟湘去坡翁絶愛此詞尾兩句自書於扇云少游已矣雖萬人何贖釋天隠註三體唐詩謂此二句實自沅湘日夜東流去不為愁人住少時變化然􅆁之毖彼泉水亦流於淇已有此意秦公葢出諸此又王直方詩話載黄山谷惜此詞斜陽暮意重欲易之未得其字今郴誌遂作斜陽度愚謂此亦何害而病其重也李太白詩􅔔彼落日暮即斜陽暮也劉禹錫烏衣巷口夕陽斜杜工部山木蒼蒼落日曛皆此意別如韓文公紀夢詩中有一人壯非少石鼔歌安置妥帖平不頗之類尤多豈可亦謂之重耶山谷當無此言即誠出山谷亦一時之言未足為定論也蝶戀花曉日窺軒雙燕語似與佳人共惜春將暮屈指艷陽都幾許可無時霎閑風雨流水落花無問處只有飛雲冉冉來還去持酒勸雲雲且住憑君礙斷春歸路一落索楊花終日空飛舞柰久長難駐海潮雖是暫時來却有箇堪憑處紫府碧雲為路好相將歸去肯如薄倖五更風不解與花為主醜奴兒夜來酒醒清無夢愁倚闌干露滴輕寒雨打芙蓉淚不乾佳人别後音塵悄瘦盡難􅂸明月無端已過紅樓十二間南鄉子妙手寫徽真水剪雙眸㸃絳唇疑是昔年窺宋玉東鄰只露墻頭一半身往事已酸辛誰記當年翠黛顰盡道有些堪恨處無情任是無情也動人醉桃源即阮郎歸碧天如水月如眉城頭銀漏遲緑波風動畫船移嬌羞初見時銀燭暗翠簾垂芳心兩自知楚臺魂斷曉雲飛幽歡難再期河傳二首亂花飛絮又望空闘合離人愁苦那更夜來一霎薄情風雨暗掩將春色去籬枯壁盡因誰做若説相思佛也眉兒聚莫恠為伊抵死縈腸惹肚為沒教人恨處又恨眉醉眼甚輕輕覷著神魂迷亂常記那回小曲闌干西畔鬢雲鬆羅襪剗丁香咲吐嬌無限語軟聲低道我何曾慣雲雨未諧早被東風吹散悶損人天不管浣溪沙五首漠漠輕寒上小樓曉陰無賴似窮秋澹烟流水畫屏幽自在飛花輕似夢無邊絲雨細如愁寶簾閑挂小銀鈎又香靨凝羞一笑開柳腰如醉暖相挨日長春困下樓臺照水有情聊整鬢倚闌無緒更兠鞋眼邊牽恨懶歸來又霜縞同心翠黛連紅綃四角綴金錢惱人香爇是龍涎枕上忽收疑是夢燈前重㸔不成眠又還一叚惡因緣又脚上鞋兒四寸羅唇邊朱粉一櫻多見人無語但回波料得有心憐宋玉只應無柰楚襄何今生有分共伊麽又錦帳重重巻暮霞屏風曲曲闘紅牙恨人何事苦離家枕上夢魂飛不去覺來紅日又西斜滿庭芳草襯殘花前叚用元㣲之天台詩意後叚婉約有味尾句尤含蓄深思如夢令五首門外鴉啼楊柳春色着人如酒睡起熨沉香玉腕不勝金斗消瘦消瘦還是褪花時候又遥夜沉沉如水風𦂳驛亭深閉夢破䑕窺燈霜送曉寒侵被無寐無寐門外馬嘶人起又幽夢怱怱破後妝粉亂㾗霑袖遥想酒醒來無柰玉銷花瘦回首回首遶岸夕陽疎柳又樓外殘陽紅滿春入柳條將半桃李不禁風回首落英無限腸斷腸斷人共楚天俱逺又池上春歸何處滿目落花飛絮孤舘悄無人夢斷月堤歸路無緒無緒簾外五更風雨阮郎歸四首褪花新緑漸團枝撲人風絮飛秋千未拆水平堤落紅成地衣遊蝶困乳鶯啼怨春春怎知日長早被酒禁持那堪更别離又宫腰裊裊翠鬟鬆夜堂深處逢無端銀燭殞秋風靈犀得暗通更有限恨無窮星河沉曉空隴頭流水各西東佳期如夢中又瀟湘門外水平鋪月寒征棹孤紅妝飲罷少踟蹰有人偷向隅揮玉筯洒真珠梨花春雨餘人人盡道斷腸初那堪腸也無又湘天風雨破寒初深沉庭院虛麗譙吹罷小單于迢迢清夜徂鄉夢斷旅魂孤崢嶸嵗又除衡陽猶有鴈傳書郴陽和鴈無滿庭芳三首咏茶北苑研膏方圭圓璧萬里名動京闗碎身粉骨功合上凌烟尊俎風流戰勝降春睡開拓愁邊纎纎捧香泉濺乳金縷鷓鴣斑正相如才病一觴一詠賔有羣賢且扶起燈前醉玉頽山搜攬胸中萬巻還傾動三峽詞源歸來晚文君未寢相對小妝殘又茶詞曉色雲開春隨人意驟雨方過還晴髙臺芳榭飛燕蹴紅英舞困榆錢自落秋千外綠水橋平東風裏朱門映栁低按小秦筝多情行樂處珠鈿翠葢玉轡紅纓漸酒空金榼花困蓬瀛豆蔻梢頭舊恨十年夢屈指堪驚凭闌乆疎煙淡日寂寞下蕪城此詞正少游所作人傳王觀撰非也又雅燕飛觴清談揮麈使君髙㑹羣賢宻雲雙鳯初破縷金團牎外爐烟似動開尊試一品奔泉輕淘起香生玉乳雪濺紫甌圓嬌鬟宜美盼雙擎翠袖穏步紅蓮坐中客翻愁酒醒歌闌㸃上紗籠畫燭花􅍡弄月影當軒頻相顧餘歡未盡欲去且留連桃源憶故人玉樓深鏁薄情種清夜悠悠誰共羞見枕衾鴛鳯悶即和衣擁月無端畫角嚴城動驚破一番新夢􅐼外月華霜重聴徹梅花弄淮海長短句巻中欽定四庫全書淮海長短句巻下宋秦觀撰調笑令十首并詩王昭君詩曰漢宫選女適單于明妃歛袂登氊車玉容寂寞花無主顧影低回泣路隅行行漸入陰山路目送征鴻入雲去獨抱琵琶恨更深漢宫不見空回顧曲子回顧漢宫路捍撥檀槽鸞對舞玉容寂寞花無主顧影偷彈玉筯未央宫殿知何處目送征鴻南去右一樂昌公主詩曰金陵往昔帝王州樂昌主第最風流一朝隋兵到江上共抱恓恓去國愁越公萬騎鳴笳鼔劒擁玉人天上去空㩦破鏡望紅塵千古江楓籠輦路曲子輦路江楓古樓上吹簫人在否菱花半壁香塵汚往日繁華何處舊歡新愛誰為主啼笑兩難分付右二崔徽詩曰蒲中有女號崔徽輕似南山翡翠兒使君當日最寵愛坐中對客常擁持一見裴郎心似醉夜解羅衣與門吏西門寺裏樂未央樂府至今歌翡翠曲子翡翠好容止誰使庸奴輕㸃綴裴郎一見心如醉笑裏偷傳深意羅衣深夜與門吏暗結城西幽㑹右三無䨇詩曰尚書有女名無雙蛾眉如畫學新妝伊家仙客最明俊舅母唯只呼王郎尚書往日先曾許數載暌違今復遇聞説襄江二十年當時未必輕相慕曲子相慕無雙女當日尚書先曾許王郎明俊神仙侣腸斷别離情苦數年暌恨今復遇笑指襄江歸去右四灼灼詩曰錦城春暖花欲飛灼灼當庭舞柘枝相君上客河東秀自言那得傍人知妾願身為梁上燕朝朝暮暮長相見雲收月墮海沉沉淚滿紅綃寄腸斷曲子腸斷繡簾捲妾願身為梁上燕朝朝暮暮長相見莫遣恩遷情變紅綃粉淚知何恨萬古空傳遺怨右五眄眄詩曰百尺樓髙燕子飛樓上美人顰翠眉將軍一去音容逺只有年年舊燕歸春風昨夜來深院春色依然人不見只餘明月照孤眠回望舊恩空戀戀曲子戀戀樓中燕燕子樓空春日晩將軍一去音容逺空鎻樓中深怨春風重到人不見十二闌干倚遍右六崔鶯鶯詩曰崔家有女名鶯鶯未識春光先有情河橋兵亂依蕭寺紅愁綠慘見張生張生一見春情重明月拂墻花影動夜半紅娘擁抱來脉脉驚魂若春夢曲子春夢神仙洞冉冉拂墻花樹動西廂待月知誰共更覺玉人情重紅娘深夜行雲送困軃釵横金鳯右七採蓮詩曰若耶溪邊天氣秋採蓮女兒溪岸頭笑隔荷花共人語煙波渺𣺌蕩輕舟數聲水調紅嬌晩棹轉舟回笑人逺腸斷誰家遊冶郎盡日踟蹰臨柳岸曲子柳岸水清淺笑折荷花呼女伴盈盈日照新妝面水調空傳幽怨扁舟日暮笑聲逺對此令人腸斷右八煙中怨詩曰鑑湖樓閣與雲齊樓上女兒名阿溪十五能為綺麗句平生未解出幽閨謝郎巧思詩裁剪能使佳人動幽怨瓊枝璧月結芳期斗帳雙雙成眷戀曲子眷戀西湖岸湖面樓臺侵雲漢阿溪本是飛瓊伴風月朱扉斜掩謝郎巧思詩裁翦能動芳懷幽怨右九離魂記詩曰深閨女兒嬌復癡春愁春恨那復知舅兄唯有相拘意暗想花心臨别時離舟欲解春江暮冉冉香魂逐君去重來兩身復一身夢覺春風話心素曲子心素與誰語始信别離情最苦蘭舟欲解春江暮精爽隨君歸去異時㩦手重來處夢覺春風庭户右十虞美人三首髙城望斷塵如霧不見聮驂處夕陽村外小灣頭只有柳花無數送歸舟瓊枝玉樹頻相見只恨離人逺欲將幽恨寄青樓爭柰無情江水不西流又碧桃天上栽和露不見凡花數亂山深處水縈洄可惜一枝如畫為誰開輕寒細雨情何限不道春難管為君沉醉又何妨秪怕酒醒時候斷人腸又行行信馬横塘畔烟水秋平岸綠荷多少夕陽中知為阿誰凝恨背西風紅妝艇子來何處蕩槳偷相顧鴛鴦驚起不無愁柳外一雙飛去却回頭㸃絳唇二首桃源醉􅃞輕舟信流引到花深處塵緣相誤無計花間住烟水茫茫千里斜陽暮山無數亂紅如雨不記來時路又月轉烏啼畫堂宫徵生離恨美人愁悶不管羅衣褪清涙斑斑揮斷柔腸寸嗔人問背燈偷揾拭盡殘妝粉品令二首幸自得一分索强教人難喫好好地惡了十來日恰而今較些不湏管啜持教笑又也何須肐織衠倚賴臉兒得人惜放軟頑道不得又掉又懼天然箇品格於中壓一簾兒下時把鞋兒踢語低低笑咭咭毎毎秦樓相見見了無限憐惜人前强不欲相沾識把不定臉兒赤南歌子三首玉漏迢迢盡銀潢淡淡横夢回宿酒未全醒已被鄰雞催起怕天明臂上妝猶在襟間淚尚盈水邊燈火漸人行天外一鈎殘月帶三星又愁髩香雲墜嬌眸水玉裁月幈風幌為誰開天外不知音耗百般猜玉露沾庭砌金風動琯灰相㸔有似夢初回只恐又抛人去幾時來又香墨彎彎畫燕脂淡淡勻揉藍衫子杏黄裙獨倚玉闌無語㸃檀唇人去空流水花飛半掩門亂山何處覔行雲又是一鈎新月照黄昏臨江仙二首千里瀟湘援藍浦蘭橈昔日曾經月髙風定露華清微波澄不動冷浸一天星獨倚危樓情悄悄遥聞妃瑟泠泠新聲含盡古今情曲終人不見江上數峰青又髻子偎人嬌不整眼兒失睡微重尋思模様早心忪斷腸㩦手何事太怱怱不忍殘紅猶在臂飜疑夢裡相逢遥憐南埭上孤篷夕陽流水紅滿淚痕中好事近夢中作春路雨添花花動一山春色行到小溪深處有黄鸝千百飛雲當面化龍蛇夭矯轉空碧醉卧古藤陰下了不知南北東坡跋供奉官莫君沔官湖南喜從遷客游尤為吕元鈞所稱又能誦少游事甚詳為予誦此詞至流涕乃錄本使藏之魯直䟦少游好事近少游醉卧古藤下誰與愁眉唱一杯解作江南斷腸句只今惟有賀方回陳後山云今之詞手惟有秦七黄九謂淮海山谷也然詞尚豐潤山谷特瘦徤似非秦比此在諸公非其至多出一時之興不自甚惜故散落者多其風懷綺麗者流播人口獨見傳錄葢亦泰山毫芒耳字復舛誤頗為辨正其有一二字不可校者不欲以臆見輙易存闕文之意更俟善本正之嘉靖乙亥中秋日南湖張綖識淮海長短句巻下
