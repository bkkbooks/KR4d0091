body:
  text: 哀挽大行太皇太后挽詞二首東朝制詔九年稱烈武功高後世興坐舉不周天柱正親扶暘谷日車升班行尚想延和殿羽衛俄趨永厚陵洛水嵩峯霄漢外百官西望涕難勝保扶明主自春宫萬國昇平出至公顧命一時聊共政思齊千古遂同風外家恩數仍長信原廟烝嘗即治隆欲叙聖功歌挽者乾坤難入畫圖中韓樞密夫人挽詞二首奕葉貂蟬後宗姻樂靜間從夫登兩地看子入三山舊像瞻揄闕遺音想佩環百年川閲水不復更西還天上開華屋邱山忽返眞内人歸盛挽者轉哀新鸞詔初乾墨魚軒已暗塵藹然多德善論次有蒼珉俞公達待制挽詞二首詞場英妙氣如虹出入青雲見事功流馬木牛通蜀漕葛巾羽扇破渠戎風生使者旌旄上春在將軍爼豆中詔墨未乾人奄忽傷心江漢日傾東一麾出守著威名凶訃西來上為驚玉帳笑談成昨夢錦囊書札見平生衣冠漸散紅蓮府鎧馬還歸細柳營可道風流回首盡芝蘭庭下粲朝榮陳承事挽詞明時就養寄淮壖忽歎艅艎以柩旋八尺衣冠成繪事百年風誼列幽鐫銘旌暮暗黄梅雨鄉路秋横碧玉天遙想葬期豪傑㑹高車連軫駐新阡永夀縣君挽詞二首廷尉䝉恩後蘭臺就養初大椿宜更夀流水遽焉如鸞錦封花誥蛛絲網板輿百年誰考德琬琰在幽墟明世辭隆養哀榮道路傳賻喪從上宰歌挽出羣仙素幔傷秋泛青缸慘夜船玉峯歸葬處木拱鴈連天曽子固哀詞皇受命而熈洽兮實千祀而一時恊氣鬱而四塞兮與盛德其俱升麟鳯出而旁午兮猶氤氳而扶輿篤生我公兮以文章為世師公神禹之苖裔兮肇子爵而鄫封逮去邑而為氏兮季葉汩其南征祖騫翔而績著兮考踡跼而文鳴公既生而多艱兮踵祖武而好修既輕車又良御兮遂大放乎厥詞發天人之奥秘兮約六藝而成章元氣含而未泄兮洞芒芴而窅㝠挽天河而一瀉兮物應手而華昌揖揚馬使先路兮咸告公曰不敢彼崔蔡之紛紛兮孰云窺其藩翰辰來遲而去速兮固前終以跋㚄方盤礴而上征兮遽相羊而補外皇揆公之忠誠兮即商墟而賜環紬史諜乎東觀兮裁誥命乎西垣典章絶而復作兮世爭覩而快先正經緯乎終古兮配維斗而昭然變化詭而難常兮雖司命其或昧忽遭艱而去國兮遂䘖哀而即世述作紛其具存兮悵爽靈之焉詣信百年不斯須兮猶電滅而焱逝天不憗遺一老兮固縉紳之所傷矧不肖以薄技兮早獲進於門墻路貫江而修阻兮曾莫奠乎酒漿悲填膺而茀鬱兮聊自記於斯文蔡氏哀詞惟夫人之髙誼兮眞一時之女英既富有此好徳兮又申之以令儀帶幽蕙之縹緲兮佩明月之陸離人自操舎之不一兮雅獨取善以自持何報施之或􅑯兮罹禍艱於不虞顔色炫而未暮兮所天忽以殞殂痛平素之偕處兮忍此奄奄而嫠居瀝哀血以自誓兮甘餌毒而捐軀佩珠玉以死真兮固衆女之所嗤曷卓越以不顧兮棄性命其如遺美不可强有兮信天資之所開要反心以内省兮豈或售乎人知嗟三晨之未浹兮遂俱逰而莫留死者有知兮𦍑魂魄以並遊日黄昏而不見兮庭室窈其無人惟哀風以歸來兮動素幔之襜襜何平生之欵密兮遽音聲之不可尋儼遺跡以在目兮紛百憂而攻心豈至理不吾喻兮如意厚而悲深撫雙櫬以增慟兮涕漬血而灑襟已矣哉人生有死兮自前古而既然精魄忽其不駐兮惟修名之可延忍錄錄以寓世兮信烈者之所羞儻佳志之獲申兮雖奄忽其焉悼時宣義挽詞奮發多難裏哀榮厚夜中妙年推正行末路見陰功風雨雙龍合山川弔鶴空懸知青史上又載一于公中書侍郎挽詞二首崛起啇巖後清忠士論歸法知商鞅弊議折董宏非遷謫生華髮騫騰上紫微又騎箕尾去朝野涕空揮守道無夷險如公實寡仇望從烏府重官到鳯池休二品追褒峻千金賻恤優縉紳終有恨王駿不封侯吕與叔挽章四首舉舉西州士來為邦國華藝文尤爾雅經術自名家正有髙山仰俄成逝水嗟賢人各有數不獨嵗龍蛇數日音容隔人琴遂已虚門生應有謚國史可無書舊室懸蛛網遺編走蠧魚定無封禪草平日笑相如追惟獻嵗發春間和我新詩憶故山今日始知詩是䜟魂兮應已度函闗風流雲散了無餘天祿空存舊直廬小吏獨來開鎻鑰案頭塵滿校殘書東平夫人挽章錢穆夫人相閥風流盛王家地勢雄室中蘭作佩庭下玉成叢啼鳥悲春檻荒原入夜宫遺芳得鴻筆論次詔無窮開府李公挽章報國封章數論交意氣真先朝貴公子當代老成人月動融尊酒花催鄭驛賓誰知古原上馬鬛一朝新戚里薨耆舊哀榮世未如襚加三事衮奠致两宫輿鹵簿前衢隘歌鍾後院虚英風知不墜芝玉茂庭除孫莘老挽詞四首同功一體盡調元獨抱沉疴反故園壺遂暮年非不遇人生到此可忘言青春芸閤妙文詞進讀金華鬢若絲轉守七州多異政奉常處處有房祠月旦嘗居第一評立朝風采照公卿門生故吏知多少盡向碑陰刻姓名華屋丘山可奈何百年光景一投梭故人唯有羊曇在慟哭西州不忍歌陳用之學士挽詞禮經三百鬢毛班追述先儒伯仲間誰請尚書重給札盡抄遺藁入名山岹嶢芸閤上參天直舎相依欲二年願寫此情歌挽者涙霑毫素不成篇雲臺觀者候昏明奎璧躔中失二星上界真人重離别陰風一夜攪青𡨕牢落公車待詔時白頭掌故更棲棲一生勤苦成何事只得銘旌數尺題滕達道挽詞早嵗峩冠侍冕旒白頭淹䘏外諸侯篋中尚有東風草塞下曾無北顧憂心繫漢廷長入夢氣吞絶塞不防秋經綸未了埋黄土精爽還應屬斗牛江南江北奉周旋合散如雲二十年春郡勝遊花蔽馬夜山清話雨連天共驚萬里長城壊獨把千金寶劔懸平日書題多散亂呼兒尋聚一澘然自作挽詞嬰釁徙窮荒茹哀與世辭官來錄我槖吏來驗我屍藤束木皮棺藁葬路傍陂家鄉在萬里妻子天一涯孤魂不敢歸惴惴猶在兹昔忝柱下史通籍黄金閨奇禍一朝作飄零至於斯弱孤未堪事返骨定何時修途繚山海豈免從闍維荼毒復荼毒彼蒼那得知嵗晩瘴江急鳥獸鳴聲悲空濛寒雨零慘淡陰風吹殯宫生蒼蘚紙錢掛空枝無人設薄奠誰與飯黄緇亦無挽歌者空有挽歌辭淮海集巻四十欽定四庫全書
