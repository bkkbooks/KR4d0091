body:
  text: 覿覯二弟作小室請書魯直名曰寄寂作此寄之用孫子實韻力田不逢年識者未宜閔他時嵗在金百兩無虚稛士生當自量天道平如凖汝兄魯叔山正坐不前謹有琴亦無絃何心尚求軫客來欲頹玉大白輒滿引官長既屢罵諸生亦時囅一口吸西江𤣥哉居士藴嵗寒知蒼松日暮識舟槿夢想八九椽森然羅玉筍孫子實詩雲薛宣欲吏季氏或招閔此分冐中秋萬物既収稛賣藥偶和名草𤣥非近凖才難不易得志大略細謹士生要𢎞毅天地如盖軫驥令鹽車驂井下知綆引難甘吁尔食聊寄粲然囅誰能借前籌還婦用束藴吾聞調􅅅鼎異味及粉槿豈其供王羞而棄會稽笋南都新亭行寄王子發洛水沄沄天上動道入隋渠下梁宋宋都堤上十二亭一一飛驚若鸞鳳光華逺繼周王雅宴喜還歸魯侯頌玉觴嚴令肅衣冠金縷哀音繞梁棟姢姢殘月照波翻習習暖風吹鳥哢何處髙帆落文鷁誰家駿馬嘶征鞚栁枝芳草恨連天暮雨朝雲同昨夢借問亭名製者誰留守王公才望重胸中雲夢呑八九日解千牛節皆中祥符相公實曾祖庭列三槐多伯仲承明厭直出荆州轉守此都行大用此都去天纔尺五交廣荆揚歸引控兎園事迹化黄埃清泠文雅堪長慟舳艫銜尾車挂轊昨日出迎今日送送故迎新無已時古往今來相戲弄亭下􅋂﨑淮海客末路逢公詩酒共一樽明日難重持豈恤官期後芒種今年氣候頗云早夭矯梅花春欲縱行見亭中祖帳開千乘送公歸法從反初昔年淮海末邂逅安期生謂我有靈骨法當逰太清區中縁未斷方外道難成一落世間網五十换嘉平夜參半不寝披衣涕縱横誓當反初服仍先謝諸彭晞髪陽之阿餔餟太和精心将虚無合身與元氣并陟降三境中髙真相送迎琅函紀前績金蒲錫嘉名耿光洞寥廓不借日月明故棲黄埃裏絶想空復情寄蓴薑法魚糟蟹寄子瞻鮮鯽經年漬醽醁團臍紫蠏脂填腹後春蓴茁滑於酥先社薑芽肥勝肉鳬卵纍纍何足道飣餖盤飱亦時欲淮南風俗事瓶罌方法相傳為㫖蓄魚鱐蜃醢薦籩豆山蔌溪毛例䝉録輒送行庖當擊鮮澤居備禮無麋鹿精思精思洞元化白日昇髙旻俯仰凌倒景龍行速如神半道過紫府弭節聊逡巡金牀設寳几璀璨明月珍僊者二三子眷然骨肉親飲我霞一杯放懐暖如春遂朝玉虚上冠劒班列真無端拜失儀放斥令自新雲霄難遽返下土多埃塵淮南守天庖嗟我實何人送楊康功守蘇公於萬事輕獨嗜山水重寓直西掖垣滄洲長入夢廣陵以都㑹厨酒萬斯甕每歎闕登臨持此将焉用比持蘇臺節論欝縉紳共翻云美泉石汔可小嬉弄怱怱治行李草草别賔從乃知仁智心所樂異庸衆梅花發春端百卉日興動公等行復反臺閣俟鸞鳳偶戲偶戲失班龍坐謫崑崙隂崑崙一何髙去天無數尋嘉禾穂盈車珠玉烱成林天飈時一拂清哀動人心一面四百門官譙雲氣侵闕然竹使符難矣蹔登臨羣仙來按行憐我乆滯滛力請始云免反室嵗巳深親朋喜我來感歎或霑襟塵寰君勿悲殊勝巢嶔崟次韻黄冕仲寄題順興歩雲閣故山無期大刀頭黄塵溽暑未罷休歩雲之篇忽我投便見氷玉懸清秋順興山川甲閩甌無風萬壑松颼颼歩雲之人人品優御風禦冦真其儔仙人乘槎凌斗牛囬環十見天星周猿鶴忽驚空蕙帳周家正要磻溪望正仲左丞生日元氣鍾英偉東皇賦炳靈蓂敷十一莢椿茂八千齡汗血來西極摶風出北溟之無分襁褓詩禮學趨庭妙質珠遺海高材刃發硎初更芸閣秘屢直𤨏闈青史筆開凡例綸言正緯經文昌頻曵履京兆屢空囹遂緫臺綱紀常參國典刑兩宫隆眷遇諸夏聳瞻聼武略驅雷電文鋒粲斗星乞閑辭亢滿分逸下青㝠綺甲雙朱服腰横萬寳釘明峰春矗矗汝水暮泠泠散策花間徑揮犀水上亭壺觴延墨客燈燭按歌伶周衮歸公旦商巖夢武丁乆聞虚揆席佇見返皇扄别數汾陽考重鐫宋父銘巍然廟堂上永作世儀形病犬犬以守禦用老憊将何為踉蹌劣於行纍然抱渇饑主人恩義易乃為升斗資追隨不肯去猶若戀藩蘺屠膾意得逞烹庖在湏斯糟糠固非意豚豕同一時念昔初得寵青韁纒􅂒絲飼養候飢飽動止常相隨胡云不終始委逐在衰遲犬死不足道固為主人悲贈女冠暢師瞳人剪水腰如束一幅烏紗裹寒玉飄然自有姑射姿囬㸔粉黛皆塵俗霧閤雲牎人莫窺門前車馬任東西禮罷曉壇春日静落紅滿地乳鵶啼和子瞻雙石天鑱海濵石欝若龜毛緑信為小仇池氣象宛然足連巖下空洞鼎張彭亨腹雙峰照清漣春眉鏡中蹙疑經女媧錬或入金華牧鑪熏充雲氣研滴當川瀆尤物足移人不必珠與玉道傍初無異漢将疑虎伏支機亦何據但出君平卜竒礓入華林傾都自追逐我願作陳那令吼震山谷一拳既在夢二駒空所欲大士捨寳陁仙人遺句曲惟詩落人間如傳置郵速徐得之閑軒建安自古多俊髦徐子磊落尤其豪論兵說劒走湖海身勤事左無所遭緑水五校已屠膾黒衣三衞嗟徒勞歸來故山便卜築脫棄萬事輕鴻毛横前澗水漱哀玉傍舍老櫪藏飛猱山􅂼何用媿梁肉鶴氅未必輸青袍追寒弄月有真意慎勿輕語傳兒曹雷陽書事駱越風俗殊有疾皆勿藥束帶趨祀房瞽史巫紛若絃歌薦繭栗奴主洽觴酌呻吟殊未央更把雞骨灼一笛一腰鼓鳴聲甚悲凉借問此何為居人朝送殤出郭披莽蒼磨刀向猪羊何湏作佳事鬼去百無殃舊傳日南郡野女出成羣此去尚應逺東門已如雲蚩氓託絲布相就通慇懃可憐秋胡子不遇卓文君海康書事十首白髪坐鉤黨南遷海瀕州灌園以餬口身自雜蒼頭籬落秋暑中碧花蔓牽牛誰知把鋤人舊日東陵侯荔子無幾何黄柑遽如許遷臣不惜日恣意移寒暑層巢俯雲木信美非吾土草芳自有時鵯鵊何關汝卜居近流水小巢依嶔岑終日數椽間但聞鳥遺音鑪香入幽夢海月明孤斟鷦鷯一枝足所恨非故林培塿無松栢駕言出焉逰讀書與意會却掃可忘憂尺蠖以時詘其信亦非求得歸良不惡未歸且淹留粤女市無常所至輒成區一日三四遷處處售鰕魚青裙脚不襪臭味猨與狙孰云風土惡白州生緑珠海康臘巳酉不論冬孟仲殺牛撾祭鼓城郭為沸動雖非堯厯頒自我先人用大笑荆楚人嘉平獵雲夢粲粲菴摩勒作湯美無有上客賦驪駒玉奩開素手那知蒼梧野棄置同芻狗荆山玉抵鵲此事繇來乆裔土桑柘希蠶月不紡績吴綃與魯縞取具舩客一朝南風發家室相怵迫半賈鬻我藏倍稱還君息一雨復一暘蒼茫􅄓風發怒號兼晝夜山海為㒹蹶云何大塊噫乃爾不可遏黎明衆竅虚白日麗空闊合浦古珠池一熟胎如山試問池邊蜑云今累年閑豈無明月珍轉徙溟渤間何關二千石時至自當還次韻曾存之嘯竹軒翩翩曾公子子猷定前身嗜好凖疇昔了然不緇磷寄食平凖官植竹當比鄰朝與竹相對暮與竹相親安可一日無此君真可人㳺仙二首服形百神朝刳心萬縁盡我無退轉境何以有精進戲為汗漫游八極一何近渺渺東海水纍纍北邙墳向來歌舞處忽復成荒村愚人如鹿耳其死了無魂孰知九霄間𤣥圃枕崑崙緇塵化人衣蒼蘿誰與捫雲車自天來駕言㳺混茫手持太一節身佩使者章龍虎傍夭矯馬龜伏以翔朝元紫薇上所覩浩難量寳網結萬珠參伍相焜煌花品不知數妙英拆𤣥房宫殿隨人身處處輙清凉危髾擢真玉髙謝人間粧二三古鬚眉冠雲帶含光遺我飛霞佩副以明月璫再拜敬服之白毛發靈香次韻荅張文潛病中見寄與君渉世網所得如鈎温念昔相乖離俯仰變寒暄把袂安可期寄書嘱加飱三年汝水濵孤懐誰與言末路非所望聨鑣金馬門校文多豫暇𤣥談到羲軒孰云笭箵小史書垂後昆匪惟以舊聞牴牾良可刋比枉病中作筆端淮海奔亟駕問所苦兀坐一室閑晤對不知夕歸途斗星飜平時帶十圍頗復減臂環君其專精神㣲恙不足論愷悌神所勞此理真如絃送喬希聖鷃翔蓬蒿非所悲鵬擊風雲非所喜貴賤窮通盡偶然囬頭緫是東流水我思田文昔相齊朱袍照日如雲霓三千冠佩醉明月清歌一曲傾玻璃如今陳迹知何在但見荒冢烟蕪迷又思原憲昔居魯門戸東西閉環堵杖藜對客騁髙談自覺胸襟軰堯禹如今寂寞已成塵空有聲名掛千古送君去何時囬世間如此令人哀我徒駐足不可乆笑指白雲歸去來與子瞻會松江得浪字松江浩無旁垂虹跨其上漫然銜洞庭領略非一状怳如陣平野萬馬攅穹帳離離雲抹山窅窅天粘浪烟中漁唱起鳥外征帆颺愈知宇宙寛斗覺東南壮太史主文盟諸豪盡詩将超摇外形檢語笑供頡頏㛹姢棄追逐撥刺亦從放獨留三百缸聊用沃軒曠子瞻得風字吳越溪山興未窮又扶衰病過垂虹浮天自古東南水送客今朝西北風絶境自忘千里逺勝逰難復古人同舟師不㑹留連意擬㸔斜陽萬頃紅雨二子縁詩老更窮人間無處吐長虹平生睡足連江盡日舟行擘岸風人笑年來三黜慣天教我軰一鐏同知君欲冩長相憶更送銀盤尾鬛紅參寥得岸字蜿蜒跨長虹吳會稱傑觀淪連幾萬頃放目失垠岸倒境射遥山青螺㸃空半從來誇震澤勝事無昏旦破浪湧長鬢排空度飛翰肺肝入清境劃若春氷泮安得淩九垓從公逰汗漫淮海集巻六欽定四庫全書淮海集巻七宋秦觀撰
