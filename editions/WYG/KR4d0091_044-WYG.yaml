seq: 44
front:
  text: 三詩
  hash: sha256:9d1c576800d9d5b124436fc02fac0e26913f9365ed72804f2da5e0e57bea2944
body:
  text: 宋秦觀撰次韻孔彦常舍人曝書上帝圖書府傳觀詔特容嘉賓蒼佩玉盛饌紫駞峰散帙牙籖亂開函錦襲重君羮如可請願備北堂供次韻莘老妙齡隨計日紺髮度闗年較藝先豪俊飛聲動𦕈綿祕書窺甲乙密室詣温宣已叶半千運仍親尺五天御香春晩炷宫蠟夜深燃漢殿螭頭筆岐藩幕下蓮孔鸞人共貴蘭蕙世皆憐附尾方瞠若提刀獨砉然皂囊封細札青簡續遺編壁府深難造龍媒雋莫先大農參奏計宗伯與興賢玉鉉行真即金甌忽浪傳两輪苕上駕百丈剡中牽荏苒馮唐老淹回賈傅還星霜俄九換金竹遽三遷皷吹吳雲外旌旛楚水壖經綸殊未倦憂患復相連惡草空摇毒羣蝸謾汚涎松筠終不易雨露竟無偏憔悴千株橘荒凉二頃田幾書借船帖屢廣絶交篇禪譽推龎藴親評主閔騫懶因閑處極樂向静中全嵗月黄塵裏鶯花白髪前氷臺清照底玉海湛無邊身世尤飛隼功名𦕈蜕蟬蕉心難固待楮葉謾勞鐫佇續清都夢還隨濁世緣泉虬淹已久風翮去應便預想朝元處簮裾立萬仙送陳太初道錄先生簮紱後世系本綿𤓰駐馬生枯骨回車濟病虵帶雲眠酒市和月醉漁家落日千山路西風一枕霞幾年流俗笑一旦五侯誇碁惜春深日琴憎雨後蛙背因書字曲髮為注經華地轉東淮水天回北斗車新宫黄道近舊隱白雲遐顧我身多累逢君意謾誇空提方士劒未上客星槎何日同歸去重飛九轉砂贈蘇子瞻嘆息蘇子瞻聲名絶後先衣冠傳盛事兄弟固多賢感慨詩三百流離路八千直心羞媚竈忠力欲回天縲紲終非罪江湖祗自憐饑寒常併日疾病更連年明主無終棄西州稍内遷奏言深意苦感泣内人傳前席須宣室非熊起渭川君臣悦相遇願上角招篇次韻安州晩行寄𫝊師投暮安州北蒼煙亂眼昏茅茨人外路砧杵月邊村野水飛雲薄空林噪雀繁幾人堪此樂逢客莫輕論題五柳亭結構依流水新題五柳亭登臨有遺味攀折不勝情隔岸閭閻皷遶軒舟舫横觀寶林塔張燈次胡瑗韻飛來峰上塔然密奉慈觀互照三山冢分輝七寶欄勢擎金界迥影蘸玉奩寒次第邊烽舉髙低祭燭攅虹旌排陣堞火傘御靈官魏乘珠千顆隋㠶錦萬端華敷連藏海光集匝宫壇冏冏連青昊熒熒逼翠巒月卿秋抒思星將夜濡翰繼聽鈞天奏尤知屬和難還自湯泉十四韻嵗晩倦城郭聮驂度嶪峩天黄雲脚亂村黒鳥翎訛潦水侵生路晴天落慢坡澄江練不巻温井鑑新磨漁火分星逺沙鷗散㸃多覇祠題玉筯龍窟受金波琬琰存吳事兒童記楚歌孤龕瘦居士雙塔盞頭陁飛䑕鳴深穴胡蜂結巧窠晩參圓白足昏梵禮青螺雲馭沉荒甃仙舂沒淺莎杖藜從莫逆談笑入無何滲澹日連霧蕭騷風轉阿華清俄夢斷回首失煙蘿辨才法師嘗以詩見寄繼聞示寂追次其韻遥聞隻履去翛然詩翰纔收數月前江海盡頭人滅度亂山深處塔孤圓憶登夜閣天連鴈同看秋崖月破煙尚有衆生未成佛肯超欲界入諸禪次韻公闢州宅月夜偶成其一新秋過雨月如霜緩足蓬萊徹上方翠木玲瓏藏寶界白煙濃淡鎻華堂書名越艷誰興發角動單于自感傷山似卧龍天似水却疑身在海中央其二繚繞千重雨後凉月含秋色上東方風催絡緯歸金井月轉檀欒䕃畵堂游目騁懐佳興發感時撫事壯心傷歸來枕簟清無夢卧看明星到未央次韻公闢即席呈太虛與君鄰並共烟霞乘興時時過我家更漏一新聞曉角門闌數級看秋花湖山對値全如買風月相期不用賖賴有醉毫吟更苦他年分作句圖誇次韻公闢將受代書蓬萊閣城連湖岸水為闗旦暮樵風自往還龜負寶林新佛地龍蟠使宅老仙山平生仕宦今何得終日登臨獨未閑嵗滿徘徊難遽别就中瀟洒異人間次韻公闢聞角有感一聽胡笳動越吟聲潜地底氣逾深千宫月色單于曲萬里天光魏闕心秉燭何人猶把盞挑燈有女正穿針早寒時節黄昏後更逐西風應逺玷寄公闢憶昔都門手一㩦春禽初向苧蘿啼夢回金殿風光别吟到銀河月影低舞急錦腰迎十八酒醒玉盞照東西何時得遂扁舟去邂逅從君訪剡溪呈公闢東歸行路歎賢哉碧落新除寵上才白傅林塘隨畫去吳山花鳥入詩來唱酬自有微之在談笑應容逸少陪除此兩翁相見外不知三徑為誰開奉和莘老童子何知幸朂深久班籍湜奉登臨挾經屢造芝蘭室揮麈常聆金玉音黄巻香焚春晼晩絳紗人散夜蕭森明朝只恐絲綸下囘首青雲萬里心中秋口號并引一云雲山閣白語伏以四難并得既為尊俎之佳期五福具膺實號搢紳之盛事矧中秋之届候宜公燕之交歡恭惟判府大資身遇聖神家傳將相時應半千之運論歸尺五之天姓名久在於金甌方面暫分於玉節浮堦飛閣引南國之佳人豪竹哀絲奏西園之清夜雲山簷楯接低空公宴初開氣鬱葱照海旌旛秋色裏激天皷吹月明中香槽旋滴珠千顆歌扇驚圍玉一叢二十四橋人望處台星正在廣寒宫致政通議口號并引一作秋燕口號竊以五福具膺實搢紳之盛事四難并得亦尊俎之佳期恭惟致政通議馬鶴英姿鼎槐華胄身見六朝之盛位登兩省之崇北陌東阡時命青牛之駕左圖右史日從赤松之遊判府左丞神嶽殊鍾星躔異稟方面雖分於玉節姓名已覆於金甌舉白飛觴極水陸四方之饌彈琴擊石盡賓主一時之歡秋空畫隼照新晴符隱庵前小隊停玉斚金醪通繾綣鳯笙龍管入青㝠靚粧釃酒花侵席寶獸呀香霧滿庭太史應占豫州分上台星近老人星口號并引美酒忘憂之物流光過隙之駒不稱人心十事常居八九得開口笑一月亦無二三莫思身外無窮且賭尊前見在功名富貴何異楚人之弓城郭人民問取遼東之鶴付與香鈿畫皷盡歡美景良辰欲奏長謡聊陳短韻平原居士今無影鸚鵡空洲誰舉杯猶有漁陽摻撾皷為君醉後作輕雷悼王子開五首其一我昔官房子長懐忠穆賢里無行馬第山有卧牛阡當代三公後惟君五福全桐棺逺歸祔追舊幾澘然其二早爾金閨彦頎然玉筍班周旋三友益零落十年間轣轆靈輀動悠揚素旐還暮年還抱愛應復辨追攀其三蕭散竹林風平生約略同官班嵇叔夜年輩晉安豐民詠濡須政朝推胊䏰功九原無復作埋玉恨何窮其四南浦維舟訪東堂抵榻眠後期猶指日輕别遂終天墨妙今初貴詩名久已傳清風如未墜諸子更翩翩其五已矣知無憾賢愚共此途白駒馳白日黄髪掩黄壚和氏終歸趙干將不葬吳挐疴如可彊猶擬奠生芻淮海後集巻三欽定四庫全書淮海後集巻四宋秦觀撰
