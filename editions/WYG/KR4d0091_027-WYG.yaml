  text: 二十七
  hash: sha256:903ca45a58ef77dc43c29014f35b993e5fab7a62d8d33028554cff5ddaa07775
body:
  text: 宋秦觀撰表代謝勑書奨諭表臣某言今月日進奏院逓到勑書一道伏䝉聖恩以臣云云特賜奨諭者捕翦兇徒葢守臣之常職降頒温詔實聖世之異恩祗服寵靈重增愧懼中謝伏念臣禀材緜薄受性顓愚因縁肺腑之親昧冐藩宣之寄浩穰十邑每懐曠敗之虞僶俛再朞敢起覬覦之望憶昨㐫年乏食狂盗干誅初䑕竊於村墟俄鴟張於道路殺傷吏卒攘奪印章居民以此震驚列郡為之騷動至煩廟論申命使車輟悍將於山東募驍兵於隴右尚且遊魂疆場假息朝昏臣志欲掃除日思方略忽知嚢槖之處近在股掌之間竊以為稽討蕩則荏苒而蜂屯待㑹合則張皇而烏散遂令募吏潜引將兵從間道以兼行指孤巢而突擊渠魁格鬬既就殱夷餘黨散亡尋皆殄㓕臣既不能如子賤任德使民不忍欺又不能如龔遂却兵致盗亦皆罷仰慙睿化方虞黜責之嚴豈謂宸音遽有旌嘉之寵此葢伏遇皇帝陛下聖仁天覆盛德海㴠欲庶職之咸修雖微勞其必録是致鈆刀之割亦膺衮字之褒臣敢不効螢爝之光竭犬馬之力誓麋捐於軀命期補報於恩私臣無任代謝加勲封表宗祀以配上帝盛禮載陳大封而錫善人彜章具舉寵靈誤逮媿懼交深中謝伏念臣學術本迂器能素拙徒屬休明之運獲參英俊之遊發金匱石室之藏討論何補承神州赤縣之乏瘝曠偶逃晩自喉舌之司亟更管轄之任辱甄收之已過知報稱之尤難比出近藩猶通祕籍㑹考我將之頌頗稽公玉之圖路寢爰開總章斯寓涓季秋而精享肅羣后以駿奔熈事備成既盡情文之典湛恩汪濊遂周中外之臣曽是孤蹤亦膺殊祉崇勲遽進真食驟増奉綸綍以凌競仰雲天而隕越此盖伏遇皇帝陛下天仁丕冐海德包㴠尚記惷愚嘗陪於國論更憐衰晩方守於郡章俾異數之併加示純禧之均畀丼泉緬邈難望屬車之塵清都䆳嚴徒夢鈞天之奏代賀元㑹表十三月為正前既稽於夏道二千石上夀仍參用於漢儀盛旦載逢彛章具舉中賀伏惟皇帝陛下財成天地參並神明命羲和之二官謹春秋之五始調和元氣撫御中區肆屬春王之朝肇修元㑹之禮雞人呼旦庭燎有光外則虎賁羽林嚴宿衛之列内則謁者御史肅班行之容漏未盡而車輅陳蹕既鳴而鼓鐘作應龍髙舉雲氣畢從北極上臨星宿咸拱受四海之圖籍拜萬國之衣冠嵗月日時於焉先正聲明文物粲爾可觀邁康王鄴宫之朝揜髙帝長樂之事藹頌聲而並作鬰協氣以横流臣比逺天光遽更年籥職拘藩國莫曕龍衮之升心折宸居但想獸樽之列瞻望闕庭云云代工部文侍郎謝表入司太僕巳慚稱效之虚進貳冬官尤愧選掄之誤顧叨塵之巳甚念辭避之弗容承命惟驚撫躬以懼中謝伏念臣身承家訓世受國恩荷先朝特逹之知䝉二聖生成之賜左選都司之要既獲備員内閣祕殿之嚴更容通籍以至外專兩郡内閲三卿徒為嵗月之淹莫見事功之舉方虞罷黜退伏於田廬敢意推遷遽陪於法從材微任過恩重報難此盖伏遇盛德海㴠至仁天覆以臣父某厯四朝而被遇登三事以退居知父子至情欲慰桑榆之景念君臣難遇遂收菅蒯之才豈惟一敝族之榮時乃百執事之勸臣敢不鞭䇿駑蹇淬礪鈍頑以捐軀報國之誠為竭力事親之義代中書舍人謝表孫君孚臣某言伏奉制命除臣中書舍人仍改賜章服者䝉恩承乏方懐曠職之憂拜命為真更竊非才之愧寵榮遽逮驚懼交増伏以三省之興實先朝之盛典西禁之任尤當代之要津上潤色於訓詞下稽參於政理自非文章妙絶可先諸子之鳴吏術精通能最羣工之課則何以當文士之極任備宰相之屬官如臣者地胄素寒資材尤戅以童子雕蟲之技偶得科名用司空城旦之書嘗更州縣比從柱後擢立螭頭閱嵗月之推移乏毫分之稱効惟虞罷斥歸耕寂寞之濱豈謂遭逢入直禁嚴之地光增末路望過初心此盖伏遇皇帝陛下在宥中區統和元氣上則承周太姒求賢之意下則納召康公用士之言耆老畢歸俊英咸事鏌鎁滿庫未忘一割之鈆刀驊騄成羣不棄十駕之駑馬遂令㧞擢爰及鈍頑臣敢不敬佩德音恪居官守竭心思之逮及効耳目之聞知經宿進碑敢效矜夸於近世累年無草願希慎宻於前人臣無任感天荷聖激切屏營之至代中書舍人謝上表左螭清近顔無咫尺之違右掖峻嚴言有絲綸之出皆一時之妙選為四海之聳觀承命震驚撫躬愧懼伏念臣縉紳末胄淮海孤生弓必為箕嘗奉父兄之教枘不量鑿莫為姻黨之容自亦笑其闊迂人或憐其狂直分丼常調望絶顯途屬二聖之載營收羣英而自助巍然大老皆歸圖任之中蕞爾小才亦備兼收之數越從戎幕擢預憲臺猥陳狂瞽之言屢瀆髙明之聽間嘗罷去旋復召還惟是七年之間遂叨兩制之列而况訓詞之任政教所原除授不當者得以論而封還指麾或慝者得以白而改正號為要地當慎選掄豈伊鄙人所能堪克此盖伏遇太皇太后德配任姒道稽唐虞用檝以濟大川斷鼇而立四極雖節儉正直在位若羔羊之時而思念憂勤進賢如巻耳之際致令頑鈍誤辱寵靈臣敢不慎出王言審求國體非特修異日祖宗之事亦以信平生師友之謀報德未期悵念嵗時之晩捐軀有處敢懐家室之私代南京謝上表訓詞失當宜正嚴誅恩貸特優止從外補任忝别都之重職叨祕殿之華祗荷寵靈載深感涕伏念臣猥以一介之賤誤䝉二聖之知本出書生朝無黨援屡為御史身有怨仇間雖竊於科名實不長於文字因縁寵數冐昧班聯既不能被命固辭以防涯分之過又不能先時引去以避賢俊之升滿器難持孤根易毁及越樽而求治果代斵以致傷然猶冐文儒弄翰之名玷侍從均勞之地省循備至僥倖實多此盖盛德海㴠至仁天覆念甞更於任使遽未忍於棄捐雖去掖廷猶分宫鑰天都甚邇常瞻佳氣之鬰葱鄉國非遥益見湛恩之汪濊永期糜潰用報生成代中書舍人謝上表方為左史注二聖之起居遽入西臺命百官之進退顧叨塵之巳甚念辭避之莫容仰對寵靈伏深震懼竊以周分内史出王命之䇿書漢列從官參相臣之辨論後世放其遺意制此近班職分四禁之嚴事押六曹之重必得或遲或速文兼枚馬之長知古知今學擅髙崔之富然後可以與紫薇之進畵賛黄閤之調和如臣者門地素寒資才尤戅早更州縣奉司空城旦之書晩玷班聨任柱下惠文之事初無補報祗取怨尤身投韁鎻之中足寄風波之上惟虞罷斥復奔走於東西豈意推遷備論思於朝夕光增末路望過初心此盖伏遇闕文代謝厯日表被命守藩方念闕庭之逺䝉恩告朔重驚嵗月之新仰服訓詞俯増愧汗伏惟欽崇天道敬授人時頒太史之占前謹清臺之課候罷諸家之疏逺正厯世之繆差上考鄧平法取黄鍾之妙下參一行術推大衍之微斗建龍躔於焉有序珠連璧合由是可窺豈惟百辟之奉行足使四夷之承用臣猥縁寄委叨奉寵靈宣布詔條預識金穰之嵗省觀風俗不疑綘老之年淮海集巻二十七欽定四庫全書淮海集巻
