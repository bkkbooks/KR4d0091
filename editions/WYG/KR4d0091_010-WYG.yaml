body:
  text: 寄孫傳師著作上林池籞富春風十里宫青錯御紅應與少年修故事誤隨逰轂栁花中泗州東城晩望渺𣺌孤城白水環舳艫人語夕霏間林梢一抹青如畫應是淮流轉處山戱雲龍山人二絶芳草未應羞鵯鵊潜鱗終是畏提壺蔡經背上㾗猶在更念麻姑指爪無選勝只携長脛鶴入廛還駕短轅車時人若問虚𤣥事笑荅無過李老書圓通院白衣閣白衣閣外遶朱欄人在琉璃菡萏間誰把此花為刻漏修行不放一時閑無邉刹境一毫端同住澄清覺海間還是此花并此葉壊空成住未曾閑一根反本六根同古佛傳家有此風滿目紅蕖參翠盖不唯門裏獲圓通照閣彌猴鏡裏三身現龍女珠中萬象開未若此軒人散後水光清泛月華來睡足寮寄震鼎二弟與物無營但欲眠客來從笑腹便便秋生淮海凉如水得句還應夢阿連次韻參寥見别爐香冉冉紆寒穗篝火熒熒擢夜芒預想江天囬首處雪風横急鴈聲長與倪老伯輝九曲池有懐元龍參寥雲月姢姢淮海秋隋家池上共浮㳺可憐一叚風流事特欠支郎與子猷春日五首幅巾投曉入西園春動林塘物物鮮却憇小庭纔日出海棠花發麝香眠一夕輕雷落萬絲霽光浮瓦碧差差有情芍藥含春淚無力薔薇卧曉枝裌衣新著倦琴書散策池塘返照初翠碧黄鸝相續去荇絲深處見遊魚春禽葉底引圓吭臨罷黄庭日正長滿院栁花寒食後旋鑚新火爇爐香金屋舊題煩乙子蜜脾新採頼蜂臣蜻蜓蛺蝶無情思隨例顛忙一作狂過一春秋日三首霜落䢴溝積水清寒星無數傍船明菰蒲深處疑無地忽有人家笑語聲月團新碾瀹花甆飲罷呼兒課楚詞風定小軒無落葉青蟲相對吐秋絲連巻雌蜺掛西樓逐雨追晴意未休安得萬粧相向舞酒酣聊把作纒頭次韻子由召伯埭見别三首孤蓬短榜泝河流無頼寒侵紫綺裘召伯埭南春欲盡為公重賦伴牢愁子由詩云裘濛濛春雨濕䢴溝蓬底安眠晝擁知有故人家在此速将詩巻洗閑愁青熒燈火照深更逐客舟航冷似冰到處故應山作主隨方還有月為朋子由詩云冰筆端大字鴉棲壁袖裏新詩句琢送我扁舟六十里未嫌罪垢汚交朋冠盖紛紛不我謀掩關聊與古人逰㑹湏匹馬淮西去雲巘風溪遂所求子由詩云逰髙安此去風濤惡還有廬山得縱便欲携君将船去念君無罪去何求還自廣陵四首薄茶便當烏程酒短艇聊充下澤車墳墓去家無百里往來仍不廢觀書南北悠悠三十年謝公遺埭故依然欲論舊事無人共卧聽鍾魚古寺邉䢴溝繚繞上雲空坐阻層冰不得通頼有東風可人意為開明鏡玉奩中天寒水鳥自相依十百為羣戯落暉過盡行人都不起忽聞水響一齊飛元日立春三絶此度春非草草囬美人休着剪刀催直湏殘臘十分盡始共新年一併來發春獻嵗偶然同新歴觀天最有功頭上兩般幡勝影一時飛入酒杯中攝提東直斗杓寒驟覺中原氣象寛天為兩宫同號令不教春嵗各開端次韻宋履中題李侯檀欒亭陰陰數畆籜龍稠亭外危通一徑幽頗似竹林當日集酒狂莫笑阮陳留春日偶題呈上尚書錢丈三年京國鬢如絲又見新花發故枝日典春衣非為酒家貧食粥已多時觀辱户部錢尚書和詩餉禄米再成二章上謝本欲先生一解頥頓煩分米慰長飢客無貴賤皆蔬飯惟有慈親食肉糜夢裏光陰挽不囬掩關獨坐萬縁灰偶因問訊維摩病香積天中施飯來擬題織錦圖悲風鳴葉秋宵冷寒絲縈手淚殘粧㣲燭窺人愁斷膓機翻雲錦妙成章晩出左掖金爵觚稜轉夕暉翩翩宫葉墮秋衣出門塵障如黄霧始覺身從天上歸次韻蔡子駿瓊花無雙亭上傳觴處最惜人歸月上時相見異鄉心欲絶可憐花與月應知處州水南庵二首竹栢蕭森溪水南道人為作小圓庵市區収罷魚豚稅來與彌陀共一龕此身分付一蒲團静對蕭蕭玉數竿偶為老僧煎茗粥自携修綆汲清寛三月晦日偶題節物相催各自新癡心兒女挽留春芳菲歇去何湏恨夏木陰陰正可人次韻東坡上元扈從三絶赭黄繖底望龍章不斷惟聞蠟炬香一片韶音歸􅃨道重瞳左右列英皇端門魏闕欝峥嶸燈火成山輦路平不待上林鸎百囀教坊先巳進新聲仗下番夷各一羣機泉如雨自繽紛細㸔香案旁邉吏却是茅家大小君淮海集巻十欽定四庫全書淮海集巻十一宋秦觀撰
