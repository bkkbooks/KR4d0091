seq: 49
front:
  text: 淮海長短句巻上
  hash: sha256:c935de123e7f3be1e444ce8acdc9ed0eb2075fc1dbfdd29b0de4b93c1548f91c
body:
  text: 宋秦觀撰望海潮四首廣陵懐古星分牛斗疆連淮海揚州萬井提封花發路香鶯啼人起朱簾十里春風豪俊氣如虹曵照春金紫飛葢相從巷入垂楊畵橋南北翠煙中追思故國繁雄有迷樓挂斗月觀横空紋錦製㠶明珠濺雨寧論雀馬魚龍往事逐孤鴻但亂雲流水縈帶離宫最好揮毫萬字一飲􅂸千鍾又越州懐古秦峰蒼翠耶溪瀟洒千巖萬壑爭流鴛瓦雉城譙門畵㦸蓬萊燕閣三休天際識歸舟泛五湖煙月西子同遊茂草荒臺苧蘿村冷起閑愁何人覽古凝眸悵朱顏易失翠被難留梅市舊書蘭亭古墨依稀風韻生秋狂客鑑湖頭有百年臺沼終日夷猶最好金龜換酒相與醉滄洲又洛陽懷古梅英疎淡氷澌溶洩東風暗換年華金谷俊游銅駞巷陌新晴細履平沙長記誤隨車正絮翻蝶舞芳思交加柳下桃蹊亂分春色到人家西園夜飲鳴笳有華燈礙月飛葢妨花蘭苑未空行人漸老重來是事堪嗟煙暝酒旗斜但倚樓極目時見棲鴉無奈歸心暗隨流水到天涯又别意奴如飛絮郎如流水相沾便肯相隨微月户庭殘燈簾幙怱怱共惜佳期纔話暫分携早抱人嬌咽䨇淚紅垂畵舸難停翠幃輕别兩依依别來怎表相思有分香帕子合數松兒紅粉脆痕青牋嫩約丁寧莫遣人知成病也因誰更自言秋杪親去無疑但恐生時注著合有分于飛沁園春春思宿靄迷空膩雲籠日晝景漸長正蘭臯泥潤誰家燕喜蜜脾香少觸處蜂忙盡日無人簾幙挂更風遞遊絲時過墻微雨後有桃愁杏怨紅涙淋浪風流寸心易感但依依竚立回盡柔腸念小奩瑶鑑重勻綘蠟玉籠金斗時熨沉香柳下相將遊冶處便回首青樓成異鄉相憶事縱蠻牋萬疊難寫微茫水龍吟贈妓婁東玉小樓連苑横空下窺繡轂雕鞍驟疎簾半捲單衣初試清明時候破暖輕風弄晴微雨欲無還有賣花聲過盡斜陽院落紅成陣飛鴛甃玉珮丁東别後悵佳期參差難又名韁利鎻天還知道和天也瘦花下重門柳邊深巷不堪回首念多情但有當時皓月向人依舊八六子倚危亭恨如芳草萋萋剗盡還生念柳外青騘别後水邊紅袂分時愴然暗驚無端天與娉婷夜月一簾幽夢春風十里柔情怎奈向歡娯漸隨流水素絃聲斷翠綃香減那堪片片飛花弄晩濛濛殘雨籠晴正銷凝黄鸝又啼數聲風流子東風吹碧草年華換行客老滄洲見梅吐舊英柳摇新絲惱人春色還上枝頭寸心亂北隨雲黯黯東逐水悠悠斜日半山暝烟兩岸數聲横笛一葉扁舟青門同携手前歡記渾似夢裏揚州誰念斷腸南陌囘首西樓筭天長地久有時有盡柰何綿綿此恨難休擬待倩人説與生怕人愁夢揚州晚雲收正柳塘煙雨初休燕子未歸惻惻輕寒如秋小欄外東風軟透繡幃花宻香稠江南逺人何處鷓鴣啼破春愁長記曾陪燕遊酬妙舞清歌麗錦纒頭殢酒困花十載因誰淹留醉鞭拂靣歸來晩望翠樓簾捲金鈎佳㑹阻離情正亂頻夢揚州雨中花指㸃虛無征路醉乘斑蚪逺訪西極見天風吹落滿空寒皇女明星迎笑何苦自淹塵域正火輪飛上霧捲煙開洞觀金碧重重觀閣横枕鼇峰水面倒銜蒼石隨處有奇香幽火杳然難測好是蟠桃熟後阿環偷報消息在天碧海一枝難遇占取春色一叢花年時今夜見師師雙頰酒紅滋疎簾半捲微燈外露華上煙裊凉颸簮髻亂抛偎人不起彈涙唱新詞佳期誰料久參差愁緒暗縈絲想應妙舞清歌罷又還對秋色嗟咨惟有畫樓當時明月兩處照相思鼔笛慢亂花叢裏曽㩦手窮艷景迷歡賞到如今誰把雕鞍鎻定阻遊人來往好夢隨春逺從前事不堪思想念香閨正杳佳歡未偶難留戀空惆悵永夜嬋娟未滿嘆玉樓幾時重上那堪萬里却尋歸路指陽闗孤唱苦恨東流水桃源路欲回雙漿仗何人細與叮寧問呵我如今怎向促拍滿路花露顆添花色月彩投忩隙春思如中酒恨無力洞房咫尺曽寄青鸞翼雲散無蹤跡羅帳薰殘夢回無處尋覔輕紅膩白歩歩薰蘭澤約腕金環重宜裝飾未知安否一向無消息不似尋常憶憶後教人片時存濟不得長相思鐵罋城髙蒜山渡闊千雲十二層樓開尊待月掩箔披風依然燈火揚州綺陌南頭記歌名宛轉鄉號温柔曲檻俯清流想花陰誰繫蘭舟念凄絶秦絃感深荆賦相望幾許凝愁勤勤裁尺素柰雙魚難渡𤓰洲曉鑑堪羞潘髩㸃吳霜漸稠幸于飛鴛鴦未老不滿庭芳三首山抹微雲天連衰草畫角聲斷譙門暫停征棹聊共引離尊多少蓬萊舊事空回首煙靄紛紛斜陽外寒鴉數㸃流水繞孤村銷魂當此際香囊暗解羅帶輕分謾贏得青樓薄倖名存此去何時見也襟袖上空惹啼痕傷情處髙城望斷燈火已黄昏晁云斜陽外三句雖不識字人亦知為天生好言語又紅蓼花繁黄蘆葉亂夜深玉露初零霽天空闊雲淡楚江清獨掉孤篷小艇悠悠過􅃄渚沙汀金鈎細絲綸慢捲牽動一潭星時時横短笛清風皓月相與忘形任人笑生涯泛梗飄萍飲罷不妨醉卧塵勞事有耳誰聽江風静日髙未起枕上酒㣲醒又碧水驚秋黄雲凝暮敗葉零亂空堦洞房人静斜月照徘徊又是重陽近也幾處處砧杵聲催西忩下風摇翠竹疑是故人來傷懷增悵望新懽易失往事難猜問籬邊黄菊知為誰開謾道愁須殢酒酒未醒愁已先回憑闌久金波漸轉白露㸃蒼苔江城子三首西城楊柳弄春柔動離憂淚難收猶記多情曾為繫歸舟碧野朱橋當日事人不見水空流韶華不為少年留恨悠悠幾時休飛絮落花時候一登樓便做春江都是淚流不盡許多愁詞人佳句多是翻案古人語如淮海此詞便做春江都是淚流不盡許多愁可謂警句雖用李宻數隋檄語亦自李後主問君都有幾多愁却似一江春水向東流變化名家如此類者不可枚舉亦一法也又南來飛燕北歸鴻偶相逢慘愁容綠鬢朱顔重見兩衰翁别後悠悠君莫問無限事不言中小槽春酒滴珠紅莫怱怱滿金鍾飲散落花流水各西東後㑹不知何處是煙浪逺暮雲重又棗花金釧約柔荑昔曾㩦事難期咫尺玉顔和淚鎻金閨恰似小園桃與李雖同處不同枝玉笙初度顫鸞箆落花飛為誰吹月冷風髙此恨只天知任是行人無定處重相見是何時滿園花一向沉吟久淚珠盈襟袖我當初不合苦撋就慣縱得軟頑見底心先有行待痴心守甚捻著脉子倒把人來僝僽近日來非常羅皂醜佛也須眉皺怎掩得衆人口待收了孛羅罷了從來斗從今後休道共我夢見也不能得勾迎春樂菖蒲葉葉知多少惟有箇蜂兒妙雨晴紅粉齊開了露一㸃嬌黄小早是被曉風力暴更春共斜陽俱老怎得花香深處作箇蜂兒抱花香原作香香恐是當時語淮海長短句巻上欽定四庫全書淮海長短句巻中宋秦觀撰鵲橋仙纎雲弄巧飛星傳恨銀漢迢迢暗度金風玉露一相逢便勝却人間無數柔情似水佳期如夢忍顧鵲橋歸路兩情若是久長時又豈在朝朝暮暮菩薩蠻蟲聲泣露驚秋枕羅幃淚濕鴛鴦錦獨卧玉肌凉殘更與恨長陰風翻翠幔雨澀燈花暗畢竟不成眠鴉啼金井寒减字木蘭花天涯舊恨獨自凄凉人不問欲見回腸斷盡金爐小篆香黛蛾長歛任是東風吹不轉困倚危樓過盡飛鴻字字愁木蘭花秋容老盡芙蓉院草上霜花勻似剪西樓促坐酒盃深風壓繡簾香不捲玉纎慵整銀筝鴈紅袖時籠金鴨煖嵗華一任委西風獨有春紅留醉臉畫堂春落紅鋪徑水平池弄晴小雨霏霏杏園憔悴杜鵑啼無柰春歸柳外畫樓獨上凭䦨手撚花枝放花無語對斜暉此恨誰知千秋嵗水邉沙外城郭春寒退花影亂鶯聲碎飄零疎酒盞離别寛衣帶人不見碧雲暮合空相對憶昔西池㑹鵷鷺同飛葢㩦手處今誰在日邊清夢斷鏡裏朱顔改春去也飛紅萬㸃愁如海踏莎行霧失樓臺月迷津渡桃源望斷無尋處可堪孤舘閉春寒杜鵑聲裏斜陽暮驛寄梅花魚傳尺素砌成此恨無重數郴江幸自遶郴山為誰流下瀟湘去坡翁絶愛此詞尾兩句自書於扇云少游已矣雖萬人何贖釋天隠註三體唐詩謂此二句實自沅湘日夜東流去不為愁人住少時變化然􅆁之毖彼泉水亦流於淇已有此意秦公葢出諸此又王直方詩話載黄山谷惜此詞斜陽暮意重欲易之未得其字今郴誌遂作斜陽度愚謂此亦何害而病其重也李太白詩􅔔彼落日暮即斜陽暮也劉禹錫烏衣巷口夕陽斜杜工部山木蒼蒼落日曛皆此意別如韓文公紀夢詩中有一人壯非少石鼔歌安置妥帖平不頗之類尤多豈可亦謂之重耶山谷當無此言即誠出山谷亦一時之言未足為定論也蝶戀花曉日窺軒雙燕語似與佳人共惜春將暮屈指艷陽都幾許可無時霎閑風雨流水落花無問處只有飛雲冉冉來還去持酒勸雲雲且住憑君礙斷春歸路一落索楊花終日空飛舞柰久長難駐海潮雖是暫時來却有箇堪憑處紫府碧雲為路好相將歸去肯如薄倖五更風不解與花為主醜奴兒夜來酒醒清無夢愁倚闌干露滴輕寒雨打芙蓉淚不乾佳人别後音塵悄瘦盡難􅂸明月無端已過紅樓十二間南鄉子妙手寫徽真水剪雙眸㸃絳唇疑是昔年窺宋玉東鄰只露墻頭一半身往事已酸辛誰記當年翠黛顰盡道有些堪恨處無情任是無情也動人醉桃源即阮郎歸碧天如水月如眉城頭銀漏遲緑波風動畫船移嬌羞初見時銀燭暗翠簾垂芳心兩自知楚臺魂斷曉雲飛幽歡難再期河傳二首亂花飛絮又望空闘合離人愁苦那更夜來一霎薄情風雨暗掩將春色去籬枯壁盡因誰做若説相思佛也眉兒聚莫恠為伊抵死縈腸惹肚為沒教人恨處又恨眉醉眼甚輕輕覷著神魂迷亂常記那回小曲闌干西畔鬢雲鬆羅襪剗丁香咲吐嬌無限語軟聲低道我何曾慣雲雨未諧早被東風吹散悶損人天不管浣溪沙五首漠漠輕寒上小樓曉陰無賴似窮秋澹烟流水畫屏幽自在飛花輕似夢無邊絲雨細如愁寶簾閑挂小銀鈎又香靨凝羞一笑開柳腰如醉暖相挨日長春困下樓臺照水有情聊整鬢倚闌無緒更兠鞋眼邊牽恨懶歸來又霜縞同心翠黛連紅綃四角綴金錢惱人香爇是龍涎枕上忽收疑是夢燈前重㸔不成眠又還一叚惡因緣又脚上鞋兒四寸羅唇邊朱粉一櫻多見人無語但回波料得有心憐宋玉只應無柰楚襄何今生有分共伊麽又錦帳重重巻暮霞屏風曲曲闘紅牙恨人何事苦離家枕上夢魂飛不去覺來紅日又西斜滿庭芳草襯殘花前叚用元㣲之天台詩意後叚婉約有味尾句尤含蓄深思如夢令五首門外鴉啼楊柳春色着人如酒睡起熨沉香玉腕不勝金斗消瘦消瘦還是褪花時候又遥夜沉沉如水風𦂳驛亭深閉夢破䑕窺燈霜送曉寒侵被無寐無寐門外馬嘶人起又幽夢怱怱破後妝粉亂㾗霑袖遥想酒醒來無柰玉銷花瘦回首回首遶岸夕陽疎柳又樓外殘陽紅滿春入柳條將半桃李不禁風回首落英無限腸斷腸斷人共楚天俱逺又池上春歸何處滿目落花飛絮孤舘悄無人夢斷月堤歸路無緒無緒簾外五更風雨阮郎歸四首褪花新緑漸團枝撲人風絮飛秋千未拆水平堤落紅成地衣遊蝶困乳鶯啼怨春春怎知日長早被酒禁持那堪更别離又宫腰裊裊翠鬟鬆夜堂深處逢無端銀燭殞秋風靈犀得暗通更有限恨無窮星河沉曉空隴頭流水各西東佳期如夢中又瀟湘門外水平鋪月寒征棹孤紅妝飲罷少踟蹰有人偷向隅揮玉筯洒真珠梨花春雨餘人人盡道斷腸初那堪腸也無又湘天風雨破寒初深沉庭院虛麗譙吹罷小單于迢迢清夜徂鄉夢斷旅魂孤崢嶸嵗又除衡陽猶有鴈傳書郴陽和鴈無滿庭芳三首咏茶北苑研膏方圭圓璧萬里名動京闗碎身粉骨功合上凌烟尊俎風流戰勝降春睡開拓愁邊纎纎捧香泉濺乳金縷鷓鴣斑正相如才病一觴一詠賔有羣賢且扶起燈前醉玉頽山搜攬胸中萬巻還傾動三峽詞源歸來晚文君未寢相對小妝殘又茶詞曉色雲開春隨人意驟雨方過還晴髙臺芳榭飛燕蹴紅英舞困榆錢自落秋千外綠水橋平東風裏朱門映栁低按小秦筝多情行樂處珠鈿翠葢玉轡紅纓漸酒空金榼花困蓬瀛豆蔻梢頭舊恨十年夢屈指堪驚凭闌乆疎煙淡日寂寞下蕪城此詞正少游所作人傳王觀撰非也又雅燕飛觴清談揮麈使君髙㑹羣賢宻雲雙鳯初破縷金團牎外爐烟似動開尊試一品奔泉輕淘起香生玉乳雪濺紫甌圓嬌鬟宜美盼雙擎翠袖穏步紅蓮坐中客翻愁酒醒歌闌㸃上紗籠畫燭花􅍡弄月影當軒頻相顧餘歡未盡欲去且留連桃源憶故人玉樓深鏁薄情種清夜悠悠誰共羞見枕衾鴛鳯悶即和衣擁月無端畫角嚴城動驚破一番新夢􅐼外月華霜重聴徹梅花弄淮海長短句巻中欽定四庫全書
