body:
  text: 同子瞻賦游恵山三首其一王武陵韻宿其二竇群韻其三朱韻輟棹縱幽討籃輿入青蒼圓頂相邀迓旃檀燎深堂層巒淡如洗傑閣森欲翔林芳含雨滋岫日隔林光㳙㳙續清溜靡靡傳幽香俯仰佳覧眺悠哉身世忘使君厭機械所與惟散人顧慙蒹葭陋繆倚瓊枝新上干青磝磝下屬白磷磷洞天不知老金界無棲塵緬彼人間世烏蟾閱青旻詎得踵三隱山阿相與隣楼觀相複重邈然閟深樾九龍吐清泠㶁㶁曾未絶罌缶馳千里真珠猶不滅况復從茶僊兹焉試葵月岸巾塵想消散策佳興發何以慰遨嬉操觚繼前轍子瞻云余昔為錢塘倅往來無錫未嘗不至恵山既去五年復為湖州與髙郵秦少游杭僧參寥同至覧唐處士王陵竇群朱宿所賦詩愛其語清簡蕭然有出塵之姿追用其韻各賦夢裏五年過覺來雙鬢蒼還将塵土足一歩倚瀾堂俯窺松桂影仰見鴻鶴翔炯然肝肺間巳作氷玉光虛明中有色清浄自生香還從世俗去永與世俗㤀薄雲不遮山䟱雨不濕人蕭蕭松桂滑策策芒鞋新嘉我二三子皎然無淄磷勝逰豈殊昔清句仍絶塵弔古泣舊史疾讒歌小旻哀哉扶風子難與巢許鄰吾敲火發山泉烹茶避林樾明䆫傾紫盞色味兩竒絶生眠食耳一飽萬想滅頗笑玉川子饑弄三百月豈如山中人睡起山花發一甌誰與共門外無來轍參寥同賦周山烟弄滅没山木含䓗蒼刺舟傍遥岸理策升虚堂遭瞩層巘矯矯如翺翔下瞰平田流澹然浮日光青篁解初籜洗雨聞新香雖云迫前途真賞豈易㤀堦松門暗朝雨寂歴無行人隆曦忽穿漏卉木鬰以新泉潄石齒照眼光磷磷使君美無度卓犖遺囂塵風標傲竹栢談笑凌窮旻何愧沈㝠子卧霞吞結鄰揚帆渡江來洗眼驚翠樾雲姿既容裔鳥弄更清絶凌梯訪前蹤琬琰亦未滅嗟我魚目光疇能綴明月狂墨掃琅玕風烟座中發殊勝區中人茫茫走飛轍馬上口占二首向晨結束事長途利風刮面冰在鬚岡窮得水馬不進霧暗失道人相呼悠悠旁舎見汲井軋軋隔林聞輓車游目騁懐自可樂勿憶鄉縣增煩紆霜風稜稜萬木枯梅花破蕚猶含鬚田家往往事游獵追逐狐兎相號呼微茫山中起狂燒隱約林梢低日車馬頭漸覺有佳趣勿厭阡陌多縈紆别子瞻人生異趣各有求繫風捕影祗懐憂我獨不願萬户侯惟願一識蘓徐州徐州英偉非人力世有髙名擅區域珠樹三株詎可攀玉海千尋真莫測一昨秋風動逺情便憶鱸魚訪洞庭芝蘭不獨庭中秀松栢仍當雪後青故人持節過鄉縣教以東來償所願天上麒麟昔漫聞河東鸑鷟今纔見不将俗物擬天真北斗巳南能幾人八塼學士風標逺五馬使君恩意新黄塵𡨕𡨕日月换中有盈虛亦何筭據龜食蛤暫相從請結後期游汗漫子瞻詩云侯夜光明月非所投逢年遇合百無憂将軍百戰竟不伯郎一斗得凉州翹闗負重君無力十年不入紛華域故人坐上見君文謂是古人吁莫測新詩説盡萬物情硬黄小字臨黄庭故人巳去君未到空吟河畔草青青誰為他鄉各異縣天遣君來破吾願一聞君語識君心短李髯孫眼中見江湖放浪乆全真忽然一鳴驚倒人從横所植無不可知君不怕新詩新千金弊帚那堪换我亦淹留豈長筭山中既未決同歸我聊爾耳君其漫侯淮南三嵗吾何求使君到後消人憂君言有客輕公扁舟相從古揚州置之匹馬恨無力千里相忘同異域新詩空使四座驚隱居未易凡人測使君南歸無限情鴻飛携書堕我庭此書兼置昔年客䄂中麗句淮山青老夫强顔依府縣堆案文書非本願清談亹亹解人頥安得座右長相見狂客吾非賀季真醉吟君似謫仙人末契長遭少年笑白髪應慙傾盖新都城酒貴誰當换塵埃始面非良筭歸來泗上正思君莫待黄花霜爛漫和黄法曹憶建溪梅花海陵參軍不枯槁醉憶梅花愁絶倒為憐一樹傍寒溪花水多情自相惱清淚班班知有恨恨春相逢苦不早甘心結子待君來洗雨梳風為誰好誰云廣平心似鐵不惜珠璣與揮掃月没參横畫角哀暗香銷盡令人老天分四時不相貸孤芳轉盻同衰草要湏健歩逺移歸亂挿繁華向晴昊參寥詩云倒朔風蕭蕭方振槁雪壓茅齋欲欹門前誰送一枝梅問訊山僧少病惱强将筆力為摹冩麗句巳輸何遜早碧桃丹杏空自妍嚼藥齅香無此好先生携酒傍玉叢醉裏雄辭驚電掃東溪不見謫仙人江路還逢少陵老我雖不飲為誰牽不惜山衣同藉草要湏陶令挿花歸醉卧春風軼軒昊壓子瞻和少游詩云灰西湖處士骨應槁只有此詩君倒東坡先生心巳為愛君詩被花惱多情立馬待黄昏殘雪消遲月出早江頭干樹春欲暗竹外一枝斜更好孤山山下醉眠處㸃綴裙腰紛不掃萬里春随逐客來十年花送佳人老去年花開我匕病今年對花還草草不如風雨巻春歸収拾餘香還畀昊傾子瞻和參寥詩云生化工未識蘓羣槁先向梅花一倒江南無雪春瘴為散氷花除熱惱風清月落無人見洗粧自趂嚴鐘早惟有飛來雙白鷲玉羽瓊樹闘争好吴山道人心似水眼浄塵空無可掃故将妙語寄多情横機欲寄東坡老東坡習氣除未盡時復長篇書小草且撼長條飱落英忍饑未忍呼穹昊子由和少游詩云梅老夫毛骨日凋槁愁見米鹽惟醉倒忽傳騷客賦寒感物傷春同懊惱江邉不識北風勁墻頭知有南枝早未開素質夜光明半落清香春更好鄰家小婦學閑媚靚粧惟有長眉掃孤芳巳與飛霰競結子仍先百花老苦遭横笛亂飛英不見逰人醉芳草可憐物性空自知羞作繁華助芒昊子由和參寥詩云憐君古木依岩槁西江飲醉湏彌倒野花幽草亦何為嶮語長篇空自惱萬㸃浮溪輙長嘆一枝過嶺誇先早拾香不忍游塵汚嚼蘂更憐真味好道人遇物心有得瓦竹相敲縁自掃誰知真妄了不妨令我至今思璉老妙明真覺昔未識但向閑䆫㸔詩草浮雲時起鳥四飛畢竟安能亂清昊送少章弟赴仁和主簿我宗本江南為将門列㦸中葉徙淮海不仕但潜徳先祖實起家先君始縫掖議郎為名士余亦忝詞客風流以及汝三通桂堂籍汝弱不好弄文章有新格久從先生游術業良未測武林一都㑹山水富南國下有賢别駕上有明方伯干将入砥礪騕䮍就􅔷勒勿矜孔鸞姿不樂棲枳棘呉中多髙士往往寄老釋辯才雖物化參寥猶夙昔投閑數訪之可得三友益少來輕别離老去重乖隔念汝逺行役惘惘意不懌道山雖云佳乆寓有饑色功名巳絶意政苦婚嫁迫終從大人議稅駕䢴溝側追蹤漢兩疏父子老阡陌送李端叔從辟中山人畏朔風聲我聞獨寛懐豈不知凛冽為自中山來端叔天下士淹留蹇無成去從中山辟良亦慰平生與君英妙時俠氣上參天孰云行半百身世各茫然當時兒戲念今日巳灰死著書如結􅈊聊以忘憂耳駸駸嵗遒盡淮海歸無期功名良獨難雖成定奚為念君逺行役中夜憂反側攬衣起成章贈以當馬策淮海集巻四欽定四庫全書淮海集巻五宋秦觀撰
