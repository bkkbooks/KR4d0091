body:
  text: 寄孫莘老少監一出承明七换麾君恩復許上􅊮墀白衣蒼狗無常態璞玉渾金有定姿天上圖書森似舊人間嵗月浪如馳鼇頭只在蓬山畔行赴蟠桃熟後期次韻馬忠玉喜王定國還自濵州淮海相逢一解顔紛紛嵗月夢魂間初驚漁艇迷花去忽認星槎拂斗還桂嶺暮登猿斷續槐堂春到鳥綿蠻石渠舊議行當復未信佳時得自閑寄李公擇郎中節旄淮畔脫秋風忽跨鯨魚上碧空華秀兩跗當重露文成五色在髙桐江南又說衣冠盛廷右仍瞻禮樂隆朝睍既升淮海見瀌瀌雨雪自消融寄李端叔編修旗亭解手屢冬春聞道歸來白髪新馬革褁尸心未艾金龜换酒氣方振夢魂偷遶邉城月導從公穿禁路塵知有新編號横槊為慿東使寄淮濵寄題倪敦復北軒倪郎才韻照氷壺北向開軒頗自娱簷度蕙風鳴鴶鵴壁經梅雨畫螔蝓觥籌交錯銀河掛文史縱横角簟鋪官舍私居同是漫莫嗟三徑就荒蕪寄題盧君斗齋俠氣軒軒翰墨埸邅廻世路鬢成霜出從車馬行千里歸與琴書寄一方鳥囀入簾春欲破爐香侵夢日初長扁舟㑹有山陽役聊借狂夫挹酒漿次韻酬周開祖宣義并州令尹古人風淮海相忘十載中麗句曉披花綽約清談初扣玉丁東追攀昔共猗犴子嗜好今同桑苧翁所惜華船輕解繂未窺笠澤故書叢送王元龍赴泗州粮料院子猷風味最諸王試吏聊懐筦庫章鵠峙碧桐初振羽珠遺滄海漸騰光淮山暮眺千峰耀洛水秋輸萬鷁翔顧我行為大梁役一巵薄酒話愁腸次韻子由題九曲池廣陵五題蕭瑟通池閟茂林岸傍無復屬車音涵春似恨隋家逺漲曉疑連蜀井深鬬草事空煙冉冉司花人逺樹隂隂勞生俛仰成陳迹縱有遺音可用尋子由詩云陵嵇老清彈怨廣隋家水調寄哀音可憐九曲遺聲盡惟有一池春水深鳳闕蕭條荒草外龍舟想像緑楊隂都人似有興亡恨每到殘春一度尋次韻子由題平山堂棟宇髙開古寺間盡収佳處入雕欄山浮海上青螺逺天轉江南碧玉寛雨檻幽花滋淺淚風巵清酒漲㣲瀾逰人若論登臨美湏作淮東第一觀子由詩云山堂上平㸔江上晴光千里對慿欄海門僅可一二數雲夢猶呑八九寛簷外小棠隂蔽芾壁間遺墨涕汍瀾人亡坐覺風流盡遺構仍湏子細觀次韻子由題蜀井蜀岡精氣滀多年故有清泉發石田乍飲肺肝俱澡雪反窺杖屨亦輕便炊成香稲流珠滑煑出新茶潑乳鮮坐使二公鄉思動放杯西望欲揮鞭子由詩云年信脚東逰十一甘泉香稲憶歸田行逢蜀井怳如夢試煑山茶意自便短綆不収容盥濯紅泥仍許置新鮮早知鄉縣勝為客逰宦何湏更着鞭次韻子由題摘星亭迷樓舊址崑崙左右兩招提中起孤髙雉堞西不見燒香成宿霧虚傳裁錦作障泥螢流花苑飛星亂蕪滿春城緑髪齊長憶凭欄風雨後斷虹明處海天低子由詩云迷闕角孤髙特地迷藏渾忘日東西江流入海情無限暮雨連山醉似泥夢裏興亡應未覺後來愁思獨難齊只堪留作逰觀地㸔遍峰巒處處低次韻子由題光化塔古佛悲憐得度人應縁來現比邱身水流月落知何處花發鸎啼又一春方外笑談清似玉夢中煩惱細如塵老僧自說從居此却悔平時事逺巡子由詩云人山頭孤塔閟真云是僧伽第二身處處金錢追晩供家家蠶麥保新春欲求世外無心地一掃胷中累劫塵方丈近聞延老宿清朝留客語逡廵次韻子瞻贈金山寳覺大師雲峰一變隔炎凉猶喜重來飯積香宿鳥水干迎曉閙亂帆天際受風忙青鞋踏雨尋幽徑朱火籠紗語上方珍重故人敦妙契自憐身世兩㣲茫子瞻詩云凉誰能斗酒博西但記齋厨法豉香往事真同一夢覺髙談誰洗五年忙清風漫與山阿曲明月常隨屋角方稽首願師憐乆客直将歸路指茫茫遊鑑湖畫舫珠簾出繚牆天風吹到芰荷鄉水光入座杯盤瑩花氣侵人笑語香翡翠側身窺緑酒蜻蜓偷眼避紅粧葡萄力緩單衣怯始信湖中五月凉謁禹廟隂隂古殿注脩廊海伯川靈儼在傍一代衣冠埋石窆千年風雨鎻梅梁碧雲暮合稽山暗紅芰秋開鑑水香令我免魚繇帝力恨無歌舞奠椒漿蓬萊閣雄簷傑檻跨峥嶸席上風雲指顧生千里勝形歸爼豆七州和氣入簫笙人逰晩㟁朱樓逺鳥度晴空碧嶂横今夜請㸔東越分藩星應帶少㣲明程公闢次韻嶸半天鍾鼓宴峥早晚隂晴景旋生湖暖水香春載酒月寒雲白夜聞笙金鼇破海頭争並玉鷺排烟陣自横我是蓬萊東道主倚欄先占日初明别程公闢給事人物風流推鎮東夕郎持節作元戎罇前倦客劉師命月下清歌盛小叢裘弊黒貂霜正急書傳黄犬嵗将窮買舟江上辭公去廽首蓬萊夢寐中程公闢次韻從君家仲父早相晩接清談有阿戎曲水暢情林竹茂小山招隱桂枝叢與時搏擊飛終逺隨處登臨興莫窮人下天來應問得髙名已到月華中中秋口號雲山簷楯接低空公宴初開氣欝葱照海旌幢秋色裏激天鼓吹月明中香槽旋滴珠千顆歌扇驚圍玉一叢二十四橋人望處台星正在廣寒宫客有傳朝議欲以子瞻使髙麗大臣有惜其去者白罷之作詩以紀其事與莘老同賦學士風流異域傳幾航雲海使南天不因名動五千里豈見文髙二百年貢外别題求妙札錦中翻様織新篇淹留却恨鴛行舊不得飛觴駐蹕前孫莘老作音文章異域有知鴨綠差池一醉吟頴士聲名動倭國樂天辭筆過鷄林節髦零落氊呑雪辯舌縱横印佩金奉使風流家世事幾隨浪泊海東岑淮海集巻八欽定四庫全書淮海集巻九宋秦觀撰
