body:
  text: 秋興九首擬韓退之逍遥北忩下百事逺客慮無端葉間蟬催促時節去愁起如亂絲縈纒不知緒日月豈得已還復役朝暮人生均有得悲歎我不悟春秋自天時感憤亦真趣擬孟郊曉風有暴信暮蟬無好聲曉風與暮蟬自與時節爭獨客辭故鄉推車謁梁城梁城道迢􅉍區區役吾生不如歸舊山藜藿安性情擬韋應物坐投林下石秋聲出疎林林間鳥驚棲豈獨傷客心物亦有代謝此理共古今鄰父縮新醅林下邀同斟癡兒踏吳歌婭姹足訛音日落相攜手涼風快虛襟擬李賀魚鱗甃空排嫩碧露桂梢寒挂團璧白蘋風起吹北忩尺鯉沈沒斷消息燕子將鶵欲歸去沈郎病骨驚遲暮濃愁茫茫寄何處萬里江南芳草路擬李白芙蓉露濃紅壓枝幽禽感秋花畔啼玉人一去未囘馬梁邊燕子三見歸江頭白蘋老波底尺書不來空相望斜吹疎雨濕秋江霜風暗引芙渠香石上菖蒲三尺長綠頭鴨兒棲萍草採蓮女郎笑花老木蘭船上動江水不覺鴛鴦帶波起擬玉川子南州有病客起卧北忩下玉兎銜光照清夜故人别我京洛遊不寄一行三改秋秋色變冷客裘薄漸覺衣袂寒颼颼作詩欲寄君未語先有愁不如呼童起危坐北忩下一杯寛我千日憂眼前俗事何擾擾此夕盡向杯中休何必懷黄金印兮爵通侯擬杜子美紫領寛袍漉酒巾江頭蕭散作閑人悲風有意催林葉落日無情下水濱車馬憧憧諸道路市朝衮衮共埃塵覔錢稚子啼紅頰不信山翁篋笥貧擬杜牧之皷鼙夜戰北忩風霜葉鋪堦疊亂紅一叚新愁驚枕上幾聲悲鴈落雲中眼前時節看馳馬日下生涯寄斷蓬弟妹别來勞夢寐杳無消息過江東擬白樂天不因霜葉辭林去的當山翁未覺秋北里酒錢煩屢索南州詩債懶頻酬欲歌金縷羞紅粉擬挿黄花避白頭底事登臨好時節等閑收拾許多愁金山晩眺西津江口月初弦水氣昏昏上接天清渚白沙茫不辨只應燈火是漁船病中疎簾薄幔對青燈鸜鵒喧喧自轉更風雨𣺌漫人卧病地爐湯鼎更悲鳴聞鴈懐邵仲恭楚澤吳天去未遲煩君且傍蒜山飛白袍居士如相問為説緇塵欲滿衣冬蚊蚤蠆蜂䖟罪一倫未如蚊子重堪嗔萬枝黄落風如射猶自傳呼欲噬人白馬寺晩泊濛濛晚雨暗囘塘逺樹依微不辨行人物漸稀疎磬斷綠蒲叢底宿鴛鴦霅上感懐七年三過白蘋洲長與諸豪載酒游舊事欲尋無處問雨荷風蓼不勝秋和程給事贈虞道判六首刀圭雲母具晨飡門對三層歩斗壇夜考鶴經分七九曉占歲氣辨黅丹火棗交梨近可飡不須地肺及天壇龜藏坎海毛皆緑鳯宿離宫色自丹紫府沉沉掩夜闗竹隂清掃月中壇歲星偷得桃枝碧董奉栽成杏子丹囊中玉色已經飡醉拂絲桐坐杏壇應笑倦游塵滓客鬢毛蕭瑟事鈆丹漢武遊心縹緲間文成五利盡登壇何如屈曲韓夫子不羡神君白玉丹使君本住道家山時訪元都太古壇隂惠已能追許令治功不獨過韋丹處州閑題清酒一杯甜似蜜美人雙鬂黒如鴉莫誇春色欺秋色未信桃花勝菊花春詞絶句五首蒲萄裀暖蕙薰微紅日窺軒睡覺時人倦披衣雙燕出青絲髙罥木蘭枝弱雲亭午弄春嬌髙柳無風妥翠條懶讀夜書搔短髮隔垣時聽賣􅄳簫都城春富百花披長憶人歸駐馬時淺色御黄應好在為誰還發去年枝風驅白雨洗園林蔽地飛花一寸深狂紫浪紅俱已矣老春雖在亦何心顚毛漸脱風情少匣劒空存俠氣銷人逺地偏無酒肉春深花鳥謾相撩秋詞二首雲惹低空不更飛班班紅葉欲辭枝秋光未老仍微暖恰似梅花結子時無數青莎繞玉階夕陽紅淺過墻來西風莫道無情思未放芙蓉取次開齊逸亭燄發郎君更不歸故亭蕭瑟異當時玉笙金管渾如夢只有梅花三四枝春日殘臘𣺌茫雲外日新春彷彿夢中來雪霜便覺都無力只見桃花次第開雪中寄丹元子隂風一夜攪青㝠風定紛紛雪片零想見玉清真境上白虛光裏誦黄庭宿乾明方丈漫天白雪無端現佛室夜艾烏更啼相逢解頥足自慰勿語俗子念心攜新開湖送孫誠之有龍見于東北因成絶句狂客走影暗悠悠􅔽萏吹風五月秋黄綬不為無氣概蒼龍隨尾送行舟呈李公擇青箋擘處銀鈎斷紅袂分時玉筯懸雲脚漸收風色𦂳半規斜日射歸船落日馬上日落荒阡白霧深紫騮嘶顧出疎林囘頭已失來時路杳杳金盤墮翠岑次韻參寥三首武陵漁子入花源但見秦人不得仙㑹有黄鸝鳴翠柳何妨白眼望青天長安仕路與雲齊倦僕羸驂不可躋但得𤣥暉曽折簡何須平子更安題且折花枝醉復醒人間時節易崢嶸屠龍肯自羞無用畫虎從人笑不成和書天慶觀賀祕監堂三首老仙舊地枕東城古木參天警畫聲我亦願為方外友風流何必並時生史君平昔慕髙清一到祠堂意一新户外黄冠應指㸃公應便是謫仙人衣屨蕭條氣久清豪家門館未嘗行朱甍碧瓦何從得疑有隂兵夜助成和書觀妙菴龍瑞宫中種玉人誅茅結室傍秋雲自言洞裡山川别此處千分未一分早春題僧舎東園紫梅初破藟北澗綠水方通流歸去一春花月夢定應常在此中遊盆池釣翁誰刻仙材作釣翁尺池終日釣微風令人却憶鴟夷子散髮五湖狂醉中賞酴醿有感春來百物不入眼唯見此花堪斷腸借問斷腸緣底事羅衣曾似此花香首夏節物相催各自新痴心兒女挽留春芳菲過盡何須恨夏木陰陰正可人淮海後集巻四欽定四庫全書淮海後集巻五宋秦觀撰
