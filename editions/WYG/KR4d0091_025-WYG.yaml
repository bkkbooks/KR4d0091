body:
  text: 傳説陳偕傳偕姓陳氏淮南廣陵人家故饒財而偕與其弟獨喜學畫其後技日以進家日以㣲遂以為業士大夫既喜其畫且愛其為人徃徃稱之然非偕之好也其言曰予從事於兹有年矣凡古今之畫不見則已茍有見焉雖敝縑裂素之餘未甞不學一不可於意輒復易之舐筆濡墨欣然忘勞盖是時余方以畫為事固其勢不得不然乃今思之亦良苦矣且物之有形如浮埃聚沫來無所從去無所詣一興一僨於無窮之中而我方汩汩然隨而畫之可不惑歟彼好事者又從而玩之至藏於巾笥且不欲以數閱可不謂大惑者歟嘻今老矣顧家貧無以給衣食之奉聊復俛仰於其間至於得失精粗不復經意也又曰有學於余者衆矣余将教之必使縱心之所勤肆筆之所成以觀其天盖工而不雅者有矣踈而不俗者有矣詳略得宜意氣容與卓乎遂若無與及者亦或有焉余從而告之曰其後當然其後當然已而果然夫畵固技之㣲者也其猶若是又况有貴於畫者哉其子直躬亦世其學而所言尤異甞曰昔宋元君時畫圖有一史觧衣槃礴元君曰是真畫者也夫觧衣槃礴固倜儻之所得閒暇之所好也元君乃以為真畫其意果安在乎有得於此然後可以言畫而或説以謂神定意閑固以異於他史其亦失元君之意矣余聞而異之又從而思之豈所謂自得於已者耶抑亦得於人者耶将内雖不充其言而頗亦有志於是耶人固未易知然比夫􅃷技以夸人賈能以售汙俗者相去亦逺矣古之君子聞一言中於理必書之故漁人之所賦孺子之所歌皆得載於前史矧其有合於道徳之要者乎於是為傳其言以遺同好亦時觀之以自擇焉眇倡傳美倡有眇一目者貧不能自贍乃計謀與母西㳺京師或止之曰倡而眇何徃而不窮且京師天下之色府也美眄巧笑雪肌而漆髪曳珠玉服阿錫妙彈吹籍於有司者以千萬計使若具両目猶恐徃而不售况眇一焉其瘠於溝中必矣倡曰固所聞也然諺有之心相憐馬首圓以京師之大是豈知無我儷者遂行抵梁舎於濱河逆旅居一月有少年從数騎出河上見而悅之為觧鞍留飲燕終日而去明日復來因大嬖取置别第中謝絶姻黨身執㸑以奉之倡飯少年亦飯倡疾不食少年亦不食囁嚅伺候曲得其意唯恐或不當也有書生嘲之曰間者缺然不見意有竒遇乃從相矢者處乎少年忿曰自余得若人還視世之女子無不餘一目者夫佳目得一足矣又奚以多為賛曰前史稱劉建康嗜瘡痂其門下二百人常逓鞭之取痂以給膳夫意之所蔽以惡為美者多矣何特眇倡之事哉傳曰播糠眯目則天地四方易位余甞三復其言而悲之魏景傳魏景字同叟淮南髙郵之隠君子也身長六尺骨如削石瞳子碧色有光甞賣繒於市遇華山元翁從授鍊丹鑄劔長生之術元翁名碧天其師曰劉海蟾海蟾之師曰吕洞賓洞賓之師曰鍾離權自權至景凡五世矣景問元翁曰余欲兼忘其方柰何翁曰執汝身守汝一謹而勿失景曰執害通守害變則如之何翁曰不然子以為構中天之臺者土木未考則能無經乎適千里之國者車馬未館則能無行乎故将欲通之必固執之将欲變之必固守之此其理也於是景以為然乃述碧天之意著書萬餘言論神仙事號太冲子云太冲子曰道者盗也釋者識也盗天地隂陽之機謂之道識萬物之理謂之釋甚矣人心之神也雖造化亦無加焉今夫天地之生物煦之以陽肅之以隂然後乃成人心則不然一舉而物已生矣故天生萬物地生萬物人心生萬物是故人心之形象天地隂中生陽陽中生隂非陽不能養陽非隂不能養隂故修陽法者去隂以純其陽修隂法者去陽以純其隂陽用其精隂假諸物此隂陽之法也水之性潤下火之性炎上衆人離上而坎下故不交真人坎上而離下故交炁真炁也氣糓氣也真人真炁純衆人糓氣雜神仙之道有中立無無中立有死而不亡者至矣一身而形二者次矣不死不亡一身而形不二者又其次也其大略如此同叟頴脱疆記得於自然凡隂陽醫藥鍜鍊之技無所不精而能諱其術所以世莫知焉頗觧屬文亦工於詩其贈元翁篇云幽㫁青松骨鍊盡江月心佳句多此類也嗚呼自大道隠學者各師異習鮮得其本真於是趍滅而不知生者為佛氏之縁覺趍生而不知滅者為道家之神仙二者不同其蔽一也然比夫生而行死而伏㝠然日用而不知者固有間矣如同叟者雖不足以窺老荘之藩翰亦葛稚川之流乎余素與之友善别之且六年矣既思其人而不可見又惜其事泯泯不少槩見於世如古之所謂隠逸者也乃撰次行義并擇其言之雅者書而記之聊以致余之意云汝水漲溢説汝南風物甚羙但入夏以來水潦為患異時道路化為陂波汝水漲溢城堞危險濕氣重蒸殆與呉越間不異郡人嵗嵗如此漢書稱汝南有鴻隙陂翟方進為相始奏罷之郡人怨甚切意鴻隙陂者非特為灌溉之利菱芡蒲魚之饒實一郡瀦水處也大陂既廢水無歸宿則自然散漫為害又水經稱汝水至汝南郡西北枝左别出一枝又屈而東轉南㑹汝形如垂瓠故號懸瓠城今汝水故道已亡惟存别枝水潦暴䧏則有泛溢之患亦其勢然也在漢時為豫州刺史治之諸邑皆春秋時沈江道柏之國事迹甚多暇為作記無文字檢耳心説心本無説説之非心也雖本無説而不得不有説黙而神之與道全之説而明之與道散之其全為體即體而有用其散為用即用而有體體用並㳺於不窮而俱止於無所極者其唯心而已矣而世之君子迷巳於物沉真於偽而莫之見焉此心説之所以作也目無外視耳無外聽遺物忘形在我而巳此其心歟曰非也心不在我然則目無内視耳無内聽馳神㳺精在物而已此其心歟曰非也心不在物然則物之有色我因視焉物之有聲我因聽焉來則御之去則将之彼是兩忘在物我之間而已矣此其心歟曰非也心不在物我之間然則心無所不在乎曰惡得而無在也雖不在我未始離我雖不在物未始離物雖不在物我之間而亦未始離乎物我之間者此心之真在也譬如虛空焉虚空者即之不親逺之不踈萬物方有則與之有萬物方無則與之無俛仰消息唯萬物之與俱夫虚空之於心猶一星之於天而一塵之於地也及其至猶若是又况於心乎哉是故即心無物謂之性即心有物謂之情心有所感謂之意心有所之謂之志意有所歸謂之思志有所致謂之慮故合精以止謂之魄配神以行謂之魂與神為一謂之精不離於精謂之神此十者入則一出則不一出入無常要皆以心為主爾不得乎主未有得乎臣者也是以古之通乎此則動為一氣静為二儀動静有萬物鼓舞有死生若然者隂可以開陽可以闔天地可以倒置日月可以逆行上焉造物者不得臣下焉外形體忘始終者不得友而况富貴之儻來死生之小變乎其不能累也亦明矣彼世之君子則不然知其曲不知其通安於近而迷於逺有見於外者則求心於物有見於内者則求心於我又其甚則蔽形而忘其神以謂心者特在乎方寸胸臆之間外此則物而巳矣嗚呼其亦不智也哉有人於此棄邑而取宫棄堂而取室世必以為不智人矣是何也所有者小而所遺者大也心之形非特官與室之㣲心之神非特堂與邑之廣而所取者如此而所棄者如彼豈不惑哉一人惑之一國笑之一國惑之天下笑之天下盡惑孰笑之哉悲夫是皆不見心之真在之過也由此觀之太上見心而無所取捨其次無心其次虛心其次有心有心者累物衆人之事也虛心者遺實賢人之事也無心者忘有聖人之事也見心之真在而無所取捨者死生不得與之變神人之事也嗚呼安得神人而與之説心哉二侯説閩有侯白善隂中人以數鄉里甚憎而畏之莫敢與較一日遇女子侯黑於路據井傍佯若有所失白恠而問焉黒曰不幸墮珥於井其直百金有能取之當分半以謝夫子獨無意乎白良乆計曰彼女子亡珥得珥固可紿而勿與因許之脱衣井旁縋而下黒度白已至水則盡取其衣亟去莫知所塗故今閩人呼相賣曰我已侯白伊更侯黒余謂二侯皆俚巷滑稽之民適相遭而角其技勢固不得不然於其所親戚游舊未必爾也而今世薦紳之士閒居負道徳矜仁義羞漢唐而不談真若無徇於世者一旦爵位顯於朝名聲彰于時稍迫利害則釋易而趨險叛友而誣親擠人而售已更相伺候若奕棊然唯恐計謀之不工僥倖一切之勝而曽白黑之不若者武相仍􅃑相屬也則二侯之事亦何所恠哉十二經相合義説易曰同聲相應同氣相求水流濕火就燥雲從龍風從虎甞以謂知易之說則十二經相合或以相生或以相剋者固理之自然而無所可疑之矣何以知其然耶經曰南方生熱熱生火北方生寒寒生水西方生燥燥生金中央生濕濕生土是則水者寒之形濕者土之氣夫水之於土妻道也故水流濕火者熱之形燥者金之氣火之於金夫道也故火就燥或以隂求陽或以陽求隂也管輅曰龍者陽精而居於淵故能興雲虎者隂精而居於山故能運風是則龍陽中之隂也惟陽中之隂為能召隂中之陽故雲從龍虎隂中之陽也惟隂中之陽為能致陽中之隂故風從虎夫隂陽之道固有因同類而相感者亦有以異類而相感者同聲相應同氣相求所謂同類而相感者也同異雖殊於其相感一也十二之經相合亦何異於是哉經曰少陽之上火氣治之中見厥隂又曰厥隂之上風氣治之中見少陽厥隂風木也位東方少陽相火也位南方火與木相生故厥隂與少陽合而肝膽三焦命門所以相為表裏也經曰陽明之上燥氣治之中見太隂又曰太隂之上濕氣治之中見陽明太隂濕土也位中央陽明燥金也位西方土與金相生故陽明與太隂合而脾與胃肺與大腸所以相為表裏也經曰太陽之上寒氣治之中見少隂又曰少隂之上熱氣治之中見太陽少隂君火也位南方太陽寒水也位北方水與火相配故太陽與少隂合而心與小腸腎與膀胱所以相為表裏也盖木位東方則陽之中也金位西方則隂之中也土位中央則隂陽之中也水位北方則隂之正也火位南方則陽之正也凡隂陽中則和和則相生故金木火土以相生而合隂陽正則相配故水火以相配而合相生而合者所謂同類而相感也相配而合者所謂異類而相感也故經曰水火者隂陽之徴兆金木者生成之始終盖水火者日之與月坎之與離而男之與女也萬物之所以有也金木者因其有而生成始終之而已矣於徴兆則以相配言之於生成則以相生言之亦其理也又水火譬之則夫婦也金木火土譬之則父子也夫婦以異而相合父子以同而相合有夫婦然後有父子有水火然後有金木四者具然後有土同類雖殊其合一也嗚呼隂陽之為道博而要小而大數之可十者推之可百數之可千者推之可萬萬之大不可勝也然其要一也故逺之於天地近之於父子之間又其悉也至於言笑飲食莫不具而有焉茍直而推之曲而求之則何所而不得也雖然今之所謂學醫者惡足以語此哉淮海集巻二十五欽定四庫全書淮海集巻二十六宋秦觀撰
