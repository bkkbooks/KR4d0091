body:
  text: 春日雜興十首飄忽星氣徂青陽廹遲暮鳴飛各有適赤白紛無數雨砌墮危芳風軒納飛絮褰幃香霧横岸幘雲峰度林影舞䆫扉池光染衣屨參差花鳥期蹭蹬琴觴趣撫事動幽尋感時遺近慕秣馬膏余車行行不周路結髪謝外好僶俛希前修繆挾江海志耻為升斗謀齞歴難刻畫賤貧多釁尤發軔皆伊闕解驂憇䢴溝丹鈆費永晷麴蘖敺深愁璧月鑒簾櫳珠星絡梧楸泯泯渠水駛霏霏花霧浮公子悵何許撫膺徒離憂潭潭故邑井猗猗上宮蘭不食自清渫莫服更幽閒志士耻弱植巻跡甘饑寒佳晨追良覿觸物懸悲端川途𦕈囘逺經歲曠音翰豈不慕裘馬詭得非所安蟬冕多怵廹繩樞尠憂患枉㝷竟何補方枘誠獨難吳㑹雖褊小海濱富竒峰天雞一號呌劒㦸明遥空谿谷相徑復深林杳攅叢猿吟虎豹啼雲氣迷西東中有遯世士超然閟孤蹤被蘭服明月起坐松聲中夜鍜吸沆瀣朝瑟庇青葱騎星友元氣巢許安可同俛眄區中人飛埃集毛鋒問津或不繆從子游鴻䝉東方有美人容華茂春粲抱影守單棲含睇理哀彈聲意一何切所歡邈雲漢徒然事膏沐孰與徂昬旦㣲誠浪自持嘉月忽復晏巧轉度虛櫺飛紅觸幽幔歲歲芳草滋夜夜明星爛合并㑹有時索居不必歎寢瘵倦文史駕言從遨嬉颸風舉遥溆規日麗清漪含桃粲朱實杜若懷碧滋娉娉弱絮墮圉圉文魴馳明霞廓逺矚哀禽攪離思縟草天際合孤雲川上移寛閑絶輪鞅重複多路岐信美難久佇歸歟從所治昔我遊京室交通五陵間主客各英妙袍馬相追攀千金具飲啜百金雇吹彈纓弁羅廣席當頭舞交竿鮮粧耀淥酒采纈生風瀾燈燭暗夜艾士女紛相班歡娛易徂歇轉眄如飛翰亹亹負孤願離離銜永歡山鳥窺茗飲簷花笑蔬飱棄捐勿重陳事定須盖棺客從逺方來遺我昭華管吹之動人心異境生虛窽磝磝青嶂横泱泱春溜漸馬蹄交狹邪車轂錯平坦士女競芳辰禽魚䕃修竿依㣲認睇笑淩沒見纎短停吹歘泯滅耽耽復空館靈物信所珍顧恨知音罕桃李用事辰鮮明奪雲綺繁華一朝去黙黙慚杞梓時徂鷹化鳩地遷橘為枳獨有羡門生後天猶一作常不死藝籍燔祖龍斯文就淪喪帝矜黔首愚諸雋一作雄出相望楊馬操宏綱韓柳激頽浪建安妙謳吟風槩亦超放玉繩帶華月艷艷青㝠上奕世希末光經緯得無妄兒曹獨何事詆斥㡬覆醬原心良自誣猥欲私所尚螳蜋拒飛轍精衛填溟漲咄咄徒爾為東海固無恙鵷鸞日彫滅黄口紛冗長投袂睇層霄兹懷誰與亮和孫莘老題召伯斗野亭淮海破冬仲雪霜滋不平菱荷枯折盡積水寒更清輟棹得佳觀湖天繞朱甍信美無與娛濁醪聊自傾北眺桑梓國悠然白雲生南望古刋溝滄波帶蕪城村墟翳茅竹孤烟起晨烹簷間鳥聲落客子念當行攬衣視日景薄隂漏㣲明何時復來遊春風發鮮榮孫莘老倡云淮海無林邱曠澤千里平一渠閑防潴物色故不清老僧喜穿築比戸延朱甍簷楯斗杓落簾幃河漢傾平湖杳無涯湛湛春波生結纜嗟已晚不見芙蓉城尚想紫芡盤明珠出新烹平生有㣲尚一舟聊寄行遇勝輒偃蹇霜鬚刷澄明可待齒牙豁歸歟謝浮榮詩黄魯直和云結謝公所築埭未歎曲池平蘇州來賦句與秋氣清構擅空闊湖光浮棟甍維斗天司南其下百瀆傾貝宮産明月含澤遍諸生盤薄淮海間風烟浸十城籟簫吹木末浪波沸庖烹我來抄摇落霜清見魚行白鷗逺飛囘得我若眼明佳人歸何時觧衣繞廂榮蘇子瞻和云落帆謝公渚日脚東西平孤亭得心憇暮景含餘清坐待斗與牛錯落掛南甍老僧如宿昔一笑意已傾新詩出故人舊事疑前生吾生七往來送老海上城逢人輒自哂得魚不忍烹似聞績溪老復作東都行小詩如秋菊艶艶霜中明過此感我言長篇發春榮思蘇子由和云扁舟未得觧坐待兩閘平濁水汙人野寺為我清昔遊有遺詠枯墨存髙甍故人獨未來一樽誰與傾北風吹㣲雲暮寒依月生前望䢴溝路却指鐵甕城茅簷卜兹地江水供晨烹試問東坡翁畢老幾此行奔馳力不足隱約性愈明早為歸耕計免慙老僧榮張琬和云危維舟得古寺望逺天四平晴日暉暉散晚風泠泠清亭下瞰野層閣髙連甍起望斗與牛淮海相奔傾往來誰百年今昔我平生悠悠何所寓臺上多化城與其逐影死寕似不鳴烹咄哉應有止老矣將安行中庭柜子落丈室霜月明此意竟蕭條猶然笑安榮中張芸叟和云我登甘棠埭所向殊未平舟行汙地頓失江湖清蛙聲亂僧唄䲭吻赫市甍意同伯喈死苟與衛士傾開池種白蓮壘石擬三生猶淹南斗墟終逺北斗城設我紫藕供報之白茅烹三年猿鶴友萬里秦梵行秋風隴首至落日淮南明寄言懷土士慎勿慕官榮和虛飄飄虛飄飄虛飄飄風寒飄絮浪春暖履冰橋勢緩霜垂霰聲乾葉下條雨中漚㸃没流水風裏綵雲鋪逺霄虛飄飄比時光影猶堅牢魯直倡起虛飄飄虚飄飄花飛不到地虹漫成橋入夢雲千疊遊空縧萬條蜃樓百尺聳滄海鴈字一行書絳霄虛飄飄比人生命猶堅牢子瞻和虛飄飄虛飄飄畫簷蛛結網銀漢鵲成橋塵積雨梧葉霜飛風栁條露凝殘㸃見紅日星曵餘光横碧霄虚飄飄比浮名利猶堅牢和游金山和子由同彦瞻江流㑹揚子􅍅􅍅東南鶩海門劃前開金山屹中據鼓鍾食萬指金艧棲千柱夜庭游月波曉觀搏香霧天清猿鳥哀風暗魚龍怒雲物横古今濤波閱晨暮三州氣色來上下端倪露偉哉元氣間此勝知誰聚念昔憇精廬登臨輒忘去汲新試團月飯素羮魁芋妙興入芳藤真境在芒屨别來星暑换寤寐經從處忽䝉珠璧投了與雲巒遇幽光烱肝肺爽氣森庭戸區中多滯念方外饒竒趣寄語山阿人泠然行復御陪彦瞻遊金山子由詩云揚州望金山隱隱大如幘朅來長江上孤髙二千尺僧居厭山小面面貼蒼石虛樓三百間正壓江潮白清風歛霽霧曉日曜金碧直侵魚龍居似有鬼神役我行有程度欲去空自惜風吹渡江水山僧午方食波瀾洗我心笋蕨飽我腹平生足遊衍壯觀此云極鐡甕本誰安海門復誰植東南遞隱見遥與此山疋兹遊㡬不遂深愧幕府客歸時日巳暮正值江月黒顧視天水并坐恐星斗濕使君何時罷登覽不可失子由同彦瞻遊金山子由枉詩卒章有使君何時罷登覽不可失之句因繼賦一􅈡子駿蓬萊二神山横絶倚鼇背鼇傾海水動一峰失所在飛來大江心盤礴㡬千載化為金僊居龍象錯朱貝夙昔愛山水江湖不蹔忘君前或剖竹匏繫古維揚隱然勝絶境旦旦遇相望不意二君子招携一葦航髙攀躡雪梯濶視瞰溟漲潮來隱天地萬里巻白浪波清霄漢淨澄澈迷下上更深月正中山影杳無象蛟鼉四面穴形勢三州壯融結既難窮丹青殊莫狀蘇侯韻髙逺邵子雅趨尚奇觀極無邉幽尋端未放浮生閱流水清話造方丈畢景趣言歸侵星摇兩槳武功真好竒落筆掃珠璣持語淮南守兹遊不可遺君恩早晚東南下一棹扁舟信所之同子瞻端午日遊諸寺賦得深字太史抱孤韻暢懷在登臨别乗載鄒枚佳辰事幽尋參差水石瘦窅窕房櫳深清磬發䟱箔妙香横素襟復登窣堵波環囬矚􅋂崟雙溪貫城郭暝色帶孤禽凉飈動爽籟薄雨生㣲隂塵想澹清漣牢愁洗芳斟揮箑訂往古援毫示來今愧無刻燭敏續此金玉音子瞻詩云適肩輿任所遇勝輒留連焚香引幽步酌茗開淨筵㣲雨止還作小䆫幽更妍盆山不見日草木自蒼然忽登最髙塔眼界窮大千卞峰照城郭震澤浮雲天深沉既可喜曠蕩亦所便幽尋未云畢墟落生晚烟歸來記所歴耿耿清不眠道人亦未寢孤燈同夜禪寄陳季常一鉤五十犗始具任公釣掲竿趣灌瀆與爾不同調先生本西蜀俠氣見英妙哀憐世間兒細黠似黄鷂侍童雙擢玉鬢髪光可照駿馬錦障泥相隨竆海嶠平生擕手好十七登廊廟小生相吏耶徒枉尺書召暮年更折節學佛得心要鬻馬放阿樊幅巾對沈燎泠泠屋外泉兀兀原頭燒欲知山中樂萬古同一笑淮海集巻三欽定四庫全書淮海集巻四宋秦觀撰
