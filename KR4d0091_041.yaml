body:
  text: 卷之一詩進南郊慶成詩幽眠越王隕星石山陽阻淺次韻參寥華者送洪景之循州參軍茶茶臼石魚劉公幹贈醫者鄒放贈張潛道荷花䤍曾逢原參寥見寄吳興道中無題二首喜雨得城字東城被盜得世字夢伯收文公送佛印流觴亭蓬萊閣送羅正之提刑卷之二詩秋夜病起懷端叔送孫誠之尉北海抱甕讀列子和顯之長老清夜南池和王定國宿金山别賈耘老李端叔見寄次韻陳令舉妙奴詩自警陪李公檡觀金地佛牙雪浪石和蔡天啓贈文潛之什早春赴杭倅至汴上作無題織錦圖五首卷之三詩次韻孔彥常曝書次韻蘋老送陳太初道録䁬蘇子瞻次韻安州晚行題五柳亭觀寶林塔張燈還白湯泉十四韻次韻辨才次韻公闢二首次韻公闢即席呈太虛次韻公闢蓬萊閣次韻公闢聞角寄公闢呈公闢奉和莘老中秋致語致政通議口號致語口號悼玉子開五首卷之四詩秋興九首擬玉子川擬韓退之擬杜子美擬孟郊擬杜牧之擬韋應物擬白樂天擬李賀擬李白金山睌眺病中聞鴈冬蚊白馬寺晚泊霅上感懷和程給事判六首處州間題春詞五首秋詞二首齊逸亭春日雪中寄丹元子宿乾明方丈新開湖送孫誠之呈李公擇落日馬上次韻參寥三首和書賀袐監堂三首和書觀妙庵早春題僧舍盆池鈞翁賞酴醿有感首夏卷之五雜文代蘄州謝上表代程給事乞祝聖表坤成節功德丈疏代答范相公啓篔孫中丞啓賀吏部傅侍郎啓代何提舉賀樞密啓賀門下吕僕射啓謝顂州吕吏部啓答丁彥良書與許州范相公書祭監稅主簿文卷之六雜文雜説通事説𧖟書種變時食制居化治錢眼鎖星添梯車禱神戎治書丁彥良明堂議銯龍井辨才事書王氏齋壁題彭景山傳神淮海間居集序淸和先生傳法雲長老然香會疏請立程給事祠堂狀精騎集序故龍圗閣直學士中大夫知成都府李公行狀淮海後集目録
