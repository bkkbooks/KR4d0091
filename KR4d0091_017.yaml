front:
  text: 淮海集巻之十七
  hash: sha256:5228c0ccb23891618de37da3f43fb3e687daba74406d8ec590ba60e6b6a17587
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_017-1a}
body:
  text: 秦觀少㳺進䇿兵法臣聞御兵者將而將所以御之者法兵不得將與無兵同將不知法與無將同盖㫁木為棋刓革為鞠亦皆有法况於帥無罪之人披堅執銳從事於萬死一生之地哉兵之有法猶人之有精神魂魄也精神失守䰟喪而魄奪則雖有七尺之軀死無日矣何則所以使形者亡也故知兵有法正行無間不知而將是謂妄行古之論兵者多矣大率不過有四一曰權謀二曰形勢三曰隂陽四曰技巧然此四術者以道用之則為四勝不以道用之則為四敗事同而功異不可不察也何以知其然也昔孫臏伏萬弩於馬陵之下魏軍至而伏發龎㳙死焉王恢伏車騎材官三十萬於馬邑之旁匈奴覺之而去恢以自殺此則用權謀之異也馬服君救閼與既遣秦間巻甲而趨之二日一夜遂破秦軍曹公追劉先主一日一夜行三百里敗於烏林此則用形勢之異也西伯將獵卜之曰獲霸王之輔果得太公望而克啇漢武卦諸將貳師最吉因以為將卒䧏匈奴此則用隂陽之異也申公巫臣教吴以車戰呉是以始通上國房琯用車以抗禄山賊投芻而火之王師奔潰此則用技巧之異也豈非以道用之則為四勝不以道用之則為四敗乎雖然所謂道者何也治心養氣而巳矣盖心不摇扵死生之變氣不奪於寵辱利害之交則四者之勝敗自然洞見如形影入於水鏡之中是兵法之大要也夫鏃金羽鶚以為矢傅膠合􅃮以為弓天下所同也而羿為善射服在箱驂在旁制以銜轡之利而加以鞭䇿之威天下之所同也而王良為善御是何也其所以用之者道也今世之學兵法者肩相摩𬒮相屬雖其精粗不同然率向之所謂四術而已至於治心養氣之道則以為書生之語而不與焉嗚呼是守弓矢與馬而欲為羿王良也盜賊上臣聞治平之世内無大臣擅權之患外無諸侯不服之憂其所事乎兵者夷狄盜賊而已夷狄之害士大夫講之詳論之熟矣至於盜賊之變則未嘗有言之者夫豈智之不及哉其意以為不足恤也天下之禍嘗生於不足恤昔秦既稱帝以為六國已亡海内無足復慮為秦患者獨胡人耳於是使䝉恬北築長城却匈奴七百餘里然而陳勝吴廣之亂乃起扵行伍阡陌之間由此言之盜賊未嘗無也夫平盜賊與攘夷狄之術異何則夷狄之兵甲馬如雲矢石如雨牛羊橐駞轉輸不絶其人便習而整其器犀利而精故方其犯邊也利速戰以折其氣盜賊則不然險阻是憑抄奪是資亡命是聚勝則烏合非有法制相縻敗則獸遯非有恩信相結然掲竿持挺郡縣之卒或不能制者人人有必死之心而已故方其群起也速戰以折其氣勿廹以携其心盖非速戰以折其氣則緩而勢縱非勿廹以携其心則急而變生今夫虎之為物嘯則風生怒則百獸震恐其氣暴悍可殺而不可辱故捕虎之術必先設機穽旁置網罟撞以利㦸射以强弓鳴金皷而乗之不旋踵而無虎矣至虵與䑕則不然雖其毒足以害人而非有風生之勇其貪足以蠧物而非有震恐百獸之威然不可以驟而取者以其急則入於窟穴而已故捕虵䑕之術必環其窟穴而伺之薫以艾注以水彼將無所得食而出焉則尺捶可以制其命夷狄者虎也盜賊者虵䑕也虎不可以艾薰而水注虵䑕不可以弓射而㦸撞故曰平盜賊與攘夷狄之術異也雖然盜賊者平之非難絶之為難平而不絶其弊有二不可不知也盖招䧏與竆治是已夫患莫大於招降禍莫深於竆治何則凡盜賊之起必有梟桀而難制者追討之官素無竒略不知計之所出則往往招其渠帥而降之彼姦悪之民見其負罪者未必死也則曰與其俛首下氣以甘饑寒之辱孰若剽攘攻刼而不失爵禄之榮由此言之是乃誘民以為亂也故曰患莫大於招降凢盜賊之首既已伏其辜矣而刀筆之吏不能長慮却顧簡節而踈目則往往竆支黨而治之廹脅之民見被汚者之不免也則將曰與其嬰錮金木束手而受斃孰若遯逸山海脱身而求生由此言之是驅民以為亂也故曰禍莫深於竆治且王者所以感服天下者惠與威也仁及有罪則傷惠戮及不辜則損威威惠兩失而欲天下心畏而力服尭舜所不能也夏書曰殱厥渠魁脅從㒺治舊染汚俗咸與維新蓋渠魁盡殺而不赦則足以奪姦雄之氣脅從汚染不治而許其自新則足以安反側之心夫如是天下之人孰肯舍生之塗而投必死之地哉嗚呼先王已亂之道可謂至矣盜賊中臣聞自古盜之所以興皆出於仍嵗水旱賦歛横出徭役數發故愚民為盜弄兵於山海險阻之間以為假息之計自陛下即位以來輕徭役薄賦歛善氣既應年糓胥熟是宜外户不閉道不拾遺而郡縣之間枹皷或驚逰徼旁午未見休已者何也以臣思之盖不任吏之弊也夫任法不任吏為弊至多而於盜賊尤甚何則今盜賊之法可謂宻矣强盜得財滿匹及傷人者輙棄市殺一家三人以上若支解人者論如律案問欲舉者得减重論殺併徒伴及告獲它盜者䧏除其罪為之囊槖通行飲食者從末减若文致於法而人心不厭者輙讞考之若此之類與夫捕獲亡逸賞罰之格凢數十條然皆畫一之制也夫民之所以為盜賊者其情不一或閭里惡少自負其氣椎埋皷鑄不復齒於平人或驕兵惰卒竆苦無聊亡命嘯聚或執左道轉相誑惑以為徒黨或困於饑寒迫於逋負剽奪衣食以延一日之命或故吏善家子失計隨流輕舉妄動若此之類特盜賊之大情耳其間夤縁曲折可矜可疾者盖不可勝數夫以畫一之法御不可勝數之情而吏莫敢為輕重則宜殺而生宜生而殺者有之矣吏果於生殺而不察其宜則威惠不行盜賊所以充斥也臣嘗觀古之能吏盜賊之課尤異者其術不過數端而已盖有使吏民雜舉少年惡子鮮衣凶服之人悉籍記之一旦收捕納於虎穴中者尹賞之治長安也有明設購賞令相斬捕吏追胥有功而上名尚書調𥙷縣令者張敞之治膠東也有耳目具知主名區處竆里空舍坐語未訖捕吏已至者趙廣漢之治京兆也有擇縣之豪傑用以為吏一旦竊發則移書詭責取辦其人者朱博之治渤海也有置正五長閭里阡陌有非常吏輙聞知姦不得舍者韓延夀之治頴川也省遣發之兵罷捕逐之吏單車獨行務以徳化撫之而安之者龔遂之治瑯琊也此數子者可謂善治盜賊矣然以今日之法繩之則彼將皇恐救過之不暇尚何功名之有哉何則非賊殺不辜則故縱反者也夫以龔遂韓延夀張敞朱博趙廣漢尹賞為吏於今之時猶不能最盜賊之課又可責於常人乎為今計者莫若寛法而任吏稍重郡守之權責以大綱而略其小過凡重法之地皆慎擇其人聼於法外處置盜賊有司覆按不得劾以出入其所賜緝捕緡錢使得益以醸酒賞格之外得酒數百石亦足以布設耳目而畜養爪牙如此則守臣之威權稍重而盜賊可以清矣王嘉曰國家有急取辦於二千石尊重難危乃能使其下嗚呼二千石能使其下則雖有黄巾赤眉無足畏也盜賊下臣聞盜賊之起小則蜂屯蟻聚虜掠閭里大則擅名號攻城邑取庫兵釋死罪殺掠吏民然皆無足深慮如臣前説計足以辦所可深慮者其間有豪俊而巳何則人之有豪俊猶馬之有驥犬之有盧雖上觀下獲一日千里而縱踶嚙之變亦可畏也昔周亞夫得劇孟喜曰吳楚舉大事而不求劇孟吾知其無能為也天下騷動大將得之隱如一敵國云唐縱朱克融北還盧龍未㡬軍亂遂復失河朔夫孟克融皆匹夫耳而得失去就之間繫吴楚之成敗為河朔之存亡以此言之盜賊之間而有豪俊豈不為可深慮也㢤臣以為銷亡大盜之術莫大乎籠取天下之豪俊天下豪俊為我籠取則彼卒材䑕軰雖有千百為群不足以置齒牙之間矣國家取人之制其選髙者惟制䇿進士夫豪傑之士固有文武縱横之間無不可者椎魯少文獨可以任之大事者使天下豪傑皆文武縱横之才二科足以取之若有椎魯少文之人則不可得而取之矣是制䇿進士所得之外不能無遺材也臣嘗為朝廷患之未知所處有搢紳先生告臣曰漢法郡縣秀民推擇為吏考行察廉以次遷𥙷或至扵二千石入為公卿古者不専以文詞取人故得士為多黄覇起扵卒史薛宣奮扵書佐朱邑選於嗇夫邴吉出於獄史其餘名臣循吏由此而進者不可勝數唐自中葉以後方鎮皆選列校以掌牙兵是時四方豪傑不能以科舉自達者皆争為之往往積功以取旄鉞雖老姦宿盜或出其中而名卿賢將如髙仙芝封常清李光弼來瑱李抱玉叚秀實之流所得亦巳多矣王者用人如江河江河之所趨百川赴焉蛟龍生焉及其去而之他則魚鼈無所還其體而鯢鰍為之制今世胥吏牙校皆奴僕庸人者無他以朝廷不用也今欲用胥吏牙校而胥吏行文書治刑獄錢糓其勢不可棄鞭撻鞭撻一行則豪傑不出於其間故凡刑者不可用而用者不可刑朝廷若採唐之舊制使諸路監司郡守其選士人以𥙷衙職課之以鎮税埸務督捕盜賊之類有公罪則贖焉使長吏得薦其材者第其功閥書嵗月使得出仕比任子而不以流外限其所至朝廷察其尤異者擢用數人則豪傑英偉之士漸出於此塗而姦猾之黨可得而籠入也臣嘗思之逆銷盜賊之術未有以過於此者竊取其説以獻惟陛下裁擇之綖按富鄭公蘇長公論彌盗嘗有此說秦公謂有搢紳先生如臣者其實指蘇公殆非設言也淮海集巻之十七
