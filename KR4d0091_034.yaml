front:
  text: 淮海集卷之三十四贊跋
  hash: sha256:82266479b29ad17b6dc7e2be07787a70cc0af21f8d2dd5340f45d191a467dffa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_034-1a}
body:
  text: 秦觀少遊龍丘子真贊惟龍丘子以大塊為輿元氣為駒放意自娛逰行六區世莫我踈亦莫我親追配古者葛天之民李潭漢馬圖贊前一馬驪就樹摩癢百駭佳快厥意可想中間四馬或顧或嬉飲嚙自如不相瑕疵最後一騂尾鬛奮驚背而號鳴若聞其聲寬間之鄉水逺草長無羈無縶樂未渠央南都法寶禪院一長老真贊欲老不老八反九倒昔是西庵今為法寶文雅臺邊清冷池畔大地山河且舉一半建隆慶和尚真贊大因緣十八年結跏座帶刀眠汝鼻孔未遼天呼我作無事禪書王蠋後事文古之世有不去商紂之虐君以從周武之聖臣而守死西山者其人曰伯夷伯夷者孔子稱為仁孟子稱為聖不在乎學者能道之也古之人有不愛刳身戮尸之患以求盡忠極節于其君者其人曰比干比干者孔子稱為仁孟子稱為賢不在乎學者能道之也古之人有不愛將軍之印不願萬家之封引身即死以明君臣之大義而求自附于伯夷比干之事者其人曰王蠋王蠋無孔子孟子之稱而其名亦不獲自附于伯夷比干焉學者亦不可不道也當燕人之破齊齊王走莒也臨災之地汶篁之疆為齊者無幾也齊之臣平居腰黃金結紫綬論議人主之前者一旦狼顧鳥竄分散四出不逃而去則屈而降無一人為其君出身抗賊以全齊者方是時王蠋齊之布衣也積德纍行退耕於野口未嘗食君之粟身未嘗衣君之帛獨以謂生於齊國世為齊民則當死於齊君乃奮身守大節守區區之畫邑以待燕人燕人亦為之却三十里不敢近其後燕將畏蠋之賢念蠋之在而齊之卒不滅也數為甘言啖之曰我將以子為將封子以萬家不者屠畫邑蠋曰忠臣不仕二君正女不更二夫國亡矣蠋尚何存今劫之以兵誘之以將是助桀為虐也與其無義而生固不若烹乃經其頭於木枝自奮絶脰而死士大夫聞之皆太息流涕曰王蠋布衣也義不北靣於燕况在位食祿者乎於是乃相與迎襄王於莒而齊之殘民始感義奮發閉城城守人人莫肯下燕者故莒即墨得數戰不亡而田單卒能因其民心奮其智謀却數萬之衆復七十餘城王蠋激之也始豫讀史記至此未嘗不為蠋廢書而泣以謂推蠋之志足以無憾於天無怍於人無欺於伯夷比干之事太史公當特書之屢書之以破萬世亂臣賊子之心奈何反不為蠋立傳其當時事迹乃微見於田單之傳尾使蠋之名僅存以不失傳而不足以暴天下甚可恨也且夫聶政荆軻之匹徒能瞋目攘臂奮然不顧以報一言一飯之德非有君臣之讎而懷匕首袖鐵椎白日殺人以喪七尺之軀者太史公猶以其有義也而為之立傳以見後世後世亦從而服之曰壯士蘇秦張儀陳軫犀首左右賣國以取容非有死國死君之行朝為楚卿暮為秦相不以慊於心太史公猶以其善説也而為之立傳以見後世後世亦從而服之曰竒材以至韓非申不害之徒刑名之學也猶以原道附之老𥅆淳于髠鄒衍田駢慎到接豫環騶奭之徒迂闊之士也猶以為多學而附之孟子然則世有殺身成仁如王蠋之事者獨不當傳之以附于伯夷之後乎噫昔者夫子作春秋其大意在于正君臣嚴父子使當時君臣正父子嚴則春秋不作矣後世愚夫庸婦一言一行近似者皆當筆之春秋况夫卓然有補世教者得無特書之屢書之乎此豫所以為太史公惜也書輞川圖後元祐丁卯余為汝南郡學官夏得腸癖之疾卧直舍中所善髙符仲携摩詰輞川圖視余曰閲此可以愈疾余本江海人得圖喜甚即使二兒從旁引之閲於枕上恍然若與摩詰入輞川度華子岡經孟城坳憩輞口莊泊文杏館上斤竹嶺並木蘭寨絶茱茰沜躡槐陌窺鹿柴寨返于南北垞航欹湖戲栁浪濯欒家瀨酌金屑泉過白石灘停仍里館轉辛夷塢抵漆園幅巾杖屨棊奕茗飲或賦詩自娛忘其身之匏繫於汝南也數日疾良愈而符仲亦為夏侯太沖來取圖遂題其末而歸諸髙氏髙無悔跋尾無悔將家子為人沈鷙有竒略習知邉事結髮與羌人戰大小數十遇未嘗敗北斬級捕虜獲牛馬槖馳動以萬計與其兄館使皆為邉人所推號二髙云元豐五年延師與二詔使城永樂問於無悔對曰永樂羌人必爭之地而無險阻無水泉一日冦至何以能守詔使大怒以為沮議遣歸延安既城永樂羌人數十萬奄至城中戍者才三萬人館使謂詔使曰虜衆十倍於我若其盡至不可當也我嘗破其衆於無定河川今前隊囂甚有懼我心及未定擊之雖衆可走詔使不許曰王者之師不鼓不成列館使以足頓地曰事去矣已而城外圍數重諸將出戰無生還者俄奪我水寨城中穿井數十皆不獲泉士卒飢渴困甚不能執兵城遂陷二詔使及館使皆死之於是議者皆以二髙料敵有古良將之風惜乎詔使之不能用也元祐二年余為汝南學官被詔至京師以疾歸無悔亦以失邉帥意徙內地鈐轄此郡兵馬相從于城東古寺日飲無何絶口不挂時事余酒酣悲歌聲震林木無悔嗔目熟視髮上衝冠人多怪之余二人者自若也無悔一日出諸公所與尺牘自韓魏公以下百餘番屬余跋尾余欣然濡筆因以永樂之事載之庶幾見諸公所以稱道無悔者非虛語也裴秀才跋尾裴本秦之别姓自漢以來世有顯者在唐尤為望族五房之裴為宰相者十有七人裴氏衣冠於斯為盛而東眷房晉公度實唐第一等人君晉公之裔孫也少篤學鋒氣鋭甚頗有志於天下之事巳而舉進士屢不中乃嘆曰人生如寄耳用是區區者為哉于是退居許之陽翟葛巾藜杖日閲佛書惟以專精神養夀命為事元祐三年冬君之弟朝散君通判蔡州君自陽翟籃輿過之踰月而去將行謂朝散君曰吾絶意世間事久矣比閲簏中故人書札見麻溫故郎中昔所贈詩憮然感心不能自巳聞秦少遊方為此郡學官願因弟丐一言庶幾異時有知我者余聞而嘆之昔馬援南征謂官屬曰吾從弟少遊常哀吾慷慨多大志曰士生一世但取衣食裁足乘下澤車馭款段馬為郡掾吏守墳墓鄊里稱善人斯可矣致求贏餘但自苦耳當吾在浪泊西里虜未滅之時下潦上霧毒氣薰蒸仰視飛鳶跕跕墮水中卧念少遊平生時語何可得也朝散君起家四十為郎聲聞籍甚所謂功名富貴蓋未易量而君羸老疾病卧于衡茅之下氣息奄奄僅屬既不求人知人亦莫君知者弟兄出處異矣然以二馬觀之二裴之事孰為得失哉麻君慱雅君子其所以稱道君者宜不謬後之君子讀其詩者可以知君少時之志而讀余文者可以識君莫年之心云録壯愍劉公遺事壯愍劉公未顯時凡三與賊遇始為常州無錫縣尉有梟賊劉鐵槍者起浙西轉擾諸郡捕盜官不能制公一日霑醉夜歸適報鐵槍入境遂乘酒赴之與賊接戰手殺鐵槍及其徒五人餘悉散走部使者上其功改大理評事後知果州南充縣丁先太師憂解官東還道出興州境上遇群賊奄至掠其行李發之惟文書百餘帙布數匹賊魁詈其徒曰此窮官人何足劫公時在後聞變馳至瞋目叱之賊衆披靡俄發三矢輒斃三人餘遂遁去雍帥冦萊公表其事詔遷官知瀘州後移倅汝隂過安陸遇故人留飲家屬先行復遇盜劫倒槖得一銀扣劒洎一䃋石腰帶持去後賊敗於齊安獄具法歸贓於主有司以聞時陜西轉運使員缺執政方以公進擬真宗曰是人為郡守而止有一䃋石帶廉可知也遂除公行狀墓志及國史本傳皆載無錫及興州事獨安陸一節遺而不書元祐壬申歲公之子隰州使君某與余會于京師嘗道公之遺事具以天禧中劄示余因論次之附於中劄之後以補史氏之缺云淮海集卷之三十四
