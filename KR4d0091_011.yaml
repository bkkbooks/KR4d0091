front:
  text: 淮海集巻之十一
  hash: sha256:da89e10e155f50e2f516718b503d43ec1a9714e61d0c8f8d562dd63dd9d33424
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_011-1a}
body:
  text: 秦觀少㳺四絶意録者失其序耳此贈道流盖有四時隂風一夜攪青㝠風定霏霏霰雪零遥想玉真清境上白虛光裏誦黄庭其四夜深樓上撥書眠天在欄干四角邉風拂亂雲毫髪盡獨留璧月向人圓其二天風吹月入欄干鳥鵲無聲子夜䦨織女明星來枕上了知身不在人間其三本是匡山種杏人出山來事碧虛君上清欲問因何事請看先山十丈文其一奉别牛司理堂堂先德擅才名詞賦髙凌墨客卿之子妙齡初筮仕好修文史繼家聲送酒與泗州大守張朝請莫笑杭州别駕村昔曾柱下數承恩而今雖是江湖吏猶有當時七字尊題郴陽道中一古寺壁二絶門掩荒寒僧未歸蕭蕭庭菊兩三枝行人到此無腸斷問爾黄花知不知哀歌巫女隔祠叢飢䑕相追壞壁中北客念家渾不睡荒山一夜雨吹風又别牛司理半年淹䘏越溪濵好愛如君只數人觧手莫令書信斷故園桑梓幸相鄰和工部侍郎新章甍棟相連數畆中出門遥見大明宮朝元雖共浮丘伯煑茗還同桑苧翁題金華山寺壁鸞鶴同為汗漫游天風吹散下滄洲金華有路通元氣水繞髙寒不斷流次韻出省馬上有懷蔣頴叔新淬魚腸玉似泥將軍唾手取河西偏禆萬戸封龍額部曲千金賜褭蹄制詔行聞降紫泥簮花且醉玉東西羗人誰謂多籌策止有黔驢技一蹄憶蔣征西碧幢紅斾出闗去一路東唱首云春雪京城一尺泥並鞍還已西豈比元戎碧油下貔貅繞帳馬千蹄風送馬蹄不論埃壒與塗泥封印還家日元祐三年余被召至京師從翰林蘇先生過興國𥙿室院始識汶師後二年復來閱諸公詩因次韻聊移小榻就風廊卧乆衣巾帯佛香白髪道人還省記前年引去病賢良客有遺予以假山石盆池者聞陳元發有石菖蒲作此詩乞之瑟瑟風漪心為清更窺􅍶崒眼增明可憐一片江山様只欠菖蒲十數莖興國浴室院獨坐時兒子湛就試未出滿城車馬没深泥院裏安閑緫不知兒軰未來鈎箔坐長春花上雨如絲題趙團練畫江干曉景四絶本自江湖客宦㳺常苦心看君小平逺懷我舊登臨鳥外雲峰晚沙頭草樹晴想初揮灑就侍女一齊驚公子歌鍾裏何從識渺茫惟應斗帳夢曾到水雲鄉曉浦烟籠樹春江水拍空煩君添小艇畫我作漁翁夢中得此縞帶横秋匣寒流炯暮堂風塵如未息持此奉君王寧浦書事六首揮汗讀書不已人皆怪我何求我豈更求榮逹日長聊以銷憂魚稻有如淮右溪山宛類江南自是遷臣多病非干此地烟嵐寒食山州百鳥喧春風花雨暗川原因循移病依香火寫得彌陀七萬言留别平闍黎縁盡山城且不歸此生相見了無期保持異日蓮花上重說如今結社時紹聖元年觀自國史編修官䝉恩除館閣校勘通判杭州道貶處州管庫三年以不職罷將自青田以歸因往山寺中修懴日書絶句扵住僧房壁郡後學張綎校正淮海集巻之十一
