front:
  text: 淮海集卷之五古詩
  hash: sha256:9d53df054b94c4737555d42f47adba755aabe0d099cf8da2e037377f1c87e325
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_005-1a}
body:
  text: 秦觀少遊贈蹇法師翊之天都九經緯人物如紡績豈無仙聖遊但未見高識蹇師蜀方士鬼物充服役朅來長安城摩挲金銅狄大蛇死巳論葛陂囚且釋是事何足云聊爾恤艱厄方從馬明生西去錬金液丹成得度世造化為莫逆豫亦江海人名宦偶牽迫投劾去未能見師三歎息送劉貢父舍人二首虎去藜藿採珠在其川媚君子一詘信實繫天下事念昔元豐間公𥘉謫南裔託詞弔湘水聞者為心醉踰年憸臣逐國老起相繼除公守襄陽士始有生意兹焉歸法從乃是朝廷計在公何足云事業本餘棄掖垣美花木入直春正麗同僚看家風立馬揮九制觀也本諸生早與世參商方枘不量鑿交親指為狂末路辱公知賜出非所望相期古人處豈止事文章汝南雖奧區校官實始張解鞅百無有栖栖寄僧坊築室從有徒皆公借餘光一壷千金直所濟在倉黃萬里猶比鄰别離無足傷何以報公德修好以為常南京妙峰亭蘇子瞻題榜王勝之所作王公厭承明出守南宫鑰結搆得崇丘巋然瞰清洛是時謫仙人發􅮾自廬霍郊原春鳥鳴來此動豪酌報投一何富玉按金刀錯新榜揭中楹千載見遠託朅來訪陳迹物色屬搖落人煙隔鳬鴈田疇帶城郭紅蕖隕風漪砂礫卷飛籜青青陵上姿獨汝森自若人生如博奕得喪難前約金鎚𥘉控頥巳復東方作大明升中天龍鸞入階閣深懲漁奪弊法令一刋削斯民如解懸喜氣鬱磅礴公乎數登覽行矣翔寥廓次韻奉酬丹元先生金華𬗋煙客來作牧羊兒至言𥘉無文尋繹自成詩二景入妙解元氣含煙詞憐我鬛蒼浪黃埃眩蟲絲勸解冠上纓一濯含風漪攝身列缺外倒躡蜿蜒鬐維斗錯明珠望舒耿修眉真遊無疆界浩蕩天風吹送裴仲謨君子出于德妙髙如匠石但見廣厦成不見斧斤迹厚為諸兄奉自奉頗云嗇三生陽亢宗薄俗有慙色汝南古佳郡月旦評一易爾來似揚州不辨龍蜥蜴短簿髯參軍喜怒移頃刻正平竟獲免實我文舉力念公多乖隔憂思如紡績耻為兒女仁到此淚橫臆熙朝大烹飪賢者不家食朝為郡縣吏暮作臺省客矧聞諸法從久欲薦言責去去勿重陳九萬自此擊題雙松寄陳季常遙聞連理松託根黃麻城枝枝相鉤帶葉葉同死生雖云金石姿未免兒女情想應風月夕蒲庭合歡聲徐仲車食于學官吏或以為不可欲罷去之太守不聽禮遇如𥘉感之而作許丞老病聾督郵白欲廢賢哉黃次公鑒裁實精詣殷勤謝督郵此丞乃廉吏重聽庸何傷善助無失意古人骨巳朽來者復誰繼仲車天下士固非許丞類至行通神明問學有根柢若充老更聘自革風俗弊太守前巳聞粟帛俄見賜奈何少年子輒效督郵事道喪賢哲窮聞之為流涕人心如其面難以一律揆所望在次公督郵何足議次韻夏侯太沖秀才儒官飽間散室若僧坊靜北窗腹便便支枕看斗柄或時得名酒停午猶中聖醒來復何事秉筆賦秋興焉知懶是真但覺貧非病茫茫流水意會有知音聽鐘鼎與山林人生各天性送張和叔兼簡黃魯直汝南如一器百千聚飛蚊終然鼓狂閙啾啾竟誰聞議郎盛德後清修繼先芬未試霹靂手低回從此君學官冷于水虀鹽度朝曛間蒙相暖熱破憂發孤欣君今又復去冀北遂空群豈無一樽酒誰與通殷勤大梁多豪英故人滿青雲為謝黃叔度鬢毛今白紛題騕裊圖雙瞳夾鏡權協月尾鬛簫森澤于髮鞍銜不施韁復脫旁無馭者氣騰越地如砥平丘隴滅天寒日暮抱飢渴􅋮首號鳴思一發超䡍絶塵入恍忽東門金鑄久銷歇曹霸丹青亦云沒賴有龍眠戲揮筆眼前時見千里骨玉臺閶闔相因依嗟爾龍媒空自奇鸞旗日行三十里焉用逐風追電為和東坡紅鞓帶君不見相如容貌窮不枯卓氏耻之分百奴一朝奉旨使笻筰駟馬赤車從萬夫仲元君平更高妙寄食耕卜霜眉鬚兩川人物古不乏數子風流今可無參軍少年飽經術期作侍中司御壷老披靑衫更矍鑠上馬不用兒孫扶一朝忽解印綬去耻將詩禮攘裙𥜗懸知百年事巳定却笑列仙形甚臞東阡北陌西風入瑞草橋邉人呌呼相見紅圍照白髮頽然醉卧文君壚和王忠玉提刑嵩峰何其高峰髙氣尤淸念昔秋欲老從公峰下行古木上參天哀禽報新晴修塗雲外轉稿葉風中零曛黑度伊水眇然古今情黎明出龍門山川莽難名信美非吾土顧瞻懷楚萍美人天一方傷哉誰目成黃綬我聊爾白鷗公勿驚糟醨可餔啜古人忌偏醒題楊康功醉道士石黃冠𥘉飮何人酒徑醉頽然不知久風吹化石楚山阿藤蔓纒身蘚封口常隨白鶴亦飛去但有衣冠同不朽異物終為賢俊得野老田夫豈宜有華隂楊公香按吏一見遂作忘年友日暮西垣視草歸往往對之傾數斗大夢之間無定論啓毋望夫天所誘榖城或與子房期西域更為陳郍吼我疑黃冠反見玩若此堅頑定醒否何當一笑凌蒼霞顧謝主人聊舉手送蔡子驤用蔡子駿韻越絶山川逺相屬萬壑千巖抱青緑卧龍一峰稱是奇繞趾淸漪如帶束鏡水春生鶂尾銜稽山日暮猿聲續三休上與蓬萊接登眺使人遺寵辱我昔東遊觀禹穴痛飮狂歌得所欲上天何曾有官府鸞鳳日日遭鞭朴僧坊畫壁閲幾遍神妙難忘獨金粟華胥夢斷巳十年又見春風煮餳粥苧羅若耶固依舊可憐雲月誰追逐故人淡泊出天性鷦鷯巢林一枝足不肯絃歌井管庫還同市門隱梅福惟應月下小叢歌尚有哀音傳舊俗飮酒詩四首我觀人間世無如醉中真虛空為消隕况乃百憂身惜哉知此晚坐令華髮新聖人難驟得得且致賢人左手持蟹螯舉觴屬雲漢天生此神物為我洗憂患山川同恍惚魚鳥共蕭散客至壷自傾欲去不容間客從南方來酌我一甌茗我酌𥘉不啜強啜且復醒既鑿渾沌氏遂出華胥境操戈逐儒生舉觴還酩酊竅氏一作雷觴淡如水經年不濡脣爰有擾龍系為造英靈春英靈韻何高蒲萄難為鄰他年血食汝應配杜康神艇齋并序豫以典校史領倅錢塘邂逅得友丁君彥良于陳留官舍丁君彥良年少氣雋誦詩文亹亹不休動有過人語深恨得之晚也臨分以艇齋詩速豫賦為寄題一篇平生樂漁釣放浪江湖間兀兀寄幽艇不憂浪如山聞君城鄗居左右群書環有齋亦名艇何時許追攀釣古不釣今所得孔與顔不然如爾祖跨鶴出塵寰和裴仲謨放兔行兔飢食山林兔渴飮川澤與人不瑕玼焉用若求索天寒草枯死見窘何太迫上有蒼鷹禍下有黃犬厄一死無足悲所耻敗頭額敢期揮金遇倒槖無難色雖乖獵者意頗塞仁人責兔兮兔兮聽我言月中仙子最汝憐不如亟返月中宿休顧商巖并嶽麓和裴仲謨摘白鬚行仲將題凌雲比訖鬚盡白陸展媚側室星星染為黑人生如寄耳况復形與色澤壑藏山舟夜半輸有力龎眉三不遇巳矣何所惜二毛賦秋興自愛頗姑息聞諸古竺乾毛髮因地得數窮反其本螻蟻得而食妙年光可鑒炯若鴉羽戢映梳漸蕭蕭變化了無隙所以𣑽志云昔人巳非昔皤然君勿笑子羽以貌失信美如客兒終翦施摩詰我作白鬚行而得養生術淮海集卷之五
