front:
  text: 淮海集巻之二十
  hash: sha256:4f2e5eb8d6d48eca36c26a719992aa395a7dba0f20de8861fc0554989b7db67f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_020-1a}
body:
  text: 秦觀少㳺進論李陵論臣聞草食之獸不疾而易藪水生之蟲不疾而易水行小變不失其大常也知此者可以用兵矣何則夫用兵之法有所謂常有所謂變什則圍之伍則攻之不敵則逃之兵之所謂常也以寡覆衆兵之所謂變也古之善用兵者雖能以寡覆衆而什圍伍攻之道未嘗忽焉所謂行小變而不失其大常也嗚呼李陵之所以敗者其不逹扵此乎兵法曰小敵之堅大敵之擒也方漢武時匈奴承冐頓之後號為强盛控弦百萬㡬與中國抗衡衛青霍去病之徒每出塞至少不下三萬騎其多至十萬騎又有諸將相為應援然後有功陵乃以步卒五千出居延行三十日至浚稽山與單于七八萬騎接戰一日數十合安得而不敗哉盖陵嘗將八百騎深入匈奴二千餘里過居延北不見虜還又嘗將輕騎五百出燉煌至塩水迎貳師未聞困絶謂以少擊衆可以為常不知幸之不可以數也昔秦始皇問李信曰吾欲取荆將軍度用㡬何人而足李信曰不過二十萬人又問王翦曰非六十萬人不可始皇使信伐荆既而軍敗復欲使翦翦曰大王必不得已用臣非六十萬人不可始皇從之遂平荆地夫王翦豈不知以少擊衆為利哉以為小變不可恃大常不可失也故田單疑趙奢之用衆而奢以為鏌鎁之劒肉試則㫁牛馬金試則截盤匜薄之柱上而擊之則折為三質之石上而擊之則碎為百嗚呼以王翦之事趙奢之言觀之則陵之敗也其自取之哉夫豪傑之士不患無才患不能養其氣而巳不能飬其氣則雖有竒才適足以殺其身也方陵之召見武臺天子欲使為貳師將輜重陵心耻之不敢言也遂請當一隊以分單于兵夫以陵之竒才向使少加持重則衛霍之功豈難繼耶而不勝一旦之憤輕用其鋒至兵敗降匃奴頽其家聲是以不能養其氣而巳矣或曰李陵以孤軍深入其亡也宜矣然則李靖以騎三千蹀血虜庭遂取定襄何也曰唐之擊突厥也六總管師十萬皆授靖節制所向輙克虜勢窘甚矣頡利諸酋皆勒所部來奔所謂傷弓之禽可以虛弦下也况於勁騎三千乎與陵之事異矣司馬遷論班固賛司馬遷以爲是非頗謬於聖人論大道則先黄老而後六經序㳺俠則退處士而進姦雄述貨殖則崇勢利而羞賤貧先黄老而後六經求古今搢紳先生之論尚或有之至於退處士而進姦雄崇勢利而羞貧賤則非閭里至愚極陋之人不至是也孰謂遷之髙才慱洽而至於是乎以臣觀之不然彼實有見而發有激而云耳孟子曰仁者人也合而言之道也楊子亦曰道以導之徳以得之仁以人之義以宜之禮以體之天也合則渾離則散盖道徳者仁義禮之大全而仁義禮者道徳之一偏黄老之學貴合而賤離故以道為本六經之敎於渾者略於散者詳故以仁義禮為用遷之論大道也先黄老而後六經豈非有見於此而發哉方漢武用法刻深急扵功利大臣一言不合輙下吏就誅有罪當刑得以貨自贖因而𥙷官者有焉扵是朝廷皆以偷合茍免為事而天下皆以竊資殖貨為風遷之遭李陵禍也家貧無財賄自贖交逰莫救左右親近不為一言以䧟腐刑其憤懣不平之氣無所發泄乃一切寓之於書故其序㳺俠也稱昔虞舜窘於井廩伊尹負於鼎爼傅説匿於傅巖吕尚困於棘津夷吾桎梏百里飯牛仲尼阨於陳蔡盖遷自况也又曰士窮窘得委命此豈非人所謂賢豪者耶誠使鄊曲之俠與季次原憲比權量力効功於當世不同日而論矣盖言當世號為修行仁義者皆畏避自保莫肯急扵人之難曽匹夫之不若也其述貨殖也稱秦始皇令烏氏倮比封君與列臣朝請以巴蜀寡婦清為正婦而客之為築女懐清臺盖以譏孝武也又云諺曰千金之子不死扵市非空言也盖遷自傷砥節礪行特以貧故不免扵刑戮也以此言退處士而進姦雄崇勢利而羞貧賤豈非有激而云哉彼班固不達其意遂以為是非頗謬扵聖人亦巳過矣然遷為人多愛不忍雖刺客滑稽佞幸之類猶屑屑焉稱其所長况於黄老㳺侠貨殖之事有見而發有激而言者其所稱道不能無溢美之言也若以春秋之法明善惡定邪正責之則非矣楊子曰太史公聖人將有取焉又曰多愛不忍子長也仲尼多愛愛義也子長多愛愛竒也夫惟所愛不主於義而主於竒則遷不為無過若以是非頗謬扵聖人曷為乎有取也李固論取天下者必有功臣守天下者必有名臣雖然有國家者寧無功臣不可以無名臣何則功臣以乗便逐利為能名臣以伏莭死義為任也昔西漢之末海内承平四夷賔服而王氏竊持國柄談笑而輙移之東漢之季姦雄崛起中原大亂而曹公睥睨神器終身不敢取臣嘗疑焉及讀李固與杜喬之諫門生弟子貫械腰鈇鑕願俱死者相屬然後始知其所以然也何則西漢多功臣也盖西漢自髙祖以馬上得天下不悦諸生其取人也先器識所以朝多功臣則乗便逐利者衆形不便勢不利彼不爲也故晚節末路王鳯用事王章以直言被誅而天下靡然以茍患失之爲風矣其大臣如張禹孔光輩皆持禄取容偷爲一切之計其清節之士如龔勝郭欽蔣詡之徒亦不過謝病免歸而巳其風如此亂臣賊子奈何而有懼哉此王氏所以談笑而移之也東漢自光武不任功臣鋭意文士其取人也先經術所以朝多名臣則伏節死義者衆節之所在義之所存彼必爲也故晩節末路梁冀擅命固與杜􅔬以死抗之而天下靡然以殺身成仁爲俗矣其大臣如陳蕃黄琬軰皆捐覆宗族以急國家之難黨錮之士如李膺任宻范滂之徒至連頸就誅而無愠色其俗如此亂臣賊子柰何而不懼哉曹公之所以終身而不敢取也然西漢易亡而復興東漢難亡而易絶者何也孟子曰三代之得天下也以仁其失天下也以不仁故三代之君其始也雖勢強大非有仁心則不興及其季也雖徳失政亂非有不仁之罪則不絶哀成之君失徳甚矣然其事止於女寵佞幸而巳未犯不仁之罪也故國亡而復興桓靈之時無道極矣鈎黨之獄忠臣義士死者百有餘人諸所夷滅至不可勝數則是不仁之罪巳貫盈矣故國亡而遂絶此亦理之必至事之固然無足恠也嗚呼國者天下之大器也君臣者相與持此器者也視器之安危則知人之能否視國之理亂則知君臣之賢不肖以二漢論之報施之道其不殊也如此然則為君臣者可不戒哉陳寔論孟子曰伯夷聖之清者也桞下恵聖之和者也又曰伯夷隘柳下恵不恭何也盖古之君子初無意於制行其制行也因時而已伯夷之時天下失於太濁於是制其行以清桞下恵之時天下失於太潔故制其行以和雖然清者所以激濁也非激濁而為清是隘而已和者所以救潔也非救潔而為和是不恭而已故由其本而言之則為清為和由其弊而言之則為隘為不恭故伯夷桞下恵者實未嘗清未嘗和也安有隘不恭之弊哉前史稱中常侍侯覽託太守髙倫用吏陳寔曰此人不宜用而侯常侍不可違乞從外舉又中常侍張譲歸葬頴川雖一郡畢至而名士無往者張甚耻之寔乃獨弔焉嗚呼若寔者可謂殆庶㡬於夷恵矣何則桓靈之時政在宦人而天下之士方以髙節相髙疾之已甚至使其屬無所發憤常欲以身死黨錮之禍海内塗炭者二十餘年豈特小人之罪哉君子亦有以取之也寔知其然故於用吏送塟之事稍詘其身應之所以因時救弊而巳其後復誅黨人張徳寔以此多所全宥則其效盖可見也嗚呼使東海之士大夫制行皆如寔也黨錮之禍何從而興乎以此言之寔殆庶㡬於夷恵信不誣矣然則寔為侯張而身詘也不為過則元稹之徒因䆠官以得宰相亦不為過歟斯不然也昔孔子於衛見南子矣於魯敬陽虎矣至彌子以為主我衛卿可得也則曰有命盖見南子敬陽虎者身可詘也不主彌子者道不可詘也寔於侯張亦詘身以伸道耳豈若元稹之徒詘道而伸身者哉然則士大夫為道而或詘身於䆠人者亦可乎斯又不然也昔齊人獲臧堅齊侯使人唁之且曰無死堅稽首曰拜命之辱抑君賜不終始又使其刑臣禮於士以杙抉傷而死古之人耻其身之辱於刑也是故為伯夷之清而非其時者是隘而巳若陳寔之詘身於䆠人而非其時者是為姦而已淮海集巻之二十
