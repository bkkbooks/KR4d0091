front:
  text: 淮海集卷之三
  hash: sha256:8b55aad8845ebb6a6d6e4fffa4399b9aebd4ec8f3e19677c9425185dd51bccef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_003-1a}
body:
  text: 秦觀少游春日雜興十首飄忽星氣徂青陽迫遲暮鳴飛各有適赤白紛無數雨砌墮危芳風軒納飛絮褰幃香霧横岸幘雲峰度林影舞䆫扉池光染衣屨參差花鳥期蹭蹬琴觴趣撫事動幽尋感時遺近慕秣馬膏余車行行不周路結髮謝外好僶俛希前修繆挾江海志耻爲升斗謀齞歷難刻畫賤貧多釁尤發􅮾皆伊闕解驂憇䢴溝丹鈆費永晷麴蘖敺深愁璧月鑒簾櫳珠星絡梧楸泯泯渠水駛霏霏花霧浮公子悵何許撫膺徒離憂潭潭故邑井猗猗上宫蘭不食自清渫莫服更幽閒志士耻弱植卷跡甘饑寒佳晨追良覿觸物懸悲端川途眇囘逺經歲曠音翰豈不慕裘馬詭得非所安蟬冕多怵迫䋲樞尠憂患枉㝷竟何𥙷方枘誠獨難吳㑹雖𥚹小海濱富奇峰天雞一號呌劒㦸明遥空谿谷相徑復深林杳攅叢猿吟虎豹啼雲氣迷西東中有遯世士超然閟孤蹤𬒳蘭服明月起坐松聲中夜鍜吸沆瀣朝琴庇靑䓗騎星友元氣巢許安可同俛眄區中人飛埃集毛鋒問津或不繆從子游鴻蒙東方有美人容華茂春粲抱影守單棲含睇理哀彈聲意一何切所歡邈雲漢徒然事膏沐孰與徂昬旦㣲誠浪自持嘉月忽復晏巧轉度虚􅎉飛紅觸幽幔歲歲芳草滋夜夜明星爛合并㑹有時索居不必歎寢瘵倦文史駕言從遨嬉颸風舉遥溆規日麗淸漪含桃粲朱實杜若懷碧滋娉娉弱絮墮圉圉文魴馳明霞廓逺瞩哀禽攪離思縟草天際合孤雲川上移寛閑絕輪鞅重複多路岐信美難久佇歸歟從所治昔我遊京室交通五陵間主客各英妙𫀆馬相追攀千金具飮啜百金雇吹彈纓弁羅廣席當頭舞交竿鮮粧耀淥酒釆纈生風瀾燈燭暗夜艾士女紛相班歡娛易徂歇轉眄如飛翰亹亹負孤願離離銜永歡山鳥窺茗飮簷花笑𬞞飱棄捐勿重陳事定須盖棺客從逺方来遺我昭華管吹之動人心異境生虚􅑆磝磝靑嶂横泱泱春溜漸馬蹄交狹邪車轂錯平坦士女競芳辰禽魚䕃修竿依㣲認睇笑淩沒見纎短停吹歘泯㓕耽耽復空館靈物信所珍顧恨知音罕桃李用事辰鮮明奪雲綺繁華一朝去黙黙慚𣏌梓時徂鷹化鳩地遷橘為枳獨有羡門生後天猶常一作不死藝籍燔祖龍斯文就淪喪帝矜黔首愚諸雋雄一作出相望楊馬操宏綱韓柳激頽浪䢖安妙謳吟風槩亦超放玉䋲帶華月艶艶青㝠上奕世希末光經緯得無妄兒曹獨何事詆斥㡬覆醬原心良自誣猥欲私所尚螳蜋拒飛轍精衞填溟漲咄咄徒爾為東海固無恙鵷鸞日彫滅黃口紛冗長投䄃睇層霄兹懷誰與亮和孫莘老題召伯斗野亭淮海破冬仲雪霜滋不平菱荷枯折盡積水寒更淸輟棹得佳觀湖天繞未甍信美無與娛濁醪聊自傾北眺桑梓國悠然白雲生南望古䢴溝滄波帶蕪城村墟翳茅竹孤烟起晨烹簷間鳥聲落客子念當行攬衣視日景薄隂漏㣲明何時復來遊春風發鮮榮淮海無林丘孫莘老倡云戸延朱甍簷楯斗杓落簾幃河漢傾平湖杳無涯湛湛矌澤千里平一渠閑防潴物色故不清老僧喜穿築北新烹平生有㣲尚一舟聊寄行遇勝輙偃蹇霜鬚刷澄春波生結纜嗟已晚不見芙蓉城尚想𬗋芡􅐻明珠出築棣未歎曲池平蘇州來賦詩句與秋氣清結搆擅空明可待齒开豁歸歟謝浮雲黄魯直和云謝公所含澤遍諸生􅐻薄淮海間風烟浸十城籟簫吹水末浪闊湖光浮棟甍維斗天司南其下百瀆傾貝宫產明月若眼明佳人歸何時解衣繞廂榮蘇子瞻和云落波沸庖烹我來抄揺落霜清見魚行白鷗逺飛回得我斗與牛錯落掛南甍老僧如宿昔一笑意已傾新詩出帆謝公渚日脚東西平孤亭得心憇暮景含餘淸坐待晒得魚不忍烹似聞績溪老復作東都行小詩如秋菊故人舊事疑前生吾生七往來送老海上城逢人輒自扁舟未得觧坐待兩閘平濁水汙人思野寺爲我清艶艶霜中明過此感我言長篇發春榮蘇子由和云風吹㣲雲暮寒依月生前望刋溝路却指鐡壅城茅簷昔逰有遺詠枯墨存髙甍故人獨未來一樽誰與傾北不足隱約性愈明早為歸耕計免慙老僧榮張琬和卜兹地江水供晨烹試問東坡翁畢老㡬此行奔馳力清危亭下瞰野層閣髙連甍起望斗與牛淮海相奔傾云維舟得古寺望逺天四平睛日揮揮散晚風冷冷其逐影死寧似不鳴烹咄㢤應有止老矣将安行中庭往來誰百年今昔我平生悠悠何所寓臺上多化城與叟和云我豋甘棠埭所向殊未平舟行汙地中頓失柜子落丈室霜月明此意竟蕭條猶然笑安榮張芸士傾開池種白蓮壘石擬三生猶淹南斗墟終逺北斗江湖清蛙聲亂僧唄鴟吻嚇市甍意同伯喈死苟與衞秋風隴首至落日淮南明寄言懷士士慎勿慕官榮城設我𬗋藕供報之白芽烹三年猿鶴友萬里秦楚行和虚飄飄虚飄飄虚飄飄風寒飄絮浪春暖履冰橋勢緩霜垂霰聲乾葉下條雨中漚點没流水風裏綵雲鋪逺霄虚飄飄比時光影猶堅牢到地虹起漫成橋入夢雲千疊逰魯直倡虚飄飄虚飄飄花飛不比人生命猶堅牢子瞻和虚飄飄虚飄飄畫簷蛛空絲萬條蜃樓百尺聳滄海鴈字一行書絳霄虚飄飄見紅日星曵餘光横碧霄虚飄飄比浮名利猶堅牢結網銀漢鵲成橋塵積雨梧葉霜飛風柳條露凝殘㸃和游金山和子由同彦瞻江流㑹楊子洶洶東南鶩海門劃前開金山屹中據鼓鍾食萬指金艧棲千柱夜庭游月波曉觀搏香霧天淸猿鳥哀風暗魚龍怒雲物横古今濤波閱晨暮三州氣色來上下端倪露偉哉元氣間此勝知誰聚念昔憇精廬豋臨輒忘去汲新試團月飯素羔魁芋妙興入芳藤真境在芒屨别來星暑换寤寐經從處忽蒙珠壁投了與雲巒遇幽光炯肝肺爽氣森庭戸區中多滯念方外饒竒趣寄語山阿人泠然行復御詩云揚州望金山陪彦瞻逰金山子由面貼蒼石虚樓三百間正壓江潮白清風歛霽霧暁日隱隱大如幘朅来長江上孤髙二千尺僧居厭山小面自惜風吹渡江水山僧午方食波瀾洗我心笋蕨飽我曜金碧直侵魚龍居似有鬼神役我行有程度欲去空東南逓隱見遥與此山疋兹逰㡬不遂深愧幕府客歸腹平生足遊衍壯觀此云極鐡罋本誰安海門復誰植何時罷登覽不可失子由同彦瞻逰金山子由枉詩時日巳暮正值江月黒顧視天水并坐恐星斗􅊜使君駿蓬萊三神山横絶倚鼇背鼇傾海水動一峰失所在卒章有使君何時罷登覽不可失之句因繼賦一首子昔愛山水江湖不蹔忘君前或剖竹匏繋古維揚隱然飛來大江心盤礴㡬千載化為金僊居龍象錯朱貝夙雪梯濶視瞰溟漲潮来隱天地萬里卷白浪波清霄漢勝絶境旦旦遇相望不意二君子招携一葦航髙攀躡形勢三州壯融結旣難竆丹青殊莫状蘇侯韻高逺邵浄澄澈迷下上更深月正中山影杳無象蛟鼉四面穴造方丈畢景趣言歸侵星揺兩漿武功真好竒落筆掃子雅趨尚奇觀極無邉幽尋端未放浮生閱流水清話恩早晚東南下一棹扁舟信所之珠璣持語淮南守兹逰不可遺君同子瞻端午日遊諸寺賦得深字太史抱孤韻暢懷在豋臨别乗載鄒枚佳辰事幽㝷參差水石瘦窅窕房櫳深清磬發踈箔妙香橫素㯲復豋翠堵坡環囬矚􅋂崟雙溪貫城郭暝色帶孤禽凉飈動爽籟薄雨生㣲隂塵想澹清漣牢愁洗芳斟揮箑訂往古援毫示來今愧無刻燭敏續此金玉音肩輿任所適子瞻詩云䆫幽更妍盆山不見日草木自蒼然忽豋最高塔眼界遇勝輙留連焚香引幽歩酌茗開浄筵㣲雨止還作小所便幽㝷未云畢墟落生晚烟歸來所歴耿耿清不竆大千卞峰照城郭震澤浮雲天深沈旣可喜矌蕩亦孤燈同夜禪眠道人亦未寢寄陳季常一鉤五十犗始具任公釣揭竿趣灌瀆與爾不同調先生本西蜀俠氣見英妙哀憐世間兒細黠似黄鷂侍童雙擢玉鬢髪光可照駿馬錦障泥相隨竆海嶠平生擕手好十七豋廊廟小生相吏耶徒枉尺書召暮年更折節學佛得心要鬻馬放阿樊幅巾對沈燎泠泠屋外泉兀兀原頭焼欲知山中樂萬古同一笑淮海集卷之三
