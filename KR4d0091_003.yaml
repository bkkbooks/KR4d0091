front:
  text: 淮海集卷之三
  hash: sha256:8b55aad8845ebb6a6d6e4fffa4399b9aebd4ec8f3e19677c9425185dd51bccef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_003-1a}
body:
  text: 秦觀少遊春日雜興十首飄忽星氣徂青陽迫遲暮鳴飛各有適赤白紛無數雨砌墮危芳風軒納飛絮褰幃香霧橫岸幘雲峰度林影舞窗扉池光染衣屨參差花鳥期蹭蹬琴觴趣撫事動幽尋感時遺近慕秣馬膏余車行行不周路結髮謝外好僶俯希前修繆挾江海志耻為升斗謀齞歷難刻畫賤貧多釁尤發􅮾皆伊闕解驂憩𨝍溝丹鉛費永晷麴蘖驅深愁璧月鑒簾櫳珠星絡梧楸泯泯渠水駛霏霏花霧浮公子悵何許撫膺徒離憂潭潭故邑井猗猗上宫蘭不食自清泄莫服更幽間志士耻弱植卷迹甘飢寒佳晨追良覿觸物懸悲端川途眇回逺經歲曠音翰豈不慕裘馬詭得非所安蟬冕多怵迫繩樞鮮憂患枉尋竟何輔方枘誠獨難吳會雖𥚹小海濱富奇峰天雞一號呌劒戟明遙空溪谷相徑復深林杳攢叢猿吟虎豹啼雲氣迷西東中有遁世士超然閟孤蹤𬒳蘭服明月起坐松聲中夜煆吸沆瀣朝琴庇靑蔥騎星友元氣巢許安可同俯眄區中人飛埃集毛鋒問津或不繆從子遊鴻蒙東方有美人容華茂春粲抱影守單棲含睇理哀彈聲意一何切所歡邈雲漢徒然事膏沐孰與徂昏旦微誠浪自持嘉月忽復晏巧轉度虛􅎉飛紅觸幽幔歲歲芳草滋夜夜明星爛合并會有時索居不必歎寢瘵倦文史駕言從遨嬉颸風舉遙溆規日麗淸漪含桃粲朱實杜若懷碧滋娉娉弱絮墮圉圉文魴馳明霞廓逺矚哀禽攪離思縟草天際合孤雲川上移寬間絶輪鞅重復多路岐信美難久佇歸歟從所治昔我遊京室交通五陵間主客各英妙𫀆馬相追攀千金具飮啜百金雇吹彈纓辨羅廣席當頭舞交竿鮮粧耀淥酒釆纈生風瀾燈燭暗夜艾士女紛相班歡娛易徂歇轉眄如飛翰亹亹負孤願離離銜永歡山鳥窺茗飮簷花笑𬞞飱棄捐勿重陳事定須蓋棺客從逺方來遺我昭華管吹之動人心異境生虛􅑆磝磝靑嶂橫泱泱春溜漸馬蹄交狹邪車轂錯平坦士女競芳辰禽魚蔭修竿依微認睇笑淩沒見纎短停吹歘泯滅耽耽復空館靈物信所珍顧恨知音罕桃李用事辰鮮明奪雲綺繁華一朝去默默慚𣏌梓時徂鷹化鳩地遷橘為枳獨有羡門生後天猶常一作不死藝籍燔祖龍斯文就淪喪帝矜黔首愚諸雋雄一作出相望楊馬操宏綱韓柳激頽浪建安妙謳吟風槩亦超放玉繩帶華月艷艷青冥上奕世希末光經緯得無妄兒曹獨何事詆斥幾覆醬原心良自誣猥欲私所尚螳蜋拒飛轍精衛填溟漲咄咄徒爾為東海固無恙鵷鸞日雕滅黃口紛冗長投殃睇層霄兹懷誰與亮和孫莘老題召伯斗野亭淮海破冬仲雪霜滋不平菱荷枯折盡積水寒更淸輟棹得佳觀湖天繞未甍信美無與娛濁醪聊自傾北眺桑梓國悠然白雲生南望古𨝍溝滄波帶蕪城村墟翳茅竹孤煙起晨烹簷間鳥聲落客子念當行攬衣視日景薄隂漏微明何時復來遊春風發鮮榮淮海無林丘孫莘老倡云戶延朱甍簷楯斗杓落簾幃河漢傾平湖杳無涯湛湛矌澤千里平一渠間防潴物色故不清老僧喜穿築北新烹平生有微尚一舟聊寄行遇勝輒偃蹇霜鬚刷澄春波生結纜嗟已晚不見芙蓉城尚想𬗋芡􅐻明珠出築棣未歎曲池平蘇州來賦詩句與秋氣清結搆擅空明可待齒开豁歸歟謝浮雲黃魯直和云謝公所含澤遍諸生􅐻薄淮海間風煙浸十城籟簫吹水末浪闊湖光浮棟甍維斗天司南其下百瀆傾貝宫産明月若眼明佳人歸何時解衣繞廂榮蘇子瞻和云落波沸庖烹我來抄搖落霜清見魚行白鷗逺飛回得我斗與牛錯落挂南甍老僧如宿昔一笑意已傾新詩出帆謝公渚日腳東西平孤亭得心憩暮景含餘淸坐待晒得魚不忍烹似聞績溪老復作東都行小詩如秋菊故人舊事疑前生吾生七往來送老海上城逢人輒自扁舟未得解坐待兩閘平濁水汙人思野寺為我清艷艷霜中明過此感我言長篇發春榮蘇子由和云風吹微雲暮寒依月生前望刋溝路却指鐡壅城茅簷昔逰有遺詠枯墨存髙甍故人獨未來一樽誰與傾北不足隱約性愈明早為歸耕計免慙老僧榮張琬和卜兹地江水供晨烹試問東坡翁畢老幾此行奔馳力清危亭下瞰野層閣髙連甍起望斗與牛淮海相奔傾云維舟得古寺望逺天四平睛日揮揮散晚風冷冷其逐影死寧似不鳴烹咄哉應有止老矣將安行中庭往來誰百年今昔我平生悠悠何所寓臺上多化城與叟和云我登甘棠埭所向殊未平舟行汙地中頓失匱子落丈室霜月明此意竟蕭條猶然笑安榮張藝士傾開池種白蓮壘石擬三生猶淹南斗墟終逺北斗江湖清蛙聲亂僧唄鴟吻嚇市甍意同伯喈死苟與衛秋風隴首至落日淮南明寄言懷士士慎勿慕官榮城設我𬗋藕供報之白芽烹三年猿鶴友萬里秦楚行和虛飄飄虛飄飄虛飄飄風寒飄絮浪春暖履冰橋勢緩霜垂霰聲乾葉下條雨中漚點沒流水風裏綵雲鋪逺霄虛飄飄比時光影猶堅牢到地虹起漫成橋入夢雲千疊逰魯直倡虛飄飄虛飄飄花飛不比人生命猶堅牢子瞻和虛飄飄虛飄飄畫簷蛛空絲萬條蜃樓百尺聳滄海鴈字一行書絳霄虛飄飄見紅日星曵餘光橫碧霄虛飄飄比浮名利猶堅牢結網銀漢鵲成橋塵積雨梧葉霜飛風柳條露凝殘點和遊金山和子由同彥瞻江流會楊子洶洶東南鶩海門劃前開金山屹中據鼓鍾食萬指金艧棲千柱夜庭遊月波曉觀搏香霧天淸猿鳥哀風暗魚龍怒雲物橫古今濤波閲晨暮三州氣色來上下端倪露偉哉元氣間此勝知誰聚念昔憩精廬登臨輒忘去汲新試團月飯素羔魁芋妙興入芳藤真境在芒屨别來星暑换寤寐經從處忽蒙珠壁投了與雲巒遇幽光炯肝肺爽氣森庭戶區中多滯念方外饒竒趣寄語山阿人泠然行復御詩云揚州望金山陪彥瞻逰金山子由面貼蒼石虛樓三百間正壓江潮白清風斂霽霧曉日隱隱大如幘朅來長江上孤髙二千尺僧居厭山小面自惜風吹渡江水山僧午方食波瀾洗我心笋蕨飽我曜金碧直侵魚龍居似有鬼神役我行有程度欲去空東南遞隱見遙與此山匹兹逰幾不遂深愧幕府客歸腹平生足遊衍壯觀此云極鐡甕本誰安海門復誰植何時罷登覽不可失子由同彥瞻逰金山子由枉詩時日巳暮正值江月黑顧視天水并坐恐星斗􅊜使君駿蓬萊三神山橫絶倚鼇背鼇傾海水動一峰失所在卒章有使君何時罷登覽不可失之句因繼賦一首子昔愛山水江湖不暫忘君前或剖竹匏繫古維揚隱然飛來大江心盤礴幾千載化為金仙居龍象錯朱貝夙雪梯濶視瞰溟漲潮來隱天地萬里卷白浪波清霄漢勝絶境旦旦遇相望不意二君子招携一葦航髙攀躡形勢三州壯融結既難窮丹青殊莫狀蘇侯韻高逺邵淨澄徹迷下上更深月正中山影杳無象蛟鼉四面穴造方丈畢景趣言歸侵星搖兩漿武功真好竒落筆掃子雅趨尚奇觀極無邉幽尋端未放浮生閲流水清話恩早晚東南下一棹扁舟信所之珠璣持語淮南守兹逰不可遺君同子瞻端午日遊諸寺賦得深字太史抱孤韻暢懷在登臨别乘載鄒枚佳辰事幽尋參差水石瘦窅窕房櫳深清磬發踈箔妙香橫素㯲復登翠堵坡環回矚􅋂崟雙溪貫城郭暝色帶孤禽涼飈動爽籟薄雨生微隂塵想淡清漣牢愁洗芳斟揮箑訂往古援毫示來今愧無刻燭敏續此金玉音肩輿任所適子瞻詩云窗幽更妍盆山不見日草木自蒼然忽登最高塔眼界遇勝輒留連焚香引幽步酌茗開淨筵微雨止還作小所便幽尋未云畢墟落生晚煙歸來所歷耿耿清不窮大千卞峰照城郭震澤浮雲天深沈既可喜矌蕩亦孤燈同夜禪眠道人亦未寢寄陳季常一鉤五十犗始具任公釣揭竿趣灌瀆與爾不同調先生本西蜀俠氣見英妙哀憐世間兒細黠似黃鷂侍童雙擢玉鬢髮光可照駿馬錦障泥相隨窮海嶠平生擕手好十七登廊廟小生相吏耶徒枉尺書召暮年更折節學佛得心要鬻馬放阿樊幅巾對沈燎泠泠屋外泉兀兀原頭燒欲知山中樂萬古同一笑淮海集卷之三
