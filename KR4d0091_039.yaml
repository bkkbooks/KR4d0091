front:
  text: 淮海集卷之三十九
  hash: sha256:d281708e876a3d5addfc5a659262f41e4203b61f4d5d404840828a9cac8d32d9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_039-1a}
body:
  text: 秦觀少㳺俞紫芝字序余昔㳺玉笥山周行二十四峯訪蕭子雲故隠道見靈芝焉生乎磐石之上回環而有葉秀澤而不根信天下之異草也竊愛乆之留不能去俄有童子朱顔紺髪自松隂中距石輙止撫芝嘆曰嘻道人無本其亦如是矣余異而問曰適吾子有緒言不敏未知所謂願終其説童子笑曰子求終乎終之乆矣以為未耶沒身無終雖然嘗試為汝言其崖略夫徳人以有本為宗道人以無本為宗天下皆知有物所以失已也不知有已所以失已也而徳人知之於是内觀無是外觀無彼無是故能以已為物無彼故能以物為已已物不二謂之真一夫是謂以有本為宗天下皆知有偽所以喪真也不知有真所以喪真也而道人知之扵是前際無捨後際無取無捨故不斷一切偽無取故不住一切真真偽兩忘亦無真一夫是之謂以無本為宗蓋非有本則不能離相而歸空非無本則不能即空而證實有本然後眀心無本然後見性夫子識之人間所謂道徳者固不出乎此矣雖然有本無本吾豈能識之哉語未既有老人復杖䇿自松隂中來顧謂童子曰適何所言童子欲語老人引杖擊之童子走松隂忽然不見還視老人亦以亡矣於是余茫然自失私識其言後九年游京師遇金華居士俞紫芝請余改字因思昔日玉笥童子之言字曰無本復以其説為序贈焉曹虢州詩序虢為州在闗陜之間其地不當孔道無稱使過客之勞刺史之宅有水池竹林其樂可以忘老故自唐以來號為佳郡朝之士大夫樂靜退者多願徃焉元和中劉使君作三堂新題二十一章昌黎韓文公為属和於是亭臺島渚之勝天下稱之譙國曹子方比自尚書郎出守兹郡左丞相汲郡吕公引昌黎故事送之以詩子方至陜右以書抵余曰待罪司勲初無禆𥙷疾病求去丞相不加譴假以一州幸矣又賜詞詩以寵其行幸孰甚焉且其卒章之意欲因某以警來者將摹刻於三堂之上其為我序之余曰木不能飛空託泰山則干青雲人不能蹈水附樓航則絶大海自唐迄今守虢者多矣而劉使君獨傳於世者非以昌黎文公故耶今得丞相之詩則曹劉二使君皆當傳於不朽知虢之亭臺島渚將益顯於天下朝之卿大夫願徃者又加多也余未嘗至虢竊誦丞相之詩已若幅巾杖屨從子方於水竹之間子方守虢之樂為可知也然士大夫皆謂子方賢者宜同樂於天下不當獨樂於虢子方盍專精神近藥物亟還天朝以慰士大夫之論毋為水池竹林之所留也傳曰懐與安實敗名子方其愼之逆旅集序余閒居有所聞輙書記之既盈編軸因次為若干卷題曰逆旅集盖以其智愚好醜無所不存彼皆隨至隨徃適相遇扵一時竟亦不能乆其留也或曰吾聞君子言欲純事書欲純理詳於誌常而略扵紀異今子所集雖有先王之餘論周孔之遺言而浮屠老子卜毉夢幻神仙鬼物之説猥雜於其間是否莫之分也信誕莫之質也常者不加詳而異者不加略也無迺與所謂君子之書言者異乎余笑之曰鳥棲不擇山林唯其木而已魚㳺不擇江湖唯其水而已彼計事而處簡物而言竊竊然去彼取此者縉紳先生之事也僕野人也擁腫是師懈怠是習仰不知雅言之可愛俯不知俗論之可卑偶有所聞則隨而記之耳又安知其純與駮耶然觀今世人謂其言是則矍然改容謂其言信則適然以喜而終身未甞信也則又安知彼之純不為駮而吾之駮不為純乎且萬物歴歴同歸一隙衆言喧喧歸于一源吾方與之沉與之浮欲有取捨而不可得何暇是否信誕之擇哉子徃矣客去遂以為序揚州集序揚州集者大夫鮮于公領州事之二年始命教授馬君希孟採諸家之集而次之又搜訪於境内簡編碑板亡缺之餘凡得古律詩洎箴賦合二百二篇勒為三巻號揚州集云按禹貢曰淮海惟揚州彭蠡既瀦三江既入震澤底定而周禮職方氏亦稱東南曰揚州其山鎮曰㑹稽其澤藪曰具區川曰三江浸曰五湖則三代以前所謂揚州者西北劇淮東南距海江湖之間盡其地自漢已來既置刺史於是稱揚州者徃徃指其刺史所治而已盖西漢刺史無常治東漢治歴陽或徙壽春又徙曲阿魏亦治夀春或徙合肥吳治建業西晉後魏後周皆因魏東晉宋齊梁陳皆因吳惟宋常以建業為王畿而東揚州為揚州東揚州者㑹稽也隋以後皆治廣陵繇是言之凡稱揚州者東漢指歷陽或夀春或曲阿中原自魏至周指夀春或合肥江左自吳至陳指建業或㑹稽隋唐五代乃指廣陵廣陵在二漢時甞為吳國江都國廣陵郡宋為南兖州北齊為東廣州後周為吳州唐初亦為䢴州其為揚州自隋始也繇是言之凡稱吳國江都廣陵南兗東廣吳州䢴州者皆今之揚州也此集之作自魏文帝詩巳下在當時雖非揚州而寔今之廣陵者皆取之其非廣陵而當時為揚州者皆不復取至楊子雲箴本約禹貢為辭則廣陵自在其中固不得而不錄也既成公又属某推表廢興遷徙之跡而究其端使夫覽之者有攷焉㑹稽唱和詩序給事中集賢殿修撰廣平程公守越之二年南陽趙公自杭以太子少保致仕道越以歸南陽公與廣平公其登進士第也為同年其守浙東西也為鄰國又皆喜登臨樂吟賦故其雅好視遊從中為厚而山川覽矚之美酬獻之娛一皆寓之於詩舊所唱和多矣集賢林公既為之序而道于越也復得二十有二篇東南衣冠爭誦傳之號為盛事以後見為耻或曰昔之業詩者必竒探逺取然後得名扵時今二公之詩平夷渾厚不事才巧而為世貴重如此何邪切甞以為激者辭溢夸者辭淫事謬則語難理誣則氣索人之情也二公内無所激外無所夸其事核其理富故語與氣俱足不待繁扵刻劃之功而固已過人逺矣鮑昭曰謝康樂詩如初發芙蓉自然可愛盖如其言也某既獲覩盛徳之事為幸因手寫二十二篇之詩以遺越人使鑱諸石又述其所以然者發其端云懐樂安蔣公唱和詩序㑹稽之為鎮舊矣豈惟山川形勢之盛實控扼扵東南哉其勝遊珍觀相望乎楓柟竹箭之上枕帶乎藻荇芙藻之濱可以從事雲月優㳺而忘年者殆亦非他州所及而卧龍山鑑湖尤為一郡佳處盖府第之所占城堞樓雉之所憑非若窮崖絶壑逰鹿豕而家魚龍不可與民同樂者也前太守二卿樂安蔣公甞以山富草木樵蘇所采為令扵公府止之湖地沃衍田於豪奪為表於朝廷復之又廢山西淫祠分湖之别派覆以締構為流觴曲水以追永和故事於是湖山自然之觀始深密空明不復為人力所敗聞山水間棹歌之詩至今稱焉熈寧十年廣平程公以給事中集賢殿修撰来領州事覽其遺迹而嘆曰此前賢所以遺後來也使予無一日之雅猶當奉以周旋况甞被其知遇乎乃述樂安之志手植松千餘章於卧龍山之上狂枝惡蔓斬薙以時秀甲珍牙無得輙取毎春秋佳日開池籞具舟艦與民共逰而樂之復為詩以記其事元老名儒属而和者凡六人而樂安之從子金部預焉公素以詩名天下其所述作必有深属逺寄不獨事章句而已翟公曰一死一生乃見交情時樂安之沒㡬三十年而公想像風流眷眷不忘如此然則是詩之作也豈特與山水俱傳而不朽哉聞其風者可以興起矣送錢秀才序去年夏余始與錢節遇於京師一見握手相狎侮不顧忌諱如平生故人余所泊第節數辰輙一来就語笑終日去或遂與俱出遨遊飲食而歸或闕然不見至數浹日莫卜所詣大衢支徑卒相覯逄輙嫚罵索酒不肯已因登樓縱飲狂醉各馳驢去亦不相辭謝異日復然率以為常至秋余先浮汴絶淮以歸後踰月而節亦出都矣於是復㑹扵髙郵髙郵余鄉也而邑令適節之僚壻爲留數十日余既以所學迂闊不售於世鄉人多笑之耻與遊而余亦不願見也因閉門却掃日以文史自娛其不忍遽絶而時過之者惟道人參寥東海徐子思兄弟數人而巳節聞而心慕之數人者來節每偕焉循陋巷欵小扉叱奴使通即自禠帶坐南軒下余出見之相與論詩書講字畫茗飲奕碁或至夜艾而絶口未嘗一言及曩時事也於是余始奇節能同余弛張而節亦浸知余非脂韋汩沒之人矣客聞而笑之曰子二人者昔日浩歌劇飲白眼視禮法士一燕費十餘萬錢何縱也今者室居而輿出非澹泊之事不治掩抑若䖏子又何拘也㒺两問景曰曩子坐今子起曩子行今子止何其無特操歟子二人之謂矣余對曰吾二人者信景也宜乎子之問也當為若語其凡夫思慮可以求索視聽可以聞見而操履可以殆及者皆物也歌酒之娛文字之樂等物而已矣顧何足以殊觀哉漁父有云滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足夫清濁因水而不在物拘縱因時而不在已余病弗能乆矣不意偶似之也而復何苦竊竊焉随余而隘之哉客無以應一日節曰我補官嘉禾今期至當行矣盍有詩以為送乎比懶賦詩又重逆其意因叙遊從本末之迹并以觧嘲之詞贈焉節吳越文穆王之苖裔翰林之孫起居之子倜儻好事有父祖風云王定國注論語序元豐二年眉陽蘇公用御史言文渉謗訕属吏獄具天子薄其罪責為黄州團練副使於是梁國張公涑水司馬公等三十六人素厚善眉陽得其文不以告皆罰金而太原王定國獨謫監濱州塩税定國相家子少知名一朝坐交遊斥海上人皆意其日飲無何不復以筆硯為職矣而定國至濱益自刻勵晨起入局視鹽税之事唯謹退則窮經著書或賦詩自娛非疾病慶弔輙不廢七年罷還詣東上閣門奏書曰臣無状幸緣先臣之故獲齒仕版不能慎事䧟于罪戾念無以自贖間因職事之暇妄以所見注成論語十卷未敢以進唯陛下裁哀之明日詔御藥院取其書去未報而神宗棄天下嗚呼自熈寧初王氏父子以經術得幸下其說於太學凡置愽士試諸生皆以新書從事不合者黜罷之而諸儒之論廢矣定國於時處放逐之中蠻夷瘴癘之地乃能自信不惑論著成一家之言至天子聞之取其書非其氣過人何以及此傳曰天不為人之惡寒而輟其冬地不為人之惡險而輟其廣君子不為小人之匈匈而易其行於斯言可信余比多事未獲請觀其書而定國迺以副本来屬予為序顧余文之陋豈能發定國之所蘊乎姑掇其大㮣使夫覽之者知定國著書之時為如此又知神宗嚮經術亦非主於一家而已集瑞圗序熈寧九年燕國邵舜文與諸弟持其先君之䘮於宜興數月有雙瓜生于後圃後二年又生紫芝三雙桃雙蓮一凡六物扵是鄉之耆老聞而嘆曰邵氏其興乎何其瑞之多也舜文因集六物者而圗之號集瑞圗云余謂萬物皆天地之委和而瑞物者又至和之所委也至和之氣磅礴氤氲而不已則必發見於天地之間其精者蓋已為盛徳為尊行為豪傑之材其浮沉而下上者則又為景星卿雲甘露時雨醴泉芝草連理之木同頴之禾而捿翔逰息乎其中者則又為鳯凰麒麟神馬靈龜之属曄乎光景色象之異也藹乎華實臭味之殊也卓乎形聲文章之無與及也於是世指以為瑞焉繇是言之世之所謂瑞者乃盛徳尊行魁奇之才所鍾和氣之餘者耶邵氏之祖考既以潜徳隠行見推鄉閭至舜文彦瞻端仁又以文學收科第弟兄相繼有聞於時而諸子森然皆列於英俊之域則是至和之氣鍾於其家乆矣宜其餘者發為草木之瑞也昔楊寶得王母使者白環四枚而寳生震震生秉秉生賜賜生彪凡四世為三公以徃推今即邵氏六物之瑞豈徒生而已夫盖有應之者矣送馮梓州序上即位之明年有詔侍從之官各舉部使者二人故龍圗閣直學士滕公與二三耆老皆以馮侯叔眀應詔即日除陜西路提㸃刑獄公事觀甞問於滕公曰馮侯何如人公曰有守君子也觀曰何以知之公曰昔髙平范公之帥環慶也環將种古以寧守史籍變其熟羌獄上書訟寃且言髙平公不法者七事朝廷疑之即寧州置獄而馮侯以御史推直實奉詔往訊是時髙平公坐言事去執政有惡之者欲中以危法乆矣此獄之起人皆為懼及馮侯召對神宗曰帥臣不法萬一有之恐誤邊事然范純仁為時名卿宜審治所以遣吏者政恐有差誤耳即賜緋衣銀魚馮侯拜賜出執政謂曰上怒慶帥甚君其慎之馮侯曰上意亦無他因誦所聞徳音執政不恱及考按連逮熟羌之獄實不可變而古所言高平公七事皆無狀附置以聞執政殊失望㑹史籍有異詞詔遣韓晉卿覆治執政因言范純仁事亦恐治未竟願令晉卿盡覆神宗曰范純仁事已明白勿復治也獄具如馮侯章於是籍古皆得罪而髙平公獨免執政大不快未幾髙平公復為鄰帥所奏謫守信陽而馮侯失用事者意亦竟罷去繇是言之非有守君子而何觀曰如公所云殆古之遺直也豈特部使者而已哉後六年馮侯自尚書郎出守梓潼加集賢校理實始相識質其事信然嗚呼古語有之人能勝天天定亦能勝人信斯言也方髙平公被誣上有明天子之無私下有良使者之不撓可以免矣而二三子表裏為姦始終巧請至於抵罪而後已可不謂人能勝天乎然當時所謂用事之臣與諸附麗之者今日屈指數之幾人為能無恙而髙平公方以故相之重保釐西洛郊馮侯亦通籍儒館持節鄉郡其福禄夀考功業未艾也可不謂天定亦能勝人乎馮侯將行同舎之士二十有八人餞飲于慈孝佛寺又將属賦詩而觀以拙陋所欲言者不能盡之於詩乃以舊聞并以甞所感嘆者爲序贈之淮海集卷之三十九
