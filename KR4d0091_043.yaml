front:
  text: 淮海後集卷之二詩
  hash: sha256:a4c2f510ea8372f4b0525a1fbb2cfcc62041c364bd5cf638995f1e842ac05c85
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_043-1a}
body:
  text: 秦觀少遊秋夜病起懷端叔作詩寄之寢瘵當老秋入夜庭軒空天光脆如洗月色清無縫風飈戾戾輕露氣霏霏重簷花伴徐步籠燭窺孤諷𬗟惟情所親佳辰誰與共夫子淮海英材大難為用秉心既絶俗發語自驚衆麈尾扣球琳筆端攢螮蝀雄深迫楊馬妙麗該沈宋浮沈任朝野魚鳥狎鯤鳯與時真楚越於我實伯仲爾來居邑鄰頗便書札貢上憑鴻鴈傳下託鯉魚送二物或愆時已辱移文訟人生無根柢泛若愛波葑昧者復汲汲晨暝趨一閧隂持含沙毒射影期必中自匿嫫母容對客施錦幪溘然一朝逝萬事俱成夢形骸猶汝辭利勢猶君動思之可太息傷之為長慟所以古達人脫身事髙縱我生尤不敏胸腹常空洞強顏入規模垂耳受羈鞚行謀買竿栧名理就折衷但恐狂接輿煩君更嘲弄送孫誠之尉北海吾鄉如覆盂地據揚楚脊環以萬頃湖黏天四無壁蜿蜒戲神珠正晝飛霹靂草木無異姿靈氣殊鬱積所以生羣材各抱荆山璧小為百夫防大為萬人敵夫子少邁倫喑嗚阻金石奏賦明光宫玉座瞻咫尺翻身墮雲霄十載迫窮厄焚舟更一戰得尉滄海北五月乘畫船簫鼓事逺適天橫齊山青雨帶楚水黑勿云晚方仕四十乃古昔勿云名位卑九萬自此擊幽求尉朝邑鬢髮森已白元振尉通泉律令非所即一朝會風雲顧眄立四極行矣壯舊圖勉逸抱甕搰搰抱甕人汒呼治其內仲尼為所輕子貢無以對捨器欲還朴為量固已隘苟得渾沌真寧羞事機械讀列子咄咄兩小兒多言空爾為後之日無定不覺心有期尺捶探蒼溟但令傍者嗤誰謂不能決孔丘乃真知和顯之長老禪子觀因緣寸晷無復餘講人治經論艾夜猶未除冷風奏哀松寒月挂碧虛此意了不諭悲哉同翳如清夜子夜天無雲稀星耿頑碧茫茫行役者對此焉不息胡為蝸角端相與競尋尺勸君歸去來飛空鳥無迹南池泛泛池中鳬上下與水俱不與水爭力所以全其軀遇物貴含垢修身戒明汚胡能若雲月浪自驚羣愚和王定國崢嶸嵗月徂物色莾於邑歡言公子至坐失百憂集宵箔蕙煙橫寒炮玉脂泣勉旃決南圖荷華行滿隰宿金山山南山北江水流半空金碧隨雲浮我來仍值風日好十月未寒如晚秋山僧引客尋蒼翠歷卷參荖到平地萬里風來拂骨清却憶人間如夢寐夜深無風月入扉相對老人如稿枝流水與天爭入海共笑此心誰得知下山却向中􅨀望畨憶當時在屏障老母思兒且欲歸回首雲峰已天上别賈耘老若有人兮霅之濱服火齊兮冠切雲有才不為世所掄盡入詩句為奇新忘歸繁弱不浪陳發必中的疑有神目關飛鳥緍蒼鱗俯仰自娛忘賤貧繄我與君素參辰孰為一見同天倫共指飛光易沉淪莫若痛飲還我真况有內子賢文君終日呌呼不怒嗔酒酣往往出前珍瓦甌竹筯羞青芹左列文史右紅裙樽前不覺徂清晨念我行當西道秦拏舟來別非所欣欲託毫素通殷勤郢匠旁矚難揮斤人生百齡同臂伸斷梗流萍暫相親行行飲酒且勿云丈夫萬里猶比鄰李端叔見寄次韻君文豪贍無與儔使我吟諷忘離憂浩如沅湘起陽侯翻星轉日吞數州華章藻句饒風力頃刻朱紅迷畛域一班縱復為管窺萬派終難以蠡測區區文墨倦髙情解鞅還遊恍惚庭半槽新水六尺簟卧視雲物行空青伊我籃輿抵京縣溽暑黃埃負初願君家只在御城東彌月不能三兩見求仙未若醉中真蟻鬬蛾飛愁殺人清都夢斷理歸棹回首一樹瓊枝新歸來草木春風換世事蝟毛那可算幸謝故人頻寄書莫笑元郎自呼漫陳令舉妙奴詩西湖水滑多嬌嬙妙奴十二正芬芳肌膚晳白髮腳長含語未發先有香溪上夜燕侍簪裳皎如華月墮滄浪音聲入雲能斷腸不許北客辭酒漿主人藹藹邦之良少年射䇿謁未央俊詞偉氣森開張玉杓貫斗生怒芒天欲文采老更昌故使斂翮窺羣翔五十僅補尚書郎浩歌騎牛倚徜徉東風戲雨花草狂二溪泱泱青黛光妙奴勿倦侑羽觴主人正欲遊醉鄉自警古人去後音容寂何處茫茫尋舊迹君看草遍北邙山骼胔猶來丘壟積那堪此地日黃昏長途萬里傷行客只知恩愛動傷情豈悟區區頭已白莫嫌天地少含弘自是人心多褊窄爭名競利走如狂復被利名生怨隙貪聲戀色鎮如癡終被聲色迷阡陌休言七十古稀有最苦如今難半百聞道蓬宫仙子間紅塵不染無瑕謫日月遲遲異短明三峰秀麗皆仙格女蘿覆石蔓黃花芝草琅玕知幾尺桃源長占四時春漾漾華池真水碧乘槎擬欲扣金扄巨浪洪波依舊隔歸來芳舍與誰儔老鶴松間三四隻唳天聲動彩雲飛對我時時振長翮驂鸞未遇且悠悠盡日琴書還自適紛華任使投吾前爭奈此心終匪石拜命懷金誰謂榮低頭未免拾言責從兹俗態兩相忘笑指青山歸路僻同人有志覔長生運氣休糧徒有益須知下手向無為莫學迷徒賴針灸陪李公擇觀金地佛牙薄伽梵相含空虛化人分假同璠璵爾來示滅二千嵗真骨萬里傳中區錢塘有尼號法照得自禁掖藏金鋪欲因此勝髙構閣假設象似開羣愚偶從好事至霅上持出瞻玩相歡娛靈牙寶色玉不如上有無數光明珠莊嚴一一出御帑蜿蜒繡袋滎硨磲是時賔客盡上士回向已登十地初殷勤稱讃出軟語坐人顧眄驚俗汚因悲人生信如夢浪逐聲勢霜鬢鬚一源清淨誰復無枉入諸趣更﨑嶇願因今日詣真際古松白日常蕭疏乃知金仙妙難測餘潤普及霑凡枯况復老尼亦才辨朱甍碧瓦非難圖行看岹嶢倚青嶂翁嫗頌説傾三吳雪浪石漢庭卿士如雲屯結綬彈冠朝至尊登髙履危足在外神色不變惟伯昏金華掉頭不肯住乞身欲老江南村天恩許兼兩學士將兵百萬守北門居士強名曰天元寤寐山水勞心魂髙齋引泉注竒石迅若飛浪來雲根朔南修好八十載兵法雖妙何足論夜闌畨漢人馬靜想見雉堞低金盆報罷五更人吏散坐調一氣白元存和蔡天啓贈文潛之什蔡侯飽學困干釡濯足清江起南土劇談頗似燕客豪快奪范雎如墜雨東城橋梓未足論柏直何為口方乳蔣信山中伴香火三年不厭長蔬苦平生瑰瑋有誰同要得長侯三日語晝間那自運甓忙時清不用聞雞舞桓榮歡喜見車馬書册辛勤立門户要當食肉似班超猛虎何嘗窺案俎早春黃金蔌蔌滿垂楊尚有春寒到畫堂酒力漸銷歌扇怯入簾飛雪帶梅香赴杭倅至汴上作俯仰觚稜十載間扁舟江海得身間平生孤負僧牀睡準擬如今處處還無題掃地燒香閉閣眠簟紋如水帳如煙客來夢覺知何處挂起西窗浪接天蘇子瞻記江南所題詩夲不全余嘗見之記其五絶今以補子瞻之遺第十卷擬織錦詩注下東坡跋并三絶見正集紅窗小泣低聲怨永夕春風斗帳空中酒落花飛絮亂曉鶯啼破夢匆匆其二晞草露如郎幸薄亂花飛似妾情多歸鴻見處彈珠淚語燕聞時斂翠蛾其三琴絃斷續愁兼恨嶺水分流西復東深院小扉紅日落繡窗間倚更誰同其四參橫霽色天沉水鳥宿寒枝竹瑣煙衾惹舊香清夜半淚凝殘燭畫堂前其五寒信霜風似葉黃冷燈殘月照空牀看君記憶傳文錦字字愁縈惹斷腸淮海後集卷之二
