front:
  text: 淮海集卷之八七言律詩
  hash: sha256:caad0d7094b7355b93e1a7177d57382507cb46a0b44bd2168aa8649574dc95e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_008-1a}
body:
  text: 秦觀少游寄孫莘老少監一出承明七換麾君恩復許上􅊮墀白衣蒼狗無常態璞玉渾金有定姿天上圖書森似舊人間歲月浪如馳鼇頭只在蓬山畔行赴蟠桃熟後期次韻馬忠玉喜王定國還自濱州淮海相逢一觧顏紛紛歲月夢魂間𥘉驚漁艇迷花去忽認星槎拂斗還桂嶺暮豋猿斷續槐堂春到鳥綿蠻石渠舊議行當復未信佳時得自閑寄李公擇郎中節旄淮畔脫秋風忽跨鯨魚上碧空華秀兩跗當重露文成五色在髙桐江南又說衣冠盛廷右仍瞻禮樂隆朝睍旣升淮海見瀌瀌雨雪自消融寄李端叔編修旗亭觧手屢冬春聞道歸来白髪新馬革褁尸心未艾金龜換酒氣方震夢魂偷遶邉城月導從公穿禁路塵知有新編號横槊為憑東使寄淮濱寄題倪敦復北軒倪郎才韻照氷壷北向開軒頗自娛簷度蕙風鳴鴶鵴壁經梅雨畫螔蝓觥籌交錯銀河掛文史縱横角簟鋪官舍私居同是漫莫嗟三徑就荒蕪寄題盧君斗齋俠氣軒軒翰墨埸邅廻世路鬢成霜出從車馬行千里歸與琴書寄一方鳥囀入簾春欲破爐香侵夢日𥘉長扁舟㑹有山陽役聊借狂夫挹酒漿次韻酬周開祖宣義并州令尹古人風淮海相忘十載中麗句暁披花綽約清談𥘉扣玉丁東追攀昔共猗犴子嗜好今同桑苧翁所惜華船輕觧繂未窺笠澤故書叢送王元龍赴泗州糧料院子猷風味最諸王試吏聊懷筦庫章鵠峙碧桐𥘉振羽珠遺滄海漸騰光淮山暮眺千峰耀洛水秋輸萬鷁翔顧我行為大梁役一巵薄酒話愁腸次韻子由題九曲池廣陵五題蕭瑟通池閟茂林岸傍無復屬車音涵春似恨隋家逺漲暁疑連蜀井深鬪草事空煙冉冉司花人逺樹隂隂勞生俛仰成陳迹縱有遺音可用㝷清弹怨廣陵隋家子由詩云嵇老蕭條荒草外龍舟想像緑楊隂都人似有興亡恨毎到水調寄哀音可憐九曲遺聲盡惟有一池春水深鳳闕度㝷殘春一次韻子由題平山堂棟宇髙開古寺間盡収佳處入雕欄山浮海上靑螺逺天轉江南碧玉寛雨檻幽花滋淺淚風巵清酒漲㣲瀾逰人若論豋臨美湏作淮東第一觀平看江上山晴光子由詩云堂上小棠隂蔽芾壁間遺墨涕氿瀾人亡坐覺風流盡遺構千里對慿欄海門僅可一二數雲夢猶吞八九寛簷外細觀仍須子次韻子由題蜀井蜀岡精氣滀多年故有清泉發石田乍飮肺肝俱澡雪攵窺杖屨亦輕便炊成香稻流珠滑煑出新茶潑乳鮮坐使二公鄉思動放柸西望欲揮鞭東逰十一年甘泉子由詩云信脚不収容盥濯紅泥仍許置清鮮早知鄉勝為客逰宦香稻憶歸田行逢蜀井怳如夢試煑山茶意自便短綆着鞭何須更次韻子由題摘星亭迷樓舊址崑崙左右兩招提中起孤髙雉堞西不見焼香成宿霧虚傳裁錦作障泥螢流花苑飛星亂蕪滿春城綠髪齊長憶凭欄風雨後斷虹明處海天低孤髙特地迷迷藏子由詩云闕角興亡應未覺後来愁思獨難齊只堪留作逰觀地看遍渾忘日東西江流入海情無限暮雨連山醉似泥夢衰處低峰巒處次韻子由題光化塔古佛悲憐得度人應緣来現比丘身水流月落知何處花發鸎啼又一春方外笑談清似玉夢中煩惱細如塵老僧自說從居此却悔平時事逺巡孤塔閟真人云是子由詩云山頭世外無心地一掃胷中累劫塵方丈近聞延老宿清朝僧伽第二身處處金錢追晩供家家𧖟麥保新春欲求逡巡留客語次韻子瞻贈金山寳覺大師雲峰一變隔炎凉猶喜重来飯積香宿鳥水干迎暁閙亂帆天際受風忙青鞋踏雨㝷幽徑朱火籠紗語上方珍重故人敦妙契自憐身世兩㣲茫斗酒慱西凉但記子瞻詩云誰能漫與山阿曲明月常隨屋角方稽首願師憐久客直将齋厨法豉香往事真同一夢覺髙談誰洗五年忙清風茫茫歸路指遊鑑湖畫舫珠簾出繚牆天風吹到芰荷鄉水光入座杯盤瑩花氣侵人笑語香翡翠側身窺渌酒蜻蜓偷眼避紅粧莆萄力緩單衣怯始信湖中五月凉謁禹廟隂隂古殿注脩廊海伯川靈儼在傍一代衣冠埋石窆千年風雨鎻梅梁碧雲暮合稽山暗紅芰秋開鑑水香令我免魚繇帝力恨無歌舞奠椒漿蓬莱閣雄簷傑檻跨峥嶸席上風雲指顧生千里勝形歸爼豆七州和氣入簫笙人逰晩㟁朱樓逺鳥度晴空碧嶂横今夜請看東越分藩星應帶少㣲明天鍾鼔宴峥嶸早程公闢次韻半鼇破海頭争並玉鷺排烟陣自横我是蓬莱東道主倚晚隂晴景旋生湖暖水香春載酒月寒雲白夜聞笙金日𥘉明欄先占别程公闢給事人物風流推鎮東夕郎持節作元戎罇前倦客劉師命月下淸歌盛小叢裘弊黒貂霜正急書傳黄犬歲将竆買舟江上辭公去逥首蓬莱夢寐中家仲父早相從晩程公闢次韻君時摶擊飛終逺隨處豋臨興莫竆人下天来應問得髙接清談有阿戎曲水暢情林竹茂小山招隱桂枝叢與月華中名已到中秋口號雲山簷楯接低空公宴𥘉開氣欝葱照海旌幢秋色裏激天鼓吹月明中香槽旋滴珠千顆歌扇驚圍玉一叢二十四橋人望處台星正在廣寒宫客有傳朝議欲以子瞻使髙麗大臣有惜其去者白罷之作詩以紀其事與莘老同賦文章異域有知音鴨綠差池一醉吟頴士聲名動倭國樂天辭筆過鷄林節髦零落氊吞雪辯舌縱横印佩金奉使風流家世事㡬隨浪拍海東岑莘老作此一首學士風流異域傳㡬航雲海使南天不因名動五千里豈見文髙二百年貢外别題求妙札錦中翻様織新篇淹留却恨鴛行舊不得飛觴駐蹕前淮海集卷第八
