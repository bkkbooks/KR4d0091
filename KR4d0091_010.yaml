front:
  text: 淮海集卷第十絶句
  hash: sha256:e287f724759221bd7059e1e9916e70e9671d1e6958dc5de2ecc5083247161faa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_010-1a}
body:
  text: 秦觀少遊寄孫傳師著作上林池籞富春風十里宫青錯御紅應與少年修故事誤隨逰轂柳花中泗州東城晚望渺渺孤城白水環舳艫人語夕霏間林梢一抹青如畫應是淮流轉處山戲雲龍山人二絶芳草未應羞鵯鵊潛鱗終是畏提壷蔡經背上䀶猶在更念麻姑指爪無選勝只携長脛鶴入廛還駕短轅車時人若問虛玄事笑答無過李老書圓通院白衣閣白衣閣外繞朱欄人在琉璃菡萏間誰把此花為刻漏修行不放一時間無邉剎境一毫端同住澄清覺海間還是此花并此葉壞空成住未曾間一根反本六根同古佛傳家有此風滿目紅蕖參翠蓋不唯門裏獲圓通照閣彌猴鏡裏三身現龍女珠中萬象開未若此軒人散後水光清泛月華來睡足寮寄震鼎二弟與物無營但欲眠客來從笑腹便便秋生淮海涼如水得句還應夢阿連次韻參寥見别爐香冉冉紆寒穗篝火熒熒擢夜芒預想江天回首處雪風橫急鴈聲長與倪老伯輝九曲池有懷元龍參寥雲月姢姢淮海秋隋家池上共浮遊可憐一假風流事特欠支郎與子猷春日五首幅巾投曉入西園春動林塘物物鮮却憩小庭才日出海棠花發麝香眠一夕輕雷落萬絲霽光浮瓦碧差差有情芍藥含春淚無力薔薇卧曉枝夾衣新著倦琴書散䇿池塘返照𥘉翠碧黃鸝相續去荇絲深處見逰魚春禽葉底引圓吭臨罷黃庭日正長滿院柳花寒食後旋鑽新火爇爐香金屋舊題煩乙子蜜脾新採賴蜂臣蜻蜓蛺蝶無情思隨例顛忙狂一作過一春秋日三首霜落𨝍溝積水清寒星無數傍船明菰蒲深處疑無地忽有人家笑語聲月團新碾瀹花瓷飲罷呼兒課楚詞風定小軒無落葉青蟲相對吐秋絲連卷雌霓挂西樓逐由追晴意未休安得萬粧相向舞酒酣聊把作纒頭次韻子由召伯埭見别三首孤蓬短榜沂河流無賴寒侵紫綺裘召伯埭南春欲盡為公重賦伴牢愁安眠晝擁裘知有故人家在此速將子由詩云濛濛春雨濕𨝍溝蓬底間愁詩卷洗靑熒燈火照深更逐客舟航冷似冰到處故應山作主隨方還有月為朋新詩句琢冰送我扁舟六十里未嫌子由詩云筆端大字鴉棲壁袖裏交朋罪垢汚冠蓋紛紛不我謀掩關聊與古人逰會須匹馬淮西去雲巘風溪遂所求廬山得縱逰便欲携君將船去念君子由詩云髙安此去風濤惡還有何求無罪去還自廣陵四首薄茶便當烏程酒短艇聊充下澤車墳墓去家無百里往來仍不廢觀書南北悠悠三十年謝公遺埭故依然欲論舊事無人共卧聽鍾魚古寺邉𨝍溝繚繞上雲空坐阻層冰不得通賴有東風可人意為開明鏡玉奩中天寒水鳥自相依十百為群戲落暉過盡行人都不起忽聞水響一齊飛元日立春三絶此度春非草草回美人休著剪刀催直須殘臘十分盡始共新年一併來發春獻歲偶然同新曆觀天最有功頭上兩般幡勝影一時飛入酒杯中攝提東直斗杓寒驟覺中原氣象寬天為兩宫同號令不教春歲各開端次韻宋履中題李侯檀欒亭隂隂數畝籜龍稠亭外危通一徑幽頗似竹林當日集酒狂莫笑阮陳留春日偶題呈上尚書丈丈三年京國鬢如絲又見新花發故枝日典春衣非為酒家貧食粥已多時觀辱戶部錢尚書和詩餉祿米再成二章上謝本欲先生一解頥頓煩分米慰長飢客無貴賤皆𬞞飯惟有慈親食肉糜夢裏光隂挽不回掩關獨坐萬緣灰偶因問訊維摩病香積天中施飯來擬題織錦圖悲風鳴葉秋宵冷寒絲縈手淚殘粧微燭窺人愁斷腸機翻雲錦妙成章晚出左掖金爵觚稜轉夕暉翩翩宫葉墮秋衣出門塵障如黃霧始覺身從天上歸次韻蔡子駿瓊花無雙亭上傳觴處最惜人歸月上時相見異鄉心欲絶可憐花與月應知處州水南庵二首竹柏蕭森溪水南道人為作小圓庵市區收罷魚豚稅來與彌陀共一龕此身分付一蒲團靜對蕭蕭玉數竿偶為老僧煎茗粥自携修綆汲清寬三月晦日偶題節物相催各自新癡心兒女挽留春芳菲歇去何須恨夏木隂隂正可人次韻東坡上元扈從三絶赭黃繖底望龍章不斷惟聞蠟炬香一片韶音歸復道重瞳左右列英皇端門魏闕鬱峥嶸燈火成山輦路平不待上林鶯百囀教坊先已進新聲仗下番夷各一群機泉如雨自繽紛細看香案旁邉吏却是茅家大小君淮海集卷之十
