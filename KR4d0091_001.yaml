  text: 淮海集卷第一
  hash: sha256:98423d92b8b79b14d942a585cb3d05c6f88e4d6cd68c8721f73fc4435b8f72d3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_001-1a}
body:
  text: 秦觀少游浮山堰賦并引梁武帝天監十三年用魏降人王足計欲以淮水灌壽陽乃假太子右衞康絢節督卒二十萬作浮山堰扵鍾離而淮流湍駛漂疾將合復潰或曰淮有蛟龍喜乗風雨壞岸其性惡鐵絢以為然乃引東西冶鐵器數千萬斤益以薪石沉之猶踰年乃合堰袤九里水逆淮而上所蒙被甚廣魏人患之果徙壽陽戍頓八公山餘民分就岡壠未㡬淮暴漲堰壞奔于海有聲如雷水之怪袄蔽流而下死者數十萬人𥘉鎮星犯天江而堰實退舍而壞嗚呼異哉感而作浮山堰賦其詞曰繄四瀆之並釃兮寔脉絡扵坤靈惟長淮之湠漫兮自桐栢而發源貫江河以下騖兮拉泗沂而左奔走獰雷以赴海兮駕扶摇而薄山固元氣之宣節兮熄衆兆之災患粤蕭梁之服命兮抗北魏以爭衡信降虜之詭計兮阻湯湯而倒征依兩崖以受土兮羗合脊扵中央揵竹甾石之不足兮文沈鐵以厭不祥袤九里以中峙兮截萬派之奔茫大隄矻乎如墉兮杞柳薨其成行展源深而支永兮雖蹔否而必通倐鯨吼以奔潰兮與蒼蒼而俱東若燃犀之照渚兮旅百怪而争遒􅖃馬怒而嘘蹀兮虎蛟咆而相紏哀死者之數萬兮孤魂逝其焉游背自然以司鑿兮固神禹之所惡世苟近以昧逺兮或不攺其此度螳蜋怒臂以當車兮飛衞銜石而填海􅉃梁人之不思兮卒取非扵異代豈方迫扵㝷引兮不遑議夫無竆將姦臣取容以幸入兮公相援而欺蒙抑五材囚壯之有數兮特假手扵憧憧系曰敦阜宼㝠大川屯精氣扶輿變乾文運徒力頓漂無根潮波復故彌億年黄樓賦并引太守蘇公守彭城之明年旣治河决之變民以更生又因修繕其城作黄樓扵東門之上以為水受制扵土而土之色黄故取名焉樓成使其客髙郵秦觀賦之其詞曰惟黄樓之瓌瑋兮冠雉堞之左方挾光晷以横出兮干雲氣而上征旣要眇以有度兮又洞逹而無旁斥丹雘而不御兮爰取法乎中央列千山而環峙兮交二水而旁奔岡陵奮其攫拏兮谿谷效其吐吞覽形勢之四塞兮識諸雄之所存意天作以遺公兮慰平日之憂勤繄大河之𥘉决兮狂流漫而稽天御扶揺以東下兮紛萬馬而争前象罔出而侮人兮螭蜃過而垂延㣲精誠之所貫兮㡬孤墉之不全偷朝夕以昧逺兮固前識之所羞慮異日之或然兮復壓之以兹樓時不可以驟得兮姑從容而浮逰儻豋臨之信美兮又何必乎故丘觴酒醪以為壽兮旅殽核以為儀儼雲髾以侍側兮笑言樂而忘時發哀彈與豪吹兮飛鳥起而參差悵所思之遲暮兮綴明月而成詞噫變故之相詭兮遒傳馬之更馳昔何負而遑遽兮今何暇而遨嬉豈造物之莫詔兮惟元元之自貽將苦逸之有數兮疇工拙之能為韙哲人之知其故兮蹈夷險而皆宜視蚊虻之過前兮曾不介乎心思正余冠之崔嵬兮服余佩之焜煌從公扵斯樓兮聊裴囬以徜徉寄作詩為謝我坐黄樓上欲作黄子瞻謝詩云太虚以黄樓賦見旗楚山以為城泗水以為池我詩無傑句萬景驕莫隨樓詩忽得故人書中有黄樓詞黄樓髙十丈下䢖五丈山多磬石清滑如流脂朱蠟為摹刻細妙分毫釐佳處夫子獨何妙雨雹散雷推雄辭雜今古中有屈宋姿南有來者知未易識當寄老庵賦或問孫先生之逰湯泉山也嘗扵佛祠之旁二松之下誅䉜草茅平夷土塗規以為庵曰寄老焉子時實從與見其事願揚㩁而陳之僕曰唯唯寄老之區在扵湯泉實惟歴陽東城之域山林鬱其修阻水土婉而滋息風和氣平物無癘疫其出逰也南則峰巒經亘二百餘里前望䢖業之都却顧項王之亭龍窟呀其旁出江漫漫而徂征東則惠濟真相二刹相望殿寢中開四注脩廊間從逰子扵焉相羊沈燎茗飮樂未渠央西則赭落之前三井天出幽毖白浪明晦如一旁輸有斛上庇有室觧衣入逰百疾為失北則瓦梁之河隂陵之澤水潦之所聚㑹魚鼈之所充斥芡菱蒲蓴毛髪之富𬒳及鄰國其入居也則閉關却掃反聽收視内外旣進與妙自㑹湛乎若玉淵之澄枵然如槁木之廢其㳺也其居也無所適而非道者世奚足以識之哉雖然先生方為侍從之臣充諌諍之官論思獻納日不遑給雖欲復從二三子扵寄老之上未可得也一旦功成事畢引老乞身天子憫之不煩以政公卿大夫設祖道供帳扵國門之外酒闋升車望寄老而歸焉則僕也亦将負杖屢而從之矣湯泉賦大江之濱東城之野有泉出焉直囬峰負深谷分埓引源迤邐相屬晨夜有聲涵雲注玉薄為虎鬚洑為魚目鱗介莫潜遇者斯浴此何水也哉野老告余曰泓泓㳙㳙莫虞歲年不火而燠其名湯泉嗚呼豈非熒惑莅扵上耶燭龍隱扵中耶旁通咸池日御之所經耶幽精沈魄隂償其負耶丹砂黃硫金石之氣酷悍之所激耶徳有常仁惠公而浹寒凝海兮不冰旱焦山兮不竭其或燥濕外干精氣散越膚革瘡瘍憊筋淫血欣瀄汨之蹔㳺怳幽憂之永脫以沐則髪澤以頮則膚恱其羡流冗浸捐棄扵溝壑者猶能灌𬞞稻之畦已牛馬之暍此又何其然耶吾聞天下之水厥類寔繁至扵弱水儲隂投羽必沈火井萃陽爛石灼金祥摽醴泉病飮而瘳異紀滋穴神瀵以流焦溪乏罥蔓之飾沸潭謝聱取之㳺其餘洒墨所發膠鹽是滋啜懷千金飮狂一國裒玉乳以中涵撗金絲而徑度詭品繆名紛莫為數咸受命扵元精亦各私其所遇若夫匡廬汝水之旁尉氏驪山之下烟菲掩褥王孫鳥隼之所娛金穴椒房專寵靡曼之所占則湯泉之中又有顯晦者焉野老囅然而笑曰善乎齊給之士曵杖而去行歌扵塗曰滭沸滂沱奮此泉兮被彼山阿吾唯灌沐兮不知其他子瞻䟦云余之所聞湯泉七其五則今三子之所逰與大虚之所賦所謂匡廬汝水尉氏驪山其二則余之所見鳯翔之駱谷與渝州之陳氏山居也皆棄扵竆山之中山僧野人之所浴麋鹿猿猱之所飮惟驪山當往來之衝華堂玉甃獨為勝絶然坐明皇之累為楊李禄山所汙使口舌之士援筆唾駡以為亡國之餘辱孰甚焉今惠濟之泉獨為三子者詠嘆如此豈非所寄僻逺不為當塗者所溷而為髙人逸才與世異趣者之所樂乎或曰明皇之累楊李禄山之汙泉豈知汙之然則幽逺僻陋之歎亦非泉所病也泉固無所榮辱特以人意推之可以為抱器適用而不擇所處者之戒元豐元年十月五日歎二鶴賦廣陵郡宅之圃有二鶴焉昻然如人處乎幽間翅翮摧傷而弗能飛翻雖雄雌之相從常悒悒其鮮懽時引吭而哀唳若對客而永嘆圃吏告予曰此𬗋薇錢公之鶴也公熈寧時實守此邦心虚一而體道治清浄而忘言既不耽乎豆觴又不嗜乎匏絃惟此二鶴與之周旋􅹣則俛仰扵賓掾之後出則飛鳴乎導從之先故鶴之來也則知使君之將至鶴之往也則知使君之將還是時一郡之人好甚扵姻敬愈扵客如愛子之居家若寵臣之在國晝從乎風亭之濱夜棲乎月臺之側謂此幸之可常頗超揺而自得逮公之去于今㡬時人各有好鶴誰汝私具名物扵有司雞䳱易而侮之傍軒楹而蒙叱歷階戺而遭麾惟主人之故客間一遇而嗟咨余聞而嘆曰噫嘻有恃而生者失其所恃則悲彼有啄乎廣莫之野飮于清冷之淵随林丘而止息順風氣而騰騫一鳴九皐聲聞于天若然者又豈衞侯之能好而支遁之可憐哉郭子儀單騎見虜賦壓以至誠汾陽征虜回紇入㓂汾陽出征何單騎以見虜盖臨戎而示情匹馬雄趨方傳呼而免胄諸羗駭瞩俄下拜以投兵方其唐祚中㣲胡塵内侮承范陽猖獗之亂值永泰因循之主金繒不足以塞其貪嗜鎧仗不足以止其攘取雲屯三輔但分諸将之兵烏合萬群難破重圍之虜子儀乃外㢮嚴備中輸至誠氣干霄而直上身按轡以徐行扵是露刄者膽喪控弦者骨驚謂令公尚臨扵金甲想可汗未厭扵寰􅌡頓釋前憾來㝷舊盟彼何人斯忽去幢幡之盛果吾父也敢論戈甲之精豈非事方急則宜有異謀軍旣孤則難拘常法遭彼虜之悍勁屬我師之困乏校之力則理必敗露示以誠則意當親狎所以徹衛四環去兵兩夾雖鋒無鏌邪之銳而勢有泰山之壓據鞍以出若乘檎虎之騘失仗而驚如棄華元之甲金石至堅也以誠可動天地至大也以誠可聞矧爾熊羆之屬困乎蛇豕之群扵是時也将乗驕而必敗兵不戢則将焚惟有明信乃成茂勲吐蕃由是而引歸師殱靈夏僕固扵焉而暴卒禍息并汾非不知猛虎無助也受侮扵狐狸神龍失水也見侵扵螻蟻曷為鋒鏑之交下遽遺紀綱而不以蓋念至威無恃扵張皇大智不資扵恢詭逺同光武輕行銅馬之營近類曹成獨造國良之壘向若怨結不觧􅍔連未央飬威嚴扵将軍之幕角技巧扵勇士之場攻且攻兮天變色戰復戰兮星動芒如此則雖驍雄而必弊顧創病以何長符秦夸南伐之師坐投肥水新室恃北來之衆立潰昆陽固知精擊剌者非為将之良敢殺伐者非用兵之至況徳善之身積宜福祥之天卑故中書二十四考焉由此而致和淵明歸去來辭歸去來兮眷眷懷歸今得歸念我生之多艱心知免而猶悲天風飄兮余迎海月烱兮余追省已空之憂患疑是夢而復非及我家扵中途兒女欣而牽衣望松楸而長慟悲心極而更㣲升沈㡬何歲月如奔嗟我宿昔通籍璧門賜金雖盡給札尚存愧此散木繆為犧尊屬黨論之云興雷霆發乎威顔淮南謫扵天庖予小子其何安歲七官而五譴越鬼門之幽關化猿鶴之有日詎國光之復觀忽大明之生東釋纍囚而北還釃天漢而一洗覺宇宙之隨寛歸去來兮請逍遥扵至㳺内取足扵一身復從物兮何求榮莫榮扵不辱樂莫樂扵無憂鄉人告予以有年黍稷欝乎盈疇止有弊廬泛有扁舟濯予足兮寒泉振予衣兮古丘洞胷中之滯礙眇雲散而風流識此行之匪禍乃造物之餘休已矣哉桔槹俛仰無已時舉觴自屬聊淹留汝今不巳将安之封侯巳絕念仙事亦難期依先塋而灑掃從稚子而耘耔脩杜康之廢祠𥙷由庚之亡詩為太平之幸老幅巾待盡更奚疑淮海集卷第一
