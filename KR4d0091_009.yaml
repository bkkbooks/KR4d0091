front:
  text: 淮海集卷之九
  hash: sha256:a848d140fafbee4f4ef0c19b47f5e06c1777a36f0d06e14cbf626d2778548195
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_009-1a}
body:
  text: 泰觀少遊顯之禪老許以草庵見處作詩以約之汨汨塵勞不自堪駝裘鞭馬度晴嵐洞天窅窕清都邃神水歊蒸翠釡涵列岫過霜仍暗曖雙松迎臘正驂驔此心久已蒙師指更許山中為結庵橡葉岡頭釋馬䘖區中竒觀得窮探崕空飛鼠聲相應江靜群峰影倒涵居士碧雲裁秀句道人哀玉扣清談偶成二老風流事不是三乘宿草庵秀嶺拱層簷方丈參寥次韻􅐻盤清曉猊臺震險句窮宵虎穴探白傳異時修故事杖藜門門揖翠嵐風激松梢聲間發月留泉底影相涵天機雲庵應許到和孫莘老逰龍洞葦蕭傳火度冥冥乍入清都醉魄醒草隱月崕垂鳳尾風生隂穴帶龍腥壁間泉貯千鍾碧門外天橫數尺青更欲仗笻晉頃刻却疑朝市巳千齡紆入杳冥神鑱鬼唱首詩側徑縈江雲外白一池陽井雪中青還同康樂登臨海可共羊鑿露巖扄天懸乳石映華蓋壁隱莓苔矗翠屏九道寒暫停路與猿猱爭險磴身隨鴻鵠入青冥巉巖曲穴疑河筆不停參寥和曈曨杲日破林坰笑語相將馬公詩興動宛如遊刃發新硎無底蟠屈蒼虬信有靈能使謝送蔣頴叔帥熙河二首侍臣不合出都門為有威名藩漢尊戶部左曹回妙手胸奴右臂落清樽揮毫珠璧生談笑轉盻龍鸞在夢魂潮海一空何足道歸來黃閣坐調元天馬蒲萄隔域門漢庭誰更勇如尊行臺曉日屯千騎祖道春風屬一樽莫許留犁輕結好便令甌脫復遊魂要須盡取熙河地打鼓梁州看上元和劉僕射感舊言懷寄蘇左丞左丞昔守南京僕射方為幕客今同為執政作此詩僕射詩略寄其一聮云論文靑眼今猶在報國丹心老更同三禁提衡繫擾龍拜無燒尾有家風班行舊號靑雲士賓主今為黃閣公炯炯坐屏雲毋隔珊珊行佩水蒼同自驚𥘉到蓬萊上便見驪珠出海宫西城宴集元祐七年三月上巳詔賜館閣官花酒以中浣日遊金明池瓊林苑又會于國夫人園會者二十有六人二首春溜泱泱𥘉滿池晨光欲轉萬年枝樓臺四望煙雲合簾幕千家錦繡垂風過忽聞花外笑日長時奏水中嬉太平誰謂全無象寓在群仙把酒時少監韻次王敏中宜秋門外喜參尋豪竹哀絲發妙音金爵日邉棲壯麗彩虹天際卧清深已煩逸少書陳迹更屬相如賦上林猶恨真人足官府不如魚鳥自飛沈侍郎韻次王仲至清明前一日李觀察席上得風字病軀寒食百無悰偶到平陽舊第中池籞信為三輔冠杯盤真有五陵風美人賦韻分春色上客揮毫奪化工白髮漸于花柳薄但憐流水碧相通次韻羅正之惠綿扇吳扇新翻製素綿名郎持贈意俱圓有人充戶修明月無女乘鸞向𬗋煙供奉宜升淸暑殿動搖合作御風仙誰知揮却靑蠅輩功在春𧖟一覺眠寄新息王令藏春䲧令尹才髙寺為空歲時行樂與民同旋開小䲧藏春色更製新聲寫土風客向樽前忘爾汝路穿花去失西東無言媯女今焉在桃李相傳恨未窮送劉承議解職歸飬征馬蕭蕭柳外鳴議郎歸飬洛陽城登山尚記飛雲處罷吏端如棄唾輕為米折腰知我拙下車入里見君榮堂前嵩少宜秋色獻壽還應旋製聲次韻王仲至侍郎會李觀察池上螭口淸漪下玉欄隔花時聽鳥關關酒行寒食清明際人在蓬壷閬苑間天近省闈卿月麗春偏戚里將星間忽思歸去焚香坐靜取楞嚴看八還慶張君俞都尉留後得子天上吹簫玉作樓蟠桃熟後更無憂內家報喜車凌曉太史占祥斗挂秋龍得一珠應獻佛虎生三日便吞牛魯元福祿何人似坐見張敖數子侯寄題趙侯澄碧軒風流公子四難并更引清漪作小亭潤及玉階春漲雨光浮藻井夜涵星捲簾几硯成圖畫倚檻鬚鬟入鏡屏何日解衣容借榻卧聽螭口瀉泠泠寄張文潛右史解手亭臯才幾月春風已復動林塘稍遷右史公何沗𥘉閲除書國為狂日出想驚儒發冡風行應罷女爭桑東坡手種千株柳聞説邦人比召棠次韻裴秀才上太守向公二首東風巳動北風歸寒氣侵尋自霽威何處管絃傳臘酒誰家刀尺製春衣使君英妙開蓮幕别駕風流出粉闈唯有廣文官獨冷終年如坐水邉磯上客新從頴尾歸使君髙會列南威風將沈燎縈歌扇雪帶梅香上舞衣翻樣雲團分御帑如椽蜜炬出宫闈食前方丈羅珍怪却訝犀燃牛渚磯次韻太守向公登樓眺望二首茫茫汝水抱城根野色偷春入燒䀶千點湘妃枝上淚一聲杜宇水邉魂遙憐鴻隙陂穿路尚想元和賊負恩粉堞女牆都巳盡恍如陶侃夢天門庖煙起處認孤村天色淸寒不見䀶車網湖邉梅濺淚壷公祠畔月銷魂封疆盡是春秋國廟食多懷將相恩試問李斯長歎後誰牽黃犬出東門寄錢節時節出為揚州從事新録兼簡參寥論月柴門不浪開命車良為故人來茫然極目春千里尚想愁腸日九回緑水池邉聊復爾黃梁枕上信悠哉何時共約參寥子自擷青菁作飯材贈劉使君景文落落衣冠八尺雄魚符新賜大河東穰苴兵法申司馬曹植詩原出國風拈筆古心生篆刻引觴俠氣上雲空石渠病客君應笑手校黃書兩鬢蓬答龔深之深巷茅簷日漸長卧看花鳥競朝陽惜無好事携樽酒賴有鄰家振燭光尚友頗存書萬卷封侯正闕木千章錯刀錦假相仍至小子都忘進取狂次韻答裴仲謨十年淮海間居草偶遣兒童次第成方愧貧家矜敝帚忽蒙鄰壁借餘明文昌但願花前老張翰何須身後名移病闔門參拜阻卧聽車馬去來聲答曾存之環堵蕭然汝水隈孤懷炯炯向誰開靑春不覺書邉過白髮無端鏡上來祭竈請鄰聊復爾賣刀買犢豈難哉故人休説封侯事歸釣江天有舊臺春日寓直有懷參寥觚稜金爵自岹嶤藏室春深更寂寥捫虱幽花欹露葉岸巾髙柳轉風條文書几上鬚髯變鞍馬塵中歲月銷何日一笻江海上與君徐步看生潮次韻裴仲謨和何先輩二首聞説何郎操行端蕭然環堵若為安鳥啼花發阻携手水逺山髙空憑欄别後想多黃絹作春來尤厭惠文彈兩章讀罷知髙義貴賤交情自古難汝南古郡寡參尋兀兀長如鶴在隂支枕星河橫醉後入簾風絮報春深青山未落詩人手白髮誰知國士心多謝名郎傳緑綺愧無佳句比南金答閻求仁謝參寥彥溫訪于墳所老濞城西木半摧崑崙岡下路新開故人此地銜憂去禪客他時問疾回聞為樹風增永感却因水鳥證西來已謀寒食驅羸馬細聽清談動玉哀次韻劉遜父以寧齋詩二軸作以還之揚舲偶過海邉州一見名郎破百憂荀氏諸龍俱俊偉河東小鳳最風流明珠白璧堪投報細草幽花入獻酬别駕舊齋何足念文昌新府待公遊次韻何子溫一星就起海隅傍縣弩前驅過射陽行見斯民無重困坐令吾道有餘光簿書不礙詩人筆猿鳥常窺使者章談笑自然群吏肅何須酒後次公狂次韻宋履中近謁大慶退食館中翠華𥘉到殿中間三館諸儒共一班迎謁曉廷清蹕近退穿春仗綵旓間病來怕飮東西玉老去慚陪大小山知續春明退朝録借觀當奉一鴟還與鄧慎思沐于啓聖遇李端叔羸兵瘦馬犯黃塵自笑區區夢裏身不是對花能伏老自緣無酒可澆春校書天祿陪群彥晞髮陽阿遇故人三百六旬如此少更添香火坐逡巡和程給事贇闍黎化去之什風流雲散越王城珍重闍黎願力成不使鄧尼驚倒化祗教白傳歎先行早因妙契窺曹洞竟以清芬繼肇生回首中庭旌騎散月華還可一方明再賦流觴亭仙山逰觀甲寰􅌡不比人間目雨亭歌斷瑶池雲杳杳酒行金谷水泠泠珠簾捲雨驚秋近羅襪凌波笑客醒月下珮環聲更好應容揮麈伴公聽燕觴亭碧流如鏡羽觴飛夏木隂隂五月時淸渭日長逰女困武陵春去落花遲玉笙吹罷觥籌錯蜜炬燒殘簮珥遺吳越風流公第一未輸山簡習家池會蓬萊閣冠裳蓋坐灑清風軒外時聞韻籜龍人面春生紅玉液銀盤煙覆𬗋駝峰天涵秋色山山共樹覺鄉思葉葉重便欲買船江北去為懷明德更從容次韻侍祠南郊風馬雲車下九天郊柴𥘉告帝心虔天如倚蓋臨壇上星若連珠繞御前縹眇佩環參雅奏岧嶤樓閣抱非煙侍臣舉酒欣相屬醉看參橫左右肩與李端叔逰智海用前韻點目誰能化兩龍超然相見古人風紅塵稍與僧家逺白髮偏于我輩公休計浮名千載後且欣湯餅一杯同何時並築𨝍溝上引水澆花半畝宫和黃冕仲寄題延平冷風閣冷風三伏是清秋雖有炎蒸不汝留滿地溪山歸藻井有時絲管下滄洲快哉便是逍遙趣偶爾還成汗漫逰誰謂發揮無妙手賦凌楚玉有家丘次韻謝李安上惠茶故人早歲佩飛霞故遣長須致茗芽寒槖遽收諸品玉午甌𥘉試一團花著書懶復追鴻漸辨水時能效易牙從此道山春困少黃書剩校兩三家次韻范純夫戲答李方叔饋笋兼簡鄧慎思楚山冬笋斸寒空北客長嗟食不重秀色可憐刀切玉淸香不斷鼎烹龍論羔未愧蓴千里入貢當隨傳一封薄祿飬親甘旨少滿包時賴故人供寄少儀弟一隔音塵月屢遷忽收來問涕澘然栖遲册府吾如昨流落江村汝可憐夢裏漫成池草句愁來空誦棣華篇卑飛暫爾無多恨會有髙風送上天九月八日夜大風雨寄王定國長年身外事都捐節物驚心一悵然正是山川秋入夢可堪風雨夜連天桐梢摵摵增悽斷燈燼飛飛落小圓湔洗此情須痛飲明朝試就酒中仙林次中奉使契丹劉仲平出倅鄆州同舍十有六人飮餞于丁氏園次少蓬韻二首送次中諌議鮮車百乘使龍庭路指金燕古北平祖帳列山修故事行臺諸部奏新聲留犂撓酒知胡意尺牘移書示漢情納節便應歸法從中途巳報制書行送平仲學士須句别駕偉儀刑陵谷𥘉無見坦平七子建安推世藝五經中祕擅家聲南宫參綴端如夢東觀分擕空復情莫愛溪堂好風月早來龍尾道前行淮海集卷之九
