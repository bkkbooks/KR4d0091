front:
  text: 淮海集卷第四古詩
  hash: sha256:c959ff84e8a6ff1c77510c52d58528fef447f0b77df8830be5f1d18bb82ce5a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_004-1a}
body:
  text: 秦觀少游同子瞻賦游惠山三首群韻其朱宿韻其一王武陵韻其二竇輟棹縱幽討籃輿入青蒼圓頂相􅌽迓旃檀燎深堂層巒淡如洗傑閣森欲翔林芳含雨滋岫日隔林光㳙㳙續清溜靡靡傳幽香俯仰佳覽眺悠哉身世忘使君厭機械所與惟散人顧慙蒹葭陋繆倚瓊枝新上干青磝磝下屬白磷磷洞天不知老金界無棲塵緬彼人間世烏蟾閱青旻詎得踵三隱山阿相與鄰樓觀相複重邈然閟深樾九龍吐清泠㶁㶁曾未絶罌缶馳千里真珠猶不滅况復從茶僊兹焉試葵月岸巾塵想消散䇿佳興發何以慰遨嬉操觚繼前轍余昔為子瞻云與髙郵秦少㳺杭僧參寥同至覽唐䖏士王陵竇群朱錢塘倅往來無錫未嘗不至恵山旣去五年復為湖州賦夢裏五年過覺來雙鬢蒼還將塵土足一歩漪瀾宿所賦詩愛其語清簡蕭然有出塵之姿追用其韻各虚明中有色清浄自生香還從世俗去永與世俗忘堂俯窺松桂影仰見鵲鶴翔炯然肝肺間巳作氷玉光我二三子皎然無淄磷勝逰豈殊昔清句仍絶塵弔古薄雲不遮山踈雨不濕人蕭蕭松桂滑䇿䇿芒鞋新嘉發山泉烹茶避林樾明䆫傾𬗋盞色味兩竒絶吾生眠泣舊史疾讒歌小旻哀哉扶風子難與巢許鄰敲火人睡起山花發一甌誰與共門外無來轍參寥同賦食耳一飽萬想滅頗笑玉川子饑弄三百月豈如山中周遭瞩層巘矯矯如翶翔下瞰平田流澹然浮日光靑山烟弄滅沒山木含䓗蒼剌舟傍遥岸理䇿升虚堂門暗朝雨寂歷無行人忽穿卉木鬰以新階泉篁解初籜洗雨聞新香雖云迫前途真賞豈易忘松竹栢談笑凌窮旻何愧沈冥子卧霞吞結鄰揚帆渡潄石齒照眼光磷磷史君美無度卓犖遺囂塵風標傲蹤琬􅓨亦未滅嗟我魚目光疇能綴明月狂墨掃琅玕江來洗眼驚翠樾雲姿旣容裔鳥哢更清絶凌梯訪前中人茫茫走飛轍風烟座中發殊勝區馬上口占二首向晨結束事長途利風刮面冰在鬚岡竆得水馬不進霧暗失道人相呼悠悠旁舎見汲井軋軋隔林聞輓車游目騁懷自可樂勿憶鄕縣增煩紆霜風稜稜萬木枯梅花破蕚猶含鬚田家往往事游獵追逐狐兎相號呼㣲茫山中起狂燒隱約林梢低日車馬頭漸覺有佳趣勿厭阡陌多縈紆别子瞻人生異趣各有求繫風捕影祗懷憂我獨不願萬户侯惟願一識蘇徐州徐州英偉非人力世有髙名擅區域珠樹三株詎可攀玉海千㝷真莫測一昨秋風動逺情便憶鱸魚訪洞庭芝蘭不獨庭中秀松栢仍當雪後青故人持節過鄕縣教以東来償所願天上麒麟昔漫聞河東鸑鷟今纔見不将俗物擬天真北斗巳南能㡬人八塼學士風摽逺五馬使君恩意新黄塵冥冥日月換中有盈虚亦何筭㩀龜食蛤暫相從請結後期游汗漫百戰竟不侯伯郎一斗得凉州門負重君無力十年子瞻詩云夜光明月非所投逢年遇合百無憂将軍說盡萬物情硬黄小字臨黄庭故人巳去君未到空吟不入紛華域故人坐上見君文謂古人吁莫測新詩君語識君心短李髯孫眼中見江湖放浪乆全真忽然河畔草青青誰為他鄉各異縣天遣君来破吾願一聞弊帚那堪換我亦淹留豈長筭山中旣未決同歸我聊一鳴驚倒人從横所值無不可知君不怕新詩新千金言有客輕公侯扁舟相從古揚州置之匹馬恨無力千爾耳君其漫淮南三歲吾何求使君到後消人憂君君南歸無限情鴻飛携書堕我庭此書兼置昔年客䄂里相忘同異域新詩空使四座驚隱居未易凡人測使談亹亹解人頥安得座右長相見狂客吾非賀季真醉中麗句淮山青老夫強顔依府縣堆案文書本非願清城酒貴誰當換塵埃姤面非良筭歸来泗上正思君莫吟君似謫仙人末契長遭少年笑白髪應慙傾蓋新都霜爛熳待黄花和黄法曹憶建溪梅花海陵參軍不枯槁醉憶梅花愁絶倒為憐一樹傍寒溪花水多情自相惱淸淚班班知有恨恨春相逢苦不早甘心結子待君来洗雨梳風為誰好誰云廣平心似鐡不惜珠璣與揮掃月没參横畫角哀暗香銷盡令人老天分四時不相貸孤芳轉盻同衰草要須健歩逺移歸亂挿繁華向晴昊茅齋欲欹倒門前誰送一枝梅問訊參寥詩云朔風蕭蕭方振槁雪壓丹杏空自研嚼蘂齅香無比好先生携酒傍玉叢醉裏山僧少病惱強将筆刀為寫麗句巳輸何遜早碧桃不飮為誰牽不惜山衣同藉草要須陶令挿花歸醉卧雄辭驚電掃東溪不見謫仙人江路還逢少陵老我雖只有此詩君壓倒東坡先生心巳灰為愛君詩被花惱春風軼軒昊子瞻和少游詩云西湖䖏士骨應槁竹外一枝斜更好孤山山下醉眠處點綴裙腰紛不掃多情立馬待黄昏殘雪消遲月出早江頭千樹春欲暗今年對花還草草不如風雨卷春歸収拾餘香還畀昊萬春随逐客來十年花送佳人老去年花開我已病傾倒江南無雪春瘴生為散氷花除熱惱風清月落無子瞻和參寥詩云化工未識蘇群槁先向梅花一争好呉山道人心似水眼浄塵空無可掃故将妙語寄人見自趂嚴鐘早惟有來雙白鶿王羽瓊樹鬪小草且撼長條飱落莢忍饑未忍呼穹昊子由和少多情横機欲寄東坡老東坡習氣除未盡時復長篇書客賦寒梅感物傷春同懊惱江邉不識北風勁墻頭知游詩云老夫毛骨日凋槁愁見米監惟醉倒忽傳騷婦學閑媚靚粧惟有長眉掃孤芳巳與飛霰競結子仍有南枝早未開素質夜光明半落清香春更好鄰家小性空自知羞作繁華肋芒昊子由和參寥詩云憐先百花老苦遭横笛亂飛英不見逰人醉芳草可憐物語長篇空自惱萬㸃浮溪輙長嘆一枝過嶺誇先早拾君古木依岩槁西江飲醉須彌倒野花幽草亦何為嶮敲縁自掃誰知真妄了不妨令我至今思璉老妙明真香不忍游塵汚嚼蘃更憐真味好道人遇物心有得瓦竹相時起鳥四飛畢竟安能亂清昊覺昔未識但向閑䆫㸔詩草浮雲送少章弟赴仁和主簿我宗本江南為将門列㦸中葉徙淮海不仕但潜徳先祖實起家先君始縫掖議郎為名士余亦忝詞客風流以及汝三通桂堂籍汝弱不好弄文章有新格久從先生游術業良未測武林一都㑹山水富南國下有賢别駕上有明方伯干將入砥礪騕䮍就􅔷勒勿矜孔鸞姿不樂棲枳棘吳中多髙士往往寄老釋辯才雖物化參寥猶夙昔投閑數訪之可得三友益少来輕别離老去重乖隔念汝逺行役惘惘意不懌道山雖云佳久寓有饑色功名巳絶意政苦婚嫁迫終從大人議稅駕䢴溝側追蹤漢兩踈父子老阡陌送李端叔從辟中山人畏朔風聲我聞獨寛懷豈不知凛冽為自中山来端叔天下士淹留蹇無成去從中山辟良亦慰平生與君英妙時俠氣上參天孰云行半百身世各茫然當時兒戲念今日巳灰死著書如結氂聊以忘憂耳駸駸歲遒盡淮海歸無期功名良獨難雖成定奚為念君逺行役中夜憂反側攬衣起成章贈以當馬䇿淮海集卷第四
