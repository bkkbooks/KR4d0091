front:
  text: 淮海集卷第四古詩
  hash: sha256:c959ff84e8a6ff1c77510c52d58528fef447f0b77df8830be5f1d18bb82ce5a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_004-1a}
body:
  text: 秦觀少遊同子瞻賦遊惠山三首群韻其朱宿韻其一王武陵韻其二竇輟棹縱幽討籃輿入青蒼圓頂相􅌽迓旃檀燎深堂層巒淡如洗傑閣森欲翔林芳含雨滋岫日隔林光涓涓續清溜靡靡傳幽香俯仰佳覽眺悠哉身世忘使君厭機械所與惟散人顧慙蒹葭陋繆倚瓊枝新上干青磝磝下屬白磷磷洞天不知老金界無棲塵緬彼人間世烏蟾閲青旻詎得踵三隱山阿相與鄰樓觀相復重邈然閟深樾九龍吐清泠㶁㶁曾未絶罌缶馳千里真珠猶不滅况復從茶仙兹焉試葵月岸巾塵想消散䇿佳興發何以慰遨嬉操觚繼前轍余昔為子瞻云與髙郵秦少遊杭僧參寥同至覽唐處士王陵竇群朱錢塘倅往來無錫未嘗不至惠山既去五年復為湖州賦夢裏五年過覺來雙鬢蒼還將塵土足一步漪瀾宿所賦詩愛其語清簡蕭然有出塵之姿追用其韻各虛明中有色清淨自生香還從世俗去永與世俗忘堂俯窺松桂影仰見鵲鶴翔炯然肝肺間巳作氷玉光我二三子皎然無淄磷勝逰豈殊昔清句仍絶塵弔古薄雲不遮山踈雨不濕人蕭蕭松桂滑䇿䇿芒鞋新嘉發山泉烹茶避林樾明窗傾𬗋盞色味兩竒絶吾生眠泣舊史疾讒歌小旻哀哉扶風子難與巢許鄰敲火人睡起山花發一甌誰與共門外無來轍參寥同賦食耳一飽萬想滅頗笑玉川子飢弄三百月豈如山中周遭矚層巘矯矯如翶翔下瞰平田流淡然浮日光靑山煙弄滅沒山木含蔥蒼剌舟傍遙岸理䇿升虛堂門暗朝雨寂歷無行人忽穿卉木鬱以新階泉篁解初籜洗雨聞新香雖云迫前途真賞豈易忘松竹柏談笑凌窮旻何愧沈冥子卧霞吞結鄰揚帆渡潄石齒照眼光磷磷史君美無度卓犖遺囂塵風標傲蹤琬􅓨亦未滅嗟我魚目光疇能綴明月狂墨掃琅玕江來洗眼驚翠樾雲姿既容裔鳥哢更清絶凌梯訪前中人茫茫走飛轍風煙座中發殊勝區馬上口占二首向晨結束事長途利風刮面冰在鬚岡窮得水馬不進霧暗失道人相呼悠悠旁舍見汲井軋軋隔林聞挽車遊目騁懷自可樂勿憶鄉縣增煩紆霜風稜稜萬木枯梅花破蕚猶含鬚田家往往事遊獵追逐狐兔相號呼微茫山中起狂燒隱約林梢低日車馬頭漸覺有佳趣勿厭阡陌多縈紆别子瞻人生異趣各有求繫風捕影祗懷憂我獨不願萬户侯惟願一識蘇徐州徐州英偉非人力世有髙名擅區域珠樹三株詎可攀玉海千尋真莫測一昨秋風動逺情便憶鱸魚訪洞庭芝蘭不獨庭中秀松柏仍當雪後青故人持節過鄉縣教以東來償所願天上麒麟昔漫聞河東鸑鷟今才見不將俗物擬天真北斗巳南能幾人八磚學士風摽逺五馬使君恩意新黃塵冥冥日月換中有盈虛亦何算據龜食蛤暫相從請結後期遊汗漫百戰竟不侯伯郎一斗得涼州門負重君無力十年子瞻詩云夜光明月非所投逢年遇合百無憂將軍説盡萬物情硬黃小字臨黃庭故人巳去君未到空吟不入紛華域故人坐上見君文謂古人吁莫測新詩君語識君心短李髯孫眼中見江湖放浪久全真忽然河畔草青青誰為他鄉各異縣天遣君來破吾願一聞弊帚那堪換我亦淹留豈長算山中既未決同歸我聊一鳴驚倒人從橫所值無不可知君不怕新詩新千金言有客輕公侯扁舟相從古揚州置之匹馬恨無力千爾耳君其漫淮南三歲吾何求使君到後消人憂君君南歸無限情鴻飛携書墮我庭此書兼置昔年客袖里相忘同異域新詩空使四座驚隱居未易凡人測使談亹亹解人頥安得座右長相見狂客吾非賀季真醉中麗句淮山青老夫強顔依府縣堆案文書本非願清城酒貴誰當換塵埃姤面非良算歸來泗上正思君莫吟君似謫仙人末契長遭少年笑白髮應慙傾蓋新都霜爛熳待黃花和黃法曹憶建溪梅花海陵參軍不枯稿醉憶梅花愁絶倒為憐一樹傍寒溪花水多情自相惱淸淚班班知有恨恨春相逢苦不早甘心結子待君來洗雨梳風為誰好誰云廣平心似鐡不惜珠璣與揮掃月沒參橫畫角哀暗香銷盡令人老天分四時不相貸孤芳轉盻同衰草要須健步逺移歸亂插繁華向晴昊茅齋欲欹倒門前誰送一枝梅問訊參寥詩云朔風蕭蕭方振稿雪壓丹杏空自研嚼蘂嗅香無比好先生携酒傍玉叢醉裏山僧少病惱強將筆刀為寫麗句巳輸何遜早碧桃不飮為誰牽不惜山衣同藉草要須陶令插花歸醉卧雄辭驚電掃東溪不見謫仙人江路還逢少陵老我雖只有此詩君壓倒東坡先生心巳灰為愛君詩被花惱春風軼軒昊子瞻和少遊詩云西湖處士骨應稿竹外一枝斜更好孤山山下醉眠處點綴裙腰紛不掃多情立馬待黃昏殘雪消遲月出早江頭千樹春欲暗今年對花還草草不如風雨卷春歸收拾餘香還畀昊萬春隨逐客來十年花送佳人老去年花開我已病傾倒江南無雪春瘴生為散氷花除熱惱風清月落無子瞻和參寥詩云化工未識蘇群稿先向梅花一爭好吳山道人心似水眼淨塵空無可掃故將妙語寄人見自趂嚴鐘早惟有來雙白鷀王羽瓊樹鬪小草且撼長條飱落莢忍飢未忍呼穹昊子由和少多情橫機欲寄東坡老東坡習氣除未盡時復長篇書客賦寒梅感物傷春同懊惱江邉不識北風徑墻頭知遊詩云老夫毛骨日凋稿愁見米監惟醉倒忽傳騷婦學間媚靚粧惟有長眉掃孤芳巳與飛霰競結子仍有南枝早未開素質夜光明半落清香春更好鄰家小性空自知羞作繁華肋芒昊子由和參寥詩云憐先百花老苦遭橫笛亂飛英不見逰人醉芳草可憐物語長篇空自惱萬點浮溪輒長嘆一枝過嶺誇先早拾君古木依岩稿西江飲醉須彌倒野花幽草亦何為嶮敲緣自掃誰知真妄了不妨令我至今思璉老妙明真香不忍遊塵汚嚼蘃更憐真味好道人遇物心有得瓦竹相時起鳥四飛畢竟安能亂清昊覺昔未識但向間窗看詩草浮雲送少章弟赴仁和主簿我宗本江南為將門列戟中葉徙淮海不仕但潛德先祖實起家先君始縫掖議郎為名士余亦忝詞客風流以及汝三通桂堂籍汝弱不好弄文章有新格久從先生遊術業良未測武林一都會山水富南國下有賢别駕上有明方伯干將入砥礪騕裊就􅔷勒勿矜孔鸞姿不樂棲枳棘吳中多髙士往往寄老釋辨才雖物化參寥猶夙昔投間數訪之可得三友益少來輕别離老去重乖隔念汝逺行役惘惘意不懌道山雖云佳久寓有飢色功名巳絶意政苦婚嫁迫終從大人議稅駕𨝍溝側追蹤漢兩踈父子老阡陌送李端叔從辟中山人畏朔風聲我聞獨寬懷豈不知凛冽為自中山來端叔天下士淹留蹇無成去從中山辟良亦慰平生與君英妙時俠氣上參天孰云行半百身世各茫然當時兒戲念今日巳灰死著書如結氂聊以忘憂耳駸駸歲遒盡淮海歸無期功名良獨難雖成定奚為念君逺行役中夜憂反側攬衣起成章贈以當馬䇿淮海集卷第四
