front:
  text: 淮海後集卷之六雜文
  hash: sha256:b7cf91e78195bfa2e5539b797e9276c3be44252cfc8161d5dde3c9c8b0929301
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_047-1a}
body:
  text: 秦觀少遊雜説唐杜泉江夏人也自罷漢隂令居泗水上烈日笠首親督耕夫一年而食足二年而衣道兩餘三年而屋室完新六畜肥繁器用皆備自懇荒起家十五年為富家翁不假一人之力一毫之助彼嘗謂人曰夫忍耻入仕不困妻子衣食者幾希彼忍耻我勞力皆衣食耳顧我何如由功名之士觀之則誠為拘繫跔促人也若夫恬於進取安分潔已者蓋有取焉爾通事説文以説理為上序事為次古人皆備而有之後世知説理者或失於略事而善序事者或失於悖理皆過也蓋能説理者始可以通經善序事者始可以修史蠶書豫間居婦善蠶從婦論蠶作蠶書考之禹貢揚梁幽雍不貢繭物兖篚織文徐篚玄纎纊青篚底纁域䋙豫篚纎纊青篚檿絲皆繭物也而桑土既蠶獨言於兖然則九州蠶事兖為最乎豫遊濟河之間見蠶者豫事時作一婦不蠶比屋詈之故知兖人可為蠶師今豫所書有與吳中蠶家不同者皆得兖人也種變臘之日聚蠶種沃以牛溲浴于川毋傷其藉乃縣之始審卧之五日色青六日白七日蠶已蠶尚卧而不傷時食蠶生明日桑或柘葉風戾以食之寸二十分晝夜五食九日不食一日一夜謂之初眠又七日再眠如初既食葉寸十分晝夜六食又七日三眠如再又七日若五日不食二日謂之大眠食半葉晝夜八食又三日健食乃食全葉晝夜十食不三日遂繭凡眠已初食布葉勿擲擲則蠶驚毋食二葉制居種變方尺及乎將繭乃方四丈織萑葦範以蒼莨竹長七尺廣五尺以為筐建四木宫梁之以為槌縣筐中間九寸凡槌十縣以居食蠶時分其居糞其葉餘以時去之萑葉為籬勿密屈藁之長二尺者自後茨之為簇以居繭蠶凡繭七日而採之居蠶欲溫居繭欲涼故以萑鋪繭寒之以風以緩蛾變化治常令煮繭之鼎湯如蟹眼必以筯其緒附于先引謂之餵頭毋過三系則系粗不及則脆其審舉之凡系自鼎道錢眼升於鎖星星應車動以過添梯乃至於車錢眼為版長過鼎靣廣三寸厚九黍中其厚插大錢一出其端橫之鼎耳後鎮以石緒總錢眼而上之謂之錢眼鎖星為三蘆管管長四寸樞以圓木建兩竹夾鼎耳縛樞於竹中管之轉以車下直錢眼謂之鎖星添梯車之左端置環繩其前尺有五寸當車牀左足之上建柄長寸有半匼柄為鼓鼓生其寅以受環繩繩應車運如環無端鼓因以旋鼓上為魚魚半出鼓其出之中建柄半寸上承添梯添梯者二尺五寸片竹也其上楺竹為鈎以防系竅左端以應柄對鼓為耳方其穿以間添梯故車運以牽環繩繩簇鼓鼓以舞魚魚振添梯故系不過偏車制車如轆轤必活其兩輻以利脫系禱神卧種之日升香以禱天駟先𧖟也割雞設醴以禱婦人寓氏公主蓋蠶神也毋治堰毋誅草毋沃灰毋室入外人四者神實惡之戎治唐史載干闐初無桑丐鄰國不肯出其王即求置婚許之將迎乃告曰國無帛可持蠶自為衣女聞置蠶帽絮中關守不敢驗自是始有蠶女刻石約無殺蠶蛾飛盡乃得治繭言蠶為衣則治繭可為絲矣世傳繭之未蛾而竅者不可為絲頃見鄰家誤以竅繭雜全繭治之皆成系焉疑蛾蛻之繭也欲以為絲而其中空不復可治嗚呼世有知于闐治絲法者肯以教人則貸蠶之死可勝計哉豫作蠶書哀蠶有功而不免故録唐史所載以俟博物者書丁彥良明堂議後祀國事之大者歷世洪儒碩生議論考訂往往自相違戾丁俠以世家子早假蔭以官少年強學援質有根抵訶詆前載惜乎未能以此獻諸朝得付有司禮官博士相與校正以備一代闕文君不能姑愛惜遵養以待云録龍井辨才事熙寧九年秀州嘉興縣令陶彖有子得疾甚異形色語笑非復平人令患之乃大出錢財聘謁巫祝厭勝百方終莫能治是嵗辨才法師元淨適以事至秀法師髙僧也隱於錢塘之天竺山傳天台教學者數百人又特善呪水疾病者飲其所咒水輒愈吳人尊事之令素聞其名即馳詣師具狀告曰兒始得疾時見一女子自外來相調笑久之俱去稍行至水濵遺詩曰生為木卯人死作幽獨鬼泉門長夜開衾幃待君至自是屢來且有言曰仲冬之月二七之間月盈之夕車馬來迎今去妖期逼矣未知所處願賜哀憐師乃許諾因杖䇿從至其家除地為壇設觀音像於中央取楊枝霑水灑而呪之三繞壇而去是夜兒寢安然不復如他時矣明日復來結跏跌座引兒問曰汝居何地而來至此答曰會稽之東卞山之陽是吾之宅古木蒼蒼師又問汝姓誰氏答曰吳王山上無人處幾度臨風學舞腰師曰汝柳姓乎乃囅然而笑師良久呵曰汝無始已來迷已逐物為物所轉溺於淫邪流浪千劫不自解脫入魔趣中橫生災害延及無辜汝今當知魔即非魔魔即法界我今為汝宣説首楞嚴祕密神呪汝當諦聽痛自悔恨訟既往過愆返本來清淨覺性於是號泣不復有云是夜謂兒曰辨才之功汝父之虔無以加焉吾將去矣後二日復來曰久與子遊情不能遽捨願一舉觴為别因相對引滿既罷作詩一章曰仲冬二七是良時江下無緣與子期今日臨岐一杯酒共君千里逺相離遂去不復見豫聞其事久矣元豐二年見辨才於龍井山問之信然書王氏齋壁皇祐元年余先大父赴官南康道出九江余實生焉滿嵗受代猶寓止僧舍未幾代者卒叔瞻之先君來領其職事通家相好也至和元年叔瞻始生於南康後豫迎老母來為汝南學官也而叔瞻亦奉大夫人間居於郡之西郭時余之先大父母先人皆捐館而叔瞻之先君亦沒於瀘州皇祐逮今四十一年中間豐瘁得喪死生休戚不可悉記獨兩家之孤各奉其母相遭于此甚可悲也題彭景山傳神內殿崇班致仕彭崇仁字景山胸中有韜略吏事精密所至士大夫翕然稱之年四十不幸喪明家居無餘而目不可治如老驥伏櫪志未嘗不在千里聞北風則耳聳然自道觀之物無幸不幸以得喪觀之豈異世有所負耶然人之有德慧智術者常存乎疢疾惟深也能披剝萬象而見已安知景山不得之沉冥中耶淮海間居集序元豐七年冬余將西赴京師索文藁於囊中得數百篇辭鄙而悖於理者輒刪去之其可存者古律體詩百十有二雜文四十有九從遊之詩附見者五十有六合二百一十七篇次十卷號淮海間居集云清和先生傳清和先生姓甘名液字子美其先本出於后稷氏有粒食之功其後播棄或居於野遂為田氏田為大族布於天下至夏末世衰有神農之後利其資率其徒往俘於田而歸其倔強不降者與強而不釋甲者皆為城旦舂賴公孫杵臼審其輕重不盡碎其族徙之陳倉與麥氏谷氏鄰居其輕者猶為白粲與鬼薪仵已而逃乎河內又移于曲沃曲沃之民悉化焉曲沃之地近於甘古甘公之邑也故先生之生以甘為氏始居於曹受封於鄭及長器度汪汪澄之不清撓之不濁有醖藉涵泳經籍百家諸子之言無不濫觴孟子稱伯夷清下惠和先生自謂不夷不惠居二者之間而兼有其德因自號曰清和先生云士大夫喜與之遊詩歌曲引往往稱道之至於牛童馬卒閭巷倡優之口莫不羡之以是名漸徹於天子一召見與語竟日上熟味其旨愛其淳正可以鎮澆薄之徒不覺膝之前席自是屢見於上雖郊廟祠祀之禮先生無不預其選素與金城賈氏及玉巵子善上皆禮之每召見先生有司不請而以二子俱見上不以為疑或為之作樂盛饌以待之歡甚至於頭沒杯案先生既見寵遇子孫支庶出為郡國二千石往往皆是至於十室之邑百人之聚先生之族無不在焉昔最著聞者中山宣城湓浦皆良子弟也然皆好賔客所居冠蓋駢集賔客號呶出入無節交易之所在委積由是上疑其濁小人或乘間以賄入欲以逢上意而取寵一日上問先生曰君門如市何也先生曰臣門如市臣心如水上曰清和先生今乃信其清和矣益厚遇之由是士大夫愈從先生遊鄉黨賔友之會咸曰無甘公而不樂既至則一坐盡傾莫不注揖然先生遇事多不自持以待人斟酌而後行嘗自稱沽之哉沽之哉我待價者也人或召之不問貴賤至於斗筲之量挈瓶之智或虛已來者從之如流布衣寒士一與之遇如挾纊惟不喜釋氏而僧之徒好先生者亦竊與先生遊焉至於學道隱居之士多喜見先生以自晦然先生愛移人性情激發其膽氣解釋其憂憤可謂能令公喜能令公怒者邪王公卿士如灌夫季布李景儉桓彬之徒坐與先生為黨而被罪者不可勝數其相歡而奉先生者或至於破家敗産而不悔以是禮法之士疾之如讐如丞相朱子元執金吾劉文叔郭解長孫登皆不悅未嘗與先生語時又以其士行或久多中道而變不承於初咸毁之曰甘氏孽子始以詐得終當以詐敗矣久之或有言先生性不自持無大臣輔政之體置之左右未嘗有沃心之益或虞以虛間廢事上由此亦漸踈之會徐邈稱先生為聖人上惡其朋比大怒遂命有司以光祿大夫秩就封宗廟祭祀未嘗見遂終於鄭仕於郡國者皆不奪其官初先生既失寵其交遊往往謝絶甚者至于毁棄素行以賣直自售惟吏部尚書畢卓北海相孔融彭城劉伯倫篤好如舊融嘗上書辨先生之無罪上益怒融由此亦得罪而倫又為之頌與當世為有故不著今掇其行事大要者著于篇太史公曰先生之名見於詩書者多矣而未有至公之論也譽之者美逾其實毁之者惡溢其真若先生激發壯氣解釋憂憤使布衣寒士樂而忘其窮不亦薰然慈仁君子之政歟至久而多變此亦中賢之疵也孔子稱有始有卒者其惟聖人乎先生何誅焉豫嘗過中山慨然想先生之風聲恨不及見也乃為之傳以記法雲寺長老然香會疏文竊以香者妙通法性冥動聞機大則香積如來令天人而入戒律次則香嚴童子得羅漢而證圓通覺至性之清嚴破塵寰之濁穢肆求善友同結勝緣漸沉水之密圓斥棗膏之昏鈍規模既逺誓願尤長若秣若圓得無礙法非煙非火轉不退輪偶就印以成文常干空而作蓋無前後去來之際有解脫知見之因曄乎若光明之雲佳哉如鬱蔥之氣反聞聞性八百之功德以成自覺覺他億萬之河沙斯遍越州請立程給事祠堂狀浙水之東七州獨越為都會凡七州之軍事督焉其地西帶江北被海多雄山傑澤有桑麻魚稻藤荈竹箭之饒土沃而流水清而不迫非舟車足力所會故其民喜耕耨勤織紝尊本而薄末狡獪詆欺之弊視他州為少然以險阻之故豪強惡少跌宕不逞之民一失其業則往往什聚伍行剽攘攻劫於江海之上不時去之則蔓延而成大盜矣為太守者審知風俗之厚刑政並修則一方可以指麾而治不然雖憊力勞心猶無益也熙寧十年詔以給事中集賢殿修撰廣平程公知軍州事公素以治行稱天下越人無不踴躍竦企願見公之所為及至政尚簡肅不為茍且苛細之事事至而後必行亦無所假借發隱擲伏敏捷如神每得所謂豪強惡少跌宕不逞之民草斬而獸逐之至斷絶乃已於是距吳際閩楚千里肅然盜賊不敢發川行途止如即其家獄訟衰息風雨時至仍嵗大穰乃禮賢俊仁耆孤簡練士卒繕修宫寺至於郵亭刻漏為之一新頽廢偃僵斬然俱起然後知公之才所遇縱橫無窮其所厭伏東西逆銷變故於未形者多矣非特越人受其賜也使行且大用於朝推其道於天下則其所就者又可量耶先是太子少保南陽趙公有惠政於越既去而公承其後故議者謂近世越州之政未有如二公者南陽公嘗命畫史圖太子少師天水趙公并公與已遊從之像號三老圖而越之好事者遂作三老堂以置之元豐二年公還朝郡之衣冠緇黃耆艾之士若干人乞留於部使者三為之上不報因相與泣曰公去矣其像雖存於三老堂然吾人之心未厭也聞公嘗帥洪福廣三郡三郡皆有生祠豈越獨無有今寶林院者公之所興建也若即其地為堂立公之像如三郡故事以慰吾人之思不亦可乎衆曰然於是又以狀白使者請立公之祠堂焉是時某適自淮南來省親將還越人謂某曰吾州更飢歉札癘之後程公實撫養而教誨之去年冬福州太守司諫孫公嘗道于此具見其事今祠堂成有日矣謀為記宜莫如孫公者聞子與孫公鄉里且門人也盍托厥實以為我請乎某既歎程公之政有以媚于民又嘉越人能大其施而推報之也乃為論次其事并州之風俗具而載之以備孫公之采擇焉精騎集序豫少時讀書一見輒能誦暗疏之亦不甚失然負此自放喜從滑稽飲酒者遊旬朔之間把卷無幾日故雖有強記之力而常廢於不勤比數年來頗發憤自懲艾悔前所為而聰明衰耗殆不如曩時十一二每閲一事必尋繹數終掩卷茫然輒復不省故雖然有勤苦之勞而常廢於善忘嗟夫敗吾業者常此二物也比讀齊史見孫搴答邢詞云我精騎三千足敵君羸卒數萬心善其説因取經傳子史事之可為文用者得若干條勒為若干卷題曰精騎集云噫少而不勤無如之何矣長而善忘庶幾以此補之故龍圖閣直學士中大夫知成都軍府事管內勸農使充成都府利州路兵馬鈐轄上護軍隴西郡開國侯食邑一千一百户食實封三百户賜紫金魚袋李公行狀曾祖諱宗誼故不仕祖諱知至故不仕父諱東故任江寧府漂水縣尉纍贈特進南康軍建昌縣李常字公擇年六十四李氏宗出唐宗室郇公諱逺祖濤五代時號稱名臣仕皇朝為兵部尚書封莒國公莒公少時仕於湖南氏有一子留江南公其裔孫也故今為南康建昌人公少警悟好學強記為文章捷敏初若不經意而比成粲然屬寓深逺皇祐中登進士甲科授防禦推官權江州軍事判官丁昌源郡太夫人憂解宫又丁光祿公憂服闋權宣州觀察推官監漣水軍轉般倉故大理寺丞知洪州奉新縣未行用韓公獻肅薦為三司檢法官神宗即位詔大臣舉館職曾宣公以公應詔召試學士院除祕閣校理編校史館書籍兼太常博士兼史館檢討置三司條例司檢詳官看詳中書條例權判尚書考功改右正言同管勾國子監公事是時王荆公輔政始作新法諫官御史論不合者輒斥去公上疏力詆其非以為始建三司條例司雖致天下之議而善士猶或與之至於均輸之論興青苖之法立公然取息傳會經旨以為無嫌則天下固已大駭而善士亦不復與矣時荆公之子雱與溫陵吕惠卿皆與聞國論凡朝廷之事三人者參然後得行公言陛下與大臣議某事安石不可則移而不行安石造膝議某事安石承詔頒焉吕惠卿獻疑則反之詔用某人安石惠卿之所可雱不説則又罷之孔子曰祿去公室政在大夫陪臣執國命今皆不似之耶而其論青苖尤為激切至十餘上不已於是落職通判滑州嵗餘復職知鄂州徙知湖州遷尚書祠部員外郎賜五品服徙知齊州齊故多盜公至痛懲艾之論報無虛日盜猶不止他日得黠盜察其可用刺為兵使直事鈴下間問以盜發輒得而不衰止之故曰此繇富家為之囊使盜自相推為甲乙官吏巡捕及門擒一人以首則免矣公曰吾得之矣乃令得藏盜之家皆發屋破柱盜賊遂清始公在武昌吳興政尚寬簡日與賓客縱酒笑詠吏民安樂之郡以大治於是世知公之才所值無不可也屬決河灌山東諸郡公捍禦有術部使者以聞降詔書奬諭從淮南西路提點刑獄遷尚書度支貟外郎坐厚善直史館蘇公軾得其詩文不以告罰金寄祿格行換朝散郎遷朝請郎試太常少卿公去國十五年至是還朝士大夫喜見於色以謂正人復用也以職事對稱旨靣賜三品服未幾試禮部侍郎文昌府成車駕臨幸恩遷朝奉大幸恩遷朝散大夫上即位覃恩遷朝請大夫試吏部侍郎遷朝議大夫俄試户部尚書詔百官轉對公以七事應詔一曰崇亷耻二曰存貢舉三曰别守宰四曰去贓貪五曰慎疑獄六曰擇師儒七曰修役法皆當時急務而其言役法尤合公論又取差免二法折衷為書上之以為法無新陳便民者良法也論無彼已可久者確論也又曰貧富俱出資則貧者之所難堪使富者出資貧者出力庶乎其可也大略如此遷中大夫除御史中丞兼侍讀加龍圖閣直學士初元豐河決小吳神宗以河勢方趨西北難以力回詔勿復塞須其自定增立隄防而或者以謂非悠逺之䇿請開澶淵遊河分殺水勢又欲自蘇村口截為隄導還故處詔遣公視之還奏非便又遣吏部侍郎范公百祿給事中趙公君錫覆視奏與公合而或者猶執前議鋭於興役朝廷疑之至是公申論其弊章六七上而其役竟罷之又請分詩賦經義兩科以盡取士之法别自致因人為兩塗以究省官之術其忠言讜論蓋不可以一二舉至於因時乘間導迎和氣者多密以啓聞故莫得而知也俄守兵部尚書固辭不受懇求外補章屢上遂出知鄧州數月徙成都府行及陜府閿鄉縣暴卒於傳舍實元祐五年二月二日也纍勳至上護軍隴西郡侯公風度凝逺與人有恩意而遇事強毅不為茍合初善王荆公荆公當國兾其為助而詆之乃力於他人荆公嘗遣雱喻意曰所爭者國事少存朋友之義公曰大義滅親况朋友乎自存益確士論以此歸之少時讀書於廬山五老峯下白石菴之僧舍後身雖出仕宦而書藏於山中如故每得異書輒益之至九千餘卷山中之人號李氏山房仲兄布蚤卒事其嫂張敬甚撫其子秉彛如已子自奉清約所俸入多少以賙親族捐館之日無贏資朝廷聞之常􅉠外特賜五十萬有文集若干卷藏于家初娶狄氏襄陽遵度主簿之女蚤卒贈某縣封遵度亦俊傑士寶元慶曆間以文章顯名再娶魏氏光祿卿琰之女亦蚤卒贈遂寧縣君又娶遂寧之弟封安康郡君子男四人長曰攄揚州江都縣尉蚤卒次曰邍承奉郎次曰逡承務郎次曰迢承務郎女三人長適郢州長夀縣主簿孫端次適郊祀齋郎丘揖次適進士黃叔敖諸孤自閿鄉扶柩南歸而公之伯兄時為江南西路轉運使遂以其年十月丙午葬公于南康軍建昌縣千秋之原前期諸孤請狀公之行治而公之美實多難以具著著其出處始終之大者以告諸史氏謹狀後學張綖校正淮海後集卷之六謄寫吏黎儀朱敬忠刋工李容宋本原頗李信鼎蔣邦佐
