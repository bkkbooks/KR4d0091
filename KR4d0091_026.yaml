front:
  text: 淮海集卷之二十六
  hash: sha256:6f056b8186c2ea4e626239ef18c96b38497693d28585a9ec40ec5462c084fff8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_026-1a}
body:
  text: 秦觀少遊表代賀坤成節表竊以聖誕當期嚴秋在序協氣蟠乎穹壤頌聲溢於華戎賀中伏惟太皇太后陛下德並神明功參覆載斷鼇立極追配於媧皇用楫濟川責成於傅説忠謀入而姦黨破弊事革而嘉應來巍乎在唐虞之間卓然出馬鄧之右嘉辰既屬率土交歡臣猥緣肺腑之親叨分符竹之寄前瞻觀闕阻奉萬年之觴逺託封章庶比千秋之鑑代賀興龍節表大吕飛灰爰屬星回之序靈樞繞電實當聖誕之期凡屬生成所同抃蹈賀中恭惟皇帝陛下裁成天地參並神明以言乎道則持盈而守成以言乎時則重熙而纍洽昭哉嗣服纘六聖之洪休大矣孝熙備三宫之至養清風發而羣隂伏元首明而庶事康令節載逢鴻儀斯舉加籩折爼初嘗露酎之醇擊石彈絲始奏鈞天之妙可謂一時之嘉會故得四海之歡心臣猥以葭莩厠於藩翰十章獻鑒空懷唐相之誠萬壽稱觴莫預漢庭之列代賀太皇太后受册表臣某言伏審今月某日太皇太后於某殿受册者纘繼鴻休亘華夷而共慶昭明巨禮極天壤以均歡臣某誠歡誠喜頓首頓首恭以太皇太后陛下鍾睿知之資御休明之運以至仁而子養萬國以盛德而母儀三朝造舟為梁始作文王之合斷鼇立極終成媧氏之功忠邪辨而和氣通威惠行而頌聲作既增光於聖統宜受禮於神孫典章載崇寰海交抃臣猥被藩室之寄叨居肺腑之親不獲隨例稱慶闕庭無任踴躍歡欣之至謹具表陳賀以聞代賀皇太后受册表臣某言伏審今月某日皇太后於某殿受册者稽酌天人備嚴典禮孝治既先於宫閫歡心自得於寰區賀中恭以皇太后妙道生知英能天縱自長門而登長樂法度無違以太任而事太薑晨昏不懈至於弼成先帝之治保佑聖子之功幽通神明顯被動植施之大者報必厚實之富者名必隆位號既昭華夷增抃臣謬通屬籍叨假郡章不獲隨例稱慶闕庭無任踴躍歡欣之至代賀皇太后生辰表考曆占星氣應元英之候稱觴獻壽禮行長樂之言凡在照臨所同欣抃賀中恭以皇太后德符坤載位正母儀淵沖自乎生知慈惠本乎天縱弼成文考既隆逮下之風共養太薑益著思齊之美內宣隂化日嗣徽音矧當孝治之朝尤崇慶誕之節鼓鍾具舉環珮畢臻歡聲動於宫闈佳氣蟠於觀闕某繆通屬籍叨守近藩匪惟宗族之同榮實與吏民而共慶代賀明堂禮畢表有司備物親嚴三嵗之祠率土均恩實賴一人之慶照臨所逮欣抃攸同賀中伏惟皇帝陛下道貫神明功參覆載昭哉嗣服纘六聖之洪休大矣孝熙備三宫之至養擢英髦而共政革苛弊以濟時庶事用康善祥斯應物無疵癘民不怨咨天地得以清寧草木遂其零茂九功之德既皆可歌四海之臣亦各來祭乃遵彛典爰盡孝思時以季秋之良日用上辛之吉始告虔於原廟遂嚴配於合宫精意感通景貺昭答大賚而兆人富肆青而衆心新實萬世無疆之休蓋千載不逢之會臣乍辭帷幄方守藩垣徒欣右饗之成莫預駿奔之列瞻望闕庭云云代賀皇太妃受册表臣某言伏審今月某日皇太妃於某殿受册者史官揆自宗伯陳儀舉令典於宫闈溢歡聲於方夏賀中恭以皇太妃挺生淑皆魅應昌狓贊阼化於椒塗嗣徽音於彤管晨昏共養之禮簡在兩宫動靜謙肅之風形于六寢在先朝則有警戒相成之道於聖主則有劬勞罔極之恩中外所瞻情文宜稱肆被册書之美爰昭位號之隆臣猥被瓜牙叨居藩屏不獲隨例稱慶闕庭無任踴躍歡欣之至辭史官表竊以史屬之除聖朝所慎若非承父兄之教詔世守其言則必積師友之淵源材克厥職臣於二者實無一堪聞命若驚撫躬增懼重念臣少而愚賤長更屯竒積纍嵗時尚慮人情之未與超踰涯分豈為物議之所容以蕞爾不勝任之材處灼然非所居之地必招官謗上纍恩私况儒館之中資任髙於臣者不少班行之內學術過於臣者甚多與其容菲薄以濫居不若擇英豪而改授伏望聖慈追寢新命檢會臣近申三省除臣一外任差遣代蘄守謝上表奉法明時方悔推行之誤分符近地俄蒙假貸之私祗荷寵恩載深感涕伏念臣資材暗昧問學空踈遭逢昌辰叨竊劇任徒冀事功之立靡思罪釁之成昨以出按荆車兼程鹽課猥虞曠廢妄致勤勞屬吏承風不無過當小民競利豈免怨尤雖不待於人言即行改正儻追論其事迹殆可誅夷敢祈造物之恩猶竊長人之任矧蘄春之便郡實淮右之名區風氣和平獄訟稀少平時來者尚樂寬間謫官居之真為僥幸此蓋伏遇太皇太后陛下推天地之賜回日月之光黜陟不失其所宜輕重各當其所適察臣過舉止於四月之間許臣自新付以一州之寄念捐軀而莫報徒撫巳以增慚復路回車顧迷途其未逺輸肝剖膽庶報效之可圖代程給事乞致仕表臣某言臣聞未老遽歸非臣子報君之義既衰猶仕豈儒生處巳之方惟去就適合其時乃進退不愆於禮輒陳悃愊仰瀆髙明臣誠惶誠恐頓首頓首伏念臣家本單微材尤綿薄早緣章句聲律之末技偶中上科繼以簿書獄訟之微勞誤更劇任三持使節八領郡麾以至承乏小行人之官備位大司農之屬山川陟涉幾遍於五方日月推移殆踰於四紀遂叨蘭省之秩仍忝祕殿之名每撫心而自循縱沒齒其焉報昨以蒙恩罷守被旨歸班身雖寄於海隅夢巳升於帝所非不知懷金結綬侍清光而足榮佩玉鳴騶聨法從之為幸但以風霜漸迫蒲栁遽衰爰及上印之期當批乞骸之懇日莫途逺顧已分之非安漏盡鍾鳴亦人言之可畏伏惟皇帝陛下恢覆載之量廓照臨之明憐其實知止而請身察其非偷安而避事俾還官政獲反里閭况臣北陌東阡雅多遊舊左食右粥良給嵗時是以誦歌真主之稀逢盛述聖朝之難遇馬方羸老徒結戀於軒墀木巳朽枯或能蒸於芝菌臣不任祈天俟命激切屏營之至代王承事乞回授一官表臣聞緹縈納身贖父文帝因之變法王縉削爵請兄肅宗為之推恩夫漢唐之主豈欲撓不刋之典而詭從女子輔臣之意哉蓋以子弟之願獲伸則孝悌之風䆮廣天下忠順之俗於是乎始成故不以所輕廢所重也恭惟陛下神聖功德參並天地固非漢唐之主所能擬倫臣雖愚陋不敢自比於王縉然生遇休明名列仕版不猶愈於緹縈之女子乎輒冒死亡斧鉞之誅瀝血陳誠上干天聽惟陛下賜察哀憐不勝大願切念臣父昨於元豐四年得罪蒙朝廷放歸田里逮今巳及四年矣初出於特旨有司既無敘法可舉而中外臣寮又以臣伯父待罪宰相懷避嫌疑莫敢言者臣伏覩陛下近以功成治定因時制作建列聖之廟而申以大霈正百官之制而授以新書其逺至於亡沒之裔尚被甄收其微至於胥吏皂隸之能猶得自效和氣既洽頌聲並作符貺屢至年榖胥熟此所謂千載一時不可逢之嘉會而臣父獨嬰罪釁流寓江海天髙日逺自新無路臣誠私心痛之臣昨自元豐元年蒙恩授大理評事繼奉新制改承事郎逮及七年未曾磨勘臣願以合轉宣義郎一官回授臣父乞賜敘用伏望陛下推覆載之恩生骨肉之惠惻然憐之特垂俞允况陛下自臨御以來坐法之人未嘗終棄為親之請多所願從竊以近事言之王安國自著作佐郎放歸田里比踰期年起丞大理鄧忠臣以宣德一官為母求封奏書既上得邑壽昌以臣父方之安國則四年之廢久於期年以臣比之忠臣則為父之請重於為母若獲逺繼緹縈王縉之事近依安國忠臣之例使臣父復得齒於士大夫之列則臣雖身先犬馬填委溝壑無所復恨臣無任瞻天望聖激切屏營之至淮海集卷之二十六
