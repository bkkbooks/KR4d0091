front:
  text: 秦少遊先生淮海集序
  hash: sha256:efe270566278849f6dd141fd7305c755e2c8261f13df05ee0eaa9d4e0dbd0052
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_000-1a}
body:
  text: 同郡後學張綖撰綖每進見搢紳先生未有不詢及秦公者流風遺韻隱然如髙山巨川人皆識其為一鄉之望乃知地以人而勝也然公沒已數百年而盛名不泯亦以文之有傳焉耳北監舊有集板歲久漫漶近日山東新刻不全豫乃以二集相校刻之郡齋序曰凡古人之文有緒餘有精華有源本得其源本則精華悉舉之矣况緒餘乎今夫江河之水東流入於海而岷陽崑崙則其發源之地草木花實之盛其得於地土之力必厚矣名勝傳世之文亦江河之流草木之花實也獨不有源本者乎故曰其源深者其流長其本殖者其末茂夫秦公之名丗亦豈偶然哉今之後生聞風興慕者率惟其緒餘是好不復知其精華源本以是求公不亦逺乎蓋其逸情豪興圍紅袖而寫烏絲驅風雨於揮毫落珠璣於滿𥿄婉約綺麗之句綽乎如步春時女華乎如貴遊子弟此特公之緒餘者耳至於灼見一代之利害建事揆策與賈誼陸贄爭長沉味幽玄博參諸子之精藴雄篇大筆宛然古作者之風此則其精華也乃若孝友出於天性行義孚於朋友少年慨慷論事嘗有繫笞二虜回幽夏故墟之志方王氏用事時公能少貶其説可立登顯要獨守正不撓乃至謫死窮荒沒齒無怨是其曠度高懷藐萬鍾而弗顧堅操徑氣歷九折而不回中之所存有過人者浩然一傳其殆自見也嗚呼以此為文兹其所以名世者耶豈非吾鄉百世之師乎孟子論夷惠清和而稱其為百世之師他日又謂伯夷隘桞下惠不恭隘與不恭君子不由者何耶蓋聖之清和此其源本也隘不恭則緒餘末流之弊耳是以君子由其清和不由其隘不恭也夫公之文既已著於天下矣余小子其敢以謭陋贅言獨念公一鄉之望恐向慕者昧於所求序而論之使知公之名丗乃在此而不在彼也公名觀少遊其字一字太虗高郵人淮海其名集云嘉靖己亥秋九月望日書于鄂之石鏡亭宋史傳秦觀字少遊一字太虛揚州髙郵人少豪雋慷慨溢於文詞舉進士不中強志盛氣好大而見竒讀兵家書與巳意合見蘇軾於徐為賦黃樓軾以為有屈宋才又介其詩於王安石安石亦謂清新似鮑謝軾勉以應舉為親養始登第調定海主簿蔡州教授元祐𥘉軾以賢良方正薦于朝除太學博士校正祕書省書籍遷正字而復為兼國史院編修官上日有硯墨器幣之賜紹聖𥘉坐黨籍出通判杭州以御史劉拯論其增損實録貶監處州酒稅使者承風望指候伺過失既而無所得則以謁告寫佛書為罪削秩徙郴州繼編管橫州又徙雷州徽宗立復宣德郎放還至藤州出遊華光亭為客道夢中長短句索水欲飲水至笑視之而卒先自作挽詞其語哀甚讀者悲傷之年五十三有文集四十卷觀長於議論文麗而思深及死軾聞之歎曰少遊不幸死道路哀哉世豈復有斯人乎弟覿字少章覯字少儀皆能文淮海集目録秦觀少遊卷第一浮山堰賦并引黃樓賦子瞻詩附寄老庵賦湯泉賦子瞻跋尾歎二鶴賦郭子儀單騎見虜賦和淵明歸去來辭卷第二古詩泊吳興西觀音院三老堂送周𥙿之赴新息令寄曾逢原送僧歸遂州司馬遷觀易元吉獐猿圖歌夜坐懷莘老司諌答朱廣微送僧歸保寧和王通叟琵琶夢醫者漫郎記夢答劉全美田居寄題傳欽之草堂次韻徐仲車見寄次韻邢敦夫秋懷卷第三古詩春日雜興十首和莘老題召伯斗野亭和虛飄飄直詩附子瞻魯和遊金山駿詩附子由子同子瞻端午日遊諸寺賦得深字詩附子瞻寄陳季常卷第四古詩同子瞻賦遊惠山寥詩附子瞻參馬上口占别子瞻學士詩附子瞻和黃法曹憶建溪梅花參寥詩附子瞻子由送少章弟赴仁和簿送李端叔從辟中山卷第五古詩贈賽法師送劉貢父舍人二首南京妙峰亭次韻奉酬丹元先生送裴仲謨題雙松寄陳季常徐仲車食于學官吏或以為不可云云次韻夏侯太沖送張叔和兼簡魯直題騕裊圖和東坡紅鞓帶和王忠玉提刑題楊康功醉道士石送蔡子􅋮用蔡子駿韻飮酒詩艇齋并序和裴仲謨放兔行和裴仲謨摘白鬚行卷第六古詩寄寂齋用孫子實韻南都新亭行寄子發反𥘉寄蓴薑法魚糟蟹精思送楊康功偶戲次韻黃冕仲寄題順興步雲閣正仲左丞生日病犬賜女冠暢師和子瞻雙石徐得之間軒雷陽書事海康書事次韻曽存之嘯竹軒遊仙次韻答張文潛病中見寄送喬希聖與子瞻會松江得浪字卷第七律詩五言七言德淸道中還寄子瞻次韻子由斗野亭詩附子由鮮于子駿生日輦下春晴睡起次韻莘老𥘉至湯泉詩附莘老過六合水亭懷裴博士次韻三首懷孫子實對淮南詔獄二首次韻答米元章宿參寥房次韻頴叔南郊告祭上清宫次韻米元章齋居即事次韻酬陳傳道次韻傳道自適兼呈藝叟士擬郡學試東風解凍駕幸太學題虛樂亭三首懷李公擇次韻三首題湯泉二首題王欽之自圓庵流觴亭二首遊龍門山次程公韻遊龍瑞宫次程公韻次韻朱李二君見寄睡足軒二首卷第八律詩七言寄孫莘老次韻馬忠玉喜王定國還自濱州寄李公擇寄李端叔寄題倪敦復北軒寄題盧君斗齋次韻周開祖送王元龍赴泗州糧料次韻子由九曲池詩附子由次韻子由平山堂詩附子由次韻子由蜀并詩附子由次韻子由摘星亭詩附子由次韻子由光化塔詩附子由次韻子瞻贈金山寶覺大師詩附子瞻遊鑑湖謁禹廟蓬萊閣程詩附别程公闢韻附程次中秋口號子瞻欲使髙麗不行卷第九律詩七言顯之禪老許草庵見處再用韻詩附參寥和遊龍洞寄孫傳師寥詩附唱首參送蔣頴叔帥熙河二首和劉僕射感舊言懷上巳日詔賜宴集二首清明前一日李觀察席上得風字次韻羅正之惠綿扇寄題新息王令藏春塢送劉承議解職歸飬次韻王仲至侍郎慶張君俞得子寄題澄碧軒寄張文潛次韻裴君上向守二首次韻向守登樓眺望首二寄錢節贈劉景文四首答龔深之次裴