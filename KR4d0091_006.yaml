front:
  text: 淮海集卷之六
  hash: sha256:df5028a162bf050fe5a3a3b3750795c7c19c1a2a295ed9c3d7bade197b077993
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_006-1a}
body:
  text: 秦觀少遊覿覯二弟作小室請書魯直名曰寄寂作此寄之用孫子實韻二首力田不逢年識者未宜閔他時歲在金百兩無虛稛士生當自量天道平如凖汝兄魯叔山正坐不前謹有琴亦無絃何心尚求軫客來欲頽玉大白輒滿引官長既屢罵諸生亦時囅一口吸西江玄哉居士藴歲寒知蒼松日暮識丹槿夢想八九椽森然羅玉筍薛宣欲吏雲孫子實詩玄非近凖才難不易得志大略細謹士生要洪毅天地季氏或招閔此分胸中秋萬物既收稛賣藥偶知名草然囅誰能借前籌還婦用束藴吾聞調羔鼎異味及枌如蓋軫驥令鹽車驂井下知綆引難甘吁爾食聊寄粲而棄會稽笋槿豈其供王羞南都新亭行寄王子發洛水沄沄天上動道入隋渠下梁宋宋都堤上十二亭一一飛驚若鸞鳯光華逺繼周王雅宴喜還歸魯侯頌玉觴嚴令肅衣冠金縷哀音繞梁棟姢姢殘月照波翻習習暖風吹鳥哢何處高帆落文鷁誰家駿馬嘶征鞚柳枝芳草恨連天暮雨朝雲同昨夢借問亭名製者誰留守王公才望重胸中雲夢吞八九日解千牛節皆中祥符相公實曾祖庭列三槐多伯仲承明厭直出荆州轉守此都行大用此都去天才尺五交廣荆陽歸引控兔園事迹化黃埃清冷文雅堪長慟舳艫銜尾車挂轊昨日出迎今日送送故迎新無已時古往今來相戲弄亭下􅋂崎淮海客末路逢公詩酒共一樽明日難重持豈恤官期後芒種今年氣候頗云早夭矯梅花春欲縱行見亭中祖帳開千乘送公歸法從反𥘉昔年淮海末邂逅安期生謂我有靈骨法當逰太清區中緣未斷方外道難成一落世間網五十换嘉平夜參半不寢披衣涕縱橫誓當反𥘉服仍先謝諸彭晞髮陽之阿餔餟太和精心將虗無合身與元氣并陟降三境中髙真相送迎琅函紀前績金蒲錫嘉名耿光洞寥廓不借日月明故棲黃埃裏絶想空復情寄蓴薑法魚糟蟹寄子瞻鮮鯽經年漬􅙩醁團臍𬗋蟹脂填腹後春蓴茁滑于酥先社薑芽肥勝肉鳬卵纍纍何足道飣餖盤飱亦時欲淮南風俗事瓶罌方法相傳為旨蓄魚鱐蜃醢薦籩豆山蔌溪毛例蒙録輒送行庖當擊鮮澤居備禮無麋鹿精思精思洞元化白日升高旻俯仰凌倒景龍行速如神半道過𬗋府弭節聊逡巡金牀設寶几璀璨明月珍仙者二三子眷然骨肉親飲我霞一杯放懷暖如春遂朝玉虛上冠劔班列真無端拜失儀放斥令自新雲霄難遽返下土多埃塵淮南守天庖嗟我實何人送楊康功守蘇公于萬事輕獨嗜山水重寓直西掖垣滄洲長入夢廣陵以都會厨酒萬斯甕每歎闕登臨持此將焉用比持蘇臺節論鬱縉紳共翻云美泉石汔可小嬉弄匆匆治行李草草别賓從乃知仁智心所樂異庸衆梅花發春端百卉日興動公等行復反臺閣俟鸞鳳偶戲偶戲失班龍坐謫崑崙隂崑崙一何髙去天無數尋嘉禾穗盈車珠玉炯成林天飈時一拂清哀動人心一面四百門官譙雲氣侵闕然竹使符難矣暫登臨群仙來按行憐我久滯淫力請始云免反室歲巳深親朋喜我來感歎或霑襟塵寰君勿悲殊勝巢嶔崟次韻黃冕仲寄題順興步雲閣故山無期大刀頭黃塵溽暑未罷休步雲之篇忽我投便見氷玉懸清秋順興山川甲閩甌無風萬壑松颼颼步雲之人人品優御風禦寇真其儔仙人乘槎凌斗牛回環十見天星周猿鶴忽驚空蕙帳周家正要磻溪望正仲左丞生日元氣鍾英偉東皇賦炳靈蓂敷十一莢椿茂八千齡汗血來西極摶風出北溟之無分襁褓詩禮學趨庭妙質珠遺海高材刃發硎𥘉更藝閣祕屢直瑣闈靑史筆開凡例綸言正緯經文昌頻曵履京兆屢空囹遂總臺綱紀常參國典刑兩宫隆眷遇諸夏聳瞻聽武略驅雷電文鋒粲斗星乞間辭亢滿分逸下青冥騎引雙朱服腰橫萬寶釘明峰春矗矗汝水暮泠泠散䇿花間徑揮犀水上亭壺觴延墨客燈燭按歌伶周衮歸公旦商巖夢武丁久聞虛揆席佇見返皇扄别數汾陽考重鐫宋父銘巍然廟堂上永作世儀形病犬犬以守禦用老憊將何為跟蹌劣于行纍然抱渴飢主人恩義易乃為升斗資追隨不肯去猶若戀藩蘺屠膾意得逞烹庖在須斯糟粳固非意豚豕同一時念昔𥘉得寵青韁纒毯絲飼飬候飢飽動止常相隨胡云不終始委逐在衰遲犬死不足道固為主人悲贈女冠暢師瞳人剪水腰如束一幅烏紗褁寒玉飄然自有姑射姿回看粉黛皆塵俗霧閣雲窗人莫窺門前車馬任東西禮罷曉壇春日靜落紅滿地乳鴉啼和子瞻雙石天鑱海濱石鬱若龜毛緑信為小仇池氣象宛然足連巖下空洞鼎張彭亨腹雙峰照清漣春眉鏡中蹙疑經女媧錬或入金華牧爐熏充雲氣研滴當川瀆尤物足移人不必珠與玉道傍𥘉無異漢將疑虎伏支機亦何據但出君平卜奇礓入華林傾都自追逐我願作陳那令吼震山谷一拳既在夢二駒空所欲大士捨寶陀仙人遺句曲惟詩落人間如傳置郵速徐得之間軒建安自古多俊髦徐子磊落尤其豪論兵説劔走湖海身勤事左無所遭緑水五校已屠膾黑衣三衛嗟徒勞歸來故山便卜築脫棄萬事輕鴻毛橫前澗水漱哀玉傍舍老櫪藏飛猱山𬞞何用愧梁肉鶴氅未必輸青𫀆追寒弄月有真意慎勿輕語傳兒曹雷陽書事駱越風俗殊有疾皆勿藥束帶趨祀房瞽史巫紛若絃歌薦繭栗奴主洽觴酌呻吟殊未央更把雞骨灼一笛一腰鼓鳴聲甚悲涼借問此何為居人朝送殤出郭披莽蒼磨刀向豬羊何須作佳事鬼去百無殃舊傳日南郡野女出成群此去尚應逺東門已如雲蚩氓託絲布相就通殷勤可憐秋胡子不遇卓文君海康書事十首白髮坐鉤黨南遷海瀕州灌園以糊口身自雜蒼頭籬落秋暑中碧花蔓牽牛誰知把鋤人舊日東陵侯荔子無幾何黃柑遽如許遷臣不惜日恣意移寒暑層巢俯雲木信美非吾土草芳自有時鵯鵊何關汝卜居近流水小巢依嶔岑終日數椽間但聞鳥遺音爐香入幽夢海月明孤斟鷦鷯一枝足所恨非故林培塿無松柏駕言出焉逰讀書與意會却掃可忘憂尺蠖以時詘其信亦非求得歸良不惡未歸且淹留粵女市無常所至輒成區一日三四遷處處售蝦魚青裙腳不襪臭味㣪與狚孰云風土惡白州生緑珠海康臘巳酉不論冬孟仲殺牛撾祭鼓城郭為沸動雖非堯曆頒自我先人用大笑荆楚人嘉平獵雲夢粲粲菴摩勒作湯美無有上客賦驪駒玉奩開素手那知蒼梧野棄置同芻狗荆山玉抵鵲此事繇來久裔土桑柘希𧖟月不紡績吳綃與魯縞取具船客一朝南風發家室相怵迫半賈鬻我藏倍稱還君息一雨復一暘蒼茫颶風發怒號兼晝夜山海為顛蹶云何大塊噫乃爾不可遏黎明衆竅虛白日麗空闊合浦古珠池一熟胎如山試問池邉蛋云今纍年間豈無明月珍轉徙溟渤間何關二千石時至自當還次韻曾存之嘯竹軒翩翩曾公子子猷定前身嗜好凖疇昔了然不緇磷寄食平凖官植竹當比鄰朝與竹相對暮與竹相親安可一日無此君真可人遊仙二首服形百神朝刳心萬緣盡我無退轉境何以有精進戲為汗漫遊八極一何近渺渺東海水纍纍北邙墳向來歌舞處忽復成荒村愚人如鹿耳其死了無魂孰知九霄間玄圃枕崑崙緇塵化人衣蒼蘿誰與捫雲車自天來駕言遊混茫手持太一節身佩使者章龍虎傍夭矯馬龜伏以翔朝元𬗋薇上所覩浩難量寶網結萬珠參伍相焜煌花品不知數妙英拆玄房宫殿隨人身處處輒清􅋽危髾擢貞玉髙謝人間粧二三古鬚眉冠雲帶含光遺我飛霞佩副以明月璫再拜敬服之白毛發靈香次韻答張文濳病中見寄與君涉世網所得如鈎溫念昔相乖離俯仰變寒暄把𬒮安可期寄書囑加飱三年汝水濱孤懷誰與言末路非所望聮鑣金馬門校文多豫暇玄談到羲軒孰云笭箵小史書垂後昆匪惟以舊聞抵牾良可刋比枉病中作筆端淮海奔亟駕問所苦兀坐一室間晤對不知夕歸途斗星翻平時帶十圍頗復減臂環君其專精神微恙不足論愷悌神所勞此理真如絃送喬希聖鷃翔蓬蒿非所悲鵬擊風雲非所喜貴賤窮通盡偶然回頭總是東流水我思田文昔相齊朱𫀆照日如雲霓三千冠佩醉明月清歌一曲傾玻璃如今陳迹知何在但見荒冡煙蕪迷又思原憲昔居魯門戶東西閉環堵杖藜對客騁髙談自覺胸襟輩堯禹如今寂寞已成塵空有聲名挂千古送君去何時回世間如此令人哀我徒駐足不可久笑指白雲歸去來與子瞻會松江得浪字松江浩無旁垂虹跨其上漫然銜洞庭領略非一狀恍如陳平野萬馬攢穹帳離離雲抹山窅窅天粘浪煙中漁唱起鳥外征帆揚愈知宇宙寬斗覺東南壯太史主文盟諸豪盡詩將超搖外形檢語笑供頡頏㛹姢棄追逐撥剌亦從放獨留三百缸聊用沃軒曠吳越溪山子瞻得風字西北風絶境自忘千里逺勝逰難復五人同舟師不會興未窮又扶衰病過垂虹浮天自古東南水送客今朝處吐長虹平生睡足連江雨盡日舟行擘岸風人笑年留連意擬看斜陽萬頃紅二子緣詩老更窮人間無􅐻尾鬛紅參寥得岸字蜿蜒跨長虹吳會稱傑觀來三出慣天教我輩一鐏同知君欲寫長相憶更送銀來誇震澤勝事無昏旦破浪湧長鬐排空度飛翰肺肝淪連幾萬頃放目失垠岸倒境射遙山青螺點空半從得淩九垓從公逰汗漫入清境劃若春氷泮安淮海集卷第六
