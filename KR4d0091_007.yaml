front:
  text: 淮海集卷之七律詩
  hash: sha256:70c98f0b3a59783330a52cb87e87d114e92d3e6ae19a612dd682069e4f669384
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_007-1a}
body:
  text: 秦觀少遊德清道中還寄子瞻投曉理竿栧溪行耳目醒蟲魚各蕭散雲日共晶熒水荇重深翠煙山疊亂靑路回逢短榜崖斷點孤翎叢薄開羅帳淪漪寫鏡屏踈籬窺窅窕支港泛笭箵逺溆依微見哀猱斷續聽夢長天杳杳人逺樹冥冥旅思搖風斾歸期數月蓂何時燃蜜炬復聽閣前鈴次韻子由題斗野亭滿市花風起平堤漕水流不堪春解手更為晚停舟上埭天連鴈荒祠木蔽牛杖藜聊復爾轉眄夕煙浮詩云子由飮食隨魚蟹封疆八斗牛風波方在眼轉覺此生浮細雨添春色微風靜閘流勞生兩蓬鬢生計一扁舟鮮于子駿使君生日往昔髙堂夢熊羆兆吉占氣鍾西蜀秀時應仲秋嚴江漢揮犀尾風雲下筆尖微辭追屈宋精義到黃炎操履森寒柏名聲耿夜蟾擊強雕鶚健治劇鸊鵜銛使者旌旄易將軍印綬添鴛鴻隨步武虎豹入韜鈐錦覆郎官綬􅊮垂太守襜兩行分蜜炬十里上珠簾禮士常懸榻誅姦或奮髯雨堂昏綘帳風帙亂牙籖銀漢星𥘉换金莖露已霑歡聲連北固壽邑亘東漸麗句充文几奇香牣玉奩簮紳五福具樽爼四難兼賤子真殊幸清標獲屢覘誤蒙雕朽木猥辱畫無鹽嘉運方熙洽英才豈滯淹佇公歸法從行道慰民瞻輦下春晴樓闕過朝雨參差動霽光衣冠紛禁路雲氣繞宫牆亂絮迷春闊蔫花困日長經旬牽酒伴猶未獻長揚睡起睡起東軒下悠悠春緒長爬搔失幽囀欵欠墮危芳蛛網留晴絮蜂房受晚香欲尋𥘉斷夢雲霧巳冥茫次韻莘老𥘉至湯泉二首夾路山重復參天樹老蒼一區成小市數埒引溫湯洗沐同幽客餔飱就𣑽坊未輸朝市子斗酒得西涼年華行巳老林莾尚蔥蒼地勝連龍洞泉溫注鬼湯人風逺城市鍾𣑽近僧坊九夏來投錫捿心應更涼詩云莘老茂宰藹休政道人棲淨坊恍如登十地熱惱頓清涼川谷閟深阻天時正莽蒼聊同不速客來浴自然湯過六合水亭懷裴博士次韻三首次莘老昔同裴慱士酌酒俯庭柯晚岫潭潭碧風池瑟瑟波蒼崖遺老沒白首故人過轉眄成陳迹勞生可奈何晚憩孤亭上羸驂繫斷柯荒門寒帶路空檻闊增波往事青山在餘生白鳥過誦言成絶語亹亹迫隂何折柳相從地重來失舊柯林光延晚照岸影動微波隔浦檀欒密當簷翡翠過主人成異物搔首奈情何懷孫子實舉眼趨浮末斯人獨好修靑春三不惑黃卷百無憂玉出方流潤鸞停翠竹幽相思自成韻不必寄西郵對淮南詔獄二首一室如懸磬人音盡不聞老兵隨卧起漂毋給朝曛樊雉思秋野鞲鷹望暮雲念歸忘食事日減臂環分淮海行搖落文書亦罷休風霜欺獨宿燈火伴冥搜笳動朱樓曉參橫粉堞秋更拚飛鏡破應得大刀頭次韻答米元章嗜好清無滓周旋粲有文揮毫春在手岸幘海生雲花鳥空撩我蓴鱸正屬君惟應讀䳄霓差不愧王筠宿參寥房鄉國秋行暮房櫳日巳暝驚風多犯竹破月不藏星鉤箔簷花動抄書燭燼零非關相見喜自是眼長靑次韻蔣頴叔南郊祭告上淸儲祥宫七韻二十特起朝陽內祠宫極邃淸髙窗窺玉女巨闑守昌明盛掩秦諸畤雄逾漢兩京垣橫天上𬗋洲露海中􅌡黃帝𥘉龍躍中原罷虎爭樵夫亦談道行旅不持兵此地修禳禬于時保利亨柏梁災未幾陳寶詔重營御帑金繒出慈闈服玩并摽題動宸翰撰次屬鴻生玉刻黃冠印金書祕殿名妙經藏洞觀真籙佩威盟仙溜花間靜瓊枝物外榮肇禋承帝祉肆青順民情天施寧論報風行不計程近傳聞磬管時或見旄旌海嶽朝雙闕星辰集上楹禮如尊太一事異寵文成大似圓丘報長于至日迎侍臣來祭告法駕欲時行釐事通元氣髙真逹孝誠慶增黃帝系壽續太隂精西北夷門峻東南輦路傾雲行博山氣風卷步虛聲符貺方期應英髦各彚征謳歌興法從行見泰階平次韻米元章齋居即事庭木雙株茂盆池一掬慳支頥魚出樂入眥鳥知還老境行將及仙書讀未間因君歌鳳過通昔夢歸山次韻酬陳傳道白髮三冬學青衫八尺身誰知人上傑聊作吏中循揮翰通元氣開編友古人寄聲張氏子曲逆豈長貧次韻傳道自適兼呈都司藝叟學士楚國陳夫子周南頗滯留弊𫀆披稿葉瘦馬兀扁舟藥餌過三伏文書散百憂何人共禪恱居士有浮休擬郡學試東風解凍寶歷開新歲春回斗柄東漪生天際水凍解日邉風浩蕩依蘋起侵尋帶雪融江河霜練靜池沼玉奩空魚藻雍容裏雲霄俯仰中更無舟楫礙從此百川通駕幸太學原廟𥘉更十二章還輿詔蹕幸諸庠法天璧水遙迎仗應夜深衣不亂行風動四夷將遣子禮行三舍遂賓王前知此舉追虞氏果有球音發舜堂題閻求仁虛樂亭三首前二首莘老禪房幽構徑彎環噪鵲鳴鳩盡日間隱几冥濛超物表畫圖髣佛見林間褰簾雲吐池中月岸幘天橫竹外山秋興巳闌成麗句板輿時此慰慈顔長官平昔嗜林丘僧與開亭待勝逰修竹回環扶碧瓦小池方折轉淸流春深鶗鴂催詩句夜靜蟾蜍入酒舟只恐政成留不得縣人空此憶常遊誰構新亭近翠微似教陶令狎天機池光引月來簷廡竹影疏風到客衣愛酒有時擕玉斚無絃聊自拂金徽人間此樂應無幾肯向良辰與物違懷李公擇學士一辭行斾楚亭臯幾為登臨挂鬱陶蓬斷草枯時節晚山長水逺夢魂勞流傳玉刻皆黃絹早晚金閨報大刀宣室方疑鬼神事順風行看駛鴻毛次韻二首靑髮從逰各白𫀆老來邂逅更陶陶尺書繼月傳雙鯉相見何時詠百勞諌草十年聊閣筆坐棠三郡不更刀靈崖濼水堪行樂時事紛紛劇蝟毛畫船京口見停橈蕭灑渾疑謝與陶但把好山供勝踐不將餘論挂塵勞諌垣天上經焚草藩國年來屢夢刀北路近傳新政美未嘗因物疆吹毛題湯泉二首滿斛泠泠注不窮幻塵乾慧洗皆空法流水接諸天上神瀵香聞一國中金粟示為除病惱跋陀仍巳獲圓通馬蹄又入風埃去回首吳吟謝迮翁逅迮翁湯泉有溫井霜寒碧甃澄飛塵不動玉奩清老翁仙去羸驂共太子東歸廢沼平據石聊為寶陀觀決渠還落堰溪聲洗腸灌頂雖殊事一洗勞生病惱輕寄題王欽之自圓庵誅茅北戶結圓廬從事風流入畫圖珠箔粉垣藏混沌葛巾藜杖造虛無春間居士天花室晝靜仙人白玉壷遙想吏行鳬鶩散沈煙一穗對團蒲流觴亭並次韻二首縹縹雲巒欲盡頭灑然華構别飛流朱盤瀲灔開氷鑑碧甃縈紆走玉虬毛骨漸驚超濁界風煙驟覺變淸秋更憐白足如霜句可羡溪邉六逸逰卧龍西畔北池頭水擘華堂瑟瑟流幾曲漪漣盤翠帶一峰孤秀浴蒼虬香囊近午清無汗素扇生涼爽入秋待喚畫師來貌取圖成便是竹溪逰逰龍門山次程公韻路轉橫塘入亂峰遍尋瀟灑興無窮樓臺特起喧卑外村落隨生指點中溪傍五雲清逗玉松分八面翠成宫歸途父老欣相語今日程公昔謝公逰龍瑞宫次程公韻靈祠真館閟山隈形勢相髙對越臺莓徑翠依屏上轉藕花紅繞鑑中開鶴􅋦寶箭排煙去龍護金書帶雨來夾道萬星攢騎火滿城爭看使君回次韻朱李二君見寄二首東阡北陌坐淹時偶為髙風振羽儀十丈蓮花開處逺三年楮葉刻成遲鬢毛但速安仁老錢粟難輸曼倩飢尚賴故人遙省憶發揮春色有新詩萬古流空一鳥沈衣冠常苦事違心七行俱下知君舊四者難并笑我今梅已偷春成國色雲猶憑臘造天隂美人緑綺煩遙贈莫致南金增永吟睡足軒二首長年憂患百端慵開斥僧坊頗有功地撤蔽虧僧界淨人除荒穢玉奩空青天併入揮毫裏白鳥時興隱几中最是人間佳絶處夢殘風鐵響丁東數椽空屋枕淸流一榻蕭然散百憂終日掩關塵境謝有時開卷古人逰鳴鳩去後滄浪晚飛雨來𥘉菡蓞秋此處便令君睡足何須雲夢澤南州淮海集卷之七
