front:
  text: 淮海集卷之三十六
  hash: sha256:56444452afaef1fbbf62c97897383be6e88c1836ed276186ff9960a96e778200
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_036-1a}
body:
  text: 秦觀少遊鮮于子駿行狀公諱侁字子駿其先成湯之裔箕子封于朝鮮子仲食采于于為鮮于氏世家漁陽唐初詔為閬州刺史殁于官子孫家焉遂為閬中人開元時仲通叔眀節制兩川叔眀以功賜姓李氏後復故姓于公十二世祖也曽祖演祖瓘皆不仕父至自號隱居先生為蜀名儒以公贈金紫光祿大夫母趙氏追封安德郡太夫人公自少莊重不茍力學有文鄉黨異之年二十登景祐五年進士科調京兆府櫟陽縣主簿到官數月丁外艱服除授江陵府右司理參軍慶曆中天下大旱有詔中外臣僚實封言事公上書推災變所興有四一曰言不從二曰厥咎僣三曰欲得不明四曰上下皆蔽言甚切直移歙州歙縣令歙俗喜訟善持吏長短吏稍繩以法輒得罪去公為黟又嘗攝婺源其治皆為諸邑最豪強畏之改著作佐郎知河南府伊闕縣事遷祕書丞通判黔州未行改通判綿州左綿逺郡自守將以下皆日課吏卒供薪炭芻豆𬞞果而贏取其直公到悉罷之守將已下聞之亦罷其風遂絶清獻趙公使蜀首薦之朝轉屯田員外郎賜五品服英宗初為皇嗣公上疏言儲號未正橫置未宜今皇嗣初定未聞選經術識慮之士以擁護羽翼乞妙選賢德以為宫僚陛下清躬小有寢食不順朝夕左右固惟婦寺願復漢侍中之職令二府悉休宿衛覃恩遷都官員外郎通判保安軍何公郯帥永興辟公簽書其節度判官廳公事改職方員外郎覃恩轉屯田郎中代還用三司使薦除蔡河撥發神宗初即位詔中外直言闕失公應詔言十六事其目曰納諫諍以輔德訪多士以圖治嚴法令以制世崇節儉以富民明黜陟以考實去貪暴以崇厚重臺諫以委任選監司以督姦閲守宰以求治慎遷易以去弊重根本以圖固復選舉以澄源申武備以警姦治軍旅以除患謹邊防以重內練將帥以禦戎其末曰願陛下事兩宫以孝待大臣以禮侍從知其邪正近習防其姦壬上愛其文出以示御史中丞滕元發曰此文不減王陶東宫舊臣上所信重故以公擬之而陶亦雅相知嘗薦公明經術知治體切直不阿宜備顧問後為三司使又奏為其判官不從熙寧初有詔侍從之臣各舉所知范蜀公時為翰林學士以應詔除利州路轉運判官執政有沮議者上曰鮮于某有文學執政曰陛下何以知之上曰有章疏在執政乃不敢言王荆公用事公上疏言時政之失曰可為憂患者一可為太息者二其它逆治體而起人心者不可槩舉又曰陛下聰明過于文帝而群臣無賈生之才西方議用兵公以兵將未擇關陜無年未宜輕動乃移書勸安撫使宜如李牧守鴈門故事逺斥堠謹烽火堅壁清野使寇無所獲密戒諸路選將訓兵蓄鋭俟時須其可擊而圖之安撫使不能用師果無功未幾慶州兵叛關中震擾巴峽以西皆警成都守與部使者爭議發兵屯要處書檄旁午于塗公一皆止之示以無事蜀人遂安公以劒門形勢之地當分權以制內外今帥劒南者舉全蜀之權以畀之非便宜循唐制成都益昌各自置帥以消姦雄窺伺之心書纍上不報是時初作助役青苗之法詔諸路監司各定所部役錢之數轉運使李瑜欲以四十萬緍為額公以利路民貧用二十萬緍足矣與瑜論不合各具利害以聞上是公議謂判司農寺曽布曰鮮于某所定利路役書可為諸路法遂罷瑜而以公為轉運副使兼提舉常乎農田水利差役事而青苗之法獨久之不行執政怪焉亟遣吏問狀公曰詔書稱願取即與利路之民無願取者豈可強與之邪嵗滿有旨再任及罷又留之轉都官郎中西京左藏庫使知利州事周永懿貪暴不法前使者憚其凶狡置不敢問公具得其姦贓即遣吏就捕械送于獄永懿竟除名編管衡州初利州以兼益利路兵馬都監故事武臣為守至是公上言乞堂選文臣知州事别置路分都監以懲永懿之弊又言劒門關葭萌寨使臣兼知縣事類多不習文法宜各置令專領邑事詔皆報可遂為定制其他深計逺畫公私便之而人所不及者蓋不可悉數十餘年使者有欲變其法者父老泣曰老運使之法何可變也蓋公之猶子師中嘗使利路故民以老運使别之公奉使九年閬為名郡方新法初行諸路騷動而公平心處之鄉人無異議者今翰林蘇公以謂上不害法中不傷民下不廢親為三難云移京東西路轉運副使過闕陛見靣賜三品服遷司封郎中時河決曹村梁楚之地被害公移檄諸郡具為科條所以拯救之術甚備議者或謂決河東流入海自其本性宜勿復塞公曰東州平衍兗鄆單濟曹􅗛諸河其所歸納惟梁山張澤兩濼夏秋霖潦猶能為害矧縱大河衝注于中則諸郡生聚其為魚乎乃作議河一篇數千言上之又乞下澶州早行閉塞上皆嘉納初京東分東西兩路後以財用虗贏不相通和詔復合為一路升公為轉運使更盡領其事召還賜對勞問甚厚上欲留公京師而公固求守郡遂除知揚州事官制行換朝請大夫未幾坐舉吏受賕免降為朝散大夫方在譴中又聞故吏以賕敗者或勸公宜懲前事自陳公曰吾專刺舉十二年所任吏四百餘人寧盡保其往耶然既已薦之于朝豈可反覆為自全計卒不首也復朝請大夫管勾西京留守司御史臺公之在西京也今樞密范公亦領臺事而司馬溫公提舉崇福宫三人相得歡甚搢紳慕其遊及二聖臨御圖任老成于是拜溫公為門下侍郎起范公帥環慶復除公為京東轉運使溫公曰子駿不當使外顧東土承使者聚斂之後民不聊生煩子駿往救之耳比公行又謂所親曰福星往矣安得百子駿布在天下乎公至則奏罷萊蕪利國監鐵冶乞變鹽法依河北路通商逐勾當公事之刻薄者二人發濰州守姦贓東人大悅又言髙麗朝貢可令瀕海州郡為禮不煩朝廷若其自欲商賈聽往閩越州麗人無以辭矣召還為太常少卿三省太常會議神宗配享功臣或欲用王荆公吳正憲公者公曰富文忠公勳德終始天下具知宜配食議遂定因上言本朝舊制配享雖用二人宜如唐用郭子儀故事止用富公一人詔從之元祐元年明堂禮畢拜右諫議大夫既拜命即以辨邪正之説為獻其言君子小人相為消長之理甚備又言近嵗人物衰少凡一官有缺差擬為艱宜許六曹寺監長史各舉僚屬嚴其論薦之法亦以見逹官之所舉而執政大臣可以優遊論道蓋宰相擇臺省長官臺省長官薦舉僚屬知人安民之道於斯為得自保甲之法行民以藝能入等授班行者即為官戶免役時祥符縣至一鄉止有一戶可差公言僥幸太甚宜依進納官例充役如故須其升朝乃免有旨治諫官直廬不得與東兩省相通以防漏泄公上言昔漢武帝嘗命文學之士遞宿禁中凡公府欲行之政俾之閲視辨論中外相應以義理之文故文章爾雅訓詞深厚炳然與三代同風唐太宗臨御每遇宰相平章事必命諫官俱入小有頗失隨即針規故正觀之治企及三代今乃屏置諫官使與兩省不相往還恐非朝廷開言路以副聖上納諫之義又劾大臣不宜輔郡者請加譴黜以示天下其餘乞復制舉分經義詩賦為兩科以求人材罷大理獄以省事罷帳司檢法以省官嚴出官之法減特奏名人數以抑濫進再言京東鹽禁不便宜弛以利民許蔡河撥發統制縣道以便程督罷戎瀘保甲以恤民力行浙中舊法以省漕運復三路義勇以寬保甲沙汰學官以熄異議事多施行明年春以病不任朝謁乞郡數賜告不俞章三上乃拜集賢殿修撰知陳州事仍有旨滿嵗除待制夏五月辛未終于州寢享年六十有九纍勳柱國賜爵清源縣男前數日語諸子曰吾心無不足者惟以不得歸老陽翟别著易説為恨無它言公忠亮果斷出于天性自小官以至進擢數上書言天下事咸具利害移諫官御史其言或用或不用未嘗小加損益為政以經術自輔所至有迹其去民追思之熙寧元豐之間士大夫騖于功利更其素守者多矣公雖屢更使指而屹然于新進少年之中號為正人晚登侍從益厲鋒氣知無不言在職九十餘日所言當世之務略盡嗚呼使公不疾病且死得大用于時其勳業豈易量哉然公起諸生仕為諫官供奉仗內言聽計行天下受其賜比夫當軸處中初無益於縣官者蓋得失相萬也由是言之雖病疾且死弗克大用於時亦可以無憾矣喜推轂士士之遊其門者後皆知名治經術有師法論注多出于新意晚年為詩與楚辭尤精泰山孫復嘗與公論春秋歎曰今世學經術未有如公者蘇翰林讀公八詠自謂欲作而不可及讀公元誦以謂有屈宋之風今天子賜之詔書亦曰學足以邇古才足以御今智足以應變強足以守官深於經術逹于人情又曰金石之節皓首不衰則公之德善于是可考也所著文集二十卷傳二十卷周易聖斷七卷典説一卷治世讜言七卷諫垣奏藁二卷刀筆集三卷其餘未編次者尚多娶陳氏太常寺太祝藩之女恭儉婉嫕治家有法封某君前公一年終男五人復早卒頡河南府偃師縣尉群鳯州司法參軍綽假承務郎焯未仕皆有學行而頡尤自立士大夫多稱之女四人長早卒次適趙氏次適蒲氏皆前卒次適永安縣主簿張球孫男一人嵩孫女二人公兩得任子恩皆以豫兄之子故焯猶未仕凡嫁內外親族之女若干人諸孤將以某年某月某日葬于頴昌府陽翟縣大儒鄉髙村之原前期頡以書走汝陽請狀公之行義將乞銘于知公者某被遇最厚又嘗辱薦于朝義不敢辭輒加論次而公之行能謀議過人者甚多難以具舉取其可考不誣繫國家之大者著之以告夫當世之君子云徐君主簿行狀君姓徐氏諱某字成甫其先泰州興化人逺祖湘自興化徙揚州之高郵家焉湘生嗣嗣生亮亮于君曽祖也咸不仕祖元吉有厚德鄉人尊愛之終于髙郵軍司理父格前通州司戶參軍參軍磊落豪縱不耐細務自司理之沒事計多以委君家既右族金錢邸第甲于一鄉公私斂施交錯重復君操其綱維批贅補隙抉剔含負日縱月收市笥么麼無所遺漏于是參軍以為能謂所親曰吾有子矣將不復與家事熙寧某年以入粟試將作監主簿又五年始至京師授潭州寧鄉主簿皆非其好也君事親至孝四時甘新未進不以輒嘗待昆弟族人一主于恩義叔父某為不恱者所構刺史惑之會有人誣君笞殺家奴刺史大怒以君屬吏諷并致其叔君曰罪緣某不繇叔也榜脅萬端不服獄吏嘉之為請于刺史得脫友人以貧不能葬其親者君聞之曰是余過也即為買田出錢以辦喪事而友人之親得葬者五喪此其可見者也至于字親族之孤急交遊之難賴其施者甚衆而能諱不自言雖妻子有不得而知者矣雅性寬厚給使皂隸或時犯之殊不介意婚姻之事不幸至于甚難處者君指顧從容顔色不變而事以兩全繇此見其材智度量信有以過人者焉頗涉傳記隂陽醫藥算術之學無所不窺晚節尤厭人事思與佛侶處士杖屨相從𬞞食清淡為忘年之計惜乎未及而卒矣實熙寧八年閏月十八日也享年四十一初娶張氏有賢德前君若干年卒更娶蔡氏節行益竒君病殆時至取毒藥自引後君二日卒于是又見所以刑諸家者也子男五人曰文通文仲文剛文饒文昌女三人曰文美文英文柔初君好學問聚書幾萬卷欲舉進士而父祖不從乃嘆曰子當讀書女必嫁士人其後四子藝葉蔚然有成而文通尤自立又以文美妻余如其志云葬有日矣文通泣謂余曰惟先人行義可質諸幽眀不幸以多資之故士大夫以嫌自戒者或不能究言諸孤良懼泯滅盍為我圖之余既相與泣下因掇其尤著白者為行狀以俟夫自信之君子考而志焉蔡氏夫人行狀夫人姓蔡氏楚州山陽人故潭州寧鄉主簿徐君諱某之妻而守祕書省校書郎致仕諱中正之女也幼聰敏有才藝父母獨竒愛之異於他女年十四適同郡環生生故疾病成禮十六日而卒夫人雖幼居喪事舅姑孝謹如成人已而其舅又卒為之斬衰𬞞食誦佛經無復更嫁意于是其母與諸昆弟率親族數十人即環館奪之曰若十四而適人十六日而夫死為夫之喪三年舅之喪又三年若為人婦亦至矣又不欲更嫁無乃過乎且環父子俱亡嗣若雖欲守志將誰與居夫人悲哀迫不得已遂去環氏一年而歸徐君徐君髙郵人號佳士所與遊者皆一時之豪夫人既得賢夫所為益進宗族甚重之俄而君病且殆夫人曰身踐二庭女子之辱也矧又如此生復何聊吾其決矣因不食潛使一媪市砒霜紿曰吾侍君疾將佩之以厭惡氣媪為市與之遂以自服家人大驚亟求解藥以進夫人曰是豈復欲生耶趨使持去強之終不肯下徐君沒二日而夫人亦卒矣卒之日里巷相傳皆歎曰異哉若人者豈前古所謂烈女者歟時熙寧八年閏月二十日也年三十九夫人性卓犖斬斬不為兒女事既生大家而所適又皆富贍金繒服玩取足于身餘輒以散親族作佛事無一毫愛惜既死篋中索然徐君前娶張氏妾生一女一男夫人所出才一女而巳既撫諸子猶已之子又奉張母虞氏時節勞問如已母故其卒也諸子洎虞氏及余哭之如君云仲兄繩亦以操行知名于時出殯自山陽屢來因得訊夫人之舊事而并余之所見書焉圓通禪師行狀師諱懷賢字潛道俗姓何氏溫州永嘉人也在襁褓中能合掌僧坐父母異之時郡之西山有僧嗣仁修西方白蓮淨觀行甚髙衆歸之勤號嗣仁社主乃以師從社主出家天禧二年普度天下僧遂落髮受具戒時年四歲也師既得法器又幼得髙僧為之依歸藝行日進同輩無與比者有講肄輒往聽未幾盡傳其學及長慨然有遊方之志即辭社生去遍參知識所至處延居上遊最後見逹觀禪師曇頴于潤之因聖遂得其法皇祐初潤守王公琪雅聞師名乃具禮請傳法於甘露而太平之繁昌亦以隱靜召師以甘露近城邑而隱靜僻在深山中遂從太平繁昌之請開堂于郡之瑞竹院初師從瑞新禪師遊十有二年具知宗門承襲賓主之事自謂無以復加矣比至逹觀會中聞所開示類皆世緣俗諦或雜以嵬瑣談諧之言又嘗以事斥一僧去每升堂輒追罵至纍日猶不已師心陋之乃潛詣文室請逹觀曰為人天師當只説法奈何預以世俗間事且僧有過斥去則巳矣何足追罵至纍日乎逹觀頷而不答師因此省悟至是以信香嗣逹觀法云居隱靜七年王公移守金陵復召師以清涼辭不赴眀年逹觀自眀州雪竇徙金山之龍遊州人乃以雪竇召師既行道過龍遊留一月會逹觀示寂潤州之衣冠緇素因以狀詣郡守請止師繼焉而龍遊主者故事當稟于朝廷郡守以白部使者上之報可龍遊自火災之後棟宇灰燼瑞新禪師實中興之功未既而卒師至修新公故事大興土木積八年殿堂廊廡皆具今宫室之盛冠絶淮海者蓋始于新而成于師然其地當孔道客至無虛日師頗厭之熙寧元年遂謝去隱于金牛山去丹陽縣數十里人迹罕至事委其徒覺澄主之師一切不問庭養猿鶴孔雀鸚鵡白鷴皆就掌取食號五客各為一詩贈之士大夫欲相見者就山中訪焉三年劉公述謫守九江以圓通召師師素聞匡廬山水之富常以未至為恨得疏欣然從之題詩壁間而其卒章云歲晚當期返竹門至圓通一年果謝去復還金牛眀州復以雪竇來請固以疾辭史館刁公約謂師曰雪竇東南名山明覺逹觀嗣居其地二十年間請者三至可謂勤矣今又不赴無乃孤其望乎師素厚刁公心善其説遂登舟由海道去北轉海門遇大風卒起風檣摧敗夜漂至慈溪之東岸舟破從者百餘人皆散走師獨安坐水中不動從者還救之乃免居雪竇一年復謝去還金牛以元豐五年九月甲午示寂俗夀六十七僧臘六十三覺澄等即以某月丁未葬師于金牛之西壠纍墳遂塔焉師操行卓越而遇人有恩意雖對賔客未嘗與衆異饌夜輒從衆僧寢于堂中不入丈室雅性樂施所得金錢繒帛率緣手盡其徒以此歸之又多才藝工於詩字畫有法間居絶口不挂事事雖交至錯出處之晏然無不集者當時賢士大夫聞其風皆傾意願與之遊始用參知政事髙公若訥奏賜紫方袍又用節度使李公端願奏賜號圓通大師凡十被請從之者四皆天下名山巨剎道化方行輒託事隱去州郡雖欲挽而留之不可得也弟子五十有五人所著詩頌文集凡五卷又撰次其自少至老出處之迹一篇號稚耄典記以自見云謹狀録寶林事實寶林禪院始於宋元徽中浮圖惠基得郡人皮道輿所施宅因山以造梁大同中賜號寶林寺唐會昌中廢乾符中復興更號應天寺本朝因之其山一名寶林一名飛來一名龜山上有鰻井歲旱禱雨輒應事見圖記熙寧十年八月丙申一夕火棟宇灰燼十月給事中集賢修撰程公來領州事登其山故址而歎悼之於是郡之衣冠緇素數十人詣州自陳請修復故幸公為具其事以聞逾月賜號寶林禪院遂以明年三月興工復率僚屬親至其上勸勞之衆皆感激思奮奔走承事下至刮摩磚石之技咸盡其能而貧富各以財力施其制蓋即山巔為多寶塔塔有環屋其北為羅漢殿殿旁如塔之制其南降而夷山腹為法堂法堂之東為寢堂又東為方丈又降而南得平地為佛大殿殿有兩廉以逹于東西序前為三門其左則鍾樓幡剎厨庫之所相望也其右則轉輪經藏僧堂之所相屬也繚以髙垣甃以方甓未踰再期而金石土木之觀侈於舊三倍都人士女俯仰瞻歎疑有神鬼相之凡吳越之間塔廟以火廢者其復未有如寶林之遽者也蓋越之城南左右數十里疾馳屹立皆屬於秦望而秦望又率其左右之山因鑑水謁于越越城之中能與秦望為主客者凡三山卧龍寶林蕺山也卧龍為郡守所治而蕺山少東不能正受奉望之謁是越之形勢自卧龍已下未有如寶林者其地如此宜其廢不踰時而復興矣方寺之未火時便房曲道各自為家山川之勝蔽虧隔閡者十六七而前世詞臣才士如元稹李紳徐浩之徒猶誦歎不巳見於篇章矧今制度一新神工天巧廓然披露可以岸巾憑几而盡得之使數子而在其所誦歎又可知巳然則前日之廢豈非所以為今日之興乎公一日率賓客至其上顧謂觀曰寶林之中興天也余何力焉雖然不可使其事掩抑不少槩見於世前日賜號革為十方集賢孫公既為之記矣今棟宇垂備將乞文於集賢林公子亦與見吾事者也盍托厥實以請庶幾二集賢之文相與傳於無窮不亦韙歟觀承命掇其大槩并公之意而次之號曰寶林事實以獻諸集賢云代蔡州進銀絹狀大鈞播物難酬坱北之恩墜露增流以致眇微之意前件物山澤所寶箱篚攸資屬兹誕聖之辰式備充庭之貢代蔡州進瑞麥圖狀勘會本州自春已來屢得雨澤已於某月日具狀奏聞訖今來二麥並已成熟地無髙下所收斗斛數倍當年及諸縣節次申送致麥苖有一莖二穗或三穗其多有至五穗者甚多父老等皆云數十年來無此豐熟亦未嘗見有麥苗一莖至數穗者以此見二聖臨御已來功化日新利興害去善氣克塞致此嘉應臣待罪郡守目覩其事不敢隱默謹畫成圖子一本隨狀上進以聞謹奏代薦蔡奉議奏狀竊以管下居住具位蔡駟少以文翰見推流輩仕宦所至皆有能聲安貧守道恬於進取有士如此豈敢不言伏望聖朝特賜考察擢充臺省清要任使淮海集卷之三十六
