  - {type: variant, offset: 387, length: 2, content: 逸亭, WYG: 千古遂同風外家恩數仍長信原廟烝嘗即治隆欲叙聖功歌挽者乾坤難入畫圖中韓樞密夫人挽詞二首奕葉貂蟬後宗姻樂靜間從夫登兩地看子入三山舊像瞻揄闕遺音想佩環百年川閲水不復更西還天上開華屋邱山忽返眞内人歸盛挽者轉哀新鸞詔初乾墨魚軒已暗塵藹然多德善論次有蒼珉俞公達待制挽詞二首詞場英妙氣如虹出入青雲見事功流馬木牛通蜀漕葛巾羽扇破渠戎風生使者旌旄上}
