  - {type: variant, offset: 391, length: 1, content: 雪, WYG: 傾東一麾出守著威名凶訃西來上為驚玉帳笑談成昨夢錦囊書札見平生衣冠漸散紅蓮府鎧馬還歸細柳營可道風流回首盡芝蘭庭下粲朝榮陳承事挽詞明時就養寄淮壖忽歎艅艎以柩旋八尺衣冠成繪事百年風誼列幽鐫銘旌暮暗黄梅雨鄉路秋横碧玉天遙想葬期豪傑㑹高車連軫駐新阡永夀縣君挽詞二首廷尉䝉恩後蘭臺就養初大椿宜更夀流水遽焉如鸞錦封花誥蛛絲網板輿百年誰考德琬琰在幽墟明世辭隆養哀榮道路傳賻喪從上宰歌挽出羣仙素幔傷秋泛青缸慘夜船玉峯歸葬處木拱鴈連天曽子固哀詞皇受命而熈洽兮實千祀而一時恊氣鬱而四塞兮與盛德其俱升麟鳯出而旁午兮猶氤氳而扶輿篤生我公兮以文章為世師公神禹之苖裔兮肇子爵而鄫封逮去邑而為氏兮季葉汩其南征祖騫翔而績著兮考踡跼而文鳴公既生而多艱兮踵祖武而好修既輕車又良御兮遂大放乎厥詞發天人之奥秘兮約六藝而成章元氣含而未泄兮洞芒芴而窅㝠挽天河而一瀉兮物應手而華昌揖揚馬使先路兮咸告公曰不敢彼崔蔡之紛紛兮孰云窺其藩翰辰來遲而去速兮固前終以跋㚄方盤礴而上征兮遽相羊而補外皇揆公之忠誠兮即商墟而賜環紬史諜乎東觀兮裁誥命乎西垣典章絶而復作兮世爭覩而快先正經緯乎終古兮配維斗而昭然變化詭而難常兮雖司命其或昧忽遭艱而去國兮遂䘖哀而即世述作紛其具存兮悵爽靈之焉詣信百年不斯須兮猶電滅而焱逝天不憗遺一老兮固縉紳之所傷矧不肖以薄技兮早獲進於門墻路貫江而修阻兮曾莫奠乎酒漿悲填膺而茀鬱兮聊自記於斯文蔡氏哀詞惟夫人之髙誼兮眞一時之女英既富有此好徳兮又申之以令儀帶幽蕙之縹緲兮佩明月之陸離人自操舎之不一兮雅獨取善以自持何報施之或􅑯兮罹禍艱於不虞顔色炫而未暮兮所天忽以殞殂痛平素之偕處兮忍此奄奄而嫠居瀝哀血以自誓兮甘餌毒而捐軀佩珠玉以死真兮固衆女之所嗤曷卓越以不顧兮棄性命其如遺美不可强有兮信天資之所開要反心以内省兮豈或售乎人知嗟三晨之未浹兮遂俱逰而莫留死者有知兮𦍑魂魄以並遊日黄昏而不見兮庭室窈其無人惟哀風以歸來兮動素幔之襜襜何平生之欵密兮遽音聲之不可尋儼遺跡以在目兮紛百憂而攻心豈至理不吾喻兮如意厚而悲深撫雙櫬以增慟兮涕漬血而灑襟已矣哉人生有死兮自前古而既然精魄忽其不駐兮惟修名之可延忍錄錄以寓世兮信烈者之所羞儻佳志之獲申兮雖奄忽其焉悼時宣義挽詞奮發多難裏哀榮厚夜}
