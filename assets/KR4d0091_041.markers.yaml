  - {type: variant, offset: 638, length: 2, content: 行狀, WYG: 挽章報國封章數論交意氣真先朝貴公子當代老成人月動融尊酒花催鄭驛賓誰知古原上馬鬛一朝新戚里薨耆舊哀榮世未如襚加三事衮奠致两宫輿鹵簿前衢隘歌鍾後院虚英風知不墜芝玉茂庭除孫莘老挽詞四首同功一體盡調元獨抱沉疴反故園壺遂暮年非不遇人生到此可忘言青春芸閤妙文詞進讀金華鬢若絲轉守七州多異政奉常處處有房祠月旦嘗居第一評立朝風采照公卿門生故吏知多少盡向碑陰刻姓名華屋丘山可奈何百年光景一投梭故人唯有羊曇在慟哭西州不忍歌陳用之學士挽詞禮經三百鬢毛班追述先儒伯仲間誰請尚書重給札盡抄遺藁入名山岹嶢芸閤上參天直舎相依欲二年願寫此情歌挽者涙霑毫素不成篇雲臺觀者候昏明奎璧躔中失二星上界真人重離别陰風一夜攪青𡨕牢落公車待詔時白頭掌故更棲棲一生勤苦成何事只得銘旌數尺題滕達道挽詞早嵗峩冠侍冕旒白頭淹䘏外諸侯篋中尚有東風草塞下曾無北顧憂心繫漢廷長入夢氣吞絶塞不防秋經綸未了埋黄土精爽還應屬斗牛江南江北奉周旋合散如雲二十年春郡勝遊花蔽馬夜山清話雨連天共驚萬里長城壊獨把千金寶劔懸平日書題多散亂呼兒尋聚一澘然自作挽詞嬰釁徙窮荒茹哀與世辭官來錄我槖吏來驗我屍藤束木皮棺藁葬路傍陂家鄉在萬里妻子天一涯孤魂不敢歸惴惴猶在兹昔忝柱下史通籍黄金閨奇禍一朝作飄零至於斯弱孤未堪事返骨定何時修途繚山海豈免從闍維荼毒復荼毒彼蒼那得知嵗晩瘴江急鳥獸鳴聲悲空濛寒雨零慘淡陰風吹殯宫生蒼蘚紙錢掛空枝無人設薄奠誰與飯黄緇亦無挽歌者空有挽歌辭}
