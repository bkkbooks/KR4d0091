  - {type: variant, offset: 386, length: 0, content: '', WYG: 東朝制詔九年稱烈武功高後世興坐舉不周天柱正親扶暘谷日車升班行尚想延和殿羽衛俄趨永厚陵洛水嵩峯霄漢外百官西望涕難勝保扶明主自春宫萬國昇平出至公顧命一時聊共政思}
