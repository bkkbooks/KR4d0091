  - {type: variant, offset: 2363, length: 0, content: '', WYG: 俗尚名節甚矣天下之士惟以然諾不終為媿禍亂不觧為耻厥志有在生死以之故事成則為太史慈不成則為臧洪以臣子之義責之皆罪人也揚子以要離為􅀈螫之靡聶政為壯士之靡荆軻為刺客之靡者耶孟子曰可以死可以無死死傷勇若數子者可謂傷勇矣亦足以悲夫王導論臣聞春秋書趙盾之罪而三傳皆以為實其族穿非盾也盾為正卿亡不越境反不討賊故被大惡之名臣始疑之及讀晋史見王導周顗之事然後知三傳之説為不誣矣何則經誅其志傳述其事也王敦之舉兵也劉隗勸帝盡誅王導之族導甞求救於顗顗申救甚切而}
