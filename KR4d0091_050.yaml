front:
  text: 淮海長短句卷下
  hash: sha256:edb7079c435364bc66411d9427ecd7aa2a9cbda74e6ebbeecba989e9d30ab8dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0091_SBCK_050-1a}
body:
  text: 秦觀少遊調笑令十首并詩王昭君詩曰漢宫選女適單于明妃斂袂登氊車玉容寂寞花無主顧影低回泣路隅行行漸入陰山路目送征鴻入雲去獨抱琵琶恨更深漢宫不見空回顧曲子回顧漢宫路捍撥檀槽鸞對舞玉容寂寞花無主顧影偷彈玉筯未央宫殿知何處目送征鴻南去右一樂昌公主詩曰金陵往昔帝王州樂昌主第最風流一朝陏兵到江上共抱恓恓去國愁越公萬騎鳴笳鼓劍擁玉人天上去空携破鏡望紅塵千古江楓籠輦路曲子輦路江楓古樓上吹簫人在否菱花半壁香塵汚往日繁華何處舊歡新愛誰為主啼笑兩難分付右二崔徽詩曰蒲中有女號崔徽輕似南山翡翠兒使君當日最寵愛坐中對客常擁持一見裴郎心似醉夜解羅衣與門吏西門寺裏樂未央樂府至今歌翡翠曲子翡翠好容止誰使庸奴輕點綴裴郎一見心如醉笑裏偷傳深意羅衣深夜與門吏暗結城西幽會右三無雙詩曰尚書有女名無雙蛾眉如畫學新妝伊家仙客最明俊舅母唯只呼王郎尚書往日先曾許數載暌違今復遇聞説襄江二十年當時未必輕相慕曲子相慕無雙女當日尚書先曾許王郎明俊神仙侣腸斷别離情苦數年暌恨今復遇笑指襄江歸去右四灼灼詩曰錦城春暖花欲飛灼灼當庭舞柘枝相君上客河東秀自言那得傍人知妾願身為梁上燕朝朝暮暮長相見雲收月墮海沉沉淚滿紅綃寄腸斷曲子腸斷繡簾捲妾願身為梁上燕朝朝暮暮長相見莫遣恩遷情變紅綃粉淚知何恨萬古空傳遺怨右五眄眄詩曰百尺樓髙燕子飛樓上美人顰翠眉將軍一去音容逺只有年年舊燕歸春風昨夜來深院春色依然人不見只餘明月照孤眠回望舊恩空戀戀曲子戀戀樓中燕燕子樓空春日晚將軍一去音容逺空鎖樓中深怨春風重到人不見十二闌干倚遍右六崔鶯鶯詩曰崔家有女名鶯鶯未識春光先有情河橋兵亂依蕭寺紅愁緑慘見張生張生一見春情重明月拂墻花影動夜半紅娘擁抱來脈脈驚魂若春夢曲子春夢神仙洞冉冉拂墻花樹動西廂待月知誰共更覺玉人情重紅娘深夜行雲送困嚲叉橫金鳯右七採蓮詩曰若耶溪邊天氣秋採蓮女兒溪岸頭笑隔荷花共人語煙波渺渺蕩輕舟數聲水調紅嬌晚棹轉舟回笑人逺腸斷誰家遊冶郎盡日踟蹰臨柳岸曲子柳岸水清淺笑折荷花呼女伴盈盈日照新妝面水調空傳幽怨扁舟日暮笑聲逺對此令人腸斷右八煙中怨詩曰鑑湖樓閣與雲齊樓上女兒名阿溪十五能為綺麗句平生未解出幽閨謝郎巧思詩裁剪能使佳人動幽怨瓊枝璧月結芳期斗帳雙雙成眷戀曲子眷戀西湖岸湖面樓臺侵雲漢阿溪本是飛瓊伴風月朱扉斜掩謝郎巧思詩裁翦能動芳懷幽怨右九離魂記詩曰深閨女兒嬌復癡春愁春恨那復知舅兄唯有相拘意暗想花心臨别時離舟欲解春江暮冉冉香魂逐君去重來兩身復一身夢覺春風話心素曲子心素與誰語始信别離情最苦蘭舟欲解春江暮精爽隨君歸去異時携手重來處夢覺春風庭户右十虞美人三首髙城望斷塵如霧不見聮驂處夕陽村外小灣頭只有柳花無數送歸舟瓊枝玉樹頻相見只恨離人逺欲將幽恨寄青樓爭奈無情江水不西流又碧桃天上栽和露不見凡花數亂山深處水縈洄可惜一枝如畫為誰開輕寒細雨情何限不道春難管為君沉醉又何妨秪怕酒醒時候斷人腸又行行信馬橫塘畔煙水秋平岸緑荷多少夕陽中知為阿誰凝恨背西風紅妝艇子來何處蕩槳偷相顧鴛鴦驚起不無愁柳外一雙飛去却回頭點絳唇二首桃源醉漾輕舟信流引到花深處塵緣相誤無計花間住煙水茫茫千里斜陽暮山無數亂紅如雨不記來時路又月轉烏啼畫堂宫徵生離恨美人愁悶不管羅衣褪清淚斑斑揮斷柔腸寸嗔人問背燈偷揾拭盡殘妝粉品令二首幸自得一分索強教人難喫好好地惡了十來日恰而今較些不須管啜持教笑又也何須胳織衠倚賴臉兒得人惜放軟頑道不得又掉又懼天然箇品格於中壓一簾兒下時把鞋兒踢語低低笑咭咭每每秦樓相見見了無限憐惜人前強不欲相沾識把不定臉兒赤南歌子三首玉漏迢迢盡銀潢淡淡橫夢回宿酒未全醒已被鄰雞催起怕天明臂上妝猶在襟間淚尚盈水邊燈火漸人行天外一鈎殘月帶三星又愁鬢香雲墜嬌眸水玉裁月幈風愰為誰開天外不知音耗百般倩玉露沾庭砌金風動琯灰相看有似夢初回只恐又拋人去幾時來又香墨彎彎畫燕脂淡淡勻揉藍衫子杏黃裙獨倚玉闌無語點檀唇人去空流水花飛半掩門亂山何處覔行雲又是一鈎新月照黃昏臨江仙二首千里瀟湘援藍浦蘭橈昔日曾經月髙風定露華清微波澄不動冷浸一天星獨倚危樓情悄悄遙聞妃瑟泠泠新聲含盡古今情曲終人不見江上數峰青又髻子偎人嬌不整眼兒失睡微重尋思模樣早心忪斷腸携手何事太匆匆不忍殘紅猶在臂翻疑夢裡相逢遙憐南埭上孤篷夕陽流水紅滿淚痕中好事近夢中作春路雨添花花動一山春色行到小溪深處有黃鸝千百飛雲當面化龍蛇夭矯轉空碧醉卧古藤陰下了不知南北東坡跋供奉官莫君沔官湖南喜從遷客遊尤為吕元鈞所稱又能誦少遊事甚詳為豫誦此詞至流涕乃録本使藏之魯直跋少遊好事近少遊醉卧古藤下誰與愁眉唱一杯解作江南斷腸句只今惟有賀方回陳後山云今之詞手惟有秦七黃九謂淮海山谷也然詞尚豐潤山谷特瘦健似非秦比此在諸公非其至多出一時之興不自甚惜故散落者多其風懷綺麗者流播人口獨見傳録蓋亦泰山毫芒耳字復舛誤頗為辨正其有一二字不可校者不欲以臆見輒易存闕文之意更俟善本正之嘉靖巳亥中秋日南湖張綖識淮海長短句卷下終
